r (`generate.py`) enriches each search record with generator-controlled `type`/`typeLabel` (synthesized for docs from their bucket key) and a capped, html-escaped body slice; `_reduce_for_size` rebuilds a light names+paths index instead of emptying `search`; every searchable item (incl. TODOs) gets a `stable_id`. `schema.py` enforces the record shape at build time. The renderer (`app.js`) decodes escaped values with a new `htmlUnescape` helper at the `textContent` boundary and the match key, builds an omnibox over `data.search`, builds an `id→row` map during view render, and jumps with scrollIntoView + a transient flash. The data island stays uniformly html-escaped (Phase 1 contract); `textContent`/`&lt;mark&gt;` keep it inert.\n\n**Tech Stack:** stdlib-only Python 3.12 (no runtime deps), vanilla ES5-style IIFE JS in `app.js`, a `&lt;style&gt;`/JSON-island single-file HTML template, pytest + pytest-playwright (test-only extra) DOM tests via `page.set_content`.\n\n---\n\n## File structure\n\n- `src/acc/generate.py` — `_build_search` (add `type`/`typeLabel` incl. docs + capped escaped body slice + `_SEARCH_BODY_CHARS`), `_reduce_for_size` (light index rebuild), the escape pass capturing a raw body slice, TODO `id`s.\n- `src/acc/adapters/base.py` — add `_DOC_TYPE_LABELS` (bucket-key → human label) so docs can get a `typeLabel`; helper `doc_type_label(bucket)`.\n- `src/acc/adapters/generic.py` — give each open-TODO record a `stable_id`.\n- `src/acc/schema.py` — `validate()` enforces every `search` record&#x27;s keys, string types, and known `type`.\n- `src/acc/templates/app.js` — `htmlUnescape` helper; per-row `dataset.id` in `itemRow`/`renderDocs`/`renderTodos`; an `id→row` Map; the omnibox (build/consume/group/snippet/`&lt;mark&gt;`/keyboard/jump); relabel the per-view filter input.\n- `src/acc/templates/dashboard.html.tmpl` — omnibox `&lt;input id=&quot;acc-omnibox&quot;&gt;` + result panel `&lt;div id=&quot;acc-omnibox-results&quot;&gt;`; relabel `#acc-search`.\n- `src/acc/templates/styles.css` — omnibox input/panel, `&lt;mark&gt;`, type chip, `.acc-flash` highlight-flash, active-hit styles.\n- `tests/test_generate.py` — `_build_search` type/typeLabel/escaped-slice/cap/sort; `_reduce_for_size` light index; TODO ids.\n- `tests/test_schema.py` — malformed search-record rejection.\n- `tests/test_render_dom.py` — Playwright DOM: grouping+counts, keyboard, jump+flash, `&lt;mark&gt;`, empty states, `AT&amp;T`, hostile-body inertness.\n- `tests/test_appjs_guard.py` — CI guard grepping `app.js` for banned `innerHTML`/`outerHTML`/`insertAdjacentHTML`.\n\n---\n\n### Task 0: Reconcile branch base (Phase 3 must be present)\n\nThe current branch `feature/phase-4a-find` was cut from a commit **before** Phase 3 merged. The working tree `app.js` (60 lines), `generate.py` (no `_reduce_for_size`/`_WARN_BYTES`), and templates are the pre-Phase-3 versions, but this spec was written against Phase 3 (`itemRow`, `renderInventory`, `_reduce_for_size`, `pathPrefix`, `generator.truncated`, `tests/test_render_dom.py`). All code blocks below assume the Phase 3 base. This task rebases Phase 4a onto Phase 3 so the planned edits apply to real current code.\n\n**Files:**\n- Modify (git history only): branch `feature/phase-4a-find` (currently at `89a2fa5`, parent chain ends at `17bb59a`; Phase 3 lives on `feature/phase-3-renderer` tip `32bf625`).\n\n- [ ] Confirm the mismatch: `git -C . merge-base --is-ancestor feature/phase-3-renderer HEAD; echo $?` — expect `1` (Phase 3 NOT an ancestor).\n- [ ] Confirm","bodyTruncated":true,"id":"9b4f157796c2","path":"docs/superpowers/plans/2026-05-30-ai-control-center-phase-4a-find.md","summary":"**Goal:** Turn the dead `data.search` index into a real global omnibox — type-grouped results with counts, a `&lt;mark&gt;`-highlighted snippet, keyboard nav, focus via `/`, and jump-to-row — plus the reusable per-row-id + id→row jump infra, all via `textContent` only.","title":"Phase 4a — Find Implementation Plan"},{"body":"# Phase 4b — Relationships Implementation Plan\n\n&gt; **For agentic workers:** REQUIRED SUB-SKILL: Use superpowers:subagent-driven-development (recommended) or superpowers:executing-plans to implement this plan task-by-task. Steps use checkbox (`- [ ]`) syntax for tracking.\n\n**Goal:** Populate the empty `relationships: []` with deterministic `reference` (doc→item path mention) and `declares` (config-file→MCP/hook) edges, and render them as inline &quot;Related&quot; blocks plus a &quot;Cross-references&quot; view.\n\n**Architecture:** A new `generate._build_relationships(inv, docs)` emits a sorted, deduped edge list after the search index is built; docs carry a private `_refScanBody` (redacted body, dropped before serialization) for the reference scan; `declares` edges are sourced from synthetic config-file nodes. `schema._validate_relationships` enforces shape + type-aware referential integrity. `app.js` builds an adjacency index and renders Related blocks (non-indexed jump controls) and a source-grouped Cross-references view.\n\n**Tech Stack:** Python 3.12 stdlib (generator), vanilla JS (renderer in a JSON island), pytest + pytest-playwright (real-Chromium DOM tests), ruff.\n\n**Spec:** `docs/specs/phase-4b-relationships.md` (final at commit `1b7333c`).\n\n**Conventions for every task:** stdlib only; deterministic output (sort every list); renderer is `textContent`/`createElement` only — never `innerHTML`; run from the repo root with `python3 -m pytest`. New relationship tests live in `tests/test_relationships.py` unless noted.\n\n---\n\n### Task 1: Adapters carry `_refScanBody` on every doc\n\n**Files:**\n- Modify: `src/acc/adapters/claude.py:82-91` (the `doc` branch)\n- Modify: `src/acc/adapters/codex.py:55-61` (the `AGENTS.md` branch)\n- Modify: `src/acc/adapters/generic.py:114-120` (the doc append)\n- Test: `tests/test_relationships.py`\n\n- [ ] **Step 1: Write the failing test**\n\n```python\n# tests/test_relationships.py\nfrom acc.adapters.base import ScanContext\nfrom acc.adapters.claude import ClaudeAdapter\nfrom tests.builders import make_claude_repo\n\n\ndef _claude_docs(tmp_path):\n    make_claude_repo(tmp_path)\n    files = list(tmp_path.rglob(&quot;*&quot;))\n    ctx = ScanContext(root=tmp_path, files=[f for f in files if f.is_file()])\n    adapter = ClaudeAdapter()\n    part = adapter.normalize(ctx, adapter.detect(ctx)[0])\n    return part[&quot;docs&quot;][&quot;references&quot;]\n\n\ndef test_claude_doc_carries_refscanbody(tmp_path):\n    docs = _claude_docs(tmp_path)\n    claude_md = next(d for d in docs if d[&quot;path&quot;] == &quot;CLAUDE.md&quot;)\n    assert &quot;_refScanBody&quot; in claude_md\n    assert &quot;Project memory and rules.&quot; in claude_md[&quot;_refScanBody&quot;]\n```\n\n- [ ] **Step 2: Run test to verify it fails**\n\nRun: `python3 -m pytest tests/test_relationships.py::test_claude_doc_carries_refscanbody -v`\nExpected: FAIL with `KeyError`/`assert &#x27;_refScanBody&#x27; in ...` (the key is absent).\n\n- [ ] **Step 3: Add `_refScanBody = clean` in all three doc builders**\n\nIn `src/acc/adapters/claude.py`, the `else` (doc) branch currently appends:\n\n```python\n            else:  # &quot;doc&quot; — CLAUDE.md at root or nested under .claude/\n                clean, _ = redact_text(raw)\n                heading = _first_heading(clean) or rel\n                docs[&quot;references&quot;].append({\n                    &quot;id&quot;: make_item(&quot;claude&quot;, &quot;doc&quot;, &quot;Claude instructions&quot;, heading, rel, &quot;&quot;)[&quot;id&quot;],\n                    &quot;title&quot;: heading,\n                    &quot;path&quot;: rel,\n                    &quot;summary&quot;: _first_paragraph(clean),\n                    &quot;html&quot;: render_markdown_safe(clean),\n                    &quot;_refScanBody&quot;: clean,\n                })\n```\n\nIn `src/acc/adapters/codex.py`, the `AGENTS.md` branch:\n\n```python\n                docs[&quot;references&quot;].append({\n                    &quot;id&quot;: make_item(&quot;codex&quot;, &quot;doc&quot;, &quot;Codex instructions&quot;, heading, rel, &quot;&quot;)[&quot;id&quot;],\n                    &quot;title&quot;: heading,\n                    &quot;path&quot;: rel,\n                    &quot;summary&quot;: _first_paragraph(clean),\n                    &quot;html&quot;: render_markdown_safe(clean),\n                    &quot;_refScanBody&quot;: clea","bodyTruncated":true,"id":"8a829518d49e","path":"docs/superpowers/plans/2026-05-30-ai-control-center-phase-4b-relationships.md","summary":"**Goal:** Populate the empty `relationships: []` with deterministic `reference` (doc→item path mention) and `declares` (config-file→MCP/hook) edges, and render them as inline &quot;Related&quot; blocks plus a &quot;Cross-references&quot; view.","title":"Phase 4b — Relationships Implementation Plan"},{"body":"# AI control center dashboard — design spec\n\nDate: 2026-05-29\nStatus: approved for planning\nProject: html-dash\n\n## Problem\n\nMarkdown is the right format for AI agents in a repo. Config, intent, decisions, and capability definitions all live there: `CLAUDE.md`, `AGENTS.md`, Cursor rules, skills, agents, hooks, commands, MCP config, PRDs, ADRs. Agents read and write it well.\n\nFor a human it gets hard fast. Once a repo holds twenty-plus markdown files spread across `.claude/`, `docs/`, and the tree, a person loses the thread: what exists, how pieces connect, what was decided and why, where the project stands. The information is all there and none of it is navigable.\n\n## Goal\n\nKeep markdown as the source of truth for the machine. Add a second layer for the human: one self-contained HTML file that is the read-oriented control center for everything AI in the project. The human opens one file and sees scope, the inventory of skills/agents/hooks/commands/MCP/rules, PRDs, decisions, doc index, project state, and how things relate. Markdown for the machine, HTML for the human.\n\nThe product ships as a public skill plus a marketplace plugin. The skill, the bundled generator, and the HTML it produces are the entire product.\n\n## Hard constraints\n\nThese are the point of the product, not preferences.\n\n- One standalone HTML file. Self-contained, opens from `file://` with no server, no build step, no framework, and nothing added to the user&#x27;s repo at runtime.\n- Lives under the AI-provider folder (`.claude/`, `.codex/`, `.cursor/`), never in the source tree. A loose `.html` in the repo root or `src/` collides with web-framework globs (Vite `**/*.html`, Angular and Next entry points). Under the provider folder it is inert to any build.\n- Works on greenfield and brownfield repos, and on repos that are not under git.\n- Init-triggered: provider init produces the markdown and the HTML together; later markdown changes re-stamp the HTML.\n\n## Decisions and rationale\n\nThese were resolved during design. Each one closes off an alternative on purpose.\n\n1. Committed and shared. The HTML is checked in and travels with the repo, treated like `CLAUDE.md` and `AGENTS.md`. Consequence: output must be deterministic or every re-stamp churns the diff, and redaction is mandatory because the file can be pushed to a public remote.\n2. Project-level state, not personal. &quot;Where we left off&quot; is reframed as shared, derivable facts: current milestone, last decision, open TODOs found in docs, recently touched docs. No per-user or session data, and no live repo state (branch, dirty tree, mtimes) in a committed artifact, since those churn or go stale the instant they are written.\n3. Hybrid generation, deterministic extractor first. A bundled deterministic scanner is the canonical extractor that produces the committed JSON. The model is demoted to an optional layer that only writes summaries over already-redacted text, and that powers the generic fallback on repos with no known structure. The model never emits canonical structure. This keeps diffs stable and redaction enforceable while preserving flexibility on messy repos.\n4. Multi-provider in v1, inventory-first. First-class adapters for Claude Code, Codex, and Cursor; a generic fallback adapter covers everything else and bare repos. Thin per-provider adapters map native conventions into one superset schema. Items keep their native type label (a Cursor rule shows as a Cursor rule, never a fake &quot;skill&quot;). The renderer and schema stay provider-agnostic; sections with no data hide. v1 shows native inventory, paths, links, and relationships, and defers deep workflow interpretation.\n5. Lean ambition. Build a trusted inventory and map first. Nail refresh, redaction, stable diffs, links, and provider-native inventory before adding interpretation.\n\n## Architecture\n\n### Components\n\n- Generator: a bundled `python3` script (present on macOS and most Linux, no install). It is the canonical deterministic extractor and the thing that writes ","bodyTruncated":true,"id":"f53b173c2722","path":"docs/superpowers/specs/2026-05-29-ai-control-center-design.md","summary":"Date: 2026-05-29","title":"AI control center dashboard — design spec"},{"body":"# AI control center — Phase 2 (first-class provider adapters) design\n\nDate: 2026-05-29\nStatus: approved for planning\nProject: html-dash (AI Control Center)\nBuilds on: `2026-05-29-ai-control-center-design.md` (v1 design), Phase 1 (merged)\n\n## Scope\n\nPhase 2 adds three first-class provider adapters — Claude Code, Codex, and Cursor — that map native conventions into the superset schema&#x27;s inventory. It activates the allowlist redaction tier for structured config, and produces one merged dashboard across every detected provider folder via the owner rule. The generic adapter stays as the fallback for everything else.\n\nPhase 2 is data-only. The renderer still shows docs and TODOs (Phase 1). The bento Overview and Inventory views that surface this data are Phase 3. After Phase 2 the JSON island is richer; the visible page is unchanged.\n\nLocked decisions from brainstorming:\n\n1. Inventory parity per provider — list standard artifacts (name, native type label, path, redacted summary). No relationship extraction; the Map is Phase 3.\n2. Fixtures are built in-test with reusable builder helpers (no committed fixture trees).\n3. Data-only — no renderer changes in this phase.\n4. `validate()` gains an `assert_no_secrets` tripwire that re-scans the serialized output.\n5. Codex saved prompts map into the existing `commands` bucket with a native label, not a new bucket.\n6. Owner precedence is `.claude` &gt; `.codex` &gt; `.cursor`, then `.ai-control-center`.\n\n## Hard constraints carried from v1\n\n- Stdlib only at runtime. No PyYAML, no third-party parsers. Codex TOML uses stdlib `tomllib`.\n- Deterministic output: sorted collections, stable IDs, repo-relative POSIX paths, no timestamps or mtimes.\n- Redaction at extraction. Structured config is allowlisted (fail closed); prose runs the secret scanner.\n- One self-contained HTML file under the owning provider folder.\n\n## Architecture\n\n### New shared modules\n\n**`src/acc/frontmatter.py`** — `parse_frontmatter(text: str) -&gt; tuple[dict, str]`.\n\nA minimal reader for the YAML subset that real Claude and Cursor artifacts use. It handles a leading `---` fence, `key: value` pairs, single/double-quoted strings, inline lists `[a, b]`, block lists (`- item` under a key), and booleans (`true`/`false`). It does not handle nested maps or anchors. A line it cannot parse is skipped, never raised. Returns the parsed fields and the body after the fence. When there is no fence, fields are `{}` and the body is the whole text.\n\nThis is the stdlib-safe answer to reading frontmatter without PyYAML. The fields the adapters consume are shallow (`name`, `description`, `model`, `tools`, `argument-hint`, `globs`, `alwaysApply`), which this subset covers.\n\n**`src/acc/config.py`** — safe structured-config loaders and the allowlists.\n\n- `load_json(path) -&gt; dict` for `.mcp.json`, `.claude/settings.json`, `.cursor/mcp.json`. Returns `{}` on missing or malformed input.\n- `load_toml(path) -&gt; dict` over stdlib `tomllib` for `.codex/config.toml`. Returns `{}` on missing or malformed input.\n- `MCP_ALLOWED = {&quot;command&quot;, &quot;args&quot;, &quot;type&quot;, &quot;url&quot;}` (`type` is the real MCP-config transport key — stdio/http/sse) and any other per-config-type allowlists. Loaders never raise on bad input, and `as_dict()` coerces a well-formed-but-wrong-shape container so a broken config yields an empty result, not a crash.\n\n### Adapters\n\nEach adapter implements `detect(ctx) -&gt; list[ProviderRoot]` and `normalize(ctx, root) -&gt; dict` (a schema partial), reusing `ids`, `redaction`, `frontmatter`, `config`, and `markdown`. Adapters never import each other. Every item keeps its native type label.\n\n**`src/acc/adapters/claude.py` — `ClaudeAdapter`**\n\n- detect: a `.claude/` directory, or a root `CLAUDE.md`.\n- inventory:\n  - agents — `.claude/agents/*.md`; frontmatter `name`, `description`, `model`, `tools`. Type label &quot;Claude agent&quot;.\n  - commands — `.claude/commands/**/*.md`; frontmatter `description`, `argument-hint`. Type label &quot;Claude command&quot;.\n  - skills — `.claude/skills/*/SKILL","bodyTruncated":true,"id":"1397b9aee5d8","path":"docs/superpowers/specs/2026-05-29-ai-control-center-phase-2-adapters-design.md","summary":"Date: 2026-05-29","title":"AI control center — Phase 2 (first-class provider adapters) design"},{"body":"# AI control center — Phase 3 (renderer: Overview + Inventory) design\n\nDate: 2026-05-30\nStatus: approved for planning (revised after Codex design debate)\nProject: html-dash (AI Control Center)\nBuilds on: `2026-05-29-ai-control-center-design.md` (v1 design), Phase 1 and Phase 2 (merged)\n\n## Scope\n\nPhase 3 builds the human-facing views over the data that Phases 1 and 2 already put in the JSON island. Today the renderer shows Docs and TODOs and leaves an empty Overview; the inventory the adapters produce is in the island but never drawn. Phase 3 adds two views — a bento Overview and an Inventory view grouped by type — wires path links to source files, and adds the output size budget that Phase 2 parked here.\n\nPhase 3 is render-first. The data changes are two small fields: `source.pathPrefix` for path links and `generator.truncated` for the size budget. No adapter behavior changes.\n\nLocked decisions from brainstorming:\n\n1. Inventory view groups by type (one block per non-empty bucket), with a provider chip and the native type label on every row. Empty buckets hide. Display order is a fixed constant.\n2. Overview is a bento grid of cards built from real data only: providers detected, inventory counts, open TODOs, docs count. Cards with no data do not render. The spec&#x27;s milestone and last-decision cards stay out — no source produces them yet.\n3. Items are rows, not expandable panels. The path is a clickable relative link to the source file. No inline markdown rendering, so no HTML-injection path enters in this phase.\n4. Tests are Python HTML-string/contract assertions plus real DOM tests via Playwright in CI (decided after the Codex debate, which showed string-presence checks cannot catch runtime href/DOM breakage). Playwright is a test-only dependency; the generator and renderer stay dependency-free.\n5. The full size budget lands here: warn over 1 MB, switch to a summary-only island over 2 MB.\n\n## Hard constraints carried from v1\n\n- Stdlib only at runtime. The generator and the rendered dashboard add no dependencies. Only the test layer gains Playwright.\n- The renderer is classic inline JavaScript in one IIFE. No ES modules (they fail over `file://`), no CDN, no framework.\n- `textContent` for all author-derived text. The only attribute set from data is the path link `href`, built by per-segment URL-encoding (below). No `innerHTML`, so the stored-XSS posture is unchanged.\n- Deterministic output: fixed section and bucket order, the island stays canonical and sorted, no timestamps or mtimes.\n- One self-contained HTML file under the owning provider folder.\n\n## Architecture\n\n### Renderer (`src/acc/templates/`)\n\n**`app.js`** grows from four render functions to six, plus one shared row builder. The existing IIFE, `el()` helper, and `wireSearch()` stay.\n\n- `itemRow(opts)` — the shared DOM builder. `opts` is `{provider?, typeLabel?, title, path, summary?}`. It builds a row with an optional provider chip (`.acc-chip`), an optional type-label badge (`.badge`), the title, an optional summary line, and the path. `renderDocs`, `renderTodos`, and `renderInventory` all route through it, removing the row-building duplication that exists today. It sets `row.dataset.search` from the row&#x27;s own text (title, path, summary), so search keeps working independent of the island&#x27;s `search` array.\n- Path link — the path renders as `&lt;a class=&quot;path&quot;&gt;` when a usable prefix exists, else as plain text. The `href` is built by encoding the **combined** relative path (prefix and path together) segment by segment, preserving only `.` and `..` segments:\n\n  ```js\n  function encodedRelHref(prefix, path) {\n    var raw = (prefix === &quot;.&quot; ? path : prefix + &quot;/&quot; + path);\n    return raw.split(&quot;/&quot;).map(function (seg) {\n      return seg === &quot;.&quot; || seg === &quot;..&quot; ? seg : encodeURIComponent(seg);\n    }).join(&quot;/&quot;);\n  }\n  ```\n\n  Encoding the whole combined path (not just `item.path`) matters because `pathPrefix` is a general `relpath` and, when the out dir sits outside the repo, can itse","bodyTruncated":true,"id":"3fc51374c4da","path":"docs/superpowers/specs/2026-05-30-ai-control-center-phase-3-renderer-design.md","summary":"Date: 2026-05-30","title":"AI control center — Phase 3 (renderer: Overview + Inventory) design"},{"body":"# Examples\n\nThree tiny, self-contained repos that show what `acc` picks up. Each one is safe to copy,\nholds no real secrets, and works offline. Install the CLI once:\n\n```bash\npip install &quot;git+https://github.com/omerakben/agent-context-center&quot;   # stdlib only, no deps\n```\n\nThen `cd` into any example and run:\n\n```bash\nacc --root .\n```\n\n`acc` prints the path it wrote, a source digest, the file count, and the providers it\ndetected. Open the generated `dashboard.html` in a browser — it needs no server.\n\n## The three examples\n\n- [`minimal/`](minimal/) — the smallest case: one `CLAUDE.md`, one docs note, one open\n  TODO. Shows scope, the doc index, and the TODO list with nothing else in the way.\n- [`claude-codex-cursor/`](claude-codex-cursor/) — three providers in one repo: Claude\n  Code, Codex, and Cursor. Shows the per-provider inventory, a Claude agent, a Cursor rule\n  with a frontmatter description, and a docs entry.\n- [`mcp-and-skills/`](mcp-and-skills/) — config-heavy: a `.claude/settings.json` with a\n  hooks block and an MCP server, a Claude skill, and a root `.mcp.json`. Shows how hooks\n  and MCP servers land in the inventory and how `${ENV}` placeholders stay out of the\n  output.\n\nEach example folder has its own `README.md` with the same instructions and what to look\nfor.\n\n## A note on the MCP example\n\n`mcp-and-skills/.claude/settings.json` references a database password as\n`&quot;${PGPASSWORD}&quot;` — an environment-variable placeholder, never a real value. The generator\nallowlists MCP config to `command`, `args`, `type`, and `url`; the `env` block is dropped\nbefore anything reaches the HTML. The placeholder is there to show that even a referenced\nsecret name does not appear in the dashboard.\n","id":"44ab9d50c563","path":"examples/README.md","summary":"Three tiny, self-contained repos that show what `acc` picks up. Each one is safe to copy,","title":"Examples"},{"body":"---\nname: migration-reviewer\ndescription: Reviews a database migration for safety before it ships — locks, backfills, reversibility.\n---\n\nYou review a single SQL migration for a Postgres database under load.\n\nCheck for:\n\n- Statements that take a long lock on a large table (column type changes, non-concurrent\n  index builds, `NOT NULL` adds without a default).\n- Backfills that scan a whole table in one statement instead of in batches.\n- Whether the change is reversible, and whether a down migration exists.\n\nReport findings as a short list. Do not edit the migration; describe the risk and a safer\nalternative for each item.\n","id":"9cffb4fc8d76","path":"examples/claude-codex-cursor/.claude/agents/migration-reviewer.md","summary":"You review a single SQL migration for a Postgres database under load.","title":"examples/claude-codex-cursor/.claude/agents/migration-reviewer.md"},{"body":"# Checkout API (Codex)\n\nSame repo as `CLAUDE.md`, read by Codex. TypeScript, Node 22, Express, Postgres.\n\n## Conventions\n\n- Source in `src/`, tests in `tests/`, one test file per route.\n- Run `npm run typecheck &amp;&amp; npm test` before opening a pull request.\n- Database access goes through `src/db.ts`. No raw `pg` calls in route handlers.\n","id":"3803e0f7856d","path":"examples/claude-codex-cursor/AGENTS.md","summary":"Same repo as `CLAUDE.md`, read by Codex. TypeScript, Node 22, Express, Postgres.","title":"Checkout API (Codex)"},{"body":"# Checkout API\n\nA REST API for cart and checkout. TypeScript, Node 22, Express, Postgres.\n\n## Rules\n\n- Money is integer cents. Never floats for currency.\n- Every route validates its body with Zod before touching the database.\n- One migration per pull request. Migrations are append-only; never edit a shipped one.\n- Run the `.claude/agents/migration-reviewer.md` agent on every migration before merge.\n- Read `docs/adr/0001-idempotency-keys.md` before changing the checkout endpoint.\n","id":"085befb63963","path":"examples/claude-codex-cursor/CLAUDE.md","summary":"A REST API for cart and checkout. TypeScript, Node 22, Express, Postgres.","title":"Checkout API"},{"body":"# claude-codex-cursor\n\nOne repo, three providers: Claude Code, Codex, and Cursor.\n\n## Run it\n\n```bash\nacc --root .\n```\n\nThis repo has a `.claude/` directory, so the dashboard lands at `.claude/dashboard.html`.\nThe command prints the path and lists the providers it detected. Open the file in a\nbrowser.\n\n## What to look for\n\n- **Providers**: `claude`, `codex`, and `cursor`, each detected from its own files.\n- **Agents**: `migration-reviewer`, from `.claude/agents/migration-reviewer.md`. Its name\n  and summary come from the frontmatter.\n- **Rules**: the Cursor rule `style`, from `.cursor/rules/style.mdc`. Its summary is the\n  `description` field in the frontmatter.\n- **Docs**: the ADR at `docs/adr/0001-idempotency-keys.md`. It is indexed as generic\n  Markdown and lands under references — `acc` does not classify ADRs as a distinct type\n  yet, so it shows up as a doc entry, not a tagged decision.\n- **Cross-references**: `CLAUDE.md` names the path `.claude/agents/migration-reviewer.md`,\n  so the relationships view shows a reference edge from `CLAUDE.md` to that agent. Reference\n  edges link a doc to an inventory item (agent, skill, hook, command, MCP server, rule) by\n  its exact repo-relative path; doc-to-doc links are not built, so naming the ADR path does\n  not create an edge.\n\n## Files\n\n```\nCLAUDE.md\nAGENTS.md\n.cursor/rules/style.mdc\n.claude/agents/migration-reviewer.md\ndocs/adr/0001-idempotency-keys.md\n```\n","id":"6b209adb9178","path":"examples/claude-codex-cursor/README.md","summary":"One repo, three providers: Claude Code, Codex, and Cursor.","title":"claude-codex-cursor"},{"body":"# 0001 — Idempotency keys on checkout\n\nStatus: accepted\nDate: 2026-05-31\n\n## Context\n\nClients retry the checkout request on network timeouts. Without a guard, a retry can charge\nthe cart twice.\n\n## Decision\n\nThe checkout endpoint requires an `Idempotency-Key` header. The first request with a given\nkey runs and stores its result keyed by that value. Later requests with the same key return\nthe stored result instead of charging again. Keys expire after 24 hours.\n\n## Consequences\n\n- Clients must generate and reuse a key per checkout attempt.\n- Storage needs an `idempotency_keys` table with a TTL sweep.\n","id":"e2b7db5e8202","path":"examples/claude-codex-cursor/docs/adr/0001-idempotency-keys.md","summary":"Status: accepted","title":"0001 — Idempotency keys on checkout"},{"body":"---\nname: seed-db\ndescription: Load the local Postgres database with a small set of sample rows for development.\n---\n\nSeed the development database with sample data.\n\nSteps:\n\n1. Confirm the database connection variables are set in the local environment. Do not read\n   or print their values.\n2. Run `npm run db:reset` to drop and recreate the schema.\n3. Run `npm run db:seed` to insert the sample rows.\n4. Print the row count per table so the user can confirm the seed worked.\n\nStop and report if any step exits non-zero. Do not retry against a different database.\n","id":"7b05a67e8cd5","path":"examples/mcp-and-skills/.claude/skills/seed-db/SKILL.md","summary":"Seed the development database with sample data.","title":"examples/mcp-and-skills/.claude/skills/seed-db/SKILL.md"},{"body":"# Reporting service\n\nA service that reads Postgres and writes daily CSV reports. Node 22, Postgres.\n\n## Rules\n\n- All database connections come from environment variables. Never hardcode credentials.\n- Reports write to `./out`, one file per day, named `YYYY-MM-DD.csv`.\n- Use the `seed-db` skill to set up local data before running the report job.\n","id":"03e3af6feed2","path":"examples/mcp-and-skills/CLAUDE.md","summary":"A service that reads Postgres and writes daily CSV reports. Node 22, Postgres.","title":"Reporting service"},{"body":"# mcp-and-skills\n\nA config-heavy repo: a hooks block, two MCP servers, and a skill. Shows how `acc` reads\n`.claude/settings.json` and `.mcp.json`, and that `${ENV}` placeholders never reach the\noutput.\n\n## Run it\n\n```bash\nacc --root .\n```\n\nThe dashboard lands at `.claude/dashboard.html`. Open it in a browser.\n\n## What to look for\n\n- **Hooks**: one `PostToolUse (Edit)` hook from `.claude/settings.json`, with its command\n  `npm run lint --silent`.\n- **MCP servers**: `postgres` from `.claude/settings.json` and `filesystem` from\n  `.mcp.json`. Each shows its `command` and `args`.\n- **Skills**: `seed-db`, from `.claude/skills/seed-db/SKILL.md`, with its frontmatter name\n  and description.\n\n## On the `${PGPASSWORD}` placeholder\n\n`.claude/settings.json` lists an `env` block with `&quot;PG[redacted]` — an\nenvironment-variable name, not a value. The generator allowlists MCP config to `command`,\n`args`, `type`, and `url`. The whole `env` block is dropped before rendering: open the\n`postgres` MCP server in the dashboard and you see only its `command` and `args`. The `env`\nkeys and the `${PGPASSWORD}` placeholder are not in the rendered config.\n\nThis holds for any value placed in a dropped config field, real or placeholder. It is a\nproperty of the allowlist, not a full secret scanner. Free-form prose runs through a\nseparate high-precision scanner that favors precision over recall, so review a generated\ndashboard before publishing one from a repo with unusual secrets.\n\n## Files\n\n```\nCLAUDE.md\n.claude/settings.json\n.claude/skills/seed-db/SKILL.md\n.mcp.json\n```\n","id":"053328ed7e44","path":"examples/mcp-and-skills/README.md","summary":"A config-heavy repo: a hooks block, two MCP servers, and a skill. Shows how `acc` reads","title":"mcp-and-skills"},{"body":"# Notes service\n\nA small HTTP service for personal notes. Python 3.12, FastAPI, SQLite.\n\n## Rules\n\n- Run `pytest` before every commit; do not commit on a red suite.\n- Keep request handlers thin. Validation goes in `schemas.py`, storage in `store.py`.\n- Use parameterized SQL only. No string-built queries.\n- Read `docs/storage.md` before changing the database layer.\n","id":"93c51cf17c63","path":"examples/minimal/CLAUDE.md","summary":"A small HTTP service for personal notes. Python 3.12, FastAPI, SQLite.","title":"Notes service"},{"body":"# minimal\n\nThe smallest input `acc` accepts: one `CLAUDE.md`, one docs note, one open TODO.\n\n## Run it\n\n```bash\nacc --root .\n```\n\n`acc` writes `dashboard.html` into the detected provider folder. A `CLAUDE.md` at the root\ncounts as the Claude Code provider, so the dashboard lands at `.claude/dashboard.html` even\nthough this repo has no `.claude/` directory of its own. The command prints the exact path.\nOpen it in a browser.\n\n## What to look for\n\n- **Scope** comes from the `CLAUDE.md` heading and lead paragraph.\n- **Docs** lists `docs/storage.md`.\n- **Open TODOs** shows the one `- [ ]` line from `docs/storage.md`. Plain `TODO:` comments\n  are not counted; only Markdown checkbox lines are.\n\n## Files\n\n```\nCLAUDE.md\ndocs/storage.md\n```\n","id":"a002ad8dd401","path":"examples/minimal/README.md","summary":"The smallest input `acc` accepts: one `CLAUDE.md`, one docs note, one open TODO.","title":"minimal"},{"body":"# Storage\n\nNotes live in a single SQLite file, `notes.db`, created on first write. One table:\n\n| column     | type    | notes                         |\n| ---------- | ------- | ----------------------------- |\n| id         | INTEGER | primary key, autoincrement    |\n| body       | TEXT    | note text, not null           |\n| created_at | TEXT    | ISO 8601 timestamp, UTC       |\n\n`store.py` owns the connection and all queries. Handlers never touch SQL directly.\n\n## Open work\n\n- [ ] Add a `created_at` index before the table grows past a few thousand rows.\n","id":"64c590a81952","path":"examples/minimal/docs/storage.md","summary":"Notes live in a single SQLite file, `notes.db`, created on first write. One table:","title":"Storage"},{"body":"---\nname: agent-context-center\ndescription: Generate, refresh, or open this repo&#x27;s Agent Context Center dashboard — a single self-contained offline HTML file that inventories the repo&#x27;s AI configuration (agents, skills, hooks, commands, MCP servers, rules, docs, open TODOs). Use when the user asks to build, refresh, regenerate, or view that dashboard, and to re-stamp it after editing the repo&#x27;s AI markdown when a dashboard.html already exists under a provider folder.\nversion: 1.0.0\n---\n\n# Agent Context Center\n\nOne committed HTML file mirrors a repo&#x27;s AI markdown so a human can navigate it.\nMarkdown stays the source of truth for the machine; the dashboard is the read view for\nthe person. The generator is stdlib Python 3.12+, runs offline, and produces\nbyte-stable output.\n\n## Generate or refresh\n\nRun the `/dashboard` command. It selects a Python 3.12+ interpreter, runs the bundled\ngenerator against the user&#x27;s project with no install and no network, and reports the\nwritten path, `sourceDigest`, and scanned-file count. The dashboard is written under the\nowning provider folder (`.claude/`, `.codex/`, or `.cursor/`), never the source tree, so\nit stays inert to web builds.\n\nIf more than one provider dashboard already exists, the generator stops and asks for an\nowner; re-run with `--owner &lt;dir&gt;`.\n\n## Keep it fresh (the default tier)\n\nAfter you edit this repo&#x27;s AI markdown (CLAUDE.md, AGENTS.md, an agent, skill, hook,\ncommand, MCP config, or rule) **and a `dashboard.html` already exists** under a provider\nfolder, re-run `/dashboard` so the human view stays in sync. Refresh is manual by\ndesign: a static `file://` page cannot tell it is stale. For automatic refresh, point\nthe user at the opt-in templates in the plugin&#x27;s `templates/refresh/` (a git post-commit\nhook, a file-write hook snippet, and a CI drift check).\n\n## Enriching the dashboard — the only safe path\n\nThe generator writes every field, redacts secrets at extraction, and re-scans the\nassembled output with a tripwire. To add or improve a summary, **edit the source\nmarkdown and re-run `/dashboard`** so redaction and the tripwire re-fire over your text.\n\n- Never hand-edit `dashboard.html` or any generated file. A value written straight into\n  the output bypasses redaction and the tripwire entirely.\n- When you write prose into source markdown, describe purpose and intent only. Never\n  copy, quote, or paraphrase a literal value from a config file, an env block, a header,\n  or a URL. The prose redactor is high-precision, not an entropy scanner, so a bare\n  high-entropy token with no telltale prefix can slip through — do not rely on it to\n  catch a value you pasted.\n\n## Invariants you must not undo\n\nDeterministic output (re-stamping a clean repo produces no diff), redaction at\nextraction, and a `textContent`-only render are guarantees the generator enforces. Do\nnot disable them, post-process the HTML, or inject raw markup. If a change would weaken\nany of them, stop and surface it instead.\n","id":"a3b5f45f1608","path":"skills/agent-context-center/SKILL.md","summary":"One committed HTML file mirrors a repo&#x27;s AI markdown so a human can navigate it.","title":"Agent Context Center"},{"body":"# Refresh templates (opt-in)\n\nRefresh is manual by default: a static `file://` page cannot detect that it is stale.\nThe active tiers are the `/dashboard` command and the agent re-stamping after it edits AI\nmarkdown. These three templates add automatic refresh — none is active until you install\nit yourself.\n\nThey are shipped as files (not as a plugin `hooks/hooks.json`) on purpose: a plugin hook\nwould activate on enable and regenerate the dashboard on every edit. Auto-installed hooks\nare a v2 item; v1 keeps them opt-in.\n\n| Template | What it does | Install |\n| --- | --- | --- |\n| `git-post-commit` | Re-stamps and stages the dashboard after each commit | `cp templates/refresh/git-post-commit .git/hooks/post-commit &amp;&amp; chmod +x .git/hooks/post-commit` |\n| `claude-file-write-hook.json` | Re-stamps after the agent edits a file | Paste its `hooks` block into your `.claude/settings.json` |\n| `ci-drift-check.yml` | Fails CI if the committed dashboard is stale | `cp templates/refresh/ci-drift-check.yml .github/workflows/acc-drift.yml` |\n\n## The generator must be available\n\nThe `/dashboard` command finds the generator inside the installed plugin automatically.\nThese templates run **outside** Claude Code&#x27;s plugin context, so they need the `acc`\ngenerator reachable on their own. Pick one:\n\n- Install it (stdlib-only, no third-party deps):\n  `pip install &quot;git+https://github.com/omerakben/agent-context-center&quot;` — gives you `acc`.\n- Or point at a checkout without installing: set `ACC=&quot;python3 -m acc.cli&quot;` and export\n  `PYTHONPATH=/path/to/agent-context-center/src` for the git hook; use the same form in the\n  Claude Code hook command.\n\nThe `git-post-commit` hook reads `ACC` (default `acc`) and no-ops with a message if the\ncommand is missing, so a teammate without the generator is never blocked from committing.\n\n## Notes\n\n- All three are safe to run repeatedly: the generator is deterministic, so an unchanged\n  repo regenerates byte-identical output and produces no diff.\n- The git hook stages the refreshed dashboard for the **next** commit (a post-commit hook\n  cannot amend the commit in progress). The CI drift check is the backstop that catches\n  any lag on shared repos.\n- Prefer keeping the dashboard in the same commit? Use the same body as a `pre-commit`\n  hook instead, which re-stamps and `git add`s before the commit is created.\n","id":"1e2e5d799f72","path":"templates/refresh/README.md","summary":"Refresh is manual by default: a static `file://` page cannot detect that it is stale.","title":"Refresh templates (opt-in)"}],"workflows":[]},"generator":{"name":"agent-context-center","rendererDigest":"","truncated":false,"version":"1.3.0"},"inventory":{"agents":[],"commands":[],"hooks":[],"mcpServers":[],"rules":[],"skills":[]},"project":{"openTodos":[{"id":"6f08d997e0e4","path":".github/PULL_REQUEST_TEMPLATE.md","text":"Determinism preserved — output is byte-stable; new lists are explicitly sorted"},{"id":"0909242dad12","path":".github/PULL_REQUEST_TEMPLATE.md","text":"Docs updated — README / CONTRIBUTING / inline comments reflect the change"},{"id":"09ee027dac3f","path":".github/PULL_REQUEST_TEMPLATE.md","text":"No `innerHTML` in `app.js` — renderer stays textContent-only (the `test_appjs_guard` check passes)"},{"id":"43638ad5fff5","path":".github/PULL_REQUEST_TEMPLATE.md","text":"Redaction runs before render — secret-shaped values are scrubbed at extraction, and the output tripwire still holds"},{"id":"f01df23dbb93","path":".github/PULL_REQUEST_TEMPLATE.md","text":"no — this PR does not change scanner, adapter, schema, or renderer output"},{"id":"bbdd6768fecb","path":".github/PULL_REQUEST_TEMPLATE.md","text":"yes — I ran `acc --root .` and committed the regenerated dashboard.html"},{"id":"57ecbbc1ce8b","path":"docs/superpowers/plans/2026-05-29-ai-control-center-phase-1-core.md","text":"**Step 1: Create `pyproject.toml`**"},{"id":"c8dfb5bd97f9","path":"docs/superpowers/plans/2026-05-29-ai-control-center-phase-1-core.md","text":"**Step 1: Create `templates/styles.css`**"},{"id":"562201bcbafd","path":"docs/superpowers/plans/2026-05-29-ai-control-center-phase-1-core.md","text":"**Step 1: Write the failing test**"},{"id":"562201bcbafd","path":"docs/superpowers/plans/2026-05-29-ai-control-center-phase-1-core.md","text":"**Step 1: Write the failing test**"},{"id":"562201bcbafd","path":"docs/superpowers/plans/2026-05-29-ai-control-center-phase-1-core.md","text":"**Step 1: Write the failing test**"},{"id":"562201bcbafd","path":"docs/superpowers/plans/2026-05-29-ai-control-center-phase-1-core.md","text":"**Step 1: Write the failing test**"},{"id":"562201bcbafd","path":"docs/superpowers/plans/2026-05-29-ai-control-center-phase-1-core.md","text":"**Step
