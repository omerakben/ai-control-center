<style>/* Agent Context Center — dark, TUEL-branded theme.
   A repo-native trust surface: calm, dark, source-linked. Design language from
   docs/vision/ai-control-center-mission.html. Class hooks match app.js exactly.

   TUEL AI brand: emerald (--accent) is the attention cursor — focus, search
   match, active nav, hover. Teal (--accent-2) is the relationship layer, on a
   near-black navy ground with warm off-white ink. Resting chrome is neutral. */
:root {
  color-scheme: dark;
  --bg: #05080c;
  --panel: rgba(17, 22, 29, .72);
  --panel-2: rgba(255, 255, 255, .03);
  --panel-3: rgba(255, 255, 255, .055);

  --accent: #00c781;
  --accent-2: #08b6af;
  --good: #aef1bb;
  --warn: #fde68a;
  --danger: #fca5a5;
  --radius: 16px;
  --radius-sm: 11px;
  --measure: 72ch;
  --shell: 1180px;
  --shadow-card: 0 1px 0 rgba(255, 255, 255, .04) inset, 0 8px 28px rgba(0, 0, 0, .28);

  --mono: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", monospace;

}
* { box-sizing: border-box; }
html { scroll-behavior: smooth; scroll-padding-top: 104px; }

  margin: 0;
  font: 14px/1.6 var(--sans);
  letter-spacing: -.011em;
  color: var(--ink);
  background: var(--bg);

body::before {
  content: "";
  position: fixed;
  inset: 0;
  z-index: -1;

  background:
    radial-gradient(circle at 15% -10%, rgba(0, 199, 129, .13), transparent 32rem),
    radial-gradient(circle at 96% -4%, rgba(8, 182, 175, .12), transparent 34rem),
    linear-gradient(180deg, #05080c 0%, #070b10 54%, #05080c 100%);
}

/* Sticky header — glass bar with the repo name in an accent gradient. */
header.acc-head {
  position: sticky;
  top: 0;
  z-index: 30;

.acc-meta {

/* Sticky jump-nav — mono pills with a scroll-spy active state. */
nav.acc-nav {

/* Search inputs. */
.acc-omnibox-wrap { position: relative; flex: 1 1 280px; max-width: 520px; }

  width: 100%;
  padding: 9px 14px;
  border: 1px solid var(--line-strong);
  border-radius: 11px;
  background: rgba(255, 255, 255, .04);
  color: var(--ink);
  font: 13px/1.4 var(--sans);
}
#acc-omnibox::placeholder, #acc-search::placeholder { color: var(--faint); }
#acc-omnibox:focus, #acc-search:focus {
  outline: none;
  border-color: var(--accent);
  box-shadow: 0 0 0 3px rgba(0, 199, 129, .16);
}
#acc-search { flex: 0 1 200px; }

.acc-omnibox-results {
  position: absolute;
  top: calc(100% + 6px);
  left: 0; right: 0;
  z-index: 40;
  max-height: 62vh;
  overflow: auto;
  background: linear-gradient(180deg, #0d141b, #080d12);
  border: 1px solid var(--line-strong);
  border-radius: 14px;
  box-shadow: var(--shadow-float);
  padding: 6px;
}
.acc-omnibox-results[hidden] { display: none; }
.acc-omni-group { padding: 4px 2px; }
.acc-omni-grouphead {
  text-transform: uppercase; letter-spacing: .08em;
  font-family: var(--mono); font-size: 10px; color: var(--faint); margin: 8px 4px 2px;
}
.acc-omni-hit { display: flex; gap: 8px; align-items: baseline; flex-wrap: wrap; padding: 7px 9px; border-radius: 9px; cursor: pointer; }
.acc-omni-hit:hover, .acc-omni-hit.acc-omni-active { background: rgba(0, 199, 129, .1); }
.acc-omni-title { font-weight: 600; color: var(--ink); }
.acc-omni-snippet { color: var(--muted); font-size: 12px; flex-basis: 100%; }
.acc-omni-snippet code { font-size: 11px; }
.acc-omni-more, .acc-omni-note { color: var(--faint); font-size: 11px; padding: 4px 8px; }

/* Orientation line — one calm sentence for first-run readers. */
.acc-orient {
  max-width: var(--shell);
  margin: 14px auto 0;
  padding: 0 22px;
  color: var(--muted);
  font-size: 13px;
}

/* Sections + eyebrow labels. Content is centred to a readable shell. */
section { padding: 28px 22px; border-bottom: 1px solid var(--line); }
section > .acc-label, section > div { max-width: var(--shell); margin-inline: auto; }
.acc-label {
  text-transform: uppercase; letter-spacing: .11em;
  font-family: var(--mono); font-size: 11px; color: var(--faint);
  margin-bottom: 16px;
}
.acc-sublabel {
  display: block;
  font-weight: 650; color: var(--ink); margin: 22px 0 9px; letter-spacing: -.02em;
  position: sticky; top: 100px; z-index: 5;
  background: linear-gradient(180deg, var(--bg) 70%, transparent);
  padding: 4px 0;
}
.acc-grouptoggle {
  width: 100%; text-align: left; cursor: pointer;
  border: 0; background: linear-gradient(180deg, var(--bg) 70%, transparent);
  display: flex; align-items: center; gap: 8px; font: inherit; color: var(--ink);
}
.acc-grouptoggle .acc-caret { transition: transform .15s; color: var(--faint); }
.acc-grouptoggle.acc-open .acc-caret { transform: rotate(90deg); color: var(--accent); }
.acc-group { display: block; }

/* Bento overview — glass cards composed by content weight. */
.acc-bento {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(230px, 1fr));
  gap: 15px;
  align-items: stretch;
}
.acc-card {
  border: 1px solid var(--line);
  border-radius: var(--radius);
  background: linear-gradient(180deg, var(--panel), rgba(11, 16, 21, .72));
  box-shadow: var(--shadow-card);
  padding: 17px 18px;
  min-height: 132px;
  display: flex;
  flex-direction: column;
  gap: 8px;
}
.acc-card-inventory { grid-column: span 2; }
.acc-card-todos { grid-column: span 2; }
.acc-card-h {
  display: block; font-weight: 650; color: var(--ink);
  text-decoration: none; letter-spacing: -.02em;
}
a.acc-card-h:hover { color: var(--accent); }
.acc-card-line { color: var(--muted); }

/* Inventory KPIs inside the overview card. */
.acc-kpis { display: flex; flex-wrap: wrap; gap: 18px; margin-top: 2px; }
.acc-kpi { display: flex; flex-direction: column; }
.acc-kpi-n { font-size: 22px; font-weight: 700; letter-spacing: -.03em; color: var(--ink); }
.acc-kpi-l { font-size: 11px; color: var(--faint); font-family: var(--mono); letter-spacing: .02em; }

/* Action handoff — a quiet, data-true next move. */
.acc-action {
  margin-top: auto; align-self: flex-start;
  border: 1px solid var(--line); border-radius: 999px;
  background: var(--panel-2); color: var(--accent);
  font: 12px var(--mono); letter-spacing: .01em;
  padding: 6px 12px; cursor: pointer;
  transition: border-color .15s, background .15s;
}
.acc-action:hover { border-color: var(--accent); background: rgba(0, 199, 129, .08); }

/* Inventory / doc rows — full-width glass; text capped to a human measure,
   the source path parked in the right gutter to fill the dead space. */
.acc-row {
  display: grid;
  grid-template-columns: minmax(0, 1fr) auto;
  column-gap: 18px;
  border: 1px solid var(--line);
  border-radius: var(--radius-sm);
  background: var(--panel-2);
  padding: 13px 15px;
  margin: 9px 0;
  transition: border-color .15s, background .15s, transform .15s, box-shadow .15s;
}
.acc-row:hover { border-color: var(--line-strong); background: var(--panel-3); transform: translateY(-1px); box-shadow: var(--shadow-card); }
.acc-row.acc-open { border-color: var(--line-strong); background: var(--panel-3); }
.acc-rowhead { grid-column: 1; grid-row: 1; display: flex; gap: 9px; align-items: baseline; flex-wrap: wrap; }
.acc-itemtitle { font-weight: 600; color: var(--ink); }
.acc-summary { grid-column: 1; grid-row: 2; color: var(--muted); margin: 5px 0 0; max-width: var(--measure); }
.acc-row > .path, .acc-row > a.path {

  justify-self: end; text-align: right;
  color: var(--faint); font-family: var(--mono); font-size: 11px; text-decoration: none;
  max-width: 40ch; word-break: break-all;
}
.acc-row a.path:hover { color: var(--accent); }
.acc-related, .acc-detail { grid-column: 1 / -1; }

/* Resting chrome recedes: provider + type chips are neutral, not accented. */
.acc-chip, .acc-row .badge {
  border: 1px solid var(--line);
  border-radius: 999px;
  padding: 2px 9px;
  font-family: var(--mono); font-size: 10px; letter-spacing: .02em;
  color: var(--muted);
  background: var(--panel-2);
}
.acc-chip.acc-prov { color: var(--faint); }

/* Reading pane — the inline expander. */
.acc-toggle {
  margin-left: auto; align-self: center;
  display: inline-flex; align-items: center; gap: 5px;
  border: 1px solid var(--line); border-radius: 999px;
  background: var(--panel-2); color: var(--muted);
  font: 11px var(--mono); letter-spacing: .02em;
  padding: 3px 10px; cursor: pointer;
  transition: color .15s, border-color .15s, background .15s;

.acc-toggle:hover { color: var(--ink); border-color: var(--accent); background: rgba(0, 199, 129, .08); }
.acc-caret { display: inline-block; transition: transform .15s; }
.acc-row.acc-open .acc-toggle .acc-caret { transform: rotate(90deg); color: var(--accent); }
.acc-detail {
  margin-top: 12px; padding: 4px 16px 4px;
  border-left: 2px solid var(--line-strong);
  color: var(--ink);

.acc-detail h1, .acc-detail h2, .acc-detail h3,
.acc-detail h4, .acc-detail h5, .acc-detail h6 {
  letter-spacing: -.02em; line-height: 1.3; margin: 14px 0 6px;
}
.acc-detail h1 { font-size: 18px; } .acc-detail h2 { font-size: 16px; }
.acc-detail h3 { font-size: 14px; } .acc-detail h4, .acc-detail h5, .acc-detail h6 { font-size: 13px; color: var(--muted); }
.acc-detail p { margin: 8px 0; max-width: var(--measure); color: var(--muted); }
.acc-detail ul { margin: 8px 0; padding-left: 20px; max-width: var(--measure); color: var(--muted); }
.acc-detail li { margin: 3px 0; }

}
.acc-detail pre code { background: none; border: 0; padding: 0; font-size: 12px; color: var(--ink); }
.acc-md-table { border-collapse: collapse; margin: 10px 0; font-size: 13px; max-width: 100%; display: block; overflow-x: auto; }
.acc-md-table th, .acc-md-table td { border: 1px solid var(--line); padding: 5px 10px; text-align: left; vertical-align: top; }
.acc-md-table th { color: var(--ink); font-weight: 650; background: var(--panel-2); }
.acc-md-table td { color: var(--muted); }
.acc-detail-more { margin-top: 12px; padding-top: 10px; border-top: 1px dashed var(--line-strong); font-family: var(--mono); font-size: 12px; color: var(--faint); }
.acc-detail-more a { color: var(--accent); text-decoration: none; }
.acc-detail-more a:hover { text-decoration: underline; }

/* Inline markdown spans (summaries, titles, body, snippets). */
code {
  font-family: var(--mono); font-size: .88em;
  background: rgba(0, 199, 129, .08);
  border: 1px solid var(--line);
  border-radius: 5px; padding: 0 5px; color: #bdecd6;
}
strong { font-weight: 680; color: var(--ink); }
em { font-style: italic; }
a.acc-mdlink { color: var(--accent); text-decoration: none; border-bottom: 1px solid rgba(0, 199, 129, .35); }
a.acc-mdlink:hover { border-bottom-color: var(--accent); }

/* Empty / summarised states read as designed, not broken. */
.acc-empty {
  border: 1px dashed var(--line-strong);
  border-radius: var(--radius-sm);
  padding: 16px 18px;
  color: var(--muted);
  background: var(--panel-2);
  max-width: var(--measure);

/* Capped TODOs list. */
.acc-todos { max-height: 72vh; overflow: auto; }
.acc-more { color: var(--faint); font-family: var(--mono); font-size: 12px; margin-top: 8px; }

.acc-related { margin-top: 10px; display: flex; flex-direction: column; gap: 3px; }

button.acc-rel-line { cursor: pointer; border-radius: 6px; }

.acc-rel-verb { text-transform: uppercase; letter-spacing: .06em; font-family: var(--mono); font-size: 10px; color: var(--accent-2); min-width: 92px; }
.acc-rel-title { font-weight: 500; }
#acc-crossref .acc-xref-source { display: flex; gap: 8px; align-items: baseline; margin: 18px 0 4px; font-weight: 650; color: var(--ink); }
#acc-crossref .acc-xref-srctitle { font-weight: 650; }
#acc-crossref .acc-xref-edge { display: flex; gap: 10px; align-items: baseline; flex-wrap: wrap; width: 100%; padding: 3px 8px 3px 24px; background: none; border: 0; border-left: 2px solid var(--line); margin-left: 7px; font: inherit; color: var(--ink); text-align: left; cursor: pointer; }
#acc-crossref .acc-xref-edge:hover { background: rgba(8, 182, 175, .08); border-left-color: var(--accent-2); }
.acc-xref-empty { color: var(--muted); }

/* Truncation / notice banner. */
.acc-banner:empty { display: none; }
.acc-banner { padding: 11px 0; border-bottom: 1px solid var(--line); background: rgba(253, 230, 138, .05); }
.acc-banner .acc-noticetext { max-width: var(--shell); margin-inline: auto; padding: 0 22px; display: block; }
.acc-noticetext { color: var(--warn); font-family: var(--mono); font-size: 12px; line-height: 1.5; }

/* Trust strip + footer. */
.acc-trust { max-width: var(--shell); margin: 0 auto; padding: 18px 22px 0; }
.acc-trust-text { color: var(--faint); font-family: var(--mono); font-size: 11px; line-height: 1.6; }
footer.acc-foot { padding: 18px 22px 48px; color: var(--faint); font-family: var(--mono); font-size: 11px; line-height: 1.7; max-width: var(--shell); margin-inline: auto; }

/* Search highlight — the cyan attention cursor. */
mark { background: rgba(0, 199, 129, .85); color: #04130c; border-radius: 3px; padding: 0 2px; }
@keyframes acc-flash-kf { from { background: rgba(0, 199, 129, .22); } to { background: transparent; } }
.acc-flash { animation: acc-flash-kf 1.6s ease-out; }

.acc-hidden { display: none; }

/* Subtle cockpit scrollbar. */
::-webkit-scrollbar { width: 11px; height: 11px; }
::-webkit-scrollbar-thumb { background: rgba(164, 218, 177, .2); border-radius: 99px; border: 3px solid transparent; background-clip: content-box; }
::-webkit-scrollbar-thumb:hover { background: rgba(164, 218, 177, .34); background-clip: content-box; }

@media (max-width: 760px) {
  header.acc-head, nav.acc-nav, section, .acc-orient, .acc-trust, footer.acc-foot { padding-left: 16px; padding-right: 16px; }
  .acc-meta { margin-left: 0; justify-content: flex-start; }
  .acc-card-inventory, .acc-card-todos { grid-column: auto; }
  /* single-column rows on small screens: path drops below the text */
  .acc-row { grid-template-columns: 1fr; }
  .acc-row > .path, .acc-row > a.path { grid-column: 1; grid-row: auto; justify-self: start; text-align: left; margin-top: 6px; }
  .acc-toggle { margin-left: 0; }
}
</style>

offline file with a few hard rules. A change here needs to\nhold these:\n\n- No network, no CDN, no build step — one self-contained file\n- Deterministic, byte-stable output across runs\n- textContent-only rendering (no `innerHTML`) so repo content cannot inject script\n- Reviewable and committable as plain HTML\n","id":"2f64b9c122e7","path":".github/ISSUE_TEMPLATE/dashboard_improvement.md","summary":"&lt;!-- Which section or affordance: a provider section, the reading pane, the","title":"What part of the dashboard"},{"body":"---\nname: Detector request\nabout: Propose a deterministic check for `acc doctor`\nlabels: doctor\n---\n\n## The check\n\n&lt;!-- One sentence: what should `acc doctor` flag? --&gt;\n\n## Why it matters\n\n&lt;!-- What goes wrong in a repo when this is missing — what a reader or reviewer\n     would otherwise overlook. --&gt;\n\n## How to detect it deterministically\n\n`acc doctor` findings must be reproducible: same repo in, same findings out, no\nnetwork, no time-of-day dependence. Describe the rule in those terms.\n\n- Inputs: &lt;!-- which files or scanned facts the check looks at --&gt;\n- Rule: &lt;!-- the exact condition that makes it fire --&gt;\n- Level: &lt;!-- warning or info --&gt;\n- Suggested code: &lt;!-- a short stable string, e.g. stale-dashboard, weak-metadata --&gt;\n\n## False positives to avoid\n\n&lt;!-- Cases where a naive version of this rule would fire wrongly.\n     Existing checks stay conservative on purpose (e.g. broken-link detection). --&gt;\n\n&lt;!-- For reference, checks today include: stale-dashboard, missing/unreadable/\n     truncated dashboard, generator-version drift, weak-metadata, near-empty\n     instruction files, large files, broken relative-markdown-link (conservative),\n     redaction count, and open-TODO count. --&gt;\n","id":"5e86848ae2c3","path":".github/ISSUE_TEMPLATE/detector_request.md","summary":"&lt;!-- One sentence: what should `acc doctor` flag? --&gt;","title":"The check"},{"body":"---\nname: Docs improvement\nabout: Fix or improve the README, CONTRIBUTING, or other docs\nlabels: docs\n---\n\n## Which doc\n\n&lt;!-- File path, and section or heading if you can name it. --&gt;\n\n## What&#x27;s wrong or missing\n\n&lt;!-- A claim that&#x27;s inaccurate, a step that doesn&#x27;t work, a gap that left you stuck.\n     If a documented command failed, paste what you ran and what happened. --&gt;\n\n## Suggested wording\n\n&lt;!-- Optional: drop in the text you&#x27;d expect to see. --&gt;\n\n## Notes\n\n&lt;!-- Accuracy matters here: the docs distinguish what&#x27;s supported today from\n     what&#x27;s planned. If you spot an overclaim or an outdated flag, call it out. --&gt;\n","id":"a2ad62098c96","path":".github/ISSUE_TEMPLATE/docs_improvement.md","summary":"&lt;!-- File path, and section or heading if you can name it. --&gt;","title":"Which doc"},{"body":"---\nname: Provider adapter request\nabout: Ask for first-class support for an AI tool&#x27;s context files\nlabels: adapter\n---\n\n## Which tool\n\n&lt;!-- e.g. Gemini CLI, GitHub Copilot, Aider, Continue, Windsurf, ... --&gt;\n\n## Which files should acc read\n\nList the exact repo-relative paths and what each one declares. Examples:\n\n- `GEMINI.md` — top-level instructions\n- `.github/copilot-instructions.md` — repo instructions\n- `&lt;dir&gt;/&lt;file&gt;` — agents / skills / commands / rules / hooks / MCP servers / config\n\n## What should land in the dashboard\n\n&lt;!-- For each file above: is it an instruction doc, an agent, a skill, a command,\n     a rule, a hook, an MCP server declaration, or generic docs? --&gt;\n\n## Notes\n\n&lt;!-- Format details that matter: YAML frontmatter keys, a TOML/JSON config shape,\n     a description field to surface, anything that affects parsing or redaction.\n     A link to the tool&#x27;s own docs for these files helps a lot. --&gt;\n\n&lt;!-- Status note: GEMINI.md and .github/copilot-instructions.md are picked up today\n     as GENERIC markdown, not provider-classified. First-class adapters for them\n     are Planned. --&gt;\n","id":"8112f4534273","path":".github/ISSUE_TEMPLATE/provider_adapter_request.md","summary":"&lt;!-- e.g. Gemini CLI, GitHub Copilot, Aider, Continue, Windsurf, ... --&gt;","title":"Which tool"},{"body":"&lt;!-- Agent Context Center — pull request --&gt;\n\n## What changed\n\n&lt;!-- One or two sentences. What does this PR do and why? --&gt;\n\n## Screenshots (if the dashboard changed)\n\n&lt;!-- If this PR changes the rendered dashboard.html, drop a before/after screenshot.\n     Delete this section if the dashboard output is unchanged. --&gt;\n\n## Tests run\n\n```shell\npython -m pytest\n```\n\n&lt;!-- Paste the summary line (e.g. &quot;261 passed&quot;). Note any tests added. --&gt;\n\n## Generated dashboard updated?\n\n&lt;!-- yes / no --&gt;\n\n- [ ] yes — I ran `acc --root .` and committed the regenerated dashboard.html\n- [ ] no — this PR does not change scanner, adapter, schema, or renderer output\n\n## Risk notes\n\n&lt;!-- Anything a reviewer should watch: behavior changes, new file types scanned,\n     redaction edge cases, performance on large repos, output format changes. --&gt;\n\n## Checklist\n\n- [ ] Determinism preserved — output is byte-stable; new lists are explicitly sorted\n- [ ] Redaction runs before render — secret-shaped values are scrubbed at extraction, and the output tripwire still holds\n- [ ] No `innerHTML` in `app.js` — renderer stays textContent-only (the `test_appjs_guard` check passes)\n- [ ] Docs updated — README / CONTRIBUTING / inline comments reflect the change\n","id":"8c973e697120","path":".github/PULL_REQUEST_TEMPLATE.md","summary":"&lt;!-- Agent Context Center — pull request --&gt;","title":"What changed"},{"body":"# Agent Context Center (acc)\n\nA stdlib-Python tool that scans a repository&#x27;s AI-assistant configuration (Claude Code,\nCodex, Cursor) and generates a deterministic, single-file, offline HTML dashboard of what\nthe repo declares — agents, skills, hooks, commands, MCP servers, rules, docs, and open\nTODOs. It maps and reviews the AI context; it does not run or control agents. Public repo:\n`omerakben/agent-context-center` (the `acc` CLI stands for Agent Context Center).\n\n&gt; The generated dashboard for this repo is [`.claude/dashboard.html`](.claude/dashboard.html).\n&gt; Open it in a browser; run `/dashboard` (or `acc --root .`) to refresh it.\n\n## What this is\n\n- A generator (`src/acc/`) reads the repo, normalizes each provider through an adapter,\n  and emits one self-contained `dashboard.html` with a JSON data island plus a vanilla-JS\n  renderer. No build step, no runtime dependencies, no network.\n- Output is **deterministic**: every list is explicitly sorted, so repeated runs are\n  byte-identical.\n- The renderer is **textContent-only**: no `innerHTML` / `outerHTML` / `insertAdjacentHTML`\n  (a CI guard greps `app.js`). Author-derived text is `html.escape`-d at build and\n  `htmlUnescape`-d at display.\n- Secrets are redacted at extraction; a tripwire re-scans the assembled output.\n\n## Architecture\n\n- `src/acc/generate.py` — orchestration: scan, per-provider normalize, merge, escape,\n  build the search index, build relationships, assemble + validate + render the island.\n- `src/acc/adapters/` — `claude.py`, `codex.py`, `cursor.py`, `generic.py` over `base.py`.\n- `src/acc/schema.py` — top-level shape + search-record + relationship validation; the\n  redaction tripwire.\n- `src/acc/templates/` — `dashboard.html.tmpl`, `app.js`, `styles.css`.\n- `tests/` — flat pytest suite incl. a real-Chromium Playwright DOM test\n  (`test_render_dom.py`) and the innerHTML CI guard (`test_appjs_guard.py`).\n\n## Current state\n\n- Phases 1–3 (schema/generator/adapters/renderer) and Phase 4a (Find omnibox) are merged\n  to `main`. Phase 4b (Relationships / cross-references) is in progress on\n  `feature/phase-4b-relationships` — spec at `docs/specs/phase-4b-relationships.md`.\n\n## Codex setup\n\n- Model `gpt-5.5`, reasoning effort `xhigh` (see `.codex/config.toml`). Sandbox\n  `workspace-write`, approvals `on-request`.\n- MCP servers are disabled by default. Enable with `/codex-config enable-mcp &lt;name&gt;`\n  (context7 for docs, playwright for UI testing).\n\n## Conventions\n\n- Stdlib Python only (3.12+), type hints, no third-party runtime deps in the generator.\n- Preserve the determinism and textContent-only invariants in every change.\n- No secrets in the repo; use a local `.env` and gitignore it.\n- Verify renderer changes in a browser (or the Playwright DOM test) before claiming the UI\n  works.\n","id":"48870fc1a8b4","path":"AGENTS.md","summary":"A stdlib-Python tool that scans a repository&#x27;s AI-assistant configuration (Claude Code,","title":"Agent Context Center (acc)"},{"body":"# Changelog\n\nAll notable changes to this project are recorded here. The format follows\n[Keep a Changelog](https://keepachangelog.com/en/1.1.0/), and the project uses\n[Semantic Versioning](https://semver.org/spec/v2.0.0.html).\n\n## [1.3.0] — 2026-05-31\n\n### Changed\n\n- Repositioned the project as &quot;Agent Context Center&quot; (the `acc` CLI now stands for\n  Agent Context Center); the tool maps and reviews AI context, it does not control agents.\n- The CLI gained subcommands (`generate` default, `doctor`); `acc --root .` and\n  `acc --json` keep working unchanged.\n\n### Added\n\n- `acc doctor`: deterministic findings report with `--strict` and `--json` (doctor.v1).\n- README, docs, and community files for the public repository.\n- Example repos under `examples/`.\n- A GitHub Pages demo of a generated dashboard.\n\n## [1.2.0]\n\n### Added\n\n- TUEL brand theme: emerald, teal, and navy palette.\n\n## [1.1.2]\n\n### Added\n\n- Reading pane links to the full source file when a rendered body is capped.\n\n## [1.1.1]\n\n### Changed\n\n- Decode YAML frontmatter escapes before display.\n- Cap summaries to the lead sentence.\n\n### Added\n\n- Render markdown tables in the reading pane.\n\n## [1.1.0]\n\n### Added\n\n- Client-side markdown rendering with an inline reading pane.\n- Graduated truncation for large repos.\n\n## [1.0.1]\n\n### Fixed\n\n- Redaction render-mismatch between the scanned source and the rendered output.\n\n## [1.0.0]\n\n### Added\n\n- First release: deterministic, offline `dashboard.html` generation.\n- Adapters for Claude Code, Codex, and Cursor, plus a generic markdown index.\n- Redaction before rendering.\n- Claude Code marketplace plugin.\n","id":"281fd217c6fd","path":"CHANGELOG.md","summary":"All notable changes to this project are recorded here. The format follows","title":"Changelog"},{"body":"# CLAUDE.md\n\nThis file provides guidance to Claude Code (claude.ai/code) when working with code in this repository.\n\n`AGENTS.md` is the companion brief and `CONTRIBUTING.md` has the full extension guide; this file is the working summary plus the gotchas that bite first.\n\n## What this is\n\n`acc` (Agent Context Center) scans a repo&#x27;s AI-assistant config — Claude Code, Codex, Cursor, generic markdown — and emits one deterministic, offline, single-file `dashboard.html`. Markdown stays the source of truth; the dashboard is the human map. It maps and reviews; it does not run or control agents. The package id is `agent-context-center`; the CLI is `acc`.\n\nStdlib Python 3.12+ only. No third-party runtime dependencies. No network at runtime, no build step, no server.\n\n## Commands\n\n```bash\npip install -e &quot;.[test]&quot;      # editable install + pytest/pytest-playwright\nplaywright install chromium   # once, for the real-browser DOM test\n\npython -m pytest                          # full suite\npython -m pytest tests/test_scan.py       # one file\npython -m pytest tests/test_scan.py::test_name   # one test\npython -m pytest -k redaction             # by keyword\n\nacc --root .                  # generate into the auto-detected provider folder; prints path + digest\nacc --root . --out .          # write ./dashboard.html at repo root (--out is a DIRECTORY, not a filename)\nacc --root . --json           # machine-readable: dashboardPath, sourceDigest, file count, providers\nacc doctor --root .           # deterministic findings report (exit 0 unless execution error -&gt; 2)\nacc doctor --root . --strict  # exit 1 on any warning\nacc doctor --root . --json    # doctor.v1 report\n```\n\n## Dogfood + CI (the thing that breaks first)\n\nThis repo runs `acc` on itself. `.claude/dashboard.html` is committed and `.github/workflows/agent-context-dashboard.yml` runs two jobs on every PR:\n\n1. **freshness** — regenerates the dashboard and fails if the committed copy differs.\n2. **doctor** — `acc doctor --root . --strict`, fails on any warning.\n\nSo after any change to scanning, adapters, schema, or templates, **regenerate and commit the dashboard** (`acc --root .` then commit `.claude/dashboard.html`) and keep `acc doctor --root . --strict` clean — passing tests are not enough. (`docs/demo/dashboard.html` is a separate GitHub-Pages demo, not the freshness target.)\n\n## Architecture\n\nThe flow lives in `src/acc/generate.py::_assemble` (read-only core, shared by `generate_result` and `doctor`):\n\n1. **scan** (`scan.py`) — walk the repo into a file list.\n2. **detect + resolve owner** — `detect_providers` by precedence (claude → codex → cursor); `resolve_owner` picks the output folder (an existing dashboard, else the top detected provider&#x27;s dir, else `.agent-context-center/`). Two committed dashboards raise `OwnerAmbiguousError` unless `--owner` is given.\n3. **normalize** — each first-class adapter (`adapters/claude.py`, `codex.py`, `cursor.py`) maps native files into the shared `inventory` + `docs` schema; `generic.py` indexes only the markdown not claimed by a provider folder/marker.\n4. **merge → escape → search → relationships** — `_merge_parts` concatenates and sorts; `_escape_text_fields` redacts-then-escapes every author-derived display field; `_build_search` and `_build_relationships` run; then transient `_searchBody` / `_refScanBody` / `_rawBody` keys are stripped so they never reach the island.\n5. **redact paths → validate** — `_redact_paths` masks author-controlled paths/evidence; `schema.py::validate` checks shape and runs the secret tripwire.\n6. **render** (`render.py`) — substitute CSS, `app.js`, schema version, and the canonical-JSON data island into `templates/dashboard.html.tmpl`. `generate_result` also runs `_reduce_for_size` (graduated trim: bodies → capped summaries → search body → blanked summaries) when output exceeds the byte budget.\n\nKey modules: `schema.py` (shape + tripwire), `redaction.py` (secret-shaped scanner), `config.py` (allowlisting helpers `safe_mcp`/`","bodyTruncated":true,"id":"e2460cafe70f","path":"CLAUDE.md","summary":"This file provides guidance to Claude Code (claude.ai/code) when working with code in this repository.","title":"CLAUDE.md"},{"body":"# Code of conduct\n\n## Our pledge\n\nWe want participation in Agent Context Center to be a respectful, harassment-free\nexperience for everyone, regardless of background or identity. Maintainers and\ncontributors are expected to act in ways that keep the community open, welcoming,\nand professional.\n\n## Our standards\n\nContributors should:\n\n- be considerate and respectful in language and conduct\n- welcome differing viewpoints and accept constructive feedback gracefully\n- focus on what is best for the project and its users\n- assume good intent and give other people the benefit of the doubt\n\nThe following are not acceptable: harassment of any kind, personal or political\nattacks, publishing others&#x27; private information without permission, or other\nconduct that a reasonable person would consider inappropriate in a professional\nsetting.\n\n## Standard adopted\n\nThis project adopts the **Contributor Covenant, version 2.1**. The full text,\nincluding the detailed enforcement guidelines, is published at\n&lt;https://www.contributor-covenant.org/version/2/1/code_of_conduct/&gt;. By\nparticipating, you agree to uphold it.\n\n## Scope\n\nThis code applies in all project spaces — the repository, issues, pull requests,\nand discussions — and when an individual is representing the project in public.\n\n## Enforcement\n\nReport unacceptable behavior to the maintainer privately through GitHub (open a\nprivate report via the repository&#x27;s **Security** tab, or contact\n[@omerakben](https://github.com/omerakben)). Reports are handled discreetly.\nMaintainers may remove, edit, or reject contributions, comments, and other\nactivity that does not align with this code, and may temporarily or permanently\nban any contributor for behavior they deem inappropriate.\n\n## Attribution\n\nAdapted from the [Contributor Covenant](https://www.contributor-covenant.org),\nversion 2.1.\n","id":"e31238a843e7","path":"CODE_OF_CONDUCT.md","summary":"We want participation in Agent Context Center to be a respectful, harassment-free","title":"Code of conduct"},{"body":"# Contributing\n\nAgent Context Center is public developer infrastructure. The repo and package id is\n`agent-context-center`; the CLI is `acc`. It is a stdlib-only Python generator that scans a\nrepo&#x27;s AI context files and emits one offline, deterministic `dashboard.html`. Markdown\nstays the source of truth; the dashboard is the human map. Contributions that keep it\noffline, deterministic, and dependency-free are welcome.\n\n## Local setup\n\nYou need Python 3.12 or newer. The runtime has no third-party dependencies. The only\nextra packages are for the test suite.\n\n```bash\ngit clone https://github.com/omerakben/agent-context-center\ncd agent-context-center\npython -m venv .venv &amp;&amp; source .venv/bin/activate\npip install -e &quot;.[test]&quot;\n```\n\nThe `[test]` extra installs `pytest` and `pytest-playwright`. The DOM test drives a real\nChromium, so install the browser once:\n\n```bash\nplaywright install chromium\n```\n\n## Run the tests\n\n```bash\npython -m pytest\n```\n\nTwo tests are worth knowing about:\n\n- `tests/test_render_dom.py` loads a generated dashboard in real Chromium and asserts on\n  the rendered DOM. It needs the Chromium install above.\n- `tests/test_appjs_guard.py` greps the renderer (`src/acc/templates/app.js`) for\n  `innerHTML`, `outerHTML`, and `insertAdjacentHTML`. Any HTML sink fails CI. The renderer\n  must stay `textContent`-only.\n\n## Generate a dashboard\n\nRun the generator against this repo, or any repo, to see your change end to end:\n\n```bash\nacc --root .                    # writes into the detected provider folder, prints path + digest\nacc --root . --out .            # writes ./dashboard.html at the repo root (--out is a directory)\nacc --root . --json             # machine-readable metadata: dashboardPath, sourceDigest, etc.\nacc --root . --repo-name NAME   # pin the displayed repo name (default: manifest name, else dir name)\n```\n\n## Run doctor\n\n`acc doctor` reports deterministic findings about a repo&#x27;s AI context. Use it to check\nyour own work:\n\n```bash\nacc doctor --root .            # findings report; exit 0 unless an execution error (exit 2)\nacc doctor --root . --strict   # exit 1 if any warning is present\nacc doctor --root . --json     # a doctor.v1 report with a findings list and a status\n```\n\n## Add a provider adapter\n\nAdapters live in `src/acc/adapters/`. Each one maps a provider&#x27;s native files into the\nsingle inventory + docs schema. Use the existing `claude`, `codex`, and `cursor` adapters\nas templates.\n\n1. Implement the `ProviderAdapter` protocol from `src/acc/adapters/base.py`: an `id`, a\n   `display_name`, a `detect(ctx)` that returns `ProviderRoot`s, and a\n   `normalize(ctx, root)` that returns a dict.\n2. Build inventory and docs with `empty_inventory()`, `empty_docs()`, and `make_item(...)`\n   from `base.py`. Do not hand-roll item dicts — `make_item` assigns the stable id and the\n   type label.\n3. Read structured config through the allowlisting helpers in `src/acc/config.py`\n   (`safe_mcp`, `load_toml`, `as_dict`). Run free-form prose through `redact_text` from\n   `src/acc/redaction.py` before it enters an item. Redaction happens at extraction, not at\n   render time.\n4. Add a builder in `tests/builders.py` that lays down the provider&#x27;s native files, then a\n   `tests/test_&lt;provider&gt;_adapter.py` that asserts the normalized output.\n\nKeep new providers honest: only classify what you actually parse. Files you do not\nrecognize should fall through to the generic markdown adapter, not be mislabeled.\n\n## Add a doctor detector\n\nDetectors live in `src/acc/doctor.py`. Each one inspects the same assembled data the\ndashboard shows and yields `Finding` objects (`level` is `warn` or `info`, plus a `code`\nand a `message`).\n\nRules for a detector:\n\n- Deterministic only. No git history, no mtimes, no network, no model judgment. The same\n  repo must always produce the same findings.\n- Use `warn` only for something a reader should act on, since `--strict` exits 1 on any\n  warning. Use `info` for counts and context.\n- Add a test in `tests/test","bodyTruncated":true,"id":"5c21f3a8198d","path":"CONTRIBUTING.md","summary":"Agent Context Center is public developer infrastructure. The repo and package id is","title":"Contributing"},{"body":"# Agent Context Center\n\nAI agents have `AGENTS.md`. Humans need `dashboard.html`.\n\nAgent Context Center turns a repo&#x27;s scattered AI operating layer into one committed,\noffline HTML dashboard. Claude Code instructions, Codex prompts, Cursor rules, MCP\nservers, hooks, commands, skills, docs, and open TODOs become a source-linked map that a\nhuman can review in a browser.\n\n[View the demo dashboard](https://omerakben.github.io/agent-context-center/demo/dashboard.html)\n· [Open the public site](https://omerakben.github.io/agent-context-center/)\n· [Install from GitHub](#quickstart)\n\n![The dashboard rendered for a multi-provider repo](acc-dashboard-multi.png)\n\n## Why use it\n\nModern repos increasingly have two codebases:\n\n- the product code people review every day\n- the AI context that tells agents how to work in that repo\n\nThe second one is easy to miss. It lives in `CLAUDE.md`, `AGENTS.md`,\n`.claude/agents`, `.codex/prompts`, Cursor rules, MCP config, docs, and TODOs. Agent\nContext Center makes that layer visible, diffable, and safe to hand off.\n\nUse it when you need to:\n\n| Use case | What ACC gives you |\n| --- | --- |\n| Onboard a developer or coding agent | One browser page showing the repo&#x27;s AI instructions, tools, prompts, docs, and TODOs. |\n| Review a pull request that changes agent behavior | A regenerated `dashboard.html` diff beside the markdown/config diff. |\n| Audit MCP, hooks, and commands | A provider-aware inventory with source paths and redacted config summaries. |\n| Handoff a repo between humans or agents | A deterministic snapshot of what the repo declares, not a chat-only explanation. |\n| Keep AI context fresh in CI | `acc doctor --strict` flags stale dashboards and weak metadata without network or model calls. |\n| Explain the repo&#x27;s AI surface publicly | A static demo artifact you can open from `file://`, GitHub Pages, or a PR. |\n\n![Agent Context Center use-case map](assets/use-case-map.svg)\n\n## The pitch\n\nMarkdown stays the source of truth. The dashboard is the human map.\n\nACC is not an agent runtime and it does not control tools. It reads the files already in\nyour repo, normalizes them through provider adapters, redacts secret-shaped values, and\nemits a self-contained `dashboard.html`. You can commit it, diff it, open it offline, and\nask reviewers to inspect it like any other generated artifact.\n\n## Quickstart\n\nInstall the generator. It is stdlib Python 3.12+ with no third-party runtime\ndependencies.\n\n```bash\npip install &quot;git+https://github.com/omerakben/agent-context-center&quot;\nacc --root .\n```\n\n`acc --root .` writes `dashboard.html` into the auto-detected provider folder, for\nexample `.claude/dashboard.html`, or `.agent-context-center/` if no provider is found. It\nprints the path, source digest, scanned file count, and providers. Open the printed path\nin a browser. No server. No network.\n\nWrite the dashboard at the repo root instead:\n\n```bash\nacc --root . --out .\n```\n\n`--out` takes a directory, not a filename.\n\nThe dashboard header shows the repo name. It comes from `pyproject.toml`\n`[project].name`, then `package.json` `name`, then the directory name. Pin it explicitly\nwhen you need byte-stable output across differently named clones:\n\n```bash\nacc --root . --repo-name my-repo\n```\n\n### Claude Code plugin\n\n```text\n/plugin marketplace add omerakben/agent-context-center\n/plugin install agent-context-center@ozzy-skills\n/dashboard\n```\n\n`/dashboard` runs the bundled generator. It needs `python3` 3.12+ on your PATH. If yours\nis older, the command tells you instead of failing with a stack trace.\n\n## What it maps\n\n| Source | Status |\n| --- | --- |\n| Claude Code: `CLAUDE.md`, `.claude/agents`, `.claude/commands`, `.claude/skills` (`SKILL.md`), hooks and MCP from `.claude/settings.json` and `.mcp.json` | Supported today |\n| Codex: `AGENTS.md`, `.codex/prompts`, `.codex/config.toml` MCP and config facts | Supported today |\n| Cursor: `.cursorrules`, `.cursor/rules/*.mdc`, `.cursor/mcp.json` | Supported today |\n| Generic markdown i","bodyTruncated":true,"id":"dd79dd0f0574","path":"README.md","summary":"AI agents have `AGENTS.md`. Humans need `dashboard.html`.","title":"Agent Context Center"},{"body":"# Roadmap\n\nAgent Context Center maps a repo&#x27;s scattered AI context files into one offline HTML\ndashboard. This is the plan. Items beyond Now are planned, not promised, and carry no\ndates.\n\n## Now\n\nShipped and stable.\n\n- Deterministic, byte-stable `dashboard.html` generation from `acc --root .`.\n- First-class adapters for Claude Code, Codex, and Cursor, plus a generic markdown index\n  for any other `.md`.\n- Redaction before rendering: secret-shaped-string scanner, structured-config allowlist,\n  and an output tripwire.\n- Inline reading pane with a sanitized markdown subset rendered via `textContent`.\n- Graduated truncation so large repos still produce a usable, bounded file.\n- `acc doctor` findings report with `--strict` and `--json`.\n- CI drift-check workflow template under `templates/refresh/`.\n- TUEL theme (emerald, teal, navy).\n\n## Next\n\nPlanned. Order is rough and may change.\n\n- First-class adapters for `GEMINI.md` and `.github/copilot-instructions.md` (today these\n  files land in the generic markdown index, not provider-classified).\n- Richer `acc doctor` checks: broader broken-link detection and cross-file conflict\n  detection.\n- JSON export of doctor findings, shipped as the `doctor.v1` schema.\n- A provider compatibility matrix in the docs.\n- A published, reusable GitHub Action (today only a copyable workflow template exists).\n- PRD and ADR classification (the schema has buckets, but generic markdown currently\n  lands in `references`).\n\n## Later\n\nExploratory. No commitment.\n\n- Optional model-generated summaries, run only after redaction.\n- Repo comparison over time.\n- PR-comment summaries.\n- VS Code integration.\n- A local desktop wrapper.\n","id":"5daae9ae6ce6","path":"ROADMAP.md","summary":"Agent Context Center maps a repo&#x27;s scattered AI context files into one offline HTML","title":"Roadmap"},{"body":"# Security\n\nAgent Context Center (`agent-context-center`, CLI `acc`) generates a static, offline\n`dashboard.html` from a repo&#x27;s AI context files. The dashboard makes no network calls,\nruns no server, and ships no tracking. The renderer writes repo content with `textContent`\nonly, so content from the scanned repo cannot inject script into the committed file.\n\n## Redaction is a safety layer, not a secret scanner\n\nBefore anything is written into the dashboard, the generator:\n\n- allowlists structured provider config, so only known-safe fields pass through, and\n- runs free-form prose through a high-precision secret-shaped-string scanner, then\n  re-scans the assembled output with a tripwire.\n\nThis favors precision over recall. It catches common secret shapes (tokens with telltale\nprefixes, structured config values that are not on the allowlist). It is not a full\nentropy scanner. A high-entropy value with no recognizable prefix can slip through.\n\nDo not treat the dashboard as proof that a repo is free of secrets.\n\nAdvice:\n\n- Keep running dedicated secret scanning in your pipeline. This tool does not replace it.\n- Review a generated dashboard before you commit or publish one from a repo that holds\n  sensitive content. The output is static and offline, so a review is a plain file read.\n- The dashboard is meant to be committed. Treat it like any other artifact built from your\n  source: if the source has a secret problem, the dashboard can inherit it.\n\n## Reporting a vulnerability\n\nPlease do not file public issues for security problems.\n\n- Open a private security advisory on GitHub: the repository&#x27;s **Security** tab →\n  **Report a vulnerability**.\n- Or email the maintainer (Omer Akben) through the contact on the GitHub profile at\n  https://github.com/omerakben.\n\nInclude the version, a description, and steps to reproduce. We will confirm receipt and\nwork with you on a fix and disclosure timeline.\n","id":"cfb1779bf596","path":"SECURITY.md","summary":"Agent Context Center (`agent-context-center`, CLI `acc`) generates a static, offline","title":"Security"},{"body":"---\nname: dashboard\ndescription: Generate or refresh the Agent Context Center dashboard — one offline HTML file inventorying this repo&#x27;s AI configuration (agents, skills, hooks, commands, MCP servers, rules, docs, open TODOs). Use when asked to build, refresh, regenerate, stamp, or open the Agent Context Center / repo AI dashboard.\nallowed-tools:\n  - Bash\n  - Read\n---\n\n# /dashboard — generate the Agent Context Center dashboard\n\nRun the bundled generator against the **user&#x27;s project** (never the plugin dir) and\nreport what it wrote. The generator is stdlib Python 3.12+, offline, deterministic, and\nredacts secrets at extraction — there is no build step and nothing is installed.\n\nRun exactly this in one Bash call:\n\n```bash\nset -uo pipefail\n\nROOT=&quot;${CLAUDE_PROJECT_DIR:-}&quot;\nif [ -z &quot;$ROOT&quot; ]; then\n  echo &quot;Agent Context Center: CLAUDE_PROJECT_DIR is not set; refusing to scan an unknown directory.&quot; &gt;&amp;2\n  exit 1\nfi\n\nPLUGIN=&quot;${CLAUDE_PLUGIN_ROOT:-}&quot;\nif [ -z &quot;$PLUGIN&quot; ] || [ ! -d &quot;$PLUGIN/src/acc&quot; ]; then\n  echo &quot;Agent Context Center: cannot locate the bundled generator (CLAUDE_PLUGIN_ROOT/src/acc).&quot; &gt;&amp;2\n  exit 1\nfi\n\n# Pick the first interpreter that is actually &gt;=3.12. The generator uses 3.10+\n# syntax that is evaluated at import, so a stale system python3 (macOS ships\n# 3.9) must be rejected with a clear message, never a stack trace.\nPY=&quot;&quot;\nfor cand in python3.13 python3.12 python3; do\n  if command -v &quot;$cand&quot; &gt;/dev/null 2&gt;&amp;1 \\\n     &amp;&amp; &quot;$cand&quot; -c &#x27;import sys; raise SystemExit(0 if sys.version_info &gt;= (3,12) else 1)&#x27; 2&gt;/dev/null; then\n    PY=&quot;$cand&quot;; break\n  fi\ndone\nif [ -z &quot;$PY&quot; ]; then\n  found=&quot;$(command -v python3 &gt;/dev/null 2&gt;&amp;1 &amp;&amp; python3 -c &#x27;import sys;print(&quot;%d.%d.%d&quot;%tuple(sys.version_info[:3]))&#x27; 2&gt;/dev/null || echo none)&quot;\n  echo &quot;Agent Context Center needs Python 3.12+ on PATH (found: $found).&quot; &gt;&amp;2\n  echo &quot;Install it — macOS: &#x27;brew install python@3.12&#x27;; or use pyenv — then retry /dashboard.&quot; &gt;&amp;2\n  exit 1\nfi\n\nPYTHONPATH=&quot;$PLUGIN/src&quot; &quot;$PY&quot; -m acc.cli --root &quot;$ROOT&quot; --json\n```\n\nThen:\n\n1. On success the last line is JSON: `{&quot;dashboardPath&quot;,&quot;sourceDigest&quot;,&quot;scannedFileCount&quot;,&quot;providers&quot;,&quot;truncated&quot;}`. Tell the user the dashboard was written to `dashboardPath` (it lives under the owning provider folder, e.g. `.claude/dashboard.html`), and report `scannedFileCount` files and digest `sourceDigest`. Remind them freshness is manual: re-run `/dashboard` after editing AI markdown, or install an opt-in template from the plugin&#x27;s `templates/refresh/`.\n2. If it exits with `error: multiple dashboards found (...)`, the repo has more than one provider dashboard. Ask the user which folder owns it, then re-run the same command with `--owner &lt;dir&gt;` (e.g. `--owner .claude`) added before `--json`.\n3. If it prints the &quot;needs Python 3.12+&quot; or &quot;CLAUDE_PROJECT_DIR&quot; message, relay that line verbatim — do not retry or improvise another interpreter.\n\nNever hand-edit the generated `dashboard.html`. To change its content, edit the source\nAI markdown and re-run `/dashboard` so redaction and the secret tripwire re-fire.\n","id":"5ee3d4fc9711","path":"commands/dashboard.md","summary":"Run the bundled generator against the **user&#x27;s project** (never the plugin dir) and","title":"/dashboard — generate the Agent Context Center dashboard"},{"body":"# Next session — the UI/UX pass: make ACC a dashboard people *want* to live in\n\nStatus: brief for the next session. Pause point: the mission-control theme\n(`src/acc/templates/styles.css`) landed on branch `feature/mission-control-theme`\nand Ozzy approved the direction. This session is **not** about shipping more CSS —\nit is about *using* the dashboard like a real engineer, finding everything that\nstill breaks the taste, and turning that into a prioritized plan.\n\n## The one rule for this session: be the user, not the builder\n\nOpen ACC on a real repo and try to actually *do the job* it promises: control and\nunderstand a repo&#x27;s AI layer. Do not read the code first. Open the HTML, and with an\nengineer&#x27;s intent — &quot;what is this repo, what can the AI do here, what changed, what do\nI touch next?&quot; — scroll, search, read, follow links, and notice every moment of\nfriction, confusion, or ugliness. The reference for &quot;good&quot; is\n`docs/vision/ai-control-center-mission.html`: calm authority, source-linked, impossible\nto bluff, &quot;make the machine-readable world human-readable.&quot;\n\nDogfood on at least two repos, because the failure modes differ:\n- **A large repo** (`/Users/ozzy-mac/Projects/code-oz`, ~1,236 files) — exercises the\n  summary-only/truncation path, where the experience is currently worst.\n- **A small repo** (this one, `html-dash`, or a fresh fixture) — exercises the normal,\n  non-truncated path and the empty/near-empty states.\n\nUse a browser (the live server at `127.0.0.1:5501/.claude/dashboard.html`, or open the\nfile). Take screenshots at each step. Keep a running log: *what I tried → what I felt →\nwhat I wish it did.*\n\n## The walkthrough protocol (the journey to script and screenshot)\n\nFor each repo, move through these as the user, and write down the friction at each:\n\n1. **Land cold (first 5 seconds).** Can I tell what repo this is, what providers run\n   here, and what the AI surface is — without scrolling or thinking? Is the first\n   impression &quot;I understand this&quot; or &quot;what am I looking at?&quot;\n2. **Orient (the Overview).** Do the cards answer &quot;what is here, why it matters, what\n   changed, what should I do?&quot; (the vision&#x27;s test). Is the bento composed, or does it\n   have dead space and a broken-looking empty card?\n3. **Scroll.** Does the page guide me down? Do I always know which section I&#x27;m in\n   (the nav pills do **not** track scroll position today)? Is the rhythm calm or noisy?\n4. **Find knowledge (search).** Search for a specific thing an engineer would hunt —\n   a named rule, an MCP server, a command, a concept. How fast do I find it? Are results\n   readable? On the large repo, &quot;body search is off&quot; — how badly does that hurt, and\n   what&#x27;s the fix?\n5. **Read (the core promise).** Open a skill / agent / prompt / doc and try to *read its\n   content*. Today most rows give a title + a link out to the raw `.md`; you cannot read\n   the rendered prose, the prompt, or the rule **in** the dashboard. This is the biggest\n   gap vs the vision. Decide how reading should work (inline expand? a reading pane? a\n   rendered preview?).\n6. **Connect (relationships).** Follow a cross-reference. Does &quot;this rule owns that\n   behavior / this command calls that script / this agent uses that MCP&quot; actually feel\n   like a map, or just a flat list?\n7. **Trust.** Is it fresh? What was redacted? Any warnings? The vision wants the trust\n   posture visible without being scary. Right now it&#x27;s one small freshness pill.\n8. **Act.** Does any view suggest the safest next move (review this rule, run this\n   verification, update this stale plan)? The vision&#x27;s &quot;action handoff&quot; is absent.\n\n## Seed findings from this session (start here, then add to them)\n\nThe theme is in; these are the taste gaps already visible:\n\n- **Markdown renders raw in cards and search snippets.** `**bold**`, `` `code` ``, and\n  angle brackets show their markers. The Overview &quot;Open TODOs&quot; card and the omnibox TODO\n  snippets are the worst offenders. This is the #1 &quot;not human&quot; problem.\n- **Escaping i","bodyTruncated":true,"id":"1db5c83adbdc","path":"docs/specs/2026-05-31-ui-ux-pass.md","summary":"Status: brief for the next session. Pause point: the mission-control theme","title":"Next session — the UI/UX pass: make ACC a dashboard people *want* to live in"},{"body":"# Phase 4 — packaging: skill + marketplace plugin (design brief)\n\nDate: 2026-05-31\nStatus: locked for build (pending design-critique reconciliation)\nBuilds on: the approved v1 design (`docs/superpowers/specs/2026-05-29-ai-control-center-design.md`),\nsections &quot;Architecture → Components/Refresh&quot; and &quot;Distribution&quot;.\n\nThis is the second half of Phase 4. Phases 1–3, 4a (Find), 4b (Relationships) are\nmerged: the generator, adapters, renderer, search, and relationships are done and\ngreen (209 tests). What remains is the **distribution and refresh** layer the design\nalways called for: ship the product as a public Claude Code **skill + marketplace\nplugin**, with the three-tier refresh, and make the repo installable and shareable.\n\n## Definition of done\n\nA friend runs two commands and has a working tool, offline, no build step:\n\n```\n/plugin marketplace add omerakben/agent-context-center\n/plugin install ai-control-center@ozzy-skills\n```\n\nThen `/dashboard` (or the agent, after editing AI markdown) stamps a deterministic,\nredacted, self-contained `dashboard.html` under the project&#x27;s provider folder.\n\n## Hard invariants carried forward (non-negotiable, must survive packaging)\n\n- Deterministic, byte-stable output (re-stamp produces no diff without content change).\n- Redaction at extraction + the assembled-output tripwire (`assert_no_secrets`).\n- `textContent`-only render; no `innerHTML`/`outerHTML`/`insertAdjacentHTML` (CI guard).\n- Stdlib Python 3.12+ only at runtime; zero third-party deps; one self-contained file.\n- Offline by default; no network in the generator or the install path.\n\n## Layout decision — one repo is both the marketplace and the single plugin\n\nThe public repo `omerakben/agent-context-center` doubles as a single-plugin marketplace.\nBoth manifests live in `.claude-plugin/` (no conflict). The marketplace entry&#x27;s\n`source` is `&quot;./&quot;` (the repo root), so installing clones the whole repo into the\nplugin cache — which is exactly why the generator at `src/acc` is available offline\nat `${CLAUDE_PLUGIN_ROOT}/src/acc` with **no vendoring and no duplication**.\n\n```\nai-control-center/                 # repo root == marketplace root == plugin root\n├── .claude-plugin/\n│   ├── plugin.json                # plugin manifest (name: ai-control-center)\n│   └── marketplace.json           # marketplace catalog (name: ozzy-skills)\n├── commands/\n│   └── dashboard.md               # /dashboard — required refresh tier (active)\n├── skills/\n│   └── ai-control-center/\n│       └── SKILL.md               # agent entry point (active)\n├── templates/refresh/             # opt-in refresh tiers (NOT auto-active)\n│   ├── README.md                  # what each template is + how to enable\n│   ├── git-post-commit            # git hook: re-stamp + stage on commit\n│   ├── claude-file-write-hook.json# PostToolUse(Write|Edit) snippet for settings.json\n│   └── ci-drift-check.yml         # GitHub Actions: recompute sourceDigest, fail on drift\n├── src/acc/…                      # the generator (already built); + new __main__.py\n├── tests/ docs/ README.md LICENSE pyproject.toml\n```\n\nNaming (genuine choice; chosen for extensibility, documented so it is trivially\nrenamable — `/plugin marketplace add` keys off the repo URL, not the marketplace\n`name`, so a later rename does not break friends&#x27; installs):\n- marketplace `name`: **`ozzy-skills`** (owner: Omer Akben) — a personal catalog that\n  can hold more plugins later, matching &quot;publish all our skills&quot;.\n- plugin `name`: **`ai-control-center`**.\n- install suffix therefore reads `ai-control-center@ozzy-skills`.\n\n## Offline generator invocation (the load-bearing mechanism)\n\nThe command and skill run the bundled generator against the **user&#x27;s project**, never\nthe plugin dir, with the plugin&#x27;s own copy of the code on `PYTHONPATH`:\n\n```bash\nPYTHONPATH=&quot;${CLAUDE_PLUGIN_ROOT}/src&quot; python3 -m acc.cli --root &quot;${CLAUDE_PROJECT_DIR}&quot;\n```\n\n- `${CLAUDE_PLUGIN_ROOT}` → the cached plugin dir (expands in commands and hooks).\n- `${CLAUDE_PROJECT","bodyTruncated":true,"id":"7ef1851798e4","path":"docs/specs/phase-4-packaging.md","summary":"Date: 2026-05-31","title":"Phase 4 — packaging: skill + marketplace plugin (design brief)"},{"body":"# Phase 4a — Find (global omnibox)\n\n&gt; Status: SPEC. Splits the &quot;search&quot; half out of `phase-4-roadmap.md` workstream D.\n&gt; Phase 4b (Relationships) and the packaging work (refresh, `/dashboard`, plugin) are\n&gt; separate specs. Grounded in a 15-agent adversarial design review (run\n&gt; `wf_553ff185-c26`) — see &quot;Review provenance&quot; at the end.\n\nPhase 3 shipped a deterministic single-file dashboard with an Overview bento and an\nInventory view grouped by type. The pain that started this product — &quot;it&#x27;s hard to see\nwhere what I&#x27;m looking for is&quot; — is still half-served: Inventory has a per-row filter,\nbut there is no way to search across everything at once and land on the hit.\n\nThe generator already builds a search index (`_build_search` → `data.search`) and ships\nit in the data island, but the renderer never reads it (`app.js` filters rows by a\nseparate `dataset.search` blob and ignores `data.search` entirely). Phase 4a turns that\ndead index into a real global omnibox, extends it just enough to be useful, and builds\nthe **reusable jump infrastructure** (per-item ids + an id→row map) that Phase 4b&#x27;s\nrelationship surfaces will consume.\n\n## Decisions (locked)\n\n1. **Find leads.** Relationships → Phase 4b; packaging → a later phase.\n2. **Split confirmed.** 4a is Find only; 4a owns the shared jump infra so 4b reuses it\n   rather than duplicating it.\n3. **Search = both.** A global omnibox consuming `data.search`, plus the existing\n   per-view row filter (kept, with its role made distinct from the omnibox).\n4. **Index depth = names + paths + summaries + a capped body slice.**\n5. **textContent only.** Every value reaches the DOM via `textContent`; the path `href`\n   (per-segment `encodeURIComponent`) stays the sole data-derived attribute.\n6. **Highlighting is `createElement(&#x27;mark&#x27;)` + `textContent`, never `innerHTML`.**\n7. **No view router in this phase.** &quot;Jump&quot; means scrollIntoView + a transient highlight\n   on the item&#x27;s row. The POC-style multi-view sidebar IA is worth doing, but as its own\n   phase.\n\n## Scope\n\n- `generate.py` `_build_search`: add `type` + `typeLabel` per record (including docs);\n  append a capped, escaped body slice to the indexed `text`; keep the deterministic sort.\n- `generate.py` `_reduce_for_size`: rebuild a **light** index (names + paths) in\n  summary-only mode instead of emptying `search`, so the omnibox still works on large repos.\n- `generate.py` give every searchable item — including TODOs — a stable `id` so results\n  can be jumped to.\n- `schema.py`: enforce the search-record shape at build time.\n- `app.js`: an omnibox reading `data.search` — type-grouped results with counts and a\n  matched snippet, keyboard nav, focus via `/`, and jump via an `id → row` map built at\n  render time. Add a per-row id in every render path (inventory, docs, todos).\n- `dashboard.html.tmpl` + `styles.css`: omnibox markup; `&lt;mark&gt;`, type-chip, and\n  highlight-flash styles.\n- Keep the per-view filter; relabel the two inputs so they don&#x27;t read as duplicates.\n\n## Non-goals (Phase 4a)\n\n- Relationships: `_build_relationships`, edges, inline &quot;Related&quot;, the dedicated view —\n  Phase 4b.\n- A multi-view sidebar router — a later phase (jump is scrollIntoView here).\n- Ordered workflow chains, refresh tiers, `/dashboard`, plugin packaging.\n- The two latent Phase 3 items (`markdown.py` `_safe_link` attribute-escaping,\n  `render.py` `__SCHEMA_VERSION__` ordering) stay deferred: 4a routes no `doc.html`\n  through `innerHTML`, so they remain unreached.\n\n## Data contract (changes)\n\nSearch record grows from `{id, title, path, text}` to:\n\n```\n{ id, type, typeLabel, title, path, text }\n```\n\n- `type` — the internal kind used as a stable group key (`skill`, `agent`, `command`,\n  `mcpServer`, `hook`, `rule`, `reference`, `doc`, …).\n- `typeLabel` — the human group heading (`Claude agent`, `MCP server`, …). Inventory\n  items already carry both via `make_item` (`base.py`); **docs do not** — they are built\n  by a separate path (`claude.py`/`codex.py`/`generic.py`) and gr","bodyTruncated":true,"id":"f2c4c1486cbe","path":"docs/specs/phase-4a-find.md","summary":"Phase 3 shipped a deterministic single-file dashboard with an Overview bento and an","title":"Phase 4a — Find (global omnibox)"},{"body":"# Phase 4b — Relationships (cross-references)\n\n&gt; Status: SPEC, hardened by a 5-lens adversarial design review (18 findings) and a Codex\n&gt; debate (gpt-5.5, run thread `019e7ad1`). Splits the &quot;relationships&quot; half out of the\n&gt; Phase 4 roadmap, after Phase 4a (Find) shipped and merged (PR #4, merge commit\n&gt; `e76c0df`). Ordered workflow chains, a multi-view router, and packaging stay in later\n&gt; phases.\n\nPhase 3 shipped a deterministic single-file dashboard; Phase 4a turned the dead search\nindex into a global omnibox and built the reusable **id → row jump** infrastructure\n(per-item ids, an `id → row` map, `jumpTo`).\n\nThe `relationships` field has been a required top-level key since Phase 1 (`schema.py`)\nbut has always shipped empty (`generate.py` sets `&quot;relationships&quot;: []`). Phase 4b fills it\nwith deterministic edges and surfaces them two ways: an inline &quot;Related&quot; block on every\nitem/doc row, and a dedicated &quot;Cross-references&quot; view. It consumes 4a&#x27;s jump infra rather\nthan building anything new for navigation.\n\n## Decisions (locked)\n\n1. **Two deterministic edge kinds only.** `reference` (a doc body mentions an inventory\n   item&#x27;s exact path) and `declares` (a provider config file → the MCP servers and hooks\n   it declares). No inference, no scoring.\n2. **Body-mentions-name is deferred.** Matching an item by its title/name (not its path)\n   has a high false-positive rate and waits for a later slice.\n3. **Reference matching is exact-path, boundary-checked, unique-path-only, and targets\n   inventory items.** Match an inventory item&#x27;s exact repo-relative path as a\n   boundary-delimited token (not a bare substring), only for paths that resolve to exactly\n   one id, and never the four provider config files. Docs are reference **sources**, not\n   targets (doc→doc graphing is deferred). Shared config paths are excluded — they are the\n   `declares` channel.\n4. **`declares` source = a config-file node, not an instruction doc.** A `.claude/settings.json`,\n   `.mcp.json`, `.codex/config.toml`, or `.cursor/mcp.json` is the thing that declares an\n   MCP server or hook, so it is the edge source — not `CLAUDE.md`. Config-file nodes are\n   synthetic: they appear as Cross-references source-group headers and as an inline\n   &quot;declared in&quot; label, but they are **not** inventory rows and are not jump targets. This\n   gives correct provenance and covers cursor (which has MCP servers but no instruction\n   doc).\n5. **`declares` targets = MCP servers and hooks only.** Commands are file-discovered\n   (`.claude/commands/*.md`, `.codex/prompts/*.md`), not config declarations, so they are\n   out of `declares`.\n6. **Evidence is a generator-controlled path, not author text.** `evidence` is the\n   salient path of the edge (the referenced item path for `reference`, the config file\n   path for `declares`). It carries no doc-body text, so relationships hold no\n   author-derived content and need no `html.escape` / `htmlUnescape`; like every other\n   path field it reaches the DOM via `textContent` and is inert.\n7. **textContent only.** Edges render through `el()` / `textContent`; no new\n   `innerHTML` / `outerHTML` / `insertAdjacentHTML`. The CI guard still holds.\n8. **Jump controls are not rows.** Inline Related entries and Cross-references endpoints\n   are real `&lt;button type=&quot;button&quot;&gt;` / `&lt;a href=&quot;#…&quot;&gt;` controls with keyboard behavior,\n   but they are **not** `.acc-item` and carry **no** `data-id`. The `.acc-item[data-id]`\n   namespace stays reserved for the one canonical row per id, so `buildRowIndex` resolves\n   each id to its real row, never to a jump control.\n9. **Edges are stored directed, rendered bidirectionally.** One stored edge (`from → to`)\n   shows on both endpoints with a direction-aware verb (where both endpoints have a row).\n10. **The view is &quot;Cross-references,&quot; grouped by source, display-sorted by path/title.**\n    Ordered chains (&quot;Workflows&quot;) stay deferred, so the name avoids implying sequence.\n\n## Scope\n\n- `generate.py`: a new `_build_relationships(inv","bodyTruncated":true,"id":"a4fb696be9d0","path":"docs/specs/phase-4b-relationships.md","summary":"Phase 3 shipped a deterministic single-file dashboard; Phase 4a turned the dead search","title":"Phase 4b — Relationships (cross-references)"},{"body":"# AI Control Center — Phase 1 (deterministic core + generic dashboard) Implementation Plan\n\n&gt; **For agentic workers:** REQUIRED SUB-SKILL: Use superpowers:subagent-driven-development (recommended) or superpowers:executing-plans to implement this plan task-by-task. Steps use checkbox (`- [ ]`) syntax for tracking.\n\n**Goal:** Build the deterministic extraction core and a generic-fallback adapter that stamps one self-contained, redacted, byte-stable `dashboard.html` for any repo.\n\n**Architecture:** A stdlib-only `python3` package scans a repo&#x27;s files, a generic adapter turns markdown into normalized data, secrets are redacted at extraction, the data is canonicalized and inlined as a JSON island, and a bundled HTML template plus classic inline JS renders the view. No third-party runtime dependencies. Output is deterministic so re-stamping produces no diff when content is unchanged.\n\n**Tech Stack:** Python 3.12 (stdlib only at runtime), pytest (dev only), HTML + classic JS template.\n\nThis is Phase 1 of 4 (see the design spec at `docs/superpowers/specs/2026-05-29-ai-control-center-design.md`). Phases 2-4 (first-class adapters, full renderer, refresh + packaging) get their own plans.\n\n---\n\n## File structure\n\n```text\nai-control-center/\n  pyproject.toml                 # package metadata, pytest config (dev)\n  src/acc/\n    __init__.py                  # version constant\n    ids.py                       # stable_id(), rel_posix()\n    redaction.py                 # redact_text(), allowlist_config()\n    scan.py                      # scan_files(), DEFAULT_EXCLUDES\n    markdown.py                  # render_markdown_safe()\n    digest.py                    # source_digest()\n    schema.py                    # SCHEMA_VERSION, canonical_json(), validate()\n    render.py                    # render_html()\n    generate.py                  # generate(), detect_out_dir()\n    cli.py                       # main() entry point\n    adapters/\n      __init__.py\n      base.py                    # ScanContext, ProviderRoot, ProviderAdapter\n      generic.py                 # GenericAdapter\n  templates/\n    dashboard.html.tmpl          # static shell, layout B, placeholders\n    styles.css                   # inlined at render\n    app.js                       # classic JS, builds DOM from JSON island\n  tests/\n    test_ids.py\n    test_redaction.py\n    test_scan.py\n    test_markdown.py\n    test_digest.py\n    test_schema.py\n    test_generic_adapter.py\n    test_render.py\n    test_generate.py             # determinism, redaction, XSS integration\n    fixtures/\n      sample_repo/               # built inside the test, not committed raw\n```\n\nEach module has one responsibility. `generate.py` is the only place that wires them together. Adapters depend on `ids`, `redaction`, `markdown` but never on each other.\n\n---\n\n## Task 0: Scaffold the package\n\n**Files:**\n- Create: `pyproject.toml`\n- Create: `src/acc/__init__.py`\n- Create: `src/acc/adapters/__init__.py`\n\n- [ ] **Step 1: Create `pyproject.toml`**\n\n```toml\n[build-system]\nrequires = [&quot;setuptools&gt;=68&quot;]\nbuild-backend = &quot;setuptools.build_meta&quot;\n\n[project]\nname = &quot;ai-control-center&quot;\nversion = &quot;0.1.0&quot;\ndescription = &quot;Self-contained HTML control center generated from a repo&#x27;s AI markdown&quot;\nrequires-python = &quot;&gt;=3.12&quot;\n\n[project.scripts]\nacc = &quot;acc.cli:main&quot;\n\n[tool.setuptools.packages.find]\nwhere = [&quot;src&quot;]\n\n[tool.pytest.ini_options]\npythonpath = [&quot;src&quot;]\ntestpaths = [&quot;tests&quot;]\n```\n\n- [ ] **Step 2: Create the package init files**\n\n`src/acc/__init__.py`:\n\n```python\n__version__ = &quot;0.1.0&quot;\n```\n\n`src/acc/adapters/__init__.py`:\n\n```python\n```\n\n(empty file)\n\n- [ ] **Step 3: Verify the dev environment**\n\nRun: `python -m pytest --version`\nExpected: pytest prints its version (install with `pip install pytest` if missing).\n\n- [ ] **Step 4: Commit**\n\n```bash\ngit add pyproject.toml src/acc/__init__.py src/acc/adapters/__init__.py\ngit commit -m &quot;chore: scaffold acc package&quot;\n```\n\n---\n\n## Task 1: Stable IDs and repo-relative paths\n\n**Files:**\n- Creat","bodyTruncated":true,"id":"bb144c1da7b5","path":"docs/superpowers/plans/2026-05-29-ai-control-center-phase-1-core.md","summary":"**Goal:** Build the deterministic extraction core and a generic-fallback adapter that stamps one self-contained, redacted, byte-stable `dashboard.html` for any repo.","title":"AI Control Center — Phase 1 (deterministic core + generic dashboard) Implementation Plan"},{"body":"# AI Control Center — Phase 2 (first-class provider adapters) Implementation Plan\n\n&gt; **For agentic workers:** REQUIRED SUB-SKILL: Use superpowers:subagent-driven-development (recommended) or superpowers:executing-plans to implement this plan task-by-task. Steps use checkbox (`- [ ]`) syntax for tracking.\n\n**Goal:** Add first-class Claude Code, Codex, and Cursor adapters that map native conventions into the superset schema, activate the allowlist redaction tier for structured config, and merge every detected provider into one dashboard via the owner rule.\n\n**Architecture:** Two new stdlib helpers (`frontmatter.py`, `config.py`) feed three thin per-provider adapters. `generate.py` detects all providers, each first-class adapter claims its provider folder, the generic adapter indexes the unclaimed markdown, and the partials merge into one deterministic dashboard. A `validate()` tripwire re-scans the serialized output for surviving secrets. Phase 2 is data-only; the renderer is unchanged (Phase 3).\n\n**Tech Stack:** Python 3.12 (stdlib only at runtime — `tomllib`, `json`, `re`, `html`), pytest (dev only).\n\nThis is Phase 2 of 4. Spec: `docs/superpowers/specs/2026-05-29-ai-control-center-phase-2-adapters-design.md`. Builds on Phase 1 (merged). Phase 3 (renderer) and Phase 4 (refresh + packaging) get their own plans.\n\n---\n\n## File structure\n\n```text\nsrc/acc/\n  frontmatter.py          # NEW  parse_frontmatter()\n  config.py               # NEW  load_json(), load_toml(), MCP_ALLOWED, safe_mcp()\n  adapters/\n    base.py               # MODIFY  add make_item(), empty_inventory(), empty_docs()\n    claude.py             # NEW  ClaudeAdapter\n    codex.py              # NEW  CodexAdapter\n    cursor.py             # NEW  CursorAdapter\n    generic.py            # unchanged\n  schema.py               # MODIFY  add assert_no_secrets(); validate() calls it\n  generate.py             # MODIFY  detect-all + file-claiming merge + resolve_owner + providers\n  cli.py                  # MODIFY  add --owner; handle OwnerAmbiguousError\ntests/\n  builders.py             # NEW  make_&lt;provider&gt;_repo() helpers\n  test_builders.py        # NEW  smoke test for builders\n  test_frontmatter.py     # NEW\n  test_config.py          # NEW\n  test_adapter_base.py    # NEW\n  test_claude_adapter.py  # NEW\n  test_codex_adapter.py   # NEW\n  test_cursor_adapter.py  # NEW\n  test_owner_rule.py      # NEW\n  test_schema.py          # MODIFY  assert_no_secrets cases\n  test_generate.py        # MODIFY  multi-provider merge, determinism, no-double-list, tripwire\n```\n\nEach adapter depends on `ids`, `redaction`, `markdown`, `frontmatter`, `config`, and `adapters.base` — never on another adapter. `generate.py` is the only module that wires adapters together.\n\n**Item shape (inventory):** `{id, provider, type, typeLabel, title, path, summary}`.\n**Doc shape (docs buckets):** `{id, title, path, summary, html}` (same as Phase 1 generic docs).\n**ProviderSummary:** `{id, displayName, root, detected}` (+ optional `config` facts for Codex).\n\n---\n\n## Task 1: Frontmatter parser\n\n**Files:**\n- Create: `src/acc/frontmatter.py`\n- Test: `tests/test_frontmatter.py`\n\n- [ ] **Step 1: Write the failing test**\n\n`tests/test_frontmatter.py`:\n\n```python\nfrom acc.frontmatter import parse_frontmatter\n\n\ndef test_no_fence_returns_empty_fields_and_full_body():\n    fields, body = parse_frontmatter(&quot;# Title\\n\\nbody text&quot;)\n    assert fields == {}\n    assert body == &quot;# Title\\n\\nbody text&quot;\n\n\ndef test_parses_simple_keys_and_body():\n    text = &quot;---\\nname: reviewer\\ndescription: Reviews code\\n---\\n\\n# Reviewer\\n\\nbody&quot;\n    fields, body = parse_frontmatter(text)\n    assert fields[&quot;name&quot;] == &quot;reviewer&quot;\n    assert fields[&quot;description&quot;] == &quot;Reviews code&quot;\n    assert body == &quot;\\n# Reviewer\\n\\nbody&quot;\n\n\ndef test_strips_quotes_and_parses_booleans():\n    text = &#x27;---\\ndescription: &quot;Quoted value&quot;\\nalwaysApply: true\\ndraft: false\\n---\\nx&#x27;\n    fields, _ = parse_frontmatter(text)\n    assert fields[&quot;description&quot;] == &quot;Quoted value&quot;\n    assert fie","bodyTruncated":true,"id":"7d28fae29475","path":"docs/superpowers/plans/2026-05-29-ai-control-center-phase-2-adapters.md","summary":"**Goal:** Add first-class Claude Code, Codex, and Cursor adapters that map native conventions into the superset schema, activate the allowlist redaction tier for structured config, and merge every detected provider into one dashboard via the owner rule.","title":"AI Control Center — Phase 2 (first-class provider adapters) Implementation Plan"},{"body":"# Phase 3 renderer (Overview + Inventory) Implementation Plan\n\n&gt; **For agentic workers:** REQUIRED SUB-SKILL: Use superpowers:subagent-driven-development (recommended) or superpowers:executing-plans to implement this plan task-by-task. Steps use checkbox (`- [ ]`) syntax for tracking.\n\n**Goal:** Render the Phase 1/2 JSON island into a human-facing dashboard — a bento Overview and an Inventory view grouped by type with linked source paths — and add the output size budget.\n\n**Architecture:** Extend the existing classic-IIFE renderer (`src/acc/templates/app.js`) with two new render functions and a shared `itemRow` builder; add `source.pathPrefix` and `generator.truncated` plus a render-then-measure size budget to `src/acc/generate.py`. No adapter changes. `textContent` everywhere; the one `href` is built by per-segment URL-encoding the combined relative path.\n\n**Tech Stack:** Python 3.12 stdlib (generator), vanilla browser JS (renderer, no framework, file://-safe), `pytest` for contract tests, `pytest-playwright` (test-only) for DOM tests.\n\n**Spec:** `docs/superpowers/specs/2026-05-30-ai-control-center-phase-3-renderer-design.md`\n\n**Branch:** `feature/phase-3-renderer` (already created; the spec is committed there).\n\n---\n\n### Task 1: `source.pathPrefix` and `generator.truncated`\n\n**Files:**\n- Modify: `src/acc/generate.py` (imports near top; the `data` dict at `src/acc/generate.py:165-183`)\n- Test: `tests/test_generate.py`\n\n- [ ] **Step 1: Write the failing tests**\n\nAppend to `tests/test_generate.py`:\n\n```python\nimport os\nimport acc.generate as gen\n\n\ndef test_pathprefix_is_dotdot_for_provider_owner(tmp_path):\n    make_claude_repo(tmp_path)\n    data = _island(generate(tmp_path))\n    assert data[&quot;source&quot;][&quot;pathPrefix&quot;] == &quot;..&quot;\n\n\ndef test_pathprefix_is_dot_when_out_is_root(tmp_path):\n    make_claude_repo(tmp_path)\n    data = _island(generate(tmp_path, out_dir=tmp_path))\n    assert data[&quot;source&quot;][&quot;pathPrefix&quot;] == &quot;.&quot;\n\n\ndef test_pathprefix_for_nested_out_dir(tmp_path):\n    make_claude_repo(tmp_path)\n    data = _island(generate(tmp_path, out_dir=tmp_path / &quot;a&quot; / &quot;b&quot;))\n    assert data[&quot;source&quot;][&quot;pathPrefix&quot;] == &quot;../..&quot;\n\n\ndef test_pathprefix_empty_when_relpath_fails(tmp_path, monkeypatch):\n    make_claude_repo(tmp_path)\n\n    def boom(*a, **k):\n        raise ValueError(&quot;different drive&quot;)\n\n    monkeypatch.setattr(os.path, &quot;relpath&quot;, boom)\n    data = _island(generate(tmp_path))\n    assert data[&quot;source&quot;][&quot;pathPrefix&quot;] == &quot;&quot;\n\n\ndef test_generator_truncated_defaults_false(tmp_path):\n    make_claude_repo(tmp_path)\n    data = _island(generate(tmp_path))\n    assert data[&quot;generator&quot;][&quot;truncated&quot;] is False\n```\n\n- [ ] **Step 2: Run tests to verify they fail**\n\nRun: `python -m pytest tests/test_generate.py -k &quot;pathprefix or truncated&quot; -q`\nExpected: FAIL with `KeyError: &#x27;pathPrefix&#x27;` / `KeyError: &#x27;truncated&#x27;`.\n\n- [ ] **Step 3: Implement**\n\nAt the top of `src/acc/generate.py`, ensure these imports exist (add what is missing):\n\n```python\nimport os\n```\n\nAdd this helper above `def generate(`:\n\n```python\ndef _path_prefix(root: Path, out_dir: Path) -&gt; str:\n    &quot;&quot;&quot;Posix relative path from the dashboard&#x27;s dir back to the repo root.\n\n    Normally &quot;..&quot;, &quot;.&quot; when out_dir == root, &quot;../..&quot; when nested. Returns &quot;&quot;\n    when the path is not expressible (e.g. a different Windows drive), in which\n    case the renderer falls back to plain-text paths instead of a broken href.\n    &quot;&quot;&quot;\n    try:\n        return Path(os.path.relpath(root, out_dir)).as_posix()\n    except ValueError:\n        return &quot;&quot;\n```\n\nIn the `data` dict (`src/acc/generate.py:165-183`), change the `generator` line and add `pathPrefix` to `source`:\n\n```python\n        &quot;generator&quot;: {&quot;name&quot;: &quot;ai-control-center&quot;, &quot;version&quot;: __version__,\n                      &quot;rendererDigest&quot;: &quot;&quot;, &quot;truncated&quot;: False},\n        &quot;source&quot;: {\n            &quot;repoName&quot;: root.name,\n            &quot;pathPrefix&quot;: _path_prefix(root, out_dir),\n            &quot;dashboardPath&quot;: (\n                dashboard.relative_to(root).as_posix()\n                if da","bodyTruncated":true,"id":"90b3aec1cb6e","path":"docs/superpowers/plans/2026-05-30-ai-control-center-phase-3-renderer.md","summary":"**Goal:** Render the Phase 1/2 JSON island into a human-facing dashboard — a bento Overview and an Inventory view grouped by type with linked source paths — and add the output size budget.","title":"Phase 3 renderer (Overview + Inventory) Implementation Plan"},{"body":"# Phase 4a — Find Implementation Plan\n\n&gt; **For agentic workers:** REQUIRED SUB-SKILL: Use superpowers:subagent-driven-development (recommended) or superpowers:executing-plans to implement this plan task-by-task. Steps use checkbox (`- [ ]`) syntax for tracking.\n\n**Goal:** Turn the dead `data.search` index into a real global omnibox — type-grouped results with counts, a `&lt;mark&gt;`-highlighted snippet, keyboard nav, focus via `/`, and jump-to-row — plus the reusable per-row-id + id→row jump infra, all via `textContent` only.\n\n**Architecture:** The Python generato
