ails on missing providers/inventory.<\/p>\n<ul><li>[ ] **Step 3: Rewrite the pipeline body of <code>src/acc/generate.py<\/code>**<\/li><\/ul>\n<p>Add imports at the top (alongside the existing ones):<\/p>\n<pre><code>from .adapters.claude import ClaudeAdapter\nfrom .adapters.codex import CodexAdapter\nfrom .adapters.cursor import CursorAdapter<\/code><\/pre>\n<p>Add the claiming rule and merge helpers (after the owner-rule code from Task 9):<\/p>\n<pre><code>_FIRST_CLASS = (ClaudeAdapter, CodexAdapter, CursorAdapter)\n_CLAIM_DIRS = (&quot;.claude&quot;, &quot;.codex&quot;, &quot;.cursor&quot;)\n_CLAIM_MARKERS = (&quot;CLAUDE.md&quot;, &quot;AGENTS.md&quot;, &quot;.cursorrules&quot;)\n\n\ndef _claimed_by_provider(rel: str) -&gt; bool:\n    top = rel.split(&quot;/&quot;, 1)[0]\n    return top in _CLAIM_DIRS or rel in _CLAIM_MARKERS\n\n\ndef _merge_parts(parts: list[dict]) -&gt; tuple[dict, dict]:\n    inv = empty_inventory()\n    docs = empty_docs()\n    for part in parts:\n        for k, items in part.get(&quot;inventory&quot;, {}).items():\n            inv.setdefault(k, []).extend(items)\n        for k, items in part.get(&quot;docs&quot;, {}).items():\n            docs.setdefault(k, []).extend(items)\n    for bucket in (inv, docs):\n        for k in bucket:\n            bucket[k].sort(key=lambda x: (x[&quot;path&quot;], x[&quot;title&quot;], x[&quot;id&quot;]))\n    return inv, docs\n\n\ndef _build_search(inv: dict, docs: dict) -&gt; list[dict]:\n    records: list[dict] = []\n    for bucket in (docs, inv):\n        for items in bucket.values():\n            for it in items:\n                records.append({&quot;id&quot;: it[&quot;id&quot;], &quot;title&quot;: it[&quot;title&quot;],\n                                &quot;path&quot;: it[&quot;path&quot;], &quot;text&quot;: it.get(&quot;summary&quot;, &quot;&quot;)})\n    records.sort(key=lambda r: (r[&quot;path&quot;], r[&quot;title&quot;], r[&quot;id&quot;]))\n    return records\n\n\ndef _escape_summaries(inv: dict, docs: dict) -&gt; None:\n    for bucket in (inv, docs):\n        for items in bucket.values():\n            for it in items:\n                if &quot;summary&quot; in it:\n                    it[&quot;summary&quot;] = _html.escape(it[&quot;summary&quot;])<\/code><\/pre>\n<p>Update the imports from <code>adapters.base<\/code> so <code>empty_inventory<\/code>/<code>empty_docs<\/code> are available:<\/p>\n<pre><code>from .adapters.base import ScanContext, empty_inventory, empty_docs<\/code><\/pre>\n<p>Replace the <code>generate<\/code> function body with:<\/p>\n<pre><code>def generate(root: Path, out_dir: Path | None = None, owner: str | None = None) -&gt; Path:\n    root = root.resolve()\n    all_files = scan_files(root)\n\n    detected_ids = detect_providers(root)\n    out_dir = out_dir.resolve() if out_dir else resolve_owner(root, detected_ids, owner)\n    dashboard = (out_dir / &quot;dashboard.html&quot;).resolve()\n\n    files = [f for f in all_files if f.resolve() != dashboard]\n    ctx = ScanContext(root=root, files=files)\n\n    parts: list[dict] = []\n    provider_summaries: list[dict] = []\n    for adapter_cls in _FIRST_CLASS:\n        adapter = adapter_cls()\n        roots = adapter.detect(ctx)\n        if not roots:\n            continue\n        part = adapter.normalize(ctx, roots[0])\n        parts.append(part)\n        provider_summaries.append(part[&quot;provider&quot;])\n\n    # generic indexes only the markdown not claimed by a provider folder/marker\n    unclaimed = [f for f in files if not _claimed_by_provider(rel_posix(f, root))]\n    gctx = ScanContext(root=root, files=unclaimed)\n    gadapter = GenericAdapter()\n    gpart = gadapter.normalize(gctx, gadapter.detect(gctx)[0])\n    parts.append(gpart)\n    provider_summaries.append({&quot;id&quot;: &quot;generic&quot;, &quot;displayName&quot;: &quot;Generic&quot;,\n                               &quot;root&quot;: &quot;.&quot;, &quot;detected&quot;: True})\n\n    inv, docs = _merge_parts(parts)\n    _escape_summaries(inv, docs)        # escape plain-text summaries for the island\n    search = _build_search(inv, docs)   # search reads escaped summaries (Phase 1 contract)\n\n    out_dir.mkdir(parents=True, exist_ok=True)\n\n    data = {\n        &quot;schemaVersion&quot;: SCHEMA_VERSION,\n        &quot;generator&quot;: {&quot;name&quot;: &quot;ai-control-center&quot;, &quot;version&quot;: __version__, &quot;rendererDigest&quot;: &quot;&quot;},\n        &quot;source&quot;: {\n            &quot;repoName&quot;: root.name,\n            &quot;dashboardPath&quot;: (\n                dashboard.relative_to(root).as_posix()\n                if dashboard.is_relative_to(root) else str(dashboard)\n            ),\n            &quot;sourceDigest&quot;: source_digest(files, root),\n            &quot;vcs&quot;: {&quot;kind&quot;: &quot;none&quot;},\n        },\n        &quot;providers&quot;: provider_summaries,\n        &quot;project&quot;: gpart[&quot;project&quot;],\n        &quot;inventory&quot;: inv,\n        &quot;docs&quot;: docs,\n        &quot;relationships&quot;: [],\n        &quot;search&quot;: search,\n    }\n    validate(data)\n    dashboard.write_text(render_html(data), encoding=&quot;utf-8&quot;)\n    return dashboard<\/code><\/pre>\n<p>Add the <code>rel_posix<\/code> import at the top (used by <code>_claimed_by_provider<\/code>):<\/p>\n<pre><code>from .ids import rel_posix<\/code><\/pre>\n<p>Remove the now-unused <code>_escape_plain_text_fields<\/code> and the old <code>_build_search(part)<\/code> (single-arg) definitions; the new <code>_build_search(inv, docs)<\/code> and <code>_escape_summaries<\/code> replace them.<\/p>\n<p>&gt; Note: summaries are HTML-escaped before the search index is built, so no raw markup (e.g. <code>&lt;img onerror=...&gt;<\/code>) reaches the data island via <code>search[].text<\/code>. This preserves Phase 1&#x27;s XSS guarantee (<code>test_generate_escapes_hostile_markdown<\/code>). The cosmetic &quot;<code>search[].text<\/code> holds escaped entities&quot; item stays deferred — <code>app.js<\/code> never reads <code>data.search<\/code>.<\/p>\n<ul><li>[ ] **Step 4: Run tests to verify they pass**<\/li><\/ul>\n<p>Run: <code>python -m pytest tests/test_generate.py -v<\/code><\/p>\n<p>Expected: PASS (all existing Phase 1 tests + the new multi-provider tests)<\/p>\n<ul><li>[ ] **Step 5: Run the whole suite**<\/li><\/ul>\n<p>Run: <code>python -m pytest -q<\/code><\/p>\n<p>Expected: PASS (all green)<\/p>\n<ul><li>[ ] **Step 6: Commit**<\/li><\/ul>\n<pre><code>git add src/acc/generate.py tests/test_generate.py\ngit commit -m &quot;feat: multi-provider detect/claim/merge in generate pipeline&quot;<\/code><\/pre>\n<p>---<\/p>\n<h2>Task 11: CLI <code>--owner<\/code>, ambiguity handling, and final verification<\/h2>\n<p>**Files:**<\/p>\n<ul><li>Modify: <code>src/acc/cli.py<\/code><\/li><li>Test: covered by <code>tests/test_owner_rule.py<\/code> (resolve_owner) and a CLI smoke run<\/li><\/ul>\n<ul><li>[ ] **Step 1: Modify <code>src/acc/cli.py<\/code>**<\/li><\/ul>\n<p>Replace the file with:<\/p>\n<pre><code>import argparse\nimport sys\nfrom pathlib import Path\n\nfrom .generate import generate, OwnerAmbiguousError\n\n\ndef main(argv: list[str] | None = None) -&gt; int:\n    parser = argparse.ArgumentParser(prog=&quot;acc&quot;, description=&quot;Generate the AI control center dashboard&quot;)\n    parser.add_argument(&quot;--root&quot;, default=&quot;.&quot;, help=&quot;repo root to scan&quot;)\n    parser.add_argument(&quot;--out&quot;, default=None, help=&quot;output directory (default: auto-detect provider folder)&quot;)\n    parser.add_argument(&quot;--owner&quot;, default=None,\n                        help=&quot;provider folder to own the dashboard when more than one exists&quot;)\n    args = parser.parse_args(argv)\n    out_dir = Path(args.out) if args.out else None\n    try:\n        dashboard = generate(Path(args.root), out_dir, owner=args.owner)\n    except OwnerAmbiguousError as e:\n        print(f&quot;error: {e}&quot;, file=sys.stderr)\n        return 2\n    print(f&quot;wrote {dashboard}&quot;)\n    return 0\n\n\nif __name__ == &quot;__main__&quot;:\n    raise SystemExit(main())<\/code><\/pre>\n<ul><li>[ ] **Step 2: Verify the CLI entry behaves**<\/li><\/ul>\n<p>Run: <code>python -m pytest -q<\/code><\/p>\n<p>Expected: PASS (whole suite green; <code>main<\/code> now returns an int — no test asserts the old <code>None<\/code> return)<\/p>\n<ul><li>[ ] **Step 3: Smoke-test the CLI on a multi-provider temp repo**<\/li><\/ul>\n<p>Run:<\/p>\n<pre><code>python - &lt;&lt;&#x27;PY&#x27;\nimport tempfile, pathlib, sys\nsys.path.insert(0, &quot;tests&quot;)\nfrom builders import make_multi_provider_repo\nd = pathlib.Path(tempfile.mkdtemp())\nmake_multi_provider_repo(d)\nfrom importlib import import_module\nsys.path.insert(0, &quot;src&quot;)\ncli = import_module(&quot;acc.cli&quot;)\nrc = cli.main([&quot;--root&quot;, str(d)])\nprint(&quot;rc&quot;, rc)\nprint((d / &quot;.claude&quot; / &quot;dashboard.html&quot;).read_text()[:120])\nPY<\/code><\/pre>\n<p>Expected: prints <code>wrote .../.claude/dashboard.html<\/code>, <code>rc 0<\/code>, and the start of a valid HTML document.<\/p>\n<ul><li>[ ] **Step 4: Smoke-test the ambiguity path**<\/li><\/ul>\n<p>Run:<\/p>\n<pre><code>python - &lt;&lt;&#x27;PY&#x27;\nimport tempfile, pathlib, sys\nsys.path.insert(0, &quot;src&quot;)\nfrom importlib import import_module\ncli = import_module(&quot;acc.cli&quot;)\nd = pathlib.Path(tempfile.mkdtemp())\nfor prov in (&quot;.claude&quot;, &quot;.codex&quot;):\n    (d / prov).mkdir()\n    (d / prov / &quot;dashboard.html&quot;).write_text(&quot;&lt;html&gt;&quot;)\nrc = cli.main([&quot;--root&quot;, str(d)])\nprint(&quot;rc&quot;, rc)   # expect 2\nPY<\/code><\/pre>\n<p>Expected: prints an <code>error: multiple dashboards found ...<\/code> line and <code>rc 2<\/code>.<\/p>\n<ul><li>[ ] **Step 5: Run the CLI on this repo itself (real Codex + Claude fixture)**<\/li><\/ul>\n<p>Run: <code>python -m acc.cli --root . --out /tmp/acc-phase2 &amp;&amp; head -c 200 /tmp/acc-phase2/dashboard.html<\/code><\/p>\n<p>Expected: <code>wrote /tmp/acc-phase2/dashboard.html<\/code>; the island lists this repo&#x27;s <code>.codex/config.toml<\/code> MCP (none active), <code>AGENTS.md<\/code>, and the docs index, with no secrets.<\/p>\n<ul><li>[ ] **Step 6: Commit**<\/li><\/ul>\n<pre><code>git add src/acc/cli.py\ngit commit -m &quot;feat: CLI --owner flag and ambiguous-owner exit code&quot;<\/code><\/pre>\n<p>---<\/p>\n<h2>Self-review notes<\/h2>\n<ul><li>**Spec coverage (Phase 2):** frontmatter parser (Task 1), safe config loaders + MCP allowlist (Task 2), shape helpers (Task 3), hybrid builders (Task 4), Claude/Codex/Cursor adapters with native labels + inventory parity (Tasks 5-7), <code>assert_no_secrets<\/code> tripwire (Task 8), detection + owner rule with precedence/override/ambiguity (Task 9), file-claiming merge + providers[] + determinism + no-double-list (Task 10), <code>--owner<\/code> CLI (Task 11). Data-only — no renderer changes, matching the locked decision.<\/li><li>**Naming consistency:** <code>parse_frontmatter<\/code>, <code>load_json<\/code>, <code>load_toml<\/code>, <code>safe_mcp<\/code>, <code>MCP_ALLOWED<\/code>, <code>make_item<\/code>, <code>empty_inventory<\/code>, <code>empty_docs<\/code>, <code>ClaudeAdapter<\/code>/<code>CodexAdapter<\/code>/<code>CursorAdapter<\/code>, <code>detect_providers<\/code>, <code>resolve_owner<\/code>, <code>OwnerAmbiguousError<\/code>, <code>_claimed_by_provider<\/code>, <code>_merge_parts<\/code>, <code>_build_search<\/code>, <code>_escape_summaries<\/code> are used identically across tasks. Item shape <code>{id, provider, type, typeLabel, title, path, summary}<\/code> and doc shape <code>{id, title, path, summary, html}<\/code> are consistent.<\/li><li>**Backward compatibility:** <code>detect_out_dir<\/code> is kept as a wrapper over <code>resolve_owner<\/code>, so Phase 1&#x27;s <code>test_detect_out_dir_*<\/code> and <code>test_generate_includes_provider_folder_markdown<\/code> stay green. <code>assert_no_secrets<\/code> does not fire on the existing hostile-markdown test (<code>onerror<\/code> is not a secret keyword).<\/li><li>**Redaction paths:** MCP config -&gt; <code>safe_mcp<\/code> allowlist (drops env/headers); frontmatter text and hook commands -&gt; <code>redact_text<\/code>; <code>assert_no_secrets<\/code> is the backstop over the serialized output.<\/li><li>**No placeholders:** every code step contains complete, runnable code.<\/li><\/ul>\n<h2>What Phase 2 leaves for later<\/h2>\n<p>The full layout-B renderer (bento Overview, Inventory badges, relationship-list Map, client search over the new inventory) and the size budget are Phase 3. The three-tier refresh and skill/plugin packaging are Phase 4. Loose non-structured markdown inside a provider folder (e.g. a stray <code>.claude/notes.md<\/code> no adapter inventories) is intentionally not surfaced in v1.<\/p>","id":"7d28fae29475","path":"docs/superpowers/plans/2026-05-29-ai-control-center-phase-2-adapters.md","summary":"**Goal:** Add first-class Claude Code, Codex, and Cursor adapters that map native conventions into the superset schema, activate the allowlist redaction tier for structured config, and merge every detected provider into one dashboard via the owner rule.","title":"AI Control Center — Phase 2 (first-class provider adapters) Implementation Plan"},{"html":"<h1>AI control center dashboard — design spec<\/h1>\n<p>Date: 2026-05-29<\/p>\n<p>Status: approved for planning<\/p>\n<p>Project: html-dash<\/p>\n<h2>Problem<\/h2>\n<p>Markdown is the right format for AI agents in a repo. Config, intent, decisions, and capability definitions all live there: <code>CLAUDE.md<\/code>, <code>AGENTS.md<\/code>, Cursor rules, skills, agents, hooks, commands, MCP config, PRDs, ADRs. Agents read and write it well.<\/p>\n<p>For a human it gets hard fast. Once a repo holds twenty-plus markdown files spread across <code>.claude/<\/code>, <code>docs/<\/code>, and the tree, a person loses the thread: what exists, how pieces connect, what was decided and why, where the project stands. The information is all there and none of it is navigable.<\/p>\n<h2>Goal<\/h2>\n<p>Keep markdown as the source of truth for the machine. Add a second layer for the human: one self-contained HTML file that is the read-oriented control center for everything AI in the project. The human opens one file and sees scope, the inventory of skills/agents/hooks/commands/MCP/rules, PRDs, decisions, doc index, project state, and how things relate. Markdown for the machine, HTML for the human.<\/p>\n<p>The product ships as a public skill plus a marketplace plugin. The skill, the bundled generator, and the HTML it produces are the entire product.<\/p>\n<h2>Hard constraints<\/h2>\n<p>These are the point of the product, not preferences.<\/p>\n<ul><li>One standalone HTML file. Self-contained, opens from <code>file://<\/code> with no server, no build step, no framework, and nothing added to the user&#x27;s repo at runtime.<\/li><li>Lives under the AI-provider folder (<code>.claude/<\/code>, <code>.codex/<\/code>, <code>.cursor/<\/code>), never in the source tree. A loose <code>.html<\/code> in the repo root or <code>src/<\/code> collides with web-framework globs (Vite <code>**/*.html<\/code>, Angular and Next entry points). Under the provider folder it is inert to any build.<\/li><li>Works on greenfield and brownfield repos, and on repos that are not under git.<\/li><li>Init-triggered: provider init produces the markdown and the HTML together; later markdown changes re-stamp the HTML.<\/li><\/ul>\n<h2>Decisions and rationale<\/h2>\n<p>These were resolved during design. Each one closes off an alternative on purpose.<\/p>\n<p>1. Committed and shared. The HTML is checked in and travels with the repo, treated like <code>CLAUDE.md<\/code> and <code>AGENTS.md<\/code>. Consequence: output must be deterministic or every re-stamp churns the diff, and redaction is mandatory because the file can be pushed to a public remote.<\/p>\n<p>2. Project-level state, not personal. &quot;Where we left off&quot; is reframed as shared, derivable facts: current milestone, last decision, open TODOs found in docs, recently touched docs. No per-user or session data, and no live repo state (branch, dirty tree, mtimes) in a committed artifact, since those churn or go stale the instant they are written.<\/p>\n<p>3. Hybrid generation, deterministic extractor first. A bundled deterministic scanner is the canonical extractor that produces the committed JSON. The model is demoted to an optional layer that only writes summaries over already-redacted text, and that powers the generic fallback on repos with no known structure. The model never emits canonical structure. This keeps diffs stable and redaction enforceable while preserving flexibility on messy repos.<\/p>\n<p>4. Multi-provider in v1, inventory-first. First-class adapters for Claude Code, Codex, and Cursor; a generic fallback adapter covers everything else and bare repos. Thin per-provider adapters map native conventions into one superset schema. Items keep their native type label (a Cursor rule shows as a Cursor rule, never a fake &quot;skill&quot;). The renderer and schema stay provider-agnostic; sections with no data hide. v1 shows native inventory, paths, links, and relationships, and defers deep workflow interpretation.<\/p>\n<p>5. Lean ambition. Build a trusted inventory and map first. Nail refresh, redaction, stable diffs, links, and provider-native inventory before adding interpretation.<\/p>\n<h2>Architecture<\/h2>\n<h3>Components<\/h3>\n<ul><li>Generator: a bundled <code>python3<\/code> script (present on macOS and most Linux, no install). It is the canonical deterministic extractor and the thing that writes the HTML. It lives in the plugin and is never copied into the user&#x27;s repo.<\/li><li>Adapters: <code>claude<\/code>, <code>codex<\/code>, <code>cursor<\/code>, and <code>generic<\/code>. Each maps one provider&#x27;s files into the superset schema.<\/li><li>Renderer: a bundled HTML template plus classic inline JavaScript (no ES modules, since they fail over <code>file://<\/code>; no CDN). It builds the DOM from the inlined JSON island and provides client-side search.<\/li><li>Skill (<code>SKILL.md<\/code>): the agent&#x27;s entry point. The agent runs the generator, optionally adds summaries over redacted text, and re-stamps.<\/li><li>Plugin: packages the skill, generator, renderer, a <code>/dashboard<\/code> command, and opt-in hook templates. Offline by default.<\/li><\/ul>\n<h3>Generation pipeline<\/h3>\n<pre><code>scan sorted files\n  -&gt; adapter extract (allowlisted config fields only)\n  -&gt; redact prose and structured values\n  -&gt; optional model summaries over redacted text only\n  -&gt; schema validate (reject secret-shaped values)\n  -&gt; canonical sort and stringify\n  -&gt; render static HTML template\n  -&gt; inline JSON island\n  -&gt; write dashboard.html under the owning provider folder<\/code><\/pre>\n<p>Determinism rules: derived stable IDs of the form <code>sha256(provider + type + relativePath + heading)[:12]<\/code>, repo-relative POSIX paths, sorted collections, and no timestamps, branch names, dirty-tree state, or mtimes in the committed region. <code>sourceDigest<\/code> is a hash of the scanned inputs, so it changes only when source content changes, never on unrelated commits. Two fields need care because they can churn: <code>vcs.head<\/code> is informational and is not written to the committed region (only <code>vcs.kind<\/code> is). <code>recentDocs<\/code> is derived from git history, bounded to the most recent few changed docs, and omitted entirely on non-git repos — never derived from filesystem mtimes. That keeps every committed field content-derived, so a re-stamp with no content change produces no diff.<\/p>\n<h3>Normalized JSON shape (top level)<\/h3>\n<p>The JSON ships inlined in the HTML as a <code>&lt;script type=&quot;application/json&quot;&gt;<\/code> island. The view builds itself from it, and the same island is the client-side search index.<\/p>\n<pre><code>type DashboardData = {\n  schemaVersion: &quot;1.0&quot;;\n  generator: { name: &quot;ai-control-center&quot;; version: string; rendererDigest: string };\n  source: {\n    repoName: string;\n    dashboardPath: string;       // repo-relative\n    sourceDigest: string;        // hash of scanned inputs\n    vcs: { kind: &quot;git&quot; | &quot;none&quot;; head?: string };\n  };\n  providers: ProviderSummary[];  // which adapters fired, and their roots\n  project: {\n    title: string;\n    summary?: string;\n    currentMilestone?: Ref;\n    lastDecision?: Ref;\n    openTodos: Todo[];\n    recentDocs: Ref[];\n    warnings: Warning[];         // staleness, skipped files, redactions applied\n  };\n  inventory: {\n    agents: Item[]; skills: Item[]; hooks: Item[];\n    commands: Item[]; mcpServers: Item[]; rules: Item[];\n  };\n  docs: { prds: Doc[]; adrs: Doc[]; decisions: Doc[]; workflows: Doc[]; references: Doc[] };\n  relationships: Relationship[]; // v1 Map stub: flat, deterministic cross-references\n  search: SearchRecord[];\n};<\/code><\/pre>\n<p>Every <code>Item<\/code> carries its provider-native type label, a repo-relative source path, and a short redacted summary. <code>Ref<\/code> is a <code>{ id, title, path }<\/code> pointer. The v1 Map is <code>relationships<\/code> — a flat list such as &quot;skill X references command Y&quot; or &quot;agent Z uses MCP <code>postgres<\/code>&quot;, derived from cross-references already present in the markdown. The interactive node graph is deferred to v2.<\/p>\n<h3>Adapter interface<\/h3>\n<pre><code>type ProviderAdapter = {\n  id: &quot;claude&quot; | &quot;codex&quot; | &quot;cursor&quot; | &quot;generic&quot;;\n  displayName: string;\n  detect(ctx: ScanContext): ProviderRoot[];\n  extract(ctx: ScanContext, root: ProviderRoot): ProviderExtract;\n  normalize(extract: ProviderExtract): Partial&lt;DashboardData&gt;;\n  redactPolicy: RedactPolicy;\n};<\/code><\/pre>\n<p>The generic fallback adapter inventories markdown files, headings, front-matter, and folder structure, plus git-derived facts when git is present. It guarantees the dashboard is never empty, which is also how greenfield and brownfield support is met.<\/p>\n<h3>Refresh<\/h3>\n<p>Refresh is a first-class workflow, not a caveat. A static <code>file://<\/code> page cannot reliably detect that it is stale, so the design is honest about it.<\/p>\n<ul><li>Required: an explicit <code>/dashboard<\/code> command from the skill or plugin.<\/li><li>Default: the agent re-stamps after it edits markdown.<\/li><li>Optional: an opt-in file-write hook, a git post-commit hook, or a CI check that recomputes <code>sourceDigest<\/code> and flags drift.<\/li><\/ul>\n<p>The HTML displays its <code>sourceDigest<\/code>, scanned file count, and provider roots, and states &quot;freshness is manual&quot; when no hook is installed.<\/p>\n<h3>Multiple provider folders<\/h3>\n<p>One merged dashboard, never parallel copies.<\/p>\n<pre><code>If one dashboard exists, update it.\nIf none exists, create it under the currently running provider folder.\nIf multiple dashboards exist, stop and ask which is the owner.\nThe owner dashboard includes all detected providers.<\/code><\/pre>\n<h2>User interface<\/h2>\n<p>Single scrolling page with a sticky jump-nav, chosen for the strongest &quot;repo Confluence&quot; feel and because it needs no routing under <code>file://<\/code>. Section order:<\/p>\n<p>1. Sticky header: title, current milestone, search box, freshness marker (<code>sourceDigest<\/code>, file count, refresh command).<\/p>\n<p>2. Sticky jump-nav: Overview, Inventory, Docs, Map.<\/p>\n<p>3. Overview, rendered as a bento grid: providers detected, inventory counts, current milestone, last decision, open TODOs, recently touched docs.<\/p>\n<p>4. Inventory: grouped lists (Agents, Skills, Commands, Hooks, MCP, Rules). Each row is name, native-type badge, path link, and summary. MCP rows show name and status with auth redacted.<\/p>\n<p>5. Docs: PRDs, ADRs and decisions, workflows, references. Each links out to the raw markdown.<\/p>\n<p>6. Map: the v1 stub relationship list.<\/p>\n<p>7. Footer: freshness notice plus exactly what the generator reads and excludes.<\/p>\n<p>Sections with no data hide. The provider&#x27;s root markdown links to the dashboard so a human finds it despite the dot-folder location.<\/p>\n<h2>Security<\/h2>\n<ul><li>Redaction at extraction, not after. Two tiers with different guarantees. Structured provider config (MCP servers, settings) is allowlisted: only known-safe fields pass, everything else is dropped, so this tier fails closed. Free-form prose (docs, PRDs, ADRs) is run through a high-precision secret-shaped-string scanner that masks bearer headers, keyword assignments, provider-prefixed keys, and credential URLs; this tier is best-effort by design (it favors precision over recall to avoid mangling normal prose, so high-entropy secrets with no telltale prefix can slip through). Phase 1 ships only the generic prose scanner; the allowlist path is exercised when the provider adapters land. Neither tier emits a value it recognized as secret.<\/li><li>The dashboard is committed, executable HTML, so it is treated as a stored-XSS surface. The renderer builds text with <code>textContent<\/code> and only injects a sanitized markdown subset (headings, paragraphs, lists, code, links). No raw HTML passthrough from repo content.<\/li><li>The generator runs offline by default and states what it reads, which matters for public distribution trust.<\/li><\/ul>\n<h2>Edge cases<\/h2>\n<ul><li>Non-git repos are first-class (<code>vcs.kind: &quot;none&quot;<\/code>); no feature depends on git.<\/li><li>Root-level <code>AGENTS.md<\/code> is mirrored by link; the dashboard stays under the provider folder.<\/li><li>Monorepos use scoped roots to avoid an oversized file.<\/li><li>Scan exclusions: <code>node_modules<\/code>, <code>.git<\/code>, vendored folders, submodules, symlinks, generated docs.<\/li><li>Size budget: target under 500 KB, warn over 1 MB, switch to summary-only over 2 MB.<\/li><\/ul>\n<h2>Testing<\/h2>\n<ul><li>Fixture repos for each first-class provider, plus a brownfield fixture and a non-git fixture.<\/li><li>Determinism test: run the generator twice on a fixture and assert byte-identical output.<\/li><li>Redaction test: fixtures with realistic MCP config shapes holding fake-but-real-looking secrets; assert nothing leaks into the HTML, JSON island, or search index.<\/li><li>XSS test: a fixture with hostile markdown (script tags, <code>onerror<\/code> images, raw HTML); assert the rendered output is sanitized.<\/li><li>Size-budget test: a large fixture; assert the warn and summary-only thresholds behave.<\/li><\/ul>\n<h2>v1 boundary<\/h2>\n<p>In scope: deterministic inventory, doc index, Map stub, project facts, three-tier refresh, redaction, sanitized render, three first-class adapters, generic fallback, the <code>/dashboard<\/code> command, project level only.<\/p>\n<p>Deferred to v2: global cross-repo view at <code>~/.claude/dashboard.html<\/code>, the interactive relationship graph, live git state, smart interpretation of workflows, and auto-installed hooks (shipped as opt-in templates in v1).<\/p>","id":"f53b173c2722","path":"docs/superpowers/specs/2026-05-29-ai-control-center-design.md","summary":"Date: 2026-05-29","title":"AI control center dashboard — design spec"},{"html":"<h1>AI control center — Phase 2 (first-class provider adapters) design<\/h1>\n<p>Date: 2026-05-29<\/p>\n<p>Status: approved for planning<\/p>\n<p>Project: html-dash (AI Control Center)<\/p>\n<p>Builds on: <code>2026-05-29-ai-control-center-design.md<\/code> (v1 design), Phase 1 (merged)<\/p>\n<h2>Scope<\/h2>\n<p>Phase 2 adds three first-class provider adapters — Claude Code, Codex, and Cursor — that map native conventions into the superset schema&#x27;s inventory. It activates the allowlist redaction tier for structured config, and produces one merged dashboard across every detected provider folder via the owner rule. The generic adapter stays as the fallback for everything else.<\/p>\n<p>Phase 2 is data-only. The renderer still shows docs and TODOs (Phase 1). The bento Overview and Inventory views that surface this data are Phase 3. After Phase 2 the JSON island is richer; the visible page is unchanged.<\/p>\n<p>Locked decisions from brainstorming:<\/p>\n<p>1. Inventory parity per provider — list standard artifacts (name, native type label, path, redacted summary). No relationship extraction; the Map is Phase 3.<\/p>\n<p>2. Fixtures are built in-test with reusable builder helpers (no committed fixture trees).<\/p>\n<p>3. Data-only — no renderer changes in this phase.<\/p>\n<p>4. <code>validate()<\/code> gains an <code>assert_no_secrets<\/code> tripwire that re-scans the serialized output.<\/p>\n<p>5. Codex saved prompts map into the existing <code>commands<\/code> bucket with a native label, not a new bucket.<\/p>\n<p>6. Owner precedence is <code>.claude<\/code> &gt; <code>.codex<\/code> &gt; <code>.cursor<\/code>, then <code>.ai-control-center<\/code>.<\/p>\n<h2>Hard constraints carried from v1<\/h2>\n<ul><li>Stdlib only at runtime. No PyYAML, no third-party parsers. Codex TOML uses stdlib <code>tomllib<\/code>.<\/li><li>Deterministic output: sorted collections, stable IDs, repo-relative POSIX paths, no timestamps or mtimes.<\/li><li>Redaction at extraction. Structured config is allowlisted (fail closed); prose runs the secret scanner.<\/li><li>One self-contained HTML file under the owning provider folder.<\/li><\/ul>\n<h2>Architecture<\/h2>\n<h3>New shared modules<\/h3>\n<p>**<code>src/acc/frontmatter.py<\/code>** — <code>parse_frontmatter(text: str) -&gt; tuple[dict, str]<\/code>.<\/p>\n<p>A minimal reader for the YAML subset that real Claude and Cursor artifacts use. It handles a leading <code>---<\/code> fence, <code>key: value<\/code> pairs, single/double-quoted strings, inline lists <code>[a, b]<\/code>, block lists (<code>- item<\/code> under a key), and booleans (<code>true<\/code>/<code>false<\/code>). It does not handle nested maps or anchors. A line it cannot parse is skipped, never raised. Returns the parsed fields and the body after the fence. When there is no fence, fields are <code>{}<\/code> and the body is the whole text.<\/p>\n<p>This is the stdlib-safe answer to reading frontmatter without PyYAML. The fields the adapters consume are shallow (<code>name<\/code>, <code>description<\/code>, <code>model<\/code>, <code>tools<\/code>, <code>argument-hint<\/code>, <code>globs<\/code>, <code>alwaysApply<\/code>), which this subset covers.<\/p>\n<p>**<code>src/acc/config.py<\/code>** — safe structured-config loaders and the allowlists.<\/p>\n<ul><li><code>load_json(path) -&gt; dict<\/code> for <code>.mcp.json<\/code>, <code>.claude/settings.json<\/code>, <code>.cursor/mcp.json<\/code>. Returns <code>{}<\/code> on missing or malformed input.<\/li><li><code>load_toml(path) -&gt; dict<\/code> over stdlib <code>tomllib<\/code> for <code>.codex/config.toml<\/code>. Returns <code>{}<\/code> on missing or malformed input.<\/li><li><code>MCP_ALLOWED = {&quot;command&quot;, &quot;args&quot;, &quot;type&quot;, &quot;url&quot;}<\/code> (<code>type<\/code> is the real MCP-config transport key — stdio/http/sse) and any other per-config-type allowlists. Loaders never raise on bad input, and <code>as_dict()<\/code> coerces a well-formed-but-wrong-shape container so a broken config yields an empty result, not a crash.<\/li><\/ul>\n<h3>Adapters<\/h3>\n<p>Each adapter implements <code>detect(ctx) -&gt; list[ProviderRoot]<\/code> and <code>normalize(ctx, root) -&gt; dict<\/code> (a schema partial), reusing <code>ids<\/code>, <code>redaction<\/code>, <code>frontmatter<\/code>, <code>config<\/code>, and <code>markdown<\/code>. Adapters never import each other. Every item keeps its native type label.<\/p>\n<p>**<code>src/acc/adapters/claude.py<\/code> — <code>ClaudeAdapter<\/code>**<\/p>\n<ul><li>detect: a <code>.claude/<\/code> directory, or a root <code>CLAUDE.md<\/code>.<\/li><li>inventory:<\/li><li>agents — <code>.claude/agents/*.md<\/code>; frontmatter <code>name<\/code>, <code>description<\/code>, <code>model<\/code>, <code>tools<\/code>. Type label &quot;Claude agent&quot;.<\/li><li>commands — <code>.claude/commands/**/*.md<\/code>; frontmatter <code>description<\/code>, <code>argument-hint<\/code>. Type label &quot;Claude command&quot;.<\/li><li>skills — <code>.claude/skills/*/SKILL.md<\/code>; frontmatter <code>name<\/code>, <code>description<\/code>. Type label &quot;Claude skill&quot;.<\/li><li>hooks — from the committed <code>.claude/settings.json<\/code> <code>hooks<\/code> block only. <code>settings.local.json<\/code> is personal and gitignored, so it is skipped (project-level state, not personal). One item per configured hook (event + matcher + command). Type label &quot;Claude hook&quot;.<\/li><li>mcpServers — from <code>.mcp.json<\/code> (repo root) and <code>.claude/settings.json<\/code> <code>mcpServers<\/code>. Servers are deduplicated by name; <code>.mcp.json<\/code> wins on conflict. Each passes through <code>allowlist_config(server, MCP_ALLOWED)<\/code>. Type label &quot;MCP server&quot;.<\/li><li>docs: <code>CLAUDE.md<\/code> (root or <code>.claude/<\/code>) as the provider instructions doc.<\/li><\/ul>\n<p>**<code>src/acc/adapters/codex.py<\/code> — <code>CodexAdapter<\/code>**<\/p>\n<ul><li>detect: <code>.codex/config.toml<\/code>, or a root <code>AGENTS.md<\/code>.<\/li><li>inventory:<\/li><li>mcpServers — <code>[mcp_servers.*]<\/code> tables from <code>config.toml<\/code>, each through the allowlist. Type label &quot;MCP server&quot;.<\/li><li>commands — <code>.codex/prompts/*.md<\/code> saved prompts, mapped into the <code>commands<\/code> bucket with type label &quot;Codex prompt&quot;.<\/li><li>provider summary: non-secret config facts (<code>model<\/code>, <code>model_reasoning_effort<\/code>, <code>sandbox<\/code>, <code>approval_policy<\/code>) attach to the <code>ProviderSummary<\/code>, not to inventory.<\/li><li>docs: <code>AGENTS.md<\/code> as the provider instructions doc.<\/li><\/ul>\n<p>**<code>src/acc/adapters/cursor.py<\/code> — <code>CursorAdapter<\/code>**<\/p>\n<ul><li>detect: a <code>.cursor/<\/code> directory, or a <code>.cursorrules<\/code> file.<\/li><li>inventory:<\/li><li>rules — <code>.cursor/rules/**/*.mdc<\/code>; frontmatter <code>description<\/code>, <code>globs<\/code>, <code>alwaysApply<\/code>. Legacy <code>.cursorrules<\/code> (a single file) becomes one rule item. Type label &quot;Cursor rule&quot;.<\/li><li>mcpServers — <code>.cursor/mcp.json<\/code>, each through the allowlist. Type label &quot;MCP server&quot;.<\/li><\/ul>\n<p>**<code>src/acc/adapters/generic.py<\/code>** stays as the fallback. It runs over the markdown not claimed by any first-class provider (README, <code>docs/<\/code>, loose files), so provider files are never listed twice.<\/p>\n<h3>Detection, file-claiming, and merge<\/h3>\n<p><code>generate.py<\/code> orchestrates:<\/p>\n<p>1. Run every first-class adapter&#x27;s <code>detect<\/code>. Collect the providers present and their roots.<\/p>\n<p>2. Each first-class adapter claims the files under its provider root and emits a schema partial.<\/p>\n<p>3. The generic adapter runs over the unclaimed markdown — it supplies the doc index, <code>project.title<\/code> (from README), and open TODOs across all docs.<\/p>\n<p>4. Merge: inventory buckets and <code>providers[]<\/code> accumulate across adapters; provider instruction docs (<code>CLAUDE.md<\/code>, <code>AGENTS.md<\/code>) join the doc index. Project facts come from the generic pass.<\/p>\n<p>Determinism holds because every collection is sorted by a stable key (path, then title) and IDs are content-derived.<\/p>\n<h3>Owner rule (merged dashboard)<\/h3>\n<p><code>detect_out_dir<\/code> is replaced by <code>resolve_owner(root, detected_providers, owner_override=None) -&gt; Path<\/code>:<\/p>\n<ul><li>Scan known provider folders (<code>.claude<\/code>, <code>.codex<\/code>, <code>.cursor<\/code>, <code>.ai-control-center<\/code>) for an existing <code>dashboard.html<\/code>.<\/li><li>0 existing — create under the highest-precedence detected provider folder (<code>.claude<\/code> &gt; <code>.codex<\/code> &gt; <code>.cursor<\/code>; if none detected, <code>.ai-control-center<\/code>).<\/li><li>1 existing — that file is the owner; update it.<\/li><li>2 or more existing — raise <code>OwnerAmbiguousError<\/code> listing the candidates. The CLI prints them and exits non-zero. <code>--owner &lt;dir&gt;<\/code> picks one and proceeds.<\/li><\/ul>\n<p>The owner dashboard always carries all detected providers in <code>providers[]<\/code> and their merged inventory.<\/p>\n<h3>Schema superset<\/h3>\n<ul><li><code>Item<\/code> gains <code>provider<\/code> (adapter id), <code>type<\/code> (native kind), and <code>typeLabel<\/code> (display string such as &quot;Cursor rule&quot;). It keeps <code>id<\/code>, <code>title<\/code>, <code>path<\/code>, <code>summary<\/code>.<\/li><li>The six inventory buckets are unchanged: <code>agents<\/code>, <code>skills<\/code>, <code>hooks<\/code>, <code>commands<\/code>, <code>mcpServers<\/code>, <code>rules<\/code>. Codex prompts live in <code>commands<\/code>.<\/li><li>MCP items expose the <code>type<\/code> (transport) and <code>url<\/code> keys only; auth, <code>env<\/code>, and <code>headers<\/code> never appear.<\/li><li><code>ProviderSummary<\/code> = <code>{id, displayName, root, detected}<\/code> plus optional non-secret config facts for Codex.<\/li><li><code>validate()<\/code> extends with <code>assert_no_secrets(data)<\/code>: it serializes the assembled data and re-runs the prose secret scanner; any surviving match raises <code>ValueError<\/code>. This is a final tripwire over the new structured-config path, independent of each adapter remembering to redact.<\/li><\/ul>\n<h3>Redaction<\/h3>\n<ul><li>Structured config (all MCP servers) is allowlisted to <code>{command, args, type, url}<\/code>. Everything else is dropped before it can reach the output. This tier fails closed.<\/li><li>Hook commands and every frontmatter text field pass through <code>redact_text<\/code>.<\/li><li>The <code>assert_no_secrets<\/code> tripwire is the backstop if any path is missed.<\/li><\/ul>\n<h2>Testing<\/h2>\n<p>TDD, stdlib <code>pytest<\/code>, hybrid in-test builders.<\/p>\n<ul><li><code>tests/builders.py<\/code> — <code>make_claude_repo<\/code>, <code>make_codex_repo<\/code>, <code>make_cursor_repo<\/code>, <code>make_multi_provider_repo<\/code>, <code>make_brownfield_repo<\/code>. Each stamps a realistic provider layout into <code>tmp_path<\/code>. Every fixture is non-git by default (no <code>.git<\/code> is created), so the non-git path is the baseline rather than a separate builder.<\/li><li><code>tests/test_frontmatter.py<\/code> — the parser: fenced and unfenced, quoted values, inline and block lists, booleans, malformed lines skipped.<\/li><li><code>tests/test_claude_adapter.py<\/code>, <code>test_codex_adapter.py<\/code>, <code>test_cursor_adapter.py<\/code> — detection, inventory mapping, native labels, and that fake secrets in MCP config or prose do not leak.<\/li><li><code>tests/test_owner_rule.py<\/code> — 0, 1, and 2-or-more existing dashboards; precedence; <code>--owner<\/code> override; the ambiguous error.<\/li><li><code>tests/test_generate.py<\/code> (extended) — a multi-provider repo yields one merged dashboard with every provider; output stays byte-identical across two runs; allowlisted secrets never appear in the HTML, island, or search; generic does not re-list provider files; <code>assert_no_secrets<\/code> rejects a planted leak.<\/li><li><code>tests/test_schema.py<\/code> (extended) — the new <code>Item<\/code>/<code>ProviderSummary<\/code> fields and <code>assert_no_secrets<\/code>.<\/li><\/ul>\n<h2>What Phase 2 leaves for later<\/h2>\n<p>The full layout-B renderer with bento Overview and Inventory badges, the relationship-list Map, and client search over the new data are Phase 3. The size budget (warn at 1 MB, summary-only at 2 MB) is Phase 3. The three-tier refresh and the skill/plugin packaging are Phase 4.<\/p>","id":"1397b9aee5d8","path":"docs/superpowers/specs/2026-05-29-ai-control-center-phase-2-adapters-design.md","summary":"Date: 2026-05-29","title":"AI control center — Phase 2 (first-class provider adapters) design"},{"html":"<h1>AI control center — Phase 3 (renderer: Overview + Inventory) design<\/h1>\n<p>Date: 2026-05-30<\/p>\n<p>Status: approved for planning<\/p>\n<p>Project: html-dash (AI Control Center)<\/p>\n<p>Builds on: <code>2026-05-29-ai-control-center-design.md<\/code> (v1 design), Phase 1 and Phase 2 (merged)<\/p>\n<h2>Scope<\/h2>\n<p>Phase 3 builds the human-facing views over the data that Phases 1 and 2 already put in the JSON island. Today the renderer shows Docs and TODOs and leaves an empty Overview; the inventory the adapters produce is in the island but never drawn. Phase 3 adds two views — a bento Overview and an Inventory view grouped by type — wires path links to source files, and adds the output size budget that Phase 2 parked here.<\/p>\n<p>Phase 3 is render-first. The one data change is a small <code>source.pathPrefix<\/code> field that path links need, plus a <code>generator.truncated<\/code> flag for the size budget. No adapter behavior changes.<\/p>\n<p>Locked decisions from brainstorming:<\/p>\n<p>1. Inventory view groups by type (one block per non-empty bucket), with a provider chip and the native type label on every row. Empty buckets hide. Bucket order is a fixed constant.<\/p>\n<p>2. Overview is a bento grid of cards built from real data only: providers detected, inventory counts, open TODOs, docs count. Cards with no data do not render. The spec&#x27;s milestone and last-decision cards stay out — no source produces them yet.<\/p>\n<p>3. Items are rows, not expandable panels. The path is a clickable relative link to the source file. No inline markdown rendering, so no HTML-injection path enters in this phase.<\/p>\n<p>4. Tests are Python HTML-string assertions, consistent with Phases 1 and 2. No JS or browser test toolchain is added. A Playwright screenshot is the manual visual check, outside the automated suite.<\/p>\n<p>5. The full size budget lands here: warn over 1 MB, switch to a summary-only island over 2 MB.<\/p>\n<h2>Hard constraints carried from v1<\/h2>\n<ul><li>Stdlib only at runtime. No new dependencies in the generator or the renderer.<\/li><li>The renderer is classic inline JavaScript in one IIFE. No ES modules (they fail over <code>file://<\/code>), no CDN, no framework.<\/li><li><code>textContent<\/code> for all author-derived text. The only attribute set from data is the path link <code>href<\/code>, and it is <code>encodeURI<\/code>&#x27;d. No <code>innerHTML<\/code>, so the stored-XSS posture is unchanged.<\/li><li>Deterministic output: fixed section and bucket order, the island stays canonical and sorted, no timestamps or mtimes.<\/li><li>One self-contained HTML file under the owning provider folder.<\/li><\/ul>\n<h2>Architecture<\/h2>\n<h3>Renderer (<code>src/acc/templates/<\/code>)<\/h3>\n<p>**<code>app.js<\/code>** grows from four render functions to six, plus one shared row builder. The existing IIFE, <code>el()<\/code> helper, and <code>wireSearch()<\/code> stay.<\/p>\n<ul><li><code>itemRow(opts)<\/code> — the shared DOM builder. <code>opts<\/code> is <code>{provider?, typeLabel?, title, path, summary?}<\/code>. It builds a row with an optional provider chip (<code>.acc-chip<\/code>), an optional type-label badge (<code>.badge<\/code>), the title, an optional summary line, and the path rendered as <code>&lt;a class=&quot;path&quot; href=&quot;…&quot;&gt;<\/code>. The <code>href<\/code> is <code>encodeURI(prefix + &quot;/&quot; + path)<\/code> where <code>prefix<\/code> is <code>data.source.pathPrefix<\/code>. It sets <code>row.dataset.search<\/code> from the row&#x27;s own text (title, path, summary), so search keeps working without the island&#x27;s <code>search<\/code> array. <code>renderDocs<\/code>, <code>renderTodos<\/code>, and <code>renderInventory<\/code> all route through it, removing the row-building duplication that exists today.<\/li><li><code>renderOverview()<\/code> — builds an <code>.acc-bento<\/code> grid. One card per data category that has content:<\/li><li>Providers — a chip per detected provider (<code>displayName<\/code>).<\/li><li>Inventory — a count per non-empty bucket (&quot;1 agent&quot;, &quot;2 commands&quot;, …). The card hides if every bucket is empty.<\/li><li>Open TODOs — the count plus up to the first three texts. Hides if none.<\/li><li>Docs — the count. Hides if none.<\/li><\/ul>\n<p>  Each card scroll-links to its section. A card with no data is not appended.<\/p>\n<ul><li><code>renderInventory()<\/code> — iterates the buckets in a fixed order (<code>agents<\/code>, <code>commands<\/code>, <code>skills<\/code>, <code>hooks<\/code>, <code>mcpServers<\/code>, <code>rules<\/code>). For each non-empty bucket it appends a labeled block (&quot;Agents (1)&quot;) and one <code>itemRow<\/code> per item. Items arrive already sorted from the generator. Empty buckets are skipped.<\/li><li>Truncation notice — if <code>data.generator.truncated<\/code> is true, a banner at the top of the body states that the dashboard was reduced to a summary for size, built with <code>textContent<\/code>.<\/li><\/ul>\n<p>**<code>dashboard.html.tmpl<\/code>** adds an <code>Inventory<\/code> nav link and a <code>&lt;section id=&quot;inventory&quot;&gt;<\/code> with a host div, between Overview and Docs. The <code>#acc-overview<\/code> host already exists.<\/p>\n<p>**<code>styles.css<\/code>** adds <code>.acc-bento<\/code> (a responsive grid via <code>grid-template-columns: repeat(auto-fill, minmax(200px, 1fr))<\/code>), <code>.acc-card<\/code>, and <code>.acc-chip<\/code>, reusing the existing color tokens. No new color scheme.<\/p>\n<h3>Generator (<code>src/acc/generate.py<\/code>)<\/h3>\n<ul><li><code>source.pathPrefix<\/code> — the posix relative path from the dashboard&#x27;s output directory to the repo root, computed with <code>os.path.relpath(root, out_dir)<\/code> and normalized to posix separators. For the standard provider-folder owner (<code>.claude/<\/code>, <code>.codex/<\/code>, <code>.cursor/<\/code>, <code>.ai-control-center/<\/code>) it is <code>&quot;..&quot;<\/code>. The renderer joins it with each item path to resolve links over <code>file://<\/code>.<\/li><li>Size budget — after the full HTML is rendered, measure its UTF-8 byte length:<\/li><li>over 2 MB (<code>_TRUNCATE_BYTES = 2_000_000<\/code>): rebuild the island in summary-only form and re-render. The reduced island keeps the navigable skeleton (providers, every inventory item&#x27;s <code>provider<\/code>/<code>type<\/code>/<code>typeLabel<\/code>/<code>title<\/code>/<code>path<\/code>, inventory counts, project title, open-TODO texts, and the doc index titles and paths) and drops the heavy free text: every inventory and doc <code>summary<\/code> string, <code>docs[].html<\/code> bodies, and the <code>search<\/code> array. It sets <code>generator.truncated = true<\/code>. The re-rendered HTML is the output.<\/li><li>over 1 MB (<code>_WARN_BYTES = 1_000_000<\/code>) and not truncated: log a warning with the byte size and keep the full island.<\/li><\/ul>\n<p>  Both thresholds key off the same measured size, so the mode is a deterministic function of the input.<\/p>\n<h3>Schema (<code>src/acc/schema.py<\/code> and the data dict)<\/h3>\n<ul><li><code>source<\/code> gains <code>pathPrefix<\/code> (string).<\/li><li><code>generator<\/code> gains <code>truncated<\/code> (bool, default <code>false<\/code>).<\/li><li>No bucket or item shape changes. The required-top-level-key set is unchanged. <code>validate()<\/code> and the <code>assert_no_secrets<\/code> tripwire are untouched; the reduced island only removes fields, so it cannot introduce a leak.<\/li><\/ul>\n<h3>Data flow<\/h3>\n<p><code>island JSON → parse → renderHead · renderOverview · renderInventory · renderDocs · renderTodos → wireSearch<\/code>. The renderer is a pure function of the island, runs offline, and adds no network calls. The size-budget branch runs entirely in the generator before the file is written.<\/p>\n<h2>Security and determinism<\/h2>\n<ul><li>XSS posture is unchanged. Every author-derived value goes through <code>textContent<\/code>. The single <code>href<\/code> is <code>encodeURI<\/code>&#x27;d and built only from <code>item.path<\/code> (a real, already-escaped repo-relative path) and the generator-computed <code>pathPrefix<\/code>. No <code>innerHTML<\/code>.<\/li><li>The reduced island removes fields only, never adds, so the redaction guarantees and the <code>assert_no_secrets<\/code> tripwire still hold in both modes.<\/li><li>Determinism holds: section and bucket order are fixed constants, <code>pathPrefix<\/code> is a pure function of <code>(root, out_dir)<\/code>, and the truncation mode is a pure function of the measured size. Two runs on the same input produce byte-identical output.<\/li><\/ul>\n<h2>Testing<\/h2>\n<p>TDD, stdlib <code>pytest<\/code>, Python HTML-string assertions over <code>render_html<\/code> and <code>generate<\/code> output.<\/p>\n<ul><li><code>tests/test_render.py<\/code> (extended) — the template carries the <code>Inventory<\/code> section and nav link; <code>app.js<\/code> defines <code>renderOverview<\/code>, <code>renderInventory<\/code>, and <code>itemRow<\/code>; <code>styles.css<\/code> carries the bento classes; given data with inventory, the island carries each item&#x27;s <code>provider<\/code>/<code>typeLabel<\/code>/<code>title<\/code>/<code>path<\/code>; the bento and inventory hosts exist.<\/li><li><code>tests/test_generate.py<\/code> (extended) — <code>source.pathPrefix == &quot;..&quot;<\/code> for a provider-folder owner and the correct value for the <code>.ai-control-center<\/code> fallback; path strings in the island are unchanged (links are built in the renderer); determinism across two runs still holds.<\/li><li><code>tests/test_generate.py<\/code> size budget — a large in-test fixture pushes the island over each threshold: between 1 and 2 MB logs a warning (via <code>caplog<\/code>) and keeps the full island; over 2 MB sets <code>generator.truncated<\/code> and drops <code>summary<\/code>, <code>docs[].html<\/code>, and <code>search<\/code>; under 1 MB does neither.<\/li><li><code>tests/test_schema.py<\/code> (extended) — the new <code>source.pathPrefix<\/code> and <code>generator.truncated<\/code> fields are accepted and the existing validation still passes.<\/li><li><code>tests/builders.py<\/code> (extended) — <code>make_large_repo(root, n)<\/code> stamps enough sizable markdown to exceed the budget thresholds.<\/li><li>Determinism and packaging tests stay green; templates still ship as package data.<\/li><\/ul>\n<h2>What Phase 3 leaves for later<\/h2>\n<ul><li>Expandable item detail and inline rendering of the sanitized markdown <code>html<\/code> field.<\/li><li>The relationship Map (<code>relationships<\/code> stays <code>[]<\/code>).<\/li><li>Data sources for <code>recentDocs<\/code>, current milestone, and last decision, and the Overview cards that would show them.<\/li><li>Wiring <code>generator.rendererDigest<\/code> (still an empty string) to a hash of the renderer assets.<\/li><li>The three-tier refresh, the <code>/dashboard<\/code> command, and the skill and plugin packaging (Phase 4).<\/li><\/ul>","id":"3fc51374c4da","path":"docs/superpowers/specs/2026-05-30-ai-control-center-phase-3-renderer-design.md","summary":"Date: 2026-05-30","title":"AI control center — Phase 3 (renderer: Overview + Inventory) design"}],"workflows":[]},"generator":{"name":"ai-control-center","rendererDigest":"","version":"0.1.0"},"inventory":{"agents":[],"commands":[],"hooks":[],"mcpServers":[],"rules":[],"skills":[]},"project":{"openTodos":[{"path":"AGENTS.md","text":"Build/serve approach (static files vs dev server)."},{"path":"AGENTS.md","text":"Data source for dashboard widgets."},{"path":"AGENTS.md","text":"Framework: vanilla vs light framework (Alpine, htmx, lit) vs React."},{"path":"docs/superpowers/plans/2026-05-29-ai-control-center-phase-1-core.md","text":"**Step 1: Create `pyproject.toml`**"},{"path":"docs/superpowers/plans/2026-05-29-ai-control-center-phase-1-core.md","text":"**Step 1: Create `templates/styles.css`**"},{"path":"docs/superpowers/plans/2026-05-29-ai-control-center-phase-1-core.md","text":"**Step 1: Write the failing test**"},{"path":"docs/superpowers/plans/2026-05-29-ai-control-center-phase-1-core.md","text":"**Step 1: Write the failing test**"},{"path":"docs/superpowers/plans/2026-05-29-ai-control-center-phase-1-core.md","text":"**Step 1: Write the failing test**"},{"path":"docs/superpowers/plans/2026-05-29-ai-control-center-phase-1-core.md","text":"**Step 1: Write the failing test**"},{"path":"docs/superpowers/plans/2026-05-29-ai-control-center-phase-1-core.md","text":"**Step 1: Write the failing test**"},{"path":"docs/superpowers/plans/2026-05-29-ai-control-center-phase-1-core.md","text":"**Step 1: Write the failing test**"},{"path":"docs/superpowers/plans/2026-05-29-ai-control-center-phase-1-core.md","text":"**Step 1: Write the failing test**"},{"path":"docs/superpowers/plans/2026-05-29-ai-control-center-phase-1-core.md","text":"**Step 1: Write the failing test**"},{"path":"docs/superpowers/plans/2026-05-29-ai-control-center-phase-1-core.md","text":"**Step 1: Write the failing test**"},{"path":"docs/superpowers/plans/2026-05-29-ai-control-center-phase-1-core.md","text":"**Step 2: Create `templates/app. <script>(function () {
  var node = document.getElementById("acc-data");
  var data = JSON.parse(node.textContent);

  function el(tag, cls, text) {
    var e = document.createElement(tag);
    if (cls) e.className = cls;
    if (text != null) e.textContent = text;
    return e;
  }

  function renderHead() {
    document.getElementById("acc-title").textContent = data.project.title;
    var m = data.source;
    document.getElementById("acc-meta").textContent =
      "stamped · digest " + m.sourceDigest + " · vcs: " + m.vcs.kind + " · freshness is manual";
  }

  function renderDocs() {
    var host = document.getElementById("acc-docs");
    var groups = data.docs;
    Object.keys(groups).sort().forEach(function (g) {
      groups[g].forEach(function (doc) {
        var row = el("div", "acc-row acc-item");
        row.appendChild(el("span", null, doc.title));
        row.appendChild(document.createTextNode(" "));
        row.appendChild(el("span", "badge", g));
        row.appendChild(document.createTextNode(" "));
        row.appendChild(el("span", "path", doc.path));
        row.dataset.search = (doc.title + " " + doc.path + " " + (doc.summary || "")).toLowerCase();
        host.appendChild(row);
      });
    });
  }

  function renderTodos() {
    var host = document.getElementById("acc-todos");
    (data.project.openTodos || []).forEach(function (t) {
      var row = el("div", "acc-row acc-item", t.text + "  —  " + t.path);
      row.dataset.search = (t.text + " " + t.path).toLowerCase();
      host.appendChild(row);
    });
  }

  function wireSearch() {
    var box = document.getElementById("acc-search");
    box.addEventListener("input", function () {
      var q = box.value.toLowerCase();
      document.querySelectorAll(".acc-item").forEach(function (row) {
        var hit = !q || (row.dataset.search || "").indexOf(q) !== -1;
        row.classList.toggle("acc-hidden", !hit);
      });
    });
  }

  renderHead();
  renderDocs();
  renderTodos();
  wireSearch();
})();
</script>
