-related { margin-top: .4rem; display: flex; flex-direction: column; gap: .15rem; }\n.acc-rel-line { display: flex; align-items: center; gap: .4rem; background: none;\n  border: 0; padding: .1rem 0; font: inherit; color: inherit; text-align: left; cursor: default; }\nbutton.acc-rel-line { cursor: pointer; }\n.acc-rel-verb { font-size: .72rem; text-transform: uppercase; letter-spacing: .03em; opacity: .6; min-width: 6.5rem; }\n.acc-rel-title { font-weight: 500; }\n#acc-crossref .acc-xref-source { margin-top: .8rem; display: flex; align-items: center; gap: .4rem; font-weight: 600; }\n#acc-crossref .acc-xref-edge { display: flex; align-items: center; gap: .4rem; background: none;\n  border: 0; padding: .12rem 0 .12rem 1.2rem; font: inherit; color: inherit; text-align: left; cursor: pointer; }\n.acc-xref-empty { opacity: .6; }<\/code><\/pre>\n<ul><li>[ ] **Step 2: Verify the app still parses and the suite is green**<\/li><\/ul>\n<p>Run: <code>node --check src/acc/templates/app.js &amp;&amp; python3 -m pytest tests/test_render_dom.py -q<\/code><\/p>\n<p>Expected: PASS.<\/p>\n<ul><li>[ ] **Step 3: Commit**<\/li><\/ul>\n<pre><code>git add src/acc/templates/styles.css\ngit commit -m &quot;feat(phase-4b): styles for Related blocks and the Cross-references view&quot;<\/code><\/pre>\n<p>---<\/p>\n<h3>Task 11: Hardening DOM tests — degraded mode, redaction, config-path exclusion<\/h3>\n<p>**Files:**<\/p>\n<ul><li>Test: <code>tests/test_render_dom.py<\/code>, <code>tests/test_relationships.py<\/code><\/li><\/ul>\n<ul><li>[ ] **Step 1: Write the tests**<\/li><\/ul>\n<pre><code># append to tests/test_relationships.py\ndef test_redaction_drops_keyword_prefixed_path(tmp_path):\n    # leak.md is the ONLY mention of reviewer.md, and it sits behind a secret\n    # keyword, so redact_text removes the path before the scan -&gt; no edge.\n    make_claude_repo(tmp_path)\n    (tmp_path / &quot;docs&quot;).mkdir(exist_ok=True)\n    (tmp_path / &quot;docs&quot; / &quot;leak.md&quot;).write_text(\n        &quot;# Leak\\n\\n[redacted]&quot;)\n    data = _island(generate(tmp_path).read_text(encoding=&quot;utf-8&quot;))\n    assert not any(e[&quot;type&quot;] == &quot;reference&quot; and e[&quot;evidence&quot;] == &quot;.claude/agents/reviewer.md&quot;\n                   for e in data[&quot;relationships&quot;])\n\n\ndef test_config_path_not_a_reference_target(tmp_path):\n    make_codex_repo(tmp_path)  # single mcpServer -&gt; .codex/config.toml is a unique path\n    (tmp_path / &quot;docs&quot;).mkdir(exist_ok=True)\n    (tmp_path / &quot;docs&quot; / &quot;ref.md&quot;).write_text(&quot;# Ref\\n\\nconfigured in .codex/config.toml&quot;)\n    data = _island(generate(tmp_path).read_text(encoding=&quot;utf-8&quot;))\n    # the doc mention of the config file must NOT create a reference edge\n    assert not any(e[&quot;type&quot;] == &quot;reference&quot; and e[&quot;evidence&quot;] == &quot;.codex/config.toml&quot;\n                   for e in data[&quot;relationships&quot;])\n    # but the config-file node still declares the codex MCP server\n    assert any(e[&quot;type&quot;] == &quot;declares&quot; and e[&quot;evidence&quot;] == &quot;.codex/config.toml&quot;\n               for e in data[&quot;relationships&quot;])<\/code><\/pre>\n<pre><code># append to tests/test_render_dom.py\ndef test_degraded_mode_keeps_declares_and_renders(page, tmp_path):\n    # a repo large enough to trip the 2 MB truncate budget; declares edges are\n    # bounded, so the Cross-references view still renders its source groups.\n    make_multi_provider_repo(tmp_path)\n    make_large_repo(tmp_path, 200)\n    page.set_content(_html(tmp_path))\n    assert page.locator(&quot;#acc-crossref .acc-xref-source&quot;).count() &gt;= 1<\/code><\/pre>\n<ul><li>[ ] **Step 2: Run to verify they fail or pass appropriately**<\/li><\/ul>\n<p>Run: <code>python3 -m pytest tests/test_relationships.py -k &quot;redaction or config_path&quot; tests/test_render_dom.py::test_degraded_mode_keeps_declares_and_renders -v<\/code><\/p>\n<p>Expected: PASS (behavior implemented in Tasks 2-9; these lock it in). If <code>test_redaction_drops_keyword_prefixed_path<\/code> fails, confirm <code>_refScanBody<\/code> is the redacted body (Task 1) and the doc&#x27;s edges are checked by source path.<\/p>\n<ul><li>[ ] **Step 3: Commit**<\/li><\/ul>\n<pre><code>git add tests/test_relationships.py tests/test_render_dom.py\ngit commit -m &quot;test(phase-4b): redaction false-negative, config-path exclusion, degraded crossref&quot;<\/code><\/pre>\n<p>---<\/p>\n<h3>Task 12: Final verification<\/h3>\n<p>**Files:** none (verification only).<\/p>\n<ul><li>[ ] **Step 1: Determinism — byte-identical repeated runs**<\/li><\/ul>\n<p>Add to <code>tests/test_relationships.py<\/code>:<\/p>\n<pre><code>def test_relationships_byte_identical_across_runs(tmp_path):\n    make_multi_provider_repo(tmp_path)\n    (tmp_path / &quot;docs&quot; / &quot;links.md&quot;).write_text(&quot;# L\\n\\n.claude/agents/reviewer.md&quot;)\n    first = generate(tmp_path).read_text(encoding=&quot;utf-8&quot;)\n    second = generate(tmp_path).read_text(encoding=&quot;utf-8&quot;)\n    assert _island(first)[&quot;relationships&quot;] == _island(second)[&quot;relationships&quot;]\n    assert first == second<\/code><\/pre>\n<p>Run: <code>python3 -m pytest tests/test_relationships.py::test_relationships_byte_identical_across_runs -v<\/code><\/p>\n<p>Expected: PASS.<\/p>\n<ul><li>[ ] **Step 2: Full gate**<\/li><\/ul>\n<p>Run:<\/p>\n<pre><code>python3 -m pytest -q\nruff check .\nnode --check src/acc/templates/app.js\ngrep -nE &#x27;innerHTML|outerHTML|insertAdjacentHTML&#x27; src/acc/templates/app.js &amp;&amp; echo &quot;SINKS (bad)&quot; || echo &quot;0 sinks&quot;<\/code><\/pre>\n<p>Expected: all tests pass; ruff clean; <code>node --check<\/code> OK; <code>0 sinks<\/code>.<\/p>\n<ul><li>[ ] **Step 3: Commit any test-only additions**<\/li><\/ul>\n<pre><code>git add tests/test_relationships.py\ngit commit -m &quot;test(phase-4b): relationships output is byte-identical across runs&quot;<\/code><\/pre>\n<p>---<\/p>\n<h2>Self-review (run before execution)<\/h2>\n<p>**Spec coverage:** reference pass (T2), declares/config-nodes (T3), <code>_refScanBody<\/code> lifecycle + pop order (T1, T4), schema integrity (T5), degraded cap (T6), template (T7), inline Related non-indexed controls (T8), Cross-references source-grouped + display sort + Overview card (T9), styles (T10), boundary/redaction/config-path/degraded tests (T11), determinism + guard (T12). All spec sections map to a task.<\/p>\n<p>**Decisions honored:** path-only evidence (no snippet/escape machinery anywhere); inventory-only reference targets (path→id over <code>inv<\/code> only); config-file node <code>declares<\/code> (T3) covering cursor; commands excluded (T3 test); jump controls are <code>&lt;button&gt;<\/code> without <code>data-id<\/code>/<code>.acc-item<\/code> (T8 test asserts it); display sort by path/title not hash (T9 test).<\/p>\n<p>**Type consistency:** <code>_build_relationships(inv, docs)<\/code>, <code>_dedup_sort_edges<\/code>, <code>_CONFIG_PATHS<\/code>, <code>_MAX_DEGRADED_REFERENCE_EDGES<\/code>, <code>stable_id(&quot;config&quot;, &quot;configFile&quot;, path, &quot;&quot;)<\/code>, edge keys <code>{from,to,type,evidence}<\/code>, JS <code>metaById<\/code>/<code>edgesByEndpoint<\/code>/<code>decorateRelated<\/code>/<code>renderCrossReferences<\/code> — names are consistent across tasks.<\/p>\n<p>**Note for the executor:** <code>app.js<\/code> and <code>generate.py<\/code> are each touched by several tasks. Per the project&#x27;s hard rule, dispatch implementers **serially** when files overlap; re-verify <code>git status<\/code> after each task.<\/p>","id":"8a829518d49e","path":"docs/superpowers/plans/2026-05-30-ai-control-center-phase-4b-relationships.md","summary":"**Goal:** Populate the empty `relationships: []` with deterministic `reference` (doc→item path mention) and `declares` (config-file→MCP/hook) edges, and render them as inline &quot;Related&quot; blocks plus a &quot;Cross-references&quot; view.","title":"Phase 4b — Relationships Implementation Plan"},{"html":"<h1>AI control center dashboard — design spec<\/h1>\n<p>Date: 2026-05-29<\/p>\n<p>Status: approved for planning<\/p>\n<p>Project: html-dash<\/p>\n<h2>Problem<\/h2>\n<p>Markdown is the right format for AI agents in a repo. Config, intent, decisions, and capability definitions all live there: <code>CLAUDE.md<\/code>, <code>AGENTS.md<\/code>, Cursor rules, skills, agents, hooks, commands, MCP config, PRDs, ADRs. Agents read and write it well.<\/p>\n<p>For a human it gets hard fast. Once a repo holds twenty-plus markdown files spread across <code>.claude/<\/code>, <code>docs/<\/code>, and the tree, a person loses the thread: what exists, how pieces connect, what was decided and why, where the project stands. The information is all there and none of it is navigable.<\/p>\n<h2>Goal<\/h2>\n<p>Keep markdown as the source of truth for the machine. Add a second layer for the human: one self-contained HTML file that is the read-oriented control center for everything AI in the project. The human opens one file and sees scope, the inventory of skills/agents/hooks/commands/MCP/rules, PRDs, decisions, doc index, project state, and how things relate. Markdown for the machine, HTML for the human.<\/p>\n<p>The product ships as a public skill plus a marketplace plugin. The skill, the bundled generator, and the HTML it produces are the entire product.<\/p>\n<h2>Hard constraints<\/h2>\n<p>These are the point of the product, not preferences.<\/p>\n<ul><li>One standalone HTML file. Self-contained, opens from <code>file://<\/code> with no server, no build step, no framework, and nothing added to the user&#x27;s repo at runtime.<\/li><li>Lives under the AI-provider folder (<code>.claude/<\/code>, <code>.codex/<\/code>, <code>.cursor/<\/code>), never in the source tree. A loose <code>.html<\/code> in the repo root or <code>src/<\/code> collides with web-framework globs (Vite <code>**/*.html<\/code>, Angular and Next entry points). Under the provider folder it is inert to any build.<\/li><li>Works on greenfield and brownfield repos, and on repos that are not under git.<\/li><li>Init-triggered: provider init produces the markdown and the HTML together; later markdown changes re-stamp the HTML.<\/li><\/ul>\n<h2>Decisions and rationale<\/h2>\n<p>These were resolved during design. Each one closes off an alternative on purpose.<\/p>\n<p>1. Committed and shared. The HTML is checked in and travels with the repo, treated like <code>CLAUDE.md<\/code> and <code>AGENTS.md<\/code>. Consequence: output must be deterministic or every re-stamp churns the diff, and redaction is mandatory because the file can be pushed to a public remote.<\/p>\n<p>2. Project-level state, not personal. &quot;Where we left off&quot; is reframed as shared, derivable facts: current milestone, last decision, open TODOs found in docs, recently touched docs. No per-user or session data, and no live repo state (branch, dirty tree, mtimes) in a committed artifact, since those churn or go stale the instant they are written.<\/p>\n<p>3. Hybrid generation, deterministic extractor first. A bundled deterministic scanner is the canonical extractor that produces the committed JSON. The model is demoted to an optional layer that only writes summaries over already-redacted text, and that powers the generic fallback on repos with no known structure. The model never emits canonical structure. This keeps diffs stable and redaction enforceable while preserving flexibility on messy repos.<\/p>\n<p>4. Multi-provider in v1, inventory-first. First-class adapters for Claude Code, Codex, and Cursor; a generic fallback adapter covers everything else and bare repos. Thin per-provider adapters map native conventions into one superset schema. Items keep their native type label (a Cursor rule shows as a Cursor rule, never a fake &quot;skill&quot;). The renderer and schema stay provider-agnostic; sections with no data hide. v1 shows native inventory, paths, links, and relationships, and defers deep workflow interpretation.<\/p>\n<p>5. Lean ambition. Build a trusted inventory and map first. Nail refresh, redaction, stable diffs, links, and provider-native inventory before adding interpretation.<\/p>\n<h2>Architecture<\/h2>\n<h3>Components<\/h3>\n<ul><li>Generator: a bundled <code>python3<\/code> script (present on macOS and most Linux, no install). It is the canonical deterministic extractor and the thing that writes the HTML. It lives in the plugin and is never copied into the user&#x27;s repo.<\/li><li>Adapters: <code>claude<\/code>, <code>codex<\/code>, <code>cursor<\/code>, and <code>generic<\/code>. Each maps one provider&#x27;s files into the superset schema.<\/li><li>Renderer: a bundled HTML template plus classic inline JavaScript (no ES modules, since they fail over <code>file://<\/code>; no CDN). It builds the DOM from the inlined JSON island and provides client-side search.<\/li><li>Skill (<code>SKILL.md<\/code>): the agent&#x27;s entry point. The agent runs the generator, optionally adds summaries over redacted text, and re-stamps.<\/li><li>Plugin: packages the skill, generator, renderer, a <code>/dashboard<\/code> command, and opt-in hook templates. Offline by default.<\/li><\/ul>\n<h3>Generation pipeline<\/h3>\n<pre><code>scan sorted files\n  -&gt; adapter extract (allowlisted config fields only)\n  -&gt; redact prose and structured values\n  -&gt; optional model summaries over redacted text only\n  -&gt; schema validate (reject secret-shaped values)\n  -&gt; canonical sort and stringify\n  -&gt; render static HTML template\n  -&gt; inline JSON island\n  -&gt; write dashboard.html under the owning provider folder<\/code><\/pre>\n<p>Determinism rules: derived stable IDs of the form <code>sha256(provider + type + relativePath + heading)[:12]<\/code>, repo-relative POSIX paths, sorted collections, and no timestamps, branch names, dirty-tree state, or mtimes in the committed region. <code>sourceDigest<\/code> is a hash of the scanned inputs, so it changes only when source content changes, never on unrelated commits. Two fields need care because they can churn: <code>vcs.head<\/code> is informational and is not written to the committed region (only <code>vcs.kind<\/code> is). <code>recentDocs<\/code> is derived from git history, bounded to the most recent few changed docs, and omitted entirely on non-git repos — never derived from filesystem mtimes. That keeps every committed field content-derived, so a re-stamp with no content change produces no diff.<\/p>\n<h3>Normalized JSON shape (top level)<\/h3>\n<p>The JSON ships inlined in the HTML as a <code>&lt;script type=&quot;application/json&quot;&gt;<\/code> island. The view builds itself from it, and the same island is the client-side search index.<\/p>\n<pre><code>type DashboardData = {\n  schemaVersion: &quot;1.0&quot;;\n  generator: { name: &quot;ai-control-center&quot;; version: string; rendererDigest: string };\n  source: {\n    repoName: string;\n    dashboardPath: string;       // repo-relative\n    sourceDigest: string;        // hash of scanned inputs\n    vcs: { kind: &quot;git&quot; | &quot;none&quot;; head?: string };\n  };\n  providers: ProviderSummary[];  // which adapters fired, and their roots\n  project: {\n    title: string;\n    summary?: string;\n    currentMilestone?: Ref;\n    lastDecision?: Ref;\n    openTodos: Todo[];\n    recentDocs: Ref[];\n    warnings: Warning[];         // staleness, skipped files, redactions applied\n  };\n  inventory: {\n    agents: Item[]; skills: Item[]; hooks: Item[];\n    commands: Item[]; mcpServers: Item[]; rules: Item[];\n  };\n  docs: { prds: Doc[]; adrs: Doc[]; decisions: Doc[]; workflows: Doc[]; references: Doc[] };\n  relationships: Relationship[]; // v1 Map stub: flat, deterministic cross-references\n  search: SearchRecord[];\n};<\/code><\/pre>\n<p>Every <code>Item<\/code> carries its provider-native type label, a repo-relative source path, and a short redacted summary. <code>Ref<\/code> is a <code>{ id, title, path }<\/code> pointer. The v1 Map is <code>relationships<\/code> — a flat list such as &quot;skill X references command Y&quot; or &quot;agent Z uses MCP <code>postgres<\/code>&quot;, derived from cross-references already present in the markdown. The interactive node graph is deferred to v2.<\/p>\n<h3>Adapter interface<\/h3>\n<pre><code>type ProviderAdapter = {\n  id: &quot;claude&quot; | &quot;codex&quot; | &quot;cursor&quot; | &quot;generic&quot;;\n  displayName: string;\n  detect(ctx: ScanContext): ProviderRoot[];\n  extract(ctx: ScanContext, root: ProviderRoot): ProviderExtract;\n  normalize(extract: ProviderExtract): Partial&lt;DashboardData&gt;;\n  redactPolicy: RedactPolicy;\n};<\/code><\/pre>\n<p>The generic fallback adapter inventories markdown files, headings, front-matter, and folder structure, plus git-derived facts when git is present. It guarantees the dashboard is never empty, which is also how greenfield and brownfield support is met.<\/p>\n<h3>Refresh<\/h3>\n<p>Refresh is a first-class workflow, not a caveat. A static <code>file://<\/code> page cannot reliably detect that it is stale, so the design is honest about it.<\/p>\n<ul><li>Required: an explicit <code>/dashboard<\/code> command from the skill or plugin.<\/li><li>Default: the agent re-stamps after it edits markdown.<\/li><li>Optional: an opt-in file-write hook, a git post-commit hook, or a CI check that recomputes <code>sourceDigest<\/code> and flags drift.<\/li><\/ul>\n<p>The HTML displays its <code>sourceDigest<\/code>, scanned file count, and provider roots, and states &quot;freshness is manual&quot; when no hook is installed.<\/p>\n<h3>Multiple provider folders<\/h3>\n<p>One merged dashboard, never parallel copies.<\/p>\n<pre><code>If one dashboard exists, update it.\nIf none exists, create it under the currently running provider folder.\nIf multiple dashboards exist, stop and ask which is the owner.\nThe owner dashboard includes all detected providers.<\/code><\/pre>\n<h2>User interface<\/h2>\n<p>Single scrolling page with a sticky jump-nav, chosen for the strongest &quot;repo Confluence&quot; feel and because it needs no routing under <code>file://<\/code>. Section order:<\/p>\n<p>1. Sticky header: title, current milestone, search box, freshness marker (<code>sourceDigest<\/code>, file count, refresh command).<\/p>\n<p>2. Sticky jump-nav: Overview, Inventory, Docs, Map.<\/p>\n<p>3. Overview, rendered as a bento grid: providers detected, inventory counts, current milestone, last decision, open TODOs, recently touched docs.<\/p>\n<p>4. Inventory: grouped lists (Agents, Skills, Commands, Hooks, MCP, Rules). Each row is name, native-type badge, path link, and summary. MCP rows show name and status with auth redacted.<\/p>\n<p>5. Docs: PRDs, ADRs and decisions, workflows, references. Each links out to the raw markdown.<\/p>\n<p>6. Map: the v1 stub relationship list.<\/p>\n<p>7. Footer: freshness notice plus exactly what the generator reads and excludes.<\/p>\n<p>Sections with no data hide. The provider&#x27;s root markdown links to the dashboard so a human finds it despite the dot-folder location.<\/p>\n<h2>Security<\/h2>\n<ul><li>Redaction at extraction, not after. Two tiers with different guarantees. Structured provider config (MCP servers, settings) is allowlisted: only known-safe fields pass, everything else is dropped, so this tier fails closed. Free-form prose (docs, PRDs, ADRs) is run through a high-precision secret-shaped-string scanner that masks bearer headers, keyword assignments, provider-prefixed keys, and credential URLs; this tier is best-effort by design (it favors precision over recall to avoid mangling normal prose, so high-entropy secrets with no telltale prefix can slip through). Phase 1 ships only the generic prose scanner; the allowlist path is exercised when the provider adapters land. Neither tier emits a value it recognized as secret.<\/li><li>The dashboard is committed, executable HTML, so it is treated as a stored-XSS surface. The renderer builds text with <code>textContent<\/code> and only injects a sanitized markdown subset (headings, paragraphs, lists, code, links). No raw HTML passthrough from repo content.<\/li><li>The generator runs offline by default and states what it reads, which matters for public distribution trust.<\/li><\/ul>\n<h2>Edge cases<\/h2>\n<ul><li>Non-git repos are first-class (<code>vcs.kind: &quot;none&quot;<\/code>); no feature depends on git.<\/li><li>Root-level <code>AGENTS.md<\/code> is mirrored by link; the dashboard stays under the provider folder.<\/li><li>Monorepos use scoped roots to avoid an oversized file.<\/li><li>Scan exclusions: <code>node_modules<\/code>, <code>.git<\/code>, vendored folders, submodules, symlinks, generated docs.<\/li><li>Size budget: target under 500 KB, warn over 1 MB, switch to summary-only over 2 MB.<\/li><\/ul>\n<h2>Testing<\/h2>\n<ul><li>Fixture repos for each first-class provider, plus a brownfield fixture and a non-git fixture.<\/li><li>Determinism test: run the generator twice on a fixture and assert byte-identical output.<\/li><li>Redaction test: fixtures with realistic MCP config shapes holding fake-but-real-looking secrets; assert nothing leaks into the HTML, JSON island, or search index.<\/li><li>XSS test: a fixture with hostile markdown (script tags, <code>onerror<\/code> images, raw HTML); assert the rendered output is sanitized.<\/li><li>Size-budget test: a large fixture; assert the warn and summary-only thresholds behave.<\/li><\/ul>\n<h2>v1 boundary<\/h2>\n<p>In scope: deterministic inventory, doc index, Map stub, project facts, three-tier refresh, redaction, sanitized render, three first-class adapters, generic fallback, the <code>/dashboard<\/code> command, project level only.<\/p>\n<p>Deferred to v2: global cross-repo view at <code>~/.claude/dashboard.html<\/code>, the interactive relationship graph, live git state, smart interpretation of workflows, and auto-installed hooks (shipped as opt-in templates in v1).<\/p>","id":"f53b173c2722","path":"docs/superpowers/specs/2026-05-29-ai-control-center-design.md","summary":"Date: 2026-05-29","title":"AI control center dashboard — design spec"},{"html":"<h1>AI control center — Phase 2 (first-class provider adapters) design<\/h1>\n<p>Date: 2026-05-29<\/p>\n<p>Status: approved for planning<\/p>\n<p>Project: html-dash (AI Control Center)<\/p>\n<p>Builds on: <code>2026-05-29-ai-control-center-design.md<\/code> (v1 design), Phase 1 (merged)<\/p>\n<h2>Scope<\/h2>\n<p>Phase 2 adds three first-class provider adapters — Claude Code, Codex, and Cursor — that map native conventions into the superset schema&#x27;s inventory. It activates the allowlist redaction tier for structured config, and produces one merged dashboard across every detected provider folder via the owner rule. The generic adapter stays as the fallback for everything else.<\/p>\n<p>Phase 2 is data-only. The renderer still shows docs and TODOs (Phase 1). The bento Overview and Inventory views that surface this data are Phase 3. After Phase 2 the JSON island is richer; the visible page is unchanged.<\/p>\n<p>Locked decisions from brainstorming:<\/p>\n<p>1. Inventory parity per provider — list standard artifacts (name, native type label, path, redacted summary). No relationship extraction; the Map is Phase 3.<\/p>\n<p>2. Fixtures are built in-test with reusable builder helpers (no committed fixture trees).<\/p>\n<p>3. Data-only — no renderer changes in this phase.<\/p>\n<p>4. <code>validate()<\/code> gains an <code>assert_no_secrets<\/code> tripwire that re-scans the serialized output.<\/p>\n<p>5. Codex saved prompts map into the existing <code>commands<\/code> bucket with a native label, not a new bucket.<\/p>\n<p>6. Owner precedence is <code>.claude<\/code> &gt; <code>.codex<\/code> &gt; <code>.cursor<\/code>, then <code>.ai-control-center<\/code>.<\/p>\n<h2>Hard constraints carried from v1<\/h2>\n<ul><li>Stdlib only at runtime. No PyYAML, no third-party parsers. Codex TOML uses stdlib <code>tomllib<\/code>.<\/li><li>Deterministic output: sorted collections, stable IDs, repo-relative POSIX paths, no timestamps or mtimes.<\/li><li>Redaction at extraction. Structured config is allowlisted (fail closed); prose runs the secret scanner.<\/li><li>One self-contained HTML file under the owning provider folder.<\/li><\/ul>\n<h2>Architecture<\/h2>\n<h3>New shared modules<\/h3>\n<p>**<code>src/acc/frontmatter.py<\/code>** — <code>parse_frontmatter(text: str) -&gt; tuple[dict, str]<\/code>.<\/p>\n<p>A minimal reader for the YAML subset that real Claude and Cursor artifacts use. It handles a leading <code>---<\/code> fence, <code>key: value<\/code> pairs, single/double-quoted strings, inline lists <code>[a, b]<\/code>, block lists (<code>- item<\/code> under a key), and booleans (<code>true<\/code>/<code>false<\/code>). It does not handle nested maps or anchors. A line it cannot parse is skipped, never raised. Returns the parsed fields and the body after the fence. When there is no fence, fields are <code>{}<\/code> and the body is the whole text.<\/p>\n<p>This is the stdlib-safe answer to reading frontmatter without PyYAML. The fields the adapters consume are shallow (<code>name<\/code>, <code>description<\/code>, <code>model<\/code>, <code>tools<\/code>, <code>argument-hint<\/code>, <code>globs<\/code>, <code>alwaysApply<\/code>), which this subset covers.<\/p>\n<p>**<code>src/acc/config.py<\/code>** — safe structured-config loaders and the allowlists.<\/p>\n<ul><li><code>load_json(path) -&gt; dict<\/code> for <code>.mcp.json<\/code>, <code>.claude/settings.json<\/code>, <code>.cursor/mcp.json<\/code>. Returns <code>{}<\/code> on missing or malformed input.<\/li><li><code>load_toml(path) -&gt; dict<\/code> over stdlib <code>tomllib<\/code> for <code>.codex/config.toml<\/code>. Returns <code>{}<\/code> on missing or malformed input.<\/li><li><code>MCP_ALLOWED = {&quot;command&quot;, &quot;args&quot;, &quot;type&quot;, &quot;url&quot;}<\/code> (<code>type<\/code> is the real MCP-config transport key — stdio/http/sse) and any other per-config-type allowlists. Loaders never raise on bad input, and <code>as_dict()<\/code> coerces a well-formed-but-wrong-shape container so a broken config yields an empty result, not a crash.<\/li><\/ul>\n<h3>Adapters<\/h3>\n<p>Each adapter implements <code>detect(ctx) -&gt; list[ProviderRoot]<\/code> and <code>normalize(ctx, root) -&gt; dict<\/code> (a schema partial), reusing <code>ids<\/code>, <code>redaction<\/code>, <code>frontmatter<\/code>, <code>config<\/code>, and <code>markdown<\/code>. Adapters never import each other. Every item keeps its native type label.<\/p>\n<p>**<code>src/acc/adapters/claude.py<\/code> — <code>ClaudeAdapter<\/code>**<\/p>\n<ul><li>detect: a <code>.claude/<\/code> directory, or a root <code>CLAUDE.md<\/code>.<\/li><li>inventory:<\/li><li>agents — <code>.claude/agents/*.md<\/code>; frontmatter <code>name<\/code>, <code>description<\/code>, <code>model<\/code>, <code>tools<\/code>. Type label &quot;Claude agent&quot;.<\/li><li>commands — <code>.claude/commands/**/*.md<\/code>; frontmatter <code>description<\/code>, <code>argument-hint<\/code>. Type label &quot;Claude command&quot;.<\/li><li>skills — <code>.claude/skills/*/SKILL.md<\/code>; frontmatter <code>name<\/code>, <code>description<\/code>. Type label &quot;Claude skill&quot;.<\/li><li>hooks — from the committed <code>.claude/settings.json<\/code> <code>hooks<\/code> block only. <code>settings.local.json<\/code> is personal and gitignored, so it is skipped (project-level state, not personal). One item per configured hook (event + matcher + command). Type label &quot;Claude hook&quot;.<\/li><li>mcpServers — from <code>.mcp.json<\/code> (repo root) and <code>.claude/settings.json<\/code> <code>mcpServers<\/code>. Servers are deduplicated by name; <code>.mcp.json<\/code> wins on conflict. Each passes through <code>allowlist_config(server, MCP_ALLOWED)<\/code>. Type label &quot;MCP server&quot;.<\/li><li>docs: <code>CLAUDE.md<\/code> (root or <code>.claude/<\/code>) as the provider instructions doc.<\/li><\/ul>\n<p>**<code>src/acc/adapters/codex.py<\/code> — <code>CodexAdapter<\/code>**<\/p>\n<ul><li>detect: <code>.codex/config.toml<\/code>, or a root <code>AGENTS.md<\/code>.<\/li><li>inventory:<\/li><li>mcpServers — <code>[mcp_servers.*]<\/code> tables from <code>config.toml<\/code>, each through the allowlist. Type label &quot;MCP server&quot;.<\/li><li>commands — <code>.codex/prompts/*.md<\/code> saved prompts, mapped into the <code>commands<\/code> bucket with type label &quot;Codex prompt&quot;.<\/li><li>provider summary: non-secret config facts (<code>model<\/code>, <code>model_reasoning_effort<\/code>, <code>sandbox<\/code>, <code>approval_policy<\/code>) attach to the <code>ProviderSummary<\/code>, not to inventory.<\/li><li>docs: <code>AGENTS.md<\/code> as the provider instructions doc.<\/li><\/ul>\n<p>**<code>src/acc/adapters/cursor.py<\/code> — <code>CursorAdapter<\/code>**<\/p>\n<ul><li>detect: a <code>.cursor/<\/code> directory, or a <code>.cursorrules<\/code> file.<\/li><li>inventory:<\/li><li>rules — <code>.cursor/rules/**/*.mdc<\/code>; frontmatter <code>description<\/code>, <code>globs<\/code>, <code>alwaysApply<\/code>. Legacy <code>.cursorrules<\/code> (a single file) becomes one rule item. Type label &quot;Cursor rule&quot;.<\/li><li>mcpServers — <code>.cursor/mcp.json<\/code>, each through the allowlist. Type label &quot;MCP server&quot;.<\/li><\/ul>\n<p>**<code>src/acc/adapters/generic.py<\/code>** stays as the fallback. It runs over the markdown not claimed by any first-class provider (README, <code>docs/<\/code>, loose files), so provider files are never listed twice.<\/p>\n<h3>Detection, file-claiming, and merge<\/h3>\n<p><code>generate.py<\/code> orchestrates:<\/p>\n<p>1. Run every first-class adapter&#x27;s <code>detect<\/code>. Collect the providers present and their roots.<\/p>\n<p>2. Each first-class adapter claims the files under its provider root and emits a schema partial.<\/p>\n<p>3. The generic adapter runs over the unclaimed markdown — it supplies the doc index, <code>project.title<\/code> (from README), and open TODOs across all docs.<\/p>\n<p>4. Merge: inventory buckets and <code>providers[]<\/code> accumulate across adapters; provider instruction docs (<code>CLAUDE.md<\/code>, <code>AGENTS.md<\/code>) join the doc index. Project facts come from the generic pass.<\/p>\n<p>Determinism holds because every collection is sorted by a stable key (path, then title) and IDs are content-derived.<\/p>\n<h3>Owner rule (merged dashboard)<\/h3>\n<p><code>detect_out_dir<\/code> is replaced by <code>resolve_owner(root, detected_providers, owner_override=None) -&gt; Path<\/code>:<\/p>\n<ul><li>Scan known provider folders (<code>.claude<\/code>, <code>.codex<\/code>, <code>.cursor<\/code>, <code>.ai-control-center<\/code>) for an existing <code>dashboard.html<\/code>.<\/li><li>0 existing — create under the highest-precedence detected provider folder (<code>.claude<\/code> &gt; <code>.codex<\/code> &gt; <code>.cursor<\/code>; if none detected, <code>.ai-control-center<\/code>).<\/li><li>1 existing — that file is the owner; update it.<\/li><li>2 or more existing — raise <code>OwnerAmbiguousError<\/code> listing the candidates. The CLI prints them and exits non-zero. <code>--owner &lt;dir&gt;<\/code> picks one and proceeds.<\/li><\/ul>\n<p>The owner dashboard always carries all detected providers in <code>providers[]<\/code> and their merged inventory.<\/p>\n<h3>Schema superset<\/h3>\n<ul><li><code>Item<\/code> gains <code>provider<\/code> (adapter id), <code>type<\/code> (native kind), and <code>typeLabel<\/code> (display string such as &quot;Cursor rule&quot;). It keeps <code>id<\/code>, <code>title<\/code>, <code>path<\/code>, <code>summary<\/code>.<\/li><li>The six inventory buckets are unchanged: <code>agents<\/code>, <code>skills<\/code>, <code>hooks<\/code>, <code>commands<\/code>, <code>mcpServers<\/code>, <code>rules<\/code>. Codex prompts live in <code>commands<\/code>.<\/li><li>MCP items expose the <code>type<\/code> (transport) and <code>url<\/code> keys only; auth, <code>env<\/code>, and <code>headers<\/code> never appear.<\/li><li><code>ProviderSummary<\/code> = <code>{id, displayName, root, detected}<\/code> plus optional non-secret config facts for Codex.<\/li><li><code>validate()<\/code> extends with <code>assert_no_secrets(data)<\/code>: it serializes the assembled data and re-runs the prose secret scanner; any surviving match raises <code>ValueError<\/code>. This is a final tripwire over the new structured-config path, independent of each adapter remembering to redact.<\/li><\/ul>\n<h3>Redaction<\/h3>\n<ul><li>Structured config (all MCP servers) is allowlisted to <code>{command, args, type, url}<\/code>. Everything else is dropped before it can reach the output. This tier fails closed.<\/li><li>Hook commands and every frontmatter text field pass through <code>redact_text<\/code>.<\/li><li>The <code>assert_no_secrets<\/code> tripwire is the backstop if any path is missed.<\/li><\/ul>\n<h2>Testing<\/h2>\n<p>TDD, stdlib <code>pytest<\/code>, hybrid in-test builders.<\/p>\n<ul><li><code>tests/builders.py<\/code> — <code>make_claude_repo<\/code>, <code>make_codex_repo<\/code>, <code>make_cursor_repo<\/code>, <code>make_multi_provider_repo<\/code>, <code>make_brownfield_repo<\/code>. Each stamps a realistic provider layout into <code>tmp_path<\/code>. Every fixture is non-git by default (no <code>.git<\/code> is created), so the non-git path is the baseline rather than a separate builder.<\/li><li><code>tests/test_frontmatter.py<\/code> — the parser: fenced and unfenced, quoted values, inline and block lists, booleans, malformed lines skipped.<\/li><li><code>tests/test_claude_adapter.py<\/code>, <code>test_codex_adapter.py<\/code>, <code>test_cursor_adapter.py<\/code> — detection, inventory mapping, native labels, and that fake secrets in MCP config or prose do not leak.<\/li><li><code>tests/test_owner_rule.py<\/code> — 0, 1, and 2-or-more existing dashboards; precedence; <code>--owner<\/code> override; the ambiguous error.<\/li><li><code>tests/test_generate.py<\/code> (extended) — a multi-provider repo yields one merged dashboard with every provider; output stays byte-identical across two runs; allowlisted secrets never appear in the HTML, island, or search; generic does not re-list provider files; <code>assert_no_secrets<\/code> rejects a planted leak.<\/li><li><code>tests/test_schema.py<\/code> (extended) — the new <code>Item<\/code>/<code>ProviderSummary<\/code> fields and <code>assert_no_secrets<\/code>.<\/li><\/ul>\n<h2>What Phase 2 leaves for later<\/h2>\n<p>The full layout-B renderer with bento Overview and Inventory badges, the relationship-list Map, and client search over the new data are Phase 3. The size budget (warn at 1 MB, summary-only at 2 MB) is Phase 3. The three-tier refresh and the skill/plugin packaging are Phase 4.<\/p>","id":"1397b9aee5d8","path":"docs/superpowers/specs/2026-05-29-ai-control-center-phase-2-adapters-design.md","summary":"Date: 2026-05-29","title":"AI control center — Phase 2 (first-class provider adapters) design"},{"html":"<h1>AI control center — Phase 3 (renderer: Overview + Inventory) design<\/h1>\n<p>Date: 2026-05-30<\/p>\n<p>Status: approved for planning (revised after Codex design debate)<\/p>\n<p>Project: html-dash (AI Control Center)<\/p>\n<p>Builds on: <code>2026-05-29-ai-control-center-design.md<\/code> (v1 design), Phase 1 and Phase 2 (merged)<\/p>\n<h2>Scope<\/h2>\n<p>Phase 3 builds the human-facing views over the data that Phases 1 and 2 already put in the JSON island. Today the renderer shows Docs and TODOs and leaves an empty Overview; the inventory the adapters produce is in the island but never drawn. Phase 3 adds two views — a bento Overview and an Inventory view grouped by type — wires path links to source files, and adds the output size budget that Phase 2 parked here.<\/p>\n<p>Phase 3 is render-first. The data changes are two small fields: <code>source.pathPrefix<\/code> for path links and <code>generator.truncated<\/code> for the size budget. No adapter behavior changes.<\/p>\n<p>Locked decisions from brainstorming:<\/p>\n<p>1. Inventory view groups by type (one block per non-empty bucket), with a provider chip and the native type label on every row. Empty buckets hide. Display order is a fixed constant.<\/p>\n<p>2. Overview is a bento grid of cards built from real data only: providers detected, inventory counts, open TODOs, docs count. Cards with no data do not render. The spec&#x27;s milestone and last-decision cards stay out — no source produces them yet.<\/p>\n<p>3. Items are rows, not expandable panels. The path is a clickable relative link to the source file. No inline markdown rendering, so no HTML-injection path enters in this phase.<\/p>\n<p>4. Tests are Python HTML-string/contract assertions plus real DOM tests via Playwright in CI (decided after the Codex debate, which showed string-presence checks cannot catch runtime href/DOM breakage). Playwright is a test-only dependency; the generator and renderer stay dependency-free.<\/p>\n<p>5. The full size budget lands here: warn over 1 MB, switch to a summary-only island over 2 MB.<\/p>\n<h2>Hard constraints carried from v1<\/h2>\n<ul><li>Stdlib only at runtime. The generator and the rendered dashboard add no dependencies. Only the test layer gains Playwright.<\/li><li>The renderer is classic inline JavaScript in one IIFE. No ES modules (they fail over <code>file://<\/code>), no CDN, no framework.<\/li><li><code>textContent<\/code> for all author-derived text. The only attribute set from data is the path link <code>href<\/code>, built by per-segment URL-encoding (below). No <code>innerHTML<\/code>, so the stored-XSS posture is unchanged.<\/li><li>Deterministic output: fixed section and bucket order, the island stays canonical and sorted, no timestamps or mtimes.<\/li><li>One self-contained HTML file under the owning provider folder.<\/li><\/ul>\n<h2>Architecture<\/h2>\n<h3>Renderer (<code>src/acc/templates/<\/code>)<\/h3>\n<p>**<code>app.js<\/code>** grows from four render functions to six, plus one shared row builder. The existing IIFE, <code>el()<\/code> helper, and <code>wireSearch()<\/code> stay.<\/p>\n<ul><li><code>itemRow(opts)<\/code> — the shared DOM builder. <code>opts<\/code> is <code>{provider?, typeLabel?, title, path, summary?}<\/code>. It builds a row with an optional provider chip (<code>.acc-chip<\/code>), an optional type-label badge (<code>.badge<\/code>), the title, an optional summary line, and the path. <code>renderDocs<\/code>, <code>renderTodos<\/code>, and <code>renderInventory<\/code> all route through it, removing the row-building duplication that exists today. It sets <code>row.dataset.search<\/code> from the row&#x27;s own text (title, path, summary), so search keeps working independent of the island&#x27;s <code>search<\/code> array.<\/li><li>Path link — the path renders as <code>&lt;a class=&quot;path&quot;&gt;<\/code> when a usable prefix exists, else as plain text. The <code>href<\/code> is built by encoding the **combined** relative path (prefix and path together) segment by segment, preserving only <code>.<\/code> and <code>..<\/code> segments:<\/li><\/ul>\n<pre><code>  function encodedRelHref(prefix, path) {\n    var raw = (prefix === &quot;.&quot; ? path : prefix + &quot;/&quot; + path);\n    return raw.split(&quot;/&quot;).map(function (seg) {\n      return seg === &quot;.&quot; || seg === &quot;..&quot; ? seg : encodeURIComponent(seg);\n    }).join(&quot;/&quot;);\n  }<\/code><\/pre>\n<p>  Encoding the whole combined path (not just <code>item.path<\/code>) matters because <code>pathPrefix<\/code> is a general <code>relpath<\/code> and, when the out dir sits outside the repo, can itself contain real directory names with spaces, <code>#<\/code>, <code>?<\/code>, or <code>:<\/code> — and a raw <code>javascript:repo/...<\/code> prefix would otherwise read as a scheme over <code>file://<\/code>. Per-segment <code>encodeURIComponent<\/code> escapes those while preserving the <code>/<\/code> separators and the <code>.<\/code>/<code>..<\/code> navigation. If <code>data.source.pathPrefix<\/code> is absent or empty, the renderer omits the link and shows the path as text, so a missing prefix never produces an <code>undefined/...<\/code> href.<\/p>\n<ul><li><code>renderOverview()<\/code> — builds an <code>.acc-bento<\/code> grid. One card per data category that has content:<\/li><li>Providers — a chip per provider in <code>data.providers<\/code>, but <code>generic<\/code> is included only when it is the sole provider, so a repo with a real provider does not show a redundant Generic chip.<\/li><li>Inventory — a count per non-empty bucket (&quot;1 agent&quot;, &quot;2 commands&quot;, …), derived from array lengths (there is no count field in the data). The card hides if every bucket is empty.<\/li><li>Open TODOs — the count plus up to the first three texts. Hides if none.<\/li><li>Docs — the count. Hides if none.<\/li><\/ul>\n<p>  Each card scroll-links to its section. A card with no data is not appended.<\/p>\n<ul><li><code>renderInventory()<\/code> — iterates the buckets in a fixed display order (<code>agents<\/code>, <code>commands<\/code>, <code>skills<\/code>, <code>hooks<\/code>, <code>mcpServers<\/code>, <code>rules<\/code>). This order is a deliberate display choice and differs from the <code>_INV_BUCKETS<\/code> storage order in <code>base.py<\/code> (which has <code>skills<\/code> before <code>commands<\/code>); the renderer owns its own order. For each non-empty bucket it appends a labeled block (&quot;Agents (1)&quot;) and one <code>itemRow<\/code> per item. Items arrive already sorted from the generator. Empty buckets are skipped.<\/li><li>Truncation notice — if <code>data.generator.truncated<\/code> is true, a banner states that the dashboard was reduced to a summary for size, built with <code>textContent<\/code>. It renders into a dedicated host placed immediately after <code>&lt;nav&gt;<\/code> (before Overview), so it never displaces the sticky header.<\/li><\/ul>\n<p>**<code>dashboard.html.tmpl<\/code>** adds an <code>Inventory<\/code> nav link, a <code>&lt;section id=&quot;inventory&quot;&gt;<\/code> with a host div between Overview and Docs, and a banner host right after <code>&lt;nav&gt;<\/code>. The <code>#acc-overview<\/code> host already exists.<\/p>\n<p>**<code>styles.css<\/code>** adds <code>.acc-bento<\/code> (a responsive grid via <code>grid-template-columns: repeat(auto-fill, minmax(200px, 1fr))<\/code>), <code>.acc-card<\/code>, and <code>.acc-chip<\/code>, reusing the existing color tokens. No new color scheme.<\/p>\n<h3>Generator (<code>src/acc/generate.py<\/code>)<\/h3>\n<ul><li><code>source.pathPrefix<\/code> — the posix relative path from the dashboard&#x27;s output directory to the repo root, computed with <code>os.path.relpath(root, out_dir)<\/code> and normalized to posix separators. It is the general relative path, not a hard-coded <code>&quot;..&quot;<\/code>: a provider-folder owner yields <code>&quot;..&quot;<\/code>, <code>--out .<\/code> yields <code>&quot;.&quot;<\/code>, a nested out dir yields <code>&quot;../..&quot;<\/code>. If <code>os.path.relpath<\/code> raises (for example an out dir on a different Windows drive than the root), <code>pathPrefix<\/code> is set to <code>&quot;&quot;<\/code> and the renderer falls back to plain-text paths. The value is <code>path<\/code> only — never used as HTML.<\/li><li>Size budget — after the full HTML is rendered, measure its UTF-8 byte length:<\/li><li>over 2 MB (<code>_TRUNCATE_BYTES = 2_000_000<\/code>): rebuild the island in summary-only form and re-render. The reducer **deep-copies the full data and blanks only known heavy values, it does not delete keys or rebuild from a whitelist**: every inventory and doc <code>summary<\/code> becomes <code>&quot;&quot;<\/code>, every <code>docs[].html<\/code> becomes <code>&quot;&quot;<\/code>, and <code>search<\/code> becomes <code>[]<\/code>. Deep-copy-then-blank guarantees that every key and every optional field is preserved — inventory item shape (<code>{id, provider, type, typeLabel, title, path, summary}<\/code> plus the optional <code>config<\/code> MCP items carry), doc shape (<code>{id, title, path, summary, html}<\/code>), and TODO <code>{text, path}<\/code> — so <code>validate()<\/code> and <code>assert_no_secrets<\/code> still pass on the reduced object. <code>generator.truncated<\/code> is set to <code>true<\/code>. <code>validate()<\/code> is re-run on the exact reduced object before it is written. Log the final reduced byte size; if it is still over 2 MB, log a warning (the skeleton is the floor — there is no further truncation).<\/li><li>over 1 MB (<code>_WARN_BYTES = 1_000_000<\/code>) and not truncated: log a warning with the byte size and keep the full island.<\/li><\/ul>\n<p>  Both thresholds key off the same measured size, so the mode is a deterministic function of the input.<\/p>\n<h3>Schema (<code>src/acc/schema.py<\/code> and the data dict)<\/h3>\n<ul><li><code>source<\/code> gains <code>pathPrefix<\/code> (string).<\/li><li><code>generator<\/code> gains <code>truncated<\/code> (bool, default <code>false<\/code>).<\/li><li>Item and bucket shapes are unchanged in both modes. Summary-only mode blanks values within the existing shapes; it never adds or removes a key. <code>_REQUIRED_TOP<\/code>, <code>validate()<\/code>, and <code>assert_no_secrets<\/code> are unchanged. Counts are renderer-derived from array lengths; no count field is added.<\/li><li>The generator guarantees <code>source.pathPrefix<\/code> and <code>generator.truncated<\/code> on every render, so the renderer&#x27;s missing-field guards are a safety net for older or hand-built islands rather than the normal path.<\/li><\/ul>\n<h3>Data flow<\/h3>\n<p><code>island JSON → parse → renderHead · renderOverview · renderInventory · renderDocs · renderTodos → wireSearch<\/code>. The renderer is a pure function of the island, runs offline, and adds no network calls. The size-budget branch runs entirely in the generator before the file is written.<\/p>\n<h2>Security and determinism<\/h2>\n<ul><li>XSS posture is unchanged. Every author-derived value goes through <code>textContent<\/code>. The single <code>href<\/code> is built from <code>item.path<\/code> and the generator-computed <code>pathPrefix<\/code> combined, with every segment of the combined path passed through <code>encodeURIComponent<\/code> (preserving only <code>.<\/code>/<code>..<\/code>), so neither a reserved character in a filename nor a scheme-looking directory name in the prefix can produce a <code>javascript:<\/code>/<code>data:<\/code> href. <code>item.path<\/code> is not HTML-escaped today (<code>_escape_text_fields<\/code> escapes only <code>title<\/code> and <code>summary<\/code>), which is correct here: <code>textContent<\/code> makes the displayed path safe, and segment URL-encoding makes the <code>href<\/code> safe. No <code>innerHTML<\/code>.<\/li><li>The reduced island blanks values within existing shapes, so the redaction guarantees and the <code>assert_no_secrets<\/code> tripwire still hold in both modes.<\/li><li>Determinism holds: section and bucket display order are fixed constants, <code>pathPrefix<\/code> is a pure function of <code>(root, out_dir)<\/code>, and the truncation mode is a pure function of the measured size. Two runs on the same input produce byte-identical output.<\/li><\/ul>\n<h2>Testing<\/h2>\n<p>TDD, stdlib <code>pytest<\/code> for the generator and contract layer, Playwright for DOM behavior.<\/p>\n<p>Python HTML-string / contract assertions (<code>tests/test_render.py<\/code>, <code>tests/test_generate.py<\/code>, <code>tests/test_schema.py<\/code>):<\/p>\n<ul><li>The template carries the <code>Inventory<\/code> section, the nav link, and the banner host; <code>app.js<\/code> defines <code>renderOverview<\/code>, <code>renderInventory<\/code>, and <code>itemRow<\/code>; <code>styles.css<\/code> carries the bento classes.<\/li><li><code>source.pathPrefix<\/code> is <code>&quot;..&quot;<\/code> for a provider-folder owner, <code>&quot;.&quot;<\/code> for <code>--out .<\/code>, and the right value for a nested out dir.<\/li><li>A path with reserved characters (for example <code>docs/a#b.md<\/code>) survives into the island unmangled, so the renderer has the raw value to encode.<\/li><li>Size budget: a large in-test fixture pushes the island over each threshold. Between 1 and 2 MB logs a warning (via <code>caplog<\/code>) and keeps the full island. Over 2 MB sets <code>generator.truncated<\/code>, blanks <code>summary<\/code>/<code>docs[].html<\/code>/<code>search<\/code>, keeps all keys and shapes, and the reduced object still passes <code>validate()<\/code>. Under 1 MB does neither.<\/li><li>The new <code>source.pathPrefix<\/code> and <code>generator.truncated<\/code> fields pass validation; determinism and packaging tests stay green.<\/li><\/ul>\n<p>Playwright DOM tests (<code>tests/test_render_dom.py<\/code>):<\/p>\n<ul><li>Load the rendered HTML with <code>page.set_content(html)<\/code> (no server, no <code>file://<\/code>), then assert real DOM behavior: the bento cards render with the right counts; the Inventory view shows the items grouped by type with provider chips; a path link&#x27;s <code>href<\/code> attribute is the correctly per-segment-encoded relative URL (including the reserved-character case); typing in the search box filters the visible rows; a truncated island renders the summary banner.<\/li><li>Playwright is declared as a test-only optional dependency (a <code>test<\/code> extra in <code>pyproject.toml<\/code>); CI installs the browser (<code>playwright install chromium<\/code>) and runs this file. Runtime packaging is untouched.<\/li><\/ul>\n<p>Manual acceptance: a Playwright screenshot of a multi-provider dashboard, as a final visual confirmation.<\/p>\n<h2>What Phase 3 leaves for later<\/h2>\n<ul><li>Expandable item detail and inline rendering of the sanitized markdown <code>html<\/code> field.<\/li><li>The relationship Map (<code>relationships<\/code> stays <code>[]<\/code>).<\/li><li>Data sources for <code>recentDocs<\/code>, current milestone, and last decision, and the Overview cards that would show them.<\/li><li>Wiring <code>generator.rendererDigest<\/code> (still an empty string) to a hash of the renderer assets.<\/li><li>The three-tier refresh, the <code>/dashboard<\/code> command, and the skill and plugin packaging (Phase 4).<\/li><\/ul>","id":"3fc51374c4da","path":"docs/superpowers/specs/2026-05-30-ai-control-center-phase-3-renderer-design.md","summary":"Date: 2026-05-30","title":"AI control center — Phase 3 (renderer: Overview + Inventory) design"}],"workflows":[]},"generator":{"name":"ai-control-center","rendererDigest":"","truncated":false,"version":"0.1.0"},"inventory":{"agents":[],"commands":[],"hooks":[],"mcpServers":[],"rules":[],"skills":[]},"project":{"openTodos":[{"id":"57ecbbc1ce8b","path":"docs/superpowers/plans/2026-05-29-ai-control-center-phase-1-core.md","text":"**Step 1: Create `pyproject.toml`**"},{"id":"c8dfb5bd97f9","path":"docs/superpowers/plans/2026-05-29-ai-control-center-phase-1-core.md","text":"**Step 1: Create `templates/styles.css`**"},{"id":"562201bcbafd","path":"docs/superpowers/plans/2026-05-29-ai-control-center-phase-1-core.md","text":"**Step 1: Write the failing test**"},{"id":"562201bcbafd","path":"docs/superpowers/plans/2026-05-29-ai-control-center-phase-1-core.md","text":"**Step 1: Write the failing test**"},{"id":"562201bcbafd","path":"docs/superpowers/plans/2026-05-29-ai-control-center-phase-1-core.md","text":"**Step 1: Write the failing t":"","title":"**Step 4: Run tests to verify they pass**","type":"todo","typeLabel":"TODO"},{"id":"7957d87fd6a2","path":"docs/superpowers/plans/2026-05-30-ai-control-center-phase-4b-relationships.md","text":"","title":"**Step 4: Run tests to verify they pass**","type":"todo","typeLabel":"TODO"},{"id":"59a10df3f4e3","path":"docs/superpowers/plans/2026-05-30-ai-control-center-phase-4b-relationships.md","text":"","title":"**Step 4: Run the DOM test + `node --check` + guard**","type":"todo","typeLabel":"TODO"},{"id":"d6cb5624ca74","path":"docs/superpowers/plans/2026-05-30-ai-control-center-phase-4b-relationships.md","text":"","title":"**Step 4: Run the DOM test + `node --check` + the innerHTML guard**","type":"todo","typeLabel":"TODO"},{"id":"25c39887b106","path":"docs/superpowers/plans/2026-05-30-ai-control-center-phase-4b-relationships.md","text":"","title":"**Step 4: Run the schema tests + full suite**","type":"todo","typeLabel":"TODO"},{"id":"cefe3af4a7b9","path":"docs/superpowers/plans/2026-05-30-ai-control-center-phase-4b-relationships.md","text":"","title":"**Step 4: Run the test + `node --check`**","type":"todo","typeLabel":"TODO"},{"id":"8f3fbdcb2668","path":"docs/superpowers/plans/2026-05-30-ai-control-center-phase-4b-relationships.md","text":"","title":"**Step 4: Run the test + full suite**","type":"todo","typeLabel":"TODO"},{"id":"c476b4ff8bf0","path":"docs/superpowers/plans/2026-05-30-ai-control-center-phase-4b-relationships.md","text":"","title":"**Step 4: Run the test + the full suite to verify**","type":"todo","typeLabel":"TODO"},{"id":"240f8ff5b47f","path":"docs/superpowers/plans/2026-05-30-ai-control-center-phase-4b-relationships.md","text":"","title":"**Step 5: Commit**","type":"todo","typeLabel":"TODO"},{"id":"240f8ff5b47f","path":"docs/superpowers/plans/2026-05-30-ai-control-center-phase-4b-relationships.md","text":"","title":"**Step 5: Commit**","type":"todo","typeLabel":"TODO"},{"id":"240f8ff5b47f","path":"docs/superpowers/plans/2026-05-30-ai-control-center-phase-4b-relationships.md","text":"","title":"**Step 5: Commit**","type":"todo","typeLabel":"TODO"},{"id":"240f8ff5b47f","path":"docs/superpowers/plans/2026-05-30-ai-control-center-phase-4b-relationships.md","text":"","title":"**Step 5: Commit**","type":"todo","typeLabel":"TODO"},{"id":"240f8ff5b47f","path":"docs/superpowers/plans/2026-05-30-ai-control-center-phase-4b-relationships.md","text":"","title":"**Step 5: Commit**","type":"todo","typeLabel":"TODO"},{"id":"240f8ff5b47f","path":"docs/superpowers/plans/2026-05-30-ai-control-center-phase-4b-relationships.md","text":"","title":"**Step 5: Commit**","type":"todo","typeLabel":"TODO"},{"id":"240f8ff5b47f","path":"docs/superpowers/plans/2026-05-30-ai-control-center-phase-4b-relationships.md","text":"","title":"**Step 5: Commit**","type":"todo","typeLabel":"TODO"},{"id":"240f8ff5b47f","path":"docs/superpowers/plans/2026-05-30-ai-control-center-phase-4b-relationships.md","text":"","title":"**Step 5: Commit**","type":"todo","typeLabel":"TODO"},{"id":"240f8ff5b47f","path":"docs/superpowers/plans/2026-05-30-ai-control-center-phase-4b-relationships.md","text":"","title":"**Step 5: Commit**","type":"todo","typeLabel":"TODO"},{"id":"8a829518d49e","path":"docs/superpowers/plans/2026-05-30-ai-control-center-phase-4b-relationships.md","text":"**Goal:** Populate the empty `relationships: []` with deterministic `reference` (doc→item path mention) and `declares` (config-file→MCP/hook) edges, and render them as inline &quot;Related&quot; blocks plus a &quot;Cross-references&quot; view.","title":"Phase 4b — Relationships Implementation Plan","type":"doc","typeLabel":"Reference"},{"id":"f53b173c2722","path":"docs/superpowers/specs/2026-05-29-ai-control-center-design.md","text":"Date: 2026-05-29","title":"AI control center dashboard — design spec","type":"doc","typeLabel":"Reference"},{"id":"1397b9aee5d8","path":"docs/superpowers/specs/2026-05-29-ai-control-center-phase-2-adapters-design.md","text":"Date: 2026-05-29","title":"AI control center — Phase 2 (first-class provider adapters) design","type":"doc","typeLabel":"Reference"},{"id":"3fc51374c4da","path":"docs/superpowers/specs/2026-05-30-ai-control-center-phase-3-renderer-design.md","text":"Date: 2026-05-30","title":"AI control center — Phase 3 (renderer: Overview + Inventory) design","type":"doc","typeLabel":"Reference"}],"source":{"dashboardPath":".claude/dashboard.html","pathPrefix":"..","repoName":"html-dash","sourceDigest":"547bd17c238342a4","vcs":{"kind":"none"}}}</script>
<script>(function () {
  var node = document.getElementById("acc-data");
  var data = JSON.parse(node.textContent);
  var pathPrefix = (data.source && data.source.pathPrefix) || "";

  function el(tag, cls, text) {
    var e = document.createElement(tag);
    if (cls) e.className = cls;
    if (text != null) e.textContent = text;
    return e;
  }

  // Decode the five entities html.escape (Python) produces. Applied ONLY at
  // textContent display and when building the omnibox match key, so search and
  // display see logical text (AT&T, not AT&amp;T) without an HTML sink — the
  // decoded value still reaches the DOM via textContent and stays inert.
  // Order matters: decode &amp; LAST so "&amp;lt;" does not double-decode.
  function htmlUnescape(s) {
    if (s == null) return "";
    return String(s)
      .replace(/&lt;/g, "<")
      .replace(/&gt;/g, ">")
      .replace(/&quot;/g, '"')
      .replace(/&#x27;/g, "'")
      .replace(/&#39;/g, "'")
      .replace(/&amp;/g, "&");
  }
  // expose for DOM tests; harmless in production (no behavior, just a handle)
  window.__accHtmlUnescape = htmlUnescape;

  function encodedRelHref(prefix, path) {
    var raw = (prefix === "." ? path : prefix + "/" + path);
    return raw.split("/").map(function (seg) {
      return seg === "." || seg === ".." ? seg : encodeURIComponent(seg);
    }).join("/");
  }

  function itemRow(opts) {
    var row = el("div", "acc-row acc-item");
    if (opts.id) row.dataset.id = opts.id;
    var head = el("div", "acc-rowhead");
    if (opts.provider) head.appendChild(el("span", "acc-chip", opts.provider));
    if (opts.typeLabel) head.appendChild(el("span", "badge", opts.typeLabel));
    head.appendChild(el("span", "acc-itemtitle", htmlUnescape(opts.title)));
    row.appendChild(head);
    if (opts.summary) row.appendChild(el("div", "acc-summary", htmlUnescape(opts.summary)));
    if (pathPrefix) {
      var a = el("a", "path", opts.path);
      a.href = encodedRelHref(pathPrefix, opts.path);
      row.appendChild(a);
    } else {
      row.appendChild(el("span", "path", opts.path));
    }
    row.dataset.search =
      (htmlUnescape(opts.title) + " " + opts.path + " " +
       htmlUnescape(opts.summary || "")).toLowerCase();
    return row;
  }

  // Display order (deliberate; differs from _INV_BUCKETS storage order in
  // base.py, which has skills before commands). The renderer owns its order.
  var INV_ORDER = ["agents", "commands", "skills", "hooks", "mcpServers", "rules"];
  var INV_LABEL = {
    agents: "Agents", commands: "Commands", skills: "Skills",
    hooks: "Hooks", mcpServers: "MCP servers", rules: "Rules"
  };

  function renderInventory() {
    var host = document.getElementById("acc-inventory");
    var inv = data.inventory || {};
    INV_ORDER.forEach(function (bucket) {
      var items = inv[bucket] || [];
      if (!items.length) return;
      host.appendChild(el("div", "acc-sublabel",
        INV_LABEL[bucket] + " (" + items.length + ")"));
      items.forEach(function (it) {
        host.appendChild(itemRow({
          id: it.id,
          provider: it.provider, typeLabel: it.typeLabel,
          title: it.title, path: it.path, summary: it.summary
        }));
      });
    });
  }

  function renderHead() {
    document.getElementById("acc-title").textContent = data.project.title;
    var m = data.source;
    document.getElementById("acc-meta").textContent =
      "stamped · digest " + m.sourceDigest + " · vcs: " + m.vcs.kind + " · freshness is manual";
  }

  function renderDocs() {
    var host = document.getElementById("acc-docs");
    var groups = data.docs;
    Object.keys(groups).sort().forEach(function (g) {
      groups[g].forEach(function (doc) {
        host.appendChild(itemRow({
          id: doc.id,
          typeLabel: g, title: doc.title, path: doc.path, summary: doc.summary
        }));
      });
    });
  }

  function renderTodos() {
    var host = document.getElementById("acc-todos");
    (data.project.openTodos || []).forEach(function (t) {
      host.appendChild(itemRow({ id: t.id, title: t.text, path: t.path }));
    });
  }

  function plural(n, word) { return n + " " + (n === 1 ? word.replace(/s$/, "") : word); }

  function card(title, target) {
    var c = el("div", "acc-card");
    if (target) {
      var a = el("a", "acc-card-h", title);
      a.href = "#" + target;
      c.appendChild(a);
    } else {
      c.appendChild(el("div", "acc-card-h", title));
    }
    return c;
  }

  function renderOverview() {
    var host = document.getElementById("acc-overview");
    var bento = el("div", "acc-bento");

    // providers always includes generic; show excludes it when first-class providers exist
    var provs = data.providers || [];
    var firstClass = provs.filter(function (p) { return p.id !== "generic"; });
    var show = firstClass.length ? firstClass : provs;
    if (show.length) {
      var pc = card("Providers");
      show.forEach(function (p) { pc.appendChild(el("span", "acc-chip", p.displayName)); });
      bento.appendChild(pc);
    }

    var inv = data.inventory || {};
    var nonEmpty = INV_ORDER.filter(function (b) { return (inv[b] || []).length; });
    if (nonEmpty.length) {
      var ic = card("Inventory", "inventory");
      nonEmpty.forEach(function (b) {
        ic.appendChild(el("div", null, plural(inv[b].length, INV_LABEL[b].toLowerCase())));
      });
      bento.appendChild(ic);
    }

    var todos = (data.project && data.project.openTodos) || [];
    if (todos.length) {
      var tc = card("Open TODOs (" + todos.length + ")", "todos");
      todos.slice(0, 3).forEach(function (t) { tc.appendChild(el("div", null, t.text)); });
      bento.appendChild(tc);
    }

    var docs = data.docs || {};
    var docCount = 0;
    Object.keys(docs).forEach(function (k) { docCount += (docs[k] || []).length; });
    if (docCount) {
      var dc = card("Docs", "docs");
      dc.appendChild(el("div", null, docCount + " referenced"));
      bento.appendChild(dc);
    }

    var rels = data.relationships || [];
    if (rels.length) {
      var xc = card("Cross-references", "crossref");
      xc.appendChild(el("div", null, plural(rels.length, "edges")));
      bento.appendChild(xc);
    }

    if (bento.children.length) host.appendChild(bento);
  }

  function renderBanner() {
    if (!(data.generator && data.generator.truncated)) return;
    document.getElementById("acc-banner").appendChild(el("div", "acc-noticetext",
      "This dashboard was reduced to a summary because the full output exceeded the size budget."));
  }

  function wireSearch() {
    var box = document.getElementById("acc-search");
    box.addEventListener("input", function () {
      var q = box.value.toLowerCase();
      document.querySelectorAll(".acc-item").forEach(function (row) {
        var hit = !q || (row.dataset.search || "").indexOf(q) !== -1;
        row.classList.toggle("acc-hidden", !hit);
      });
    });
  }

  var rowById = new Map();

  function buildRowIndex() {
    rowById.clear();
    document.querySelectorAll(".acc-item[data-id]").forEach(function (row) {
      // first rendered row wins for a given id (ids are stable + unique anyway)
      if (!rowById.has(row.dataset.id)) rowById.set(row.dataset.id, row);
    });
  }

  function jumpTo(id) {
    var row = rowById.get(id);
    if (!row) return; // degrade: empty bucket skipped, or light/truncated mode
    row.scrollIntoView({ block: "center" });
    row.classList.remove("acc-flash");
    // reflow so re-adding the class restarts the flash animation
    void row.offsetWidth;
    row.classList.add("acc-flash");
    window.setTimeout(function () { row.classList.remove("acc-flash"); }, 1600);
  }
  window.__accJump = jumpTo;

  var metaById = {};
  function buildMeta() {
    var inv = data.inventory || {};
    Object.keys(inv).forEach(function (b) {
      (inv[b] || []).forEach(function (it) {
        metaById[it.id] = { title: it.title, typeLabel: it.typeLabel, path: it.path };
      });
    });
    var docs = data.docs || {};
    Object.keys(docs).forEach(function (g) {
      (docs[g] || []).forEach(function (d) {
        metaById[d.id] = { title: d.title, typeLabel: g, path: d.path };
      });
    });
    (data.project.openTodos || []).forEach(function (t) {
      metaById[t.id] = { title: t.text, typeLabel: "TODO", path: t.path };
    });
  }

  var edgesByEndpoint = {};
  function buildEdgeIndex() {
    (data.relationships || []).forEach(function (e) {
      (edgesByEndpoint[e.from] || (edgesByEndpoint[e.from] = []))
        .push({ otherId: e.to, dir: "out", type: e.type, evidence: e.evidence });
      (edgesByEndpoint[e.to] || (edgesByEndpoint[e.to] = []))
        .push({ otherId: e.from, dir: "in", type: e.type, evidence: e.evidence });
    });
  }

  var REL_VERB = {
    "reference|out": "references", "reference|in": "referenced by",
    "declares|out": "declares", "declares|in": "declared in"
  };

  function relatedEntry(edge) {
    var verb = REL_VERB[edge.type + "|" + edge.dir] || edge.type;
    var meta = metaById[edge.otherId];
    if (edge.type === "declares" && edge.dir === "in") {
      var label = el("span", "acc-rel-line");
      label.appendChild(el("span", "acc-rel-verb", verb));
      label.appendChild(el("span", "path", edge.evidence));
      return label;
    }
    if (!meta) return null;
    var btn = el("button", "acc-rel-line");
    btn.type = "button";
    btn.appendChild(el("span", "acc-rel-verb", verb));
    btn.appendChild(el("span", "acc-chip", meta.typeLabel));
    btn.appendChild(el("span", "acc-rel-title", htmlUnescape(meta.title)));
    btn.addEventListener("click", function () { jumpTo(edge.otherId); });
    return btn;
  }

  function decorateRelated() {
    rowById.forEach(function (row, id) {
      var edges = edgesByEndpoint[id];
      if (!edges || !edges.length) return;
      var box = el("div", "acc-related");
      edges.forEach(function (e) {
        var node = relatedEntry(e);
        if (node) box.appendChild(node);
      });
      if (box.children.length) row.appendChild(box);
    });
  }

  function sourceLabel(fromId, sampleEdge) {
    var meta = metaById[fromId];
    if (meta) return { title: htmlUnescape(meta.title), type: meta.typeLabel, sort: meta.path || meta.title };
    return { title: sampleEdge.evidence, type: "config", sort: sampleEdge.evidence };
  }

  function renderCrossReferences() {
    var host = document.getElementById("acc-crossref");
    if (!host) return;
    var edges = data.relationships || [];
    if (!edges.length) {
      host.appendChild(el("div", "acc-xref-empty", "No cross-references found"));
      return;
    }
    var bySource = {};
    edges.forEach(function (e) { (bySource[e.from] || (bySource[e.from] = [])).push(e); });
    var groups = Object.keys(bySource).map(function (fromId) {
      return { fromId: fromId, label: sourceLabel(fromId, bySource[fromId][0]), edges: bySource[fromId] };
    });
    groups.sort(function (a, b) { return a.label.sort < b.label.sort ? -1 : a.label.sort > b.label.sort ? 1 : 0; });
    groups.forEach(function (g) {
      var head = el("div", "acc-xref-source");
      head.appendChild(el("span", "acc-chip", g.label.type));
      head.appendChild(el("span", "acc-xref-srctitle", g.label.title));
      host.appendChild(head);
      var targets = g.edges.map(function (e) {
        var m = metaById[e.to] || {};
        return { e: e, title: htmlUnescape(m.title || ""), type: m.typeLabel || "", sort: (m.path || m.title || "") };
      });
      targets.sort(function (a, b) { return a.sort < b.sort ? -1 : a.sort > b.sort ? 1 : 0; });
      targets.forEach(function (t) {
        var btn = el("button", "acc-xref-edge");
        btn.type = "button";
        btn.appendChild(el("span", "acc-rel-verb", t.e.type === "declares" ? "declares" : "references"));
        btn.appendChild(el("span", "acc-chip", t.type));
        btn.appendChild(el("span", "acc-rel-title", t.title));
        btn.appendChild(el("span", "path", t.e.evidence));
        btn.addEventListener("click", function () { jumpTo(t.e.to); });
        host.appendChild(btn);
      });
    });
  }

  var OMNI_GROUP_CAP = 8;
  var INV_TYPE_ORDER = ["agent", "command", "skill", "hook", "mcpServer", "rule", "doc", "todo"];

  function searchRecords() { return data.search || []; }

  function matchKey(rec) {
    if (rec.__key == null) {
      rec.__key = htmlUnescape(
        (rec.title || "") + " " + (rec.path || "") + " " + (rec.text || "")
      ).toLowerCase();
    }
    return rec.__key;
  }

  function isLightIndex() {
    var recs = searchRecords();
    return recs.length > 0 && recs.every(function (r) { return (r.text || "") === ""; });
  }

  // Append text + <mark> nodes by splitting the logical string on the query.
  // No HTML strings — every node is built via textContent / createElement.
  function appendHighlighted(target, logical, qLower) {
    if (!qLower) { target.appendChild(document.createTextNode(logical)); return; }
    var hay = logical.toLowerCase();
    var from = 0, idx;
    while ((idx = hay.indexOf(qLower, from)) !== -1) {
      if (idx > from) target.appendChild(document.createTextNode(logical.slice(from, idx)));
      var m = document.createElement("mark");
      m.textContent = logical.slice(idx, idx + qLower.length);
      target.appendChild(m);
      from = idx + qLower.length;
    }
    if (from < logical.length) target.appendChild(document.createTextNode(logical.slice(from)));
  }

  function snippetFor(rec, qLower) {
    var logical = htmlUnescape(rec.text || "");
    var idx = logical.toLowerCase().indexOf(qLower);
    if (idx === -1) return logical.slice(0, 120);
    var start = Math.max(0, idx - 40);
    var end = Math.min(logical.length, idx + qLower.length + 80);
    return (start > 0 ? "…" : "") + logical.slice(start, end) + (end < logical.length ? "…" : "");
  }

  function wireOmnibox() {
    var box = document.getElementById("acc-omnibox");
    var panel = document.getElementById("acc-omnibox-results");
    if (!box || !panel) return;
    var hits = [];
    var active = -1;
    var timer = null;

    function close() { panel.hidden = true; panel.textContent = ""; hits = []; active = -1; }

    function setActive(i) {
      var nodes = panel.querySelectorAll(".acc-omni-hit");
      if (active >= 0 && nodes[active]) nodes[active].classList.remove("acc-omni-active");
      active = i;
      if (active >= 0 && nodes[active]) {
        nodes[active].classList.add("acc-omni-active");
        nodes[active].scrollIntoView({ block: "nearest" });
      }
    }

    function render(q) {
      panel.textContent = "";
      hits = [];
      active = -1;
      var qLower = q.toLowerCase();
      if (!qLower) { close(); return; }
      panel.hidden = false;

      if (isLightIndex()) {
        panel.appendChild(el("div", "acc-omni-note",
          "Body search is off (index reduced for size); searching names and paths only."));
      }

      var byType = {};
      searchRecords().forEach(function (rec) {
        if (matchKey(rec).indexOf(qLower) === -1) return;
        (byType[rec.type] || (byType[rec.type] = [])).push(rec);
      });
      var types = INV_TYPE_ORDER.filter(function (t) { return byType[t]; });
      Object.keys(byType).forEach(function (t) {
        if (types.indexOf(t) === -1) types.push(t);
      });

      if (!types.length) {
        panel.appendChild(el("div", "acc-omni-note", "No matches"));
        return;
      }

      types.forEach(function (t) {
        var recs = byType[t];
        var group = el("div", "acc-omni-group");
        group.appendChild(el("div", "acc-omni-grouphead",
          (recs[0].typeLabel || t) + " (" + recs.length + ")"));
        recs.slice(0, OMNI_GROUP_CAP).forEach(function (rec) {
          var hit = el("div", "acc-omni-hit");
          hit.dataset.id = rec.id;
          var titleEl = el("span", "acc-omni-title");
          appendHighlighted(titleEl, htmlUnescape(rec.title || ""), qLower);
          hit.appendChild(titleEl);
          hit.appendChild(el("span", "acc-chip", rec.typeLabel || t));
          hit.appendChild(el("span", "path", rec.path || ""));
          if ((rec.text || "") !== "") {
            var snipEl = el("span", "acc-omni-snippet");
            appendHighlighted(snipEl, snippetFor(rec, qLower), qLower);
            hit.appendChild(snipEl);
          }
          hit.addEventListener("click", function () { jumpTo(rec.id); });
          group.appendChild(hit);
          hits.push(rec);
        });
        if (recs.length > OMNI_GROUP_CAP) {
          group.appendChild(el("div", "acc-omni-more",
            "+" + (recs.length - OMNI_GROUP_CAP) + " more"));
        }
        panel.appendChild(group);
      });
    }

    box.addEventListener("input", function () {
      if (timer) window.clearTimeout(timer);
      timer = window.setTimeout(function () { render(box.value); }, 60);
    });
    box.addEventListener("keydown", function (e) {
      if (e.key === "Escape") { box.value = ""; close(); return; }
      if (e.key === "ArrowDown") { e.preventDefault(); if (hits.length) setActive(Math.min(active + 1, hits.length - 1)); }
      else if (e.key === "ArrowUp") { e.preventDefault(); if (hits.length) setActive(Math.max(active - 1, 0)); }
      else if (e.key === "Enter") {
        e.preventDefault();
        var pick = active >= 0 ? active : 0;
        if (hits[pick]) jumpTo(hits[pick].id);
      }
    });
    document.addEventListener("keydown", function (e) {
      if (e.key !== "/") return;
      var a = document.activeElement;
      var tag = a && a.tagName;
      if (tag === "INPUT" || tag === "TEXTAREA" || (a && a.isContentEditable)) return;
      e.preventDefault();
      box.focus();
    });
  }

  buildMeta();
  buildEdgeIndex();
  renderHead();
  renderBanner();
  renderOverview();
  renderInventory();
  renderDocs();
  renderTodos();
  buildRowIndex();
  decorateRelated();
  renderCrossReferences();
  wireOmnibox();
  wireSearch();
})();
</script>
</body>
</html>
