&quot;: {&quot;title&quot;: &quot;Demo&quot;, &quot;openTodos&quot;: [], &quot;recentDocs&quot;: [], &quot;warnings&quot;: []},\n        &quot;inventory&quot;: {&quot;agents&quot;: [], &quot;skills&quot;: [], &quot;hooks&quot;: [], &quot;commands&quot;: [], &quot;mcpServers&quot;: [], &quot;rules&quot;: []},\n        &quot;docs&quot;: {&quot;prds&quot;: [], &quot;adrs&quot;: [], &quot;decisions&quot;: [], &quot;workflows&quot;: [], &quot;references&quot;: []},\n        &quot;relationships&quot;: [],\n        &quot;search&quot;: [],\n    }\n\n\ndef test_render_inlines_data_and_template_pieces():\n    html = render_html(_data())\n    assert &quot;&lt;!DOCTYPE html&gt;&quot; in html\n    assert &#x27;&quot;sourceDigest&quot;:&quot;abc&quot;&#x27; in html\n    assert &quot;__CSS__&quot; not in html and &quot;__APP_JS__&quot; not in html and &quot;__DATA_ISLAND__&quot; not in html\n\n\ndef test_render_neutralizes_script_close_in_island():\n    data = _data()\n    data[&quot;project&quot;][&quot;title&quot;] = &quot;&lt;/script&gt;&lt;script&gt;alert(1)&lt;/script&gt;&quot;\n    html = render_html(data)\n    # the raw closing tag must not appear inside the JSON island\n    island = html.split(&#x27;id=&quot;acc-data&quot;&#x27;, 1)[1].split(&quot;&lt;/script&gt;&quot;, 1)[0]\n    assert &quot;&lt;/script&gt;&quot; not in island<\/code><\/pre>\n<ul><li>[ ] **Step 2: Run test to verify it fails**<\/li><\/ul>\n<p>Run: <code>python -m pytest tests/test_render.py -v<\/code><\/p>\n<p>Expected: FAIL with <code>ModuleNotFoundError: No module named &#x27;acc.render&#x27;<\/code><\/p>\n<ul><li>[ ] **Step 3: Write minimal implementation**<\/li><\/ul>\n<p><code>src/acc/render.py<\/code>:<\/p>\n<pre><code>from pathlib import Path\nfrom .schema import canonical_json\n\n_TEMPLATES = Path(__file__).resolve().parent.parent.parent / &quot;templates&quot;\n\n\ndef _read(name: str) -&gt; str:\n    path = _TEMPLATES / name\n    try:\n        return path.read_text(encoding=&quot;utf-8&quot;)\n    except FileNotFoundError as e:\n        raise FileNotFoundError(f&quot;template not found: {path}&quot;) from e\n\n\ndef render_html(data: dict) -&gt; str:\n    template = _read(&quot;dashboard.html.tmpl&quot;)\n    css = _read(&quot;styles.css&quot;)\n    app_js = _read(&quot;app.js&quot;)\n    island = canonical_json(data).replace(&quot;&lt;/&quot;, &quot;&lt;\\\\/&quot;)\n    # Substitute the untrusted data island LAST, so later replacements cannot\n    # corrupt island content that happens to contain a placeholder string.\n    return (\n        template\n        .replace(&quot;/*__CSS__*/&quot;, css)\n        .replace(&quot;/*__APP_JS__*/&quot;, app_js)\n        .replace(&quot;__SCHEMA_VERSION__&quot;, data[&quot;schemaVersion&quot;])\n        .replace(&quot;__DATA_ISLAND__&quot;, island)\n    )<\/code><\/pre>\n<ul><li>[ ] **Step 4: Run test to verify it passes**<\/li><\/ul>\n<p>Run: <code>python -m pytest tests/test_render.py -v<\/code><\/p>\n<p>Expected: PASS (2 passed)<\/p>\n<ul><li>[ ] **Step 5: Commit**<\/li><\/ul>\n<pre><code>git add src/acc/render.py tests/test_render.py\ngit commit -m &quot;feat: render HTML with neutralized JSON island&quot;<\/code><\/pre>\n<p>---<\/p>\n<h2>Task 10: Generate pipeline, CLI, and integration tests<\/h2>\n<p>**Files:**<\/p>\n<ul><li>Create: <code>src/acc/generate.py<\/code><\/li><li>Create: <code>src/acc/cli.py<\/code><\/li><li>Test: <code>tests/test_generate.py<\/code><\/li><\/ul>\n<ul><li>[ ] **Step 1: Write the failing test**<\/li><\/ul>\n<p><code>tests/test_generate.py<\/code>:<\/p>\n<pre><code>from pathlib import Path\nfrom acc.generate import generate, detect_out_dir\n\n\ndef _make_repo(tmp_path):\n    (tmp_path / &quot;README.md&quot;).write_text(&quot;# Demo\\n\\nA demo repo.&quot;)\n    (tmp_path / &quot;PLAN.md&quot;).write_text(&quot;- [ ] build the thing\\ntoken [redacted]&quot;)\n    return tmp_path\n\n\ndef test_generate_writes_dashboard(tmp_path):\n    out = generate(_make_repo(tmp_path))\n    assert out.exists()\n    assert out.name == &quot;dashboard.html&quot;\n    assert &quot;&lt;!DOCTYPE html&gt;&quot; in out.read_text(encoding=&quot;utf-8&quot;)\n\n\ndef test_generate_is_deterministic(tmp_path):\n    _make_repo(tmp_path)\n    first = generate(tmp_path).read_text(encoding=&quot;utf-8&quot;)\n    second = generate(tmp_path).read_text(encoding=&quot;utf-8&quot;)\n    assert first == second\n\n\ndef test_generate_redacts_secrets_from_output(tmp_path):\n    out = generate(_make_repo(tmp_path))\n    assert &quot;[redacted]&quot; not in out.read_text(encoding=&quot;utf-8&quot;)\n\n\ndef test_generate_escapes_hostile_markdown(tmp_path):\n    (tmp_path / &quot;evil.md&quot;).write_text(&quot;# Evil\\n\\n&lt;img src=x onerror=alert(1)&gt;&quot;)\n    out = generate(tmp_path)\n    html = out.read_text(encoding=&quot;utf-8&quot;)\n    assert &quot;onerror=alert(1)&gt;&quot; not in html\n    assert &quot;&amp;lt;img&quot; in html\n\n\ndef test_detect_out_dir_prefers_provider_folder(tmp_path):\n    (tmp_path / &quot;.claude&quot;).mkdir()\n    assert detect_out_dir(tmp_path) == (tmp_path / &quot;.claude&quot;).resolve()\n\n\ndef test_detect_out_dir_falls_back(tmp_path):\n    assert detect_out_dir(tmp_path) == (tmp_path / &quot;.ai-control-center&quot;).resolve()<\/code><\/pre>\n<ul><li>[ ] **Step 2: Run test to verify it fails**<\/li><\/ul>\n<p>Run: <code>python -m pytest tests/test_generate.py -v<\/code><\/p>\n<p>Expected: FAIL with <code>ModuleNotFoundError: No module named &#x27;acc.generate&#x27;<\/code><\/p>\n<ul><li>[ ] **Step 3: Write the generate pipeline**<\/li><\/ul>\n<p><code>src/acc/generate.py<\/code>:<\/p>\n<pre><code>import html as _html\nfrom pathlib import Path\nfrom .scan import scan_files\nfrom .digest import source_digest\nfrom .schema import SCHEMA_VERSION, validate\nfrom .render import render_html\nfrom .adapters.base import ScanContext\nfrom .adapters.generic import GenericAdapter\nfrom . import __version__\n\n_PROVIDER_DIRS = (&quot;.claude&quot;, &quot;.codex&quot;, &quot;.cursor&quot;)\n\n\ndef detect_out_dir(root: Path) -&gt; Path:\n    root = root.resolve()\n    for prov in _PROVIDER_DIRS:\n        if (root / prov).is_dir():\n            return (root / prov).resolve()\n    return (root / &quot;.ai-control-center&quot;).resolve()\n\n\ndef _build_search(part: dict) -&gt; list[dict]:\n    records: list[dict] = []\n    for group in part[&quot;docs&quot;].values():\n        for doc in group:\n            # summary is already HTML-escaped by _escape_plain_text_fields;\n            # do NOT escape again or &amp; becomes &amp;amp;amp;.\n            records.append({&quot;id&quot;: doc[&quot;id&quot;], &quot;title&quot;: doc[&quot;title&quot;],\n                            &quot;path&quot;: doc[&quot;path&quot;], &quot;text&quot;: doc.get(&quot;summary&quot;, &quot;&quot;)})\n    records.sort(key=lambda r: (r[&quot;path&quot;], r[&quot;title&quot;]))\n    return records\n\n\ndef _escape_plain_text_fields(part: dict) -&gt; None:\n    &quot;&quot;&quot;HTML-escape plain-text summaries so raw tags never reach the data island.&quot;&quot;&quot;\n    for group in part[&quot;docs&quot;].values():\n        for doc in group:\n            if &quot;summary&quot; in doc:\n                doc[&quot;summary&quot;] = _html.escape(doc[&quot;summary&quot;])\n\n\ndef generate(root: Path, out_dir: Path | None = None) -&gt; Path:\n    root = root.resolve()\n    # Resolve out_dir early so we can exclude ONLY the generated dashboard.html\n    # from the scan. Provider-folder markdown (.claude/**, .codex/**, .cursor/**)\n    # must stay in the scan — it is the content this tool exists to surface.\n    # Excluding only the written file keeps source_digest stable across runs\n    # without dropping provider docs.\n    out_dir = out_dir.resolve() if out_dir else detect_out_dir(root)\n    dashboard = (out_dir / &quot;dashboard.html&quot;).resolve()\n\n    files = [f for f in scan_files(root) if f.resolve() != dashboard]\n    ctx = ScanContext(root=root, files=files)\n    adapter = GenericAdapter()\n    proot = adapter.detect(ctx)[0]\n    part = adapter.normalize(ctx, proot)\n    _escape_plain_text_fields(part)\n\n    out_dir.mkdir(parents=True, exist_ok=True)\n\n    data = {\n        &quot;schemaVersion&quot;: SCHEMA_VERSION,\n        &quot;generator&quot;: {&quot;name&quot;: &quot;ai-control-center&quot;, &quot;version&quot;: __version__, &quot;rendererDigest&quot;: &quot;&quot;},\n        &quot;source&quot;: {\n            &quot;repoName&quot;: root.name,\n            &quot;dashboardPath&quot;: (\n                dashboard.relative_to(root).as_posix()\n                if dashboard.is_relative_to(root)\n                else str(dashboard)\n            ),\n            &quot;sourceDigest&quot;: source_digest(files, root),\n            &quot;vcs&quot;: {&quot;kind&quot;: &quot;none&quot;},\n        },\n        &quot;providers&quot;: [{&quot;id&quot;: &quot;generic&quot;, &quot;displayName&quot;: &quot;Generic&quot;, &quot;root&quot;: &quot;.&quot;}],\n        &quot;project&quot;: part[&quot;project&quot;],\n        &quot;inventory&quot;: part[&quot;inventory&quot;],\n        &quot;docs&quot;: {**part[&quot;docs&quot;], &quot;references&quot;: part[&quot;docs&quot;][&quot;references&quot;]},\n        &quot;relationships&quot;: part[&quot;relationships&quot;],\n        &quot;search&quot;: _build_search(part),\n    }\n    validate(data)\n    dashboard.write_text(render_html(data), encoding=&quot;utf-8&quot;)\n    return dashboard<\/code><\/pre>\n<p>&gt; Note: the original draft of this task scanned the whole repo (re-ingesting the<\/p>\n<p>&gt; written <code>dashboard.html<\/code> and breaking determinism) and excluded the entire<\/p>\n<p>&gt; output directory (which dropped provider-folder docs). The version above is the<\/p>\n<p>&gt; corrected, shipped implementation: it excludes only the generated file,<\/p>\n<p>&gt; escapes plain-text summaries, and guards <code>relative_to<\/code> for external <code>--out<\/code>.<\/p>\n<ul><li>[ ] **Step 4: Write the CLI**<\/li><\/ul>\n<p><code>src/acc/cli.py<\/code>:<\/p>\n<pre><code>import argparse\nfrom pathlib import Path\nfrom .generate import generate\n\n\ndef main(argv: list[str] | None = None) -&gt; None:\n    parser = argparse.ArgumentParser(prog=&quot;acc&quot;, description=&quot;Generate the AI control center dashboard&quot;)\n    parser.add_argument(&quot;--root&quot;, default=&quot;.&quot;, help=&quot;repo root to scan&quot;)\n    parser.add_argument(&quot;--out&quot;, default=None, help=&quot;output directory (default: auto-detect provider folder)&quot;)\n    args = parser.parse_args(argv)\n    out_dir = Path(args.out) if args.out else None\n    dashboard = generate(Path(args.root), out_dir)\n    print(f&quot;wrote {dashboard}&quot;)\n\n\nif __name__ == &quot;__main__&quot;:\n    main()<\/code><\/pre>\n<ul><li>[ ] **Step 5: Run tests to verify they pass**<\/li><\/ul>\n<p>Run: <code>python -m pytest tests/test_generate.py -v<\/code><\/p>\n<p>Expected: PASS (6 passed)<\/p>\n<ul><li>[ ] **Step 6: Run the whole suite**<\/li><\/ul>\n<p>Run: <code>python -m pytest -v<\/code><\/p>\n<p>Expected: PASS (all tests green)<\/p>\n<ul><li>[ ] **Step 7: Smoke-test the CLI on this repo**<\/li><\/ul>\n<p>Run: <code>python -m acc.cli --root . --out /tmp/acc-demo &amp;&amp; open /tmp/acc-demo/dashboard.html<\/code><\/p>\n<p>Expected: prints <code>wrote /tmp/acc-demo/dashboard.html<\/code>; the file opens in a browser and lists the repo&#x27;s markdown docs and open TODOs.<\/p>\n<ul><li>[ ] **Step 8: Commit**<\/li><\/ul>\n<pre><code>git add src/acc/generate.py src/acc/cli.py tests/test_generate.py\ngit commit -m &quot;feat: generate pipeline and CLI with determinism/redaction/XSS tests&quot;<\/code><\/pre>\n<p>---<\/p>\n<h2>Self-review notes<\/h2>\n<ul><li>**Spec coverage (Phase 1 slice):** deterministic output (Task 5, 6, 10 determinism test), redaction-at-extraction (Task 2, integration in Task 10), sanitized render / no XSS (Task 4, render island neutralization in Task 9, integration in Task 10), one HTML under the provider folder with fallback (Task 10 <code>detect_out_dir<\/code>), <code>sourceDigest<\/code> freshness (Task 5, surfaced in Task 8 JS), non-git first-class (<code>vcs.kind: &quot;none&quot;<\/code> throughout), file exclusions (Task 3). Provider-specific inventory, search polish, relationships, and refresh tiers are intentionally Phase 2-4.<\/li><li>**Naming consistency:** <code>stable_id<\/code>, <code>rel_posix<\/code>, <code>redact_text<\/code>, <code>allowlist_config<\/code>, <code>scan_files<\/code>, <code>DEFAULT_EXCLUDES<\/code>, <code>render_markdown_safe<\/code>, <code>source_digest<\/code>, <code>SCHEMA_VERSION<\/code>, <code>canonical_json<\/code>, <code>validate<\/code>, <code>ScanContext<\/code>, <code>ProviderRoot<\/code>, <code>GenericAdapter<\/code>, <code>render_html<\/code>, <code>generate<\/code>, <code>detect_out_dir<\/code> are used identically across tasks.<\/li><li>**No placeholders:** every code step contains complete, runnable code.<\/li><\/ul>\n<h2>What Phase 1 deliberately leaves for later<\/h2>\n<p>Provider adapters (Phase 2), the full layout-B renderer with bento Overview and relationship map (Phase 3), and the three-tier refresh plus skill/plugin packaging (Phase 4). Each gets its own plan that builds on this core.<\/p>","id":"bb144c1da7b5","path":"docs/superpowers/plans/2026-05-29-ai-control-center-phase-1-core.md","summary":"**Goal:** Build the deterministic extraction core and a generic-fallback adapter that stamps one self-contained, redacted, byte-stable `dashboard.html` for any repo.","title":"AI Control Center — Phase 1 (deterministic core + generic dashboard) Implementation Plan"},{"html":"<h1>AI Control Center — Phase 2 (first-class provider adapters) Implementation Plan<\/h1>\n<p>&gt; **For agentic workers:** REQUIRED SUB-SKILL: Use superpowers:subagent-driven-development (recommended) or superpowers:executing-plans to implement this plan task-by-task. Steps use checkbox (<code>- [ ]<\/code>) syntax for tracking.<\/p>\n<p>**Goal:** Add first-class Claude Code, Codex, and Cursor adapters that map native conventions into the superset schema, activate the allowlist redaction tier for structured config, and merge every detected provider into one dashboard via the owner rule.<\/p>\n<p>**Architecture:** Two new stdlib helpers (<code>frontmatter.py<\/code>, <code>config.py<\/code>) feed three thin per-provider adapters. <code>generate.py<\/code> detects all providers, each first-class adapter claims its provider folder, the generic adapter indexes the unclaimed markdown, and the partials merge into one deterministic dashboard. A <code>validate()<\/code> tripwire re-scans the serialized output for surviving secrets. Phase 2 is data-only; the renderer is unchanged (Phase 3).<\/p>\n<p>**Tech Stack:** Python 3.12 (stdlib only at runtime — <code>tomllib<\/code>, <code>json<\/code>, <code>re<\/code>, <code>html<\/code>), pytest (dev only).<\/p>\n<p>This is Phase 2 of 4. Spec: <code>docs/superpowers/specs/2026-05-29-ai-control-center-phase-2-adapters-design.md<\/code>. Builds on Phase 1 (merged). Phase 3 (renderer) and Phase 4 (refresh + packaging) get their own plans.<\/p>\n<p>---<\/p>\n<h2>File structure<\/h2>\n<pre><code>src/acc/\n  frontmatter.py          # NEW  parse_frontmatter()\n  config.py               # NEW  load_json(), load_toml(), MCP_ALLOWED, safe_mcp()\n  adapters/\n    base.py               # MODIFY  add make_item(), empty_inventory(), empty_docs()\n    claude.py             # NEW  ClaudeAdapter\n    codex.py              # NEW  CodexAdapter\n    cursor.py             # NEW  CursorAdapter\n    generic.py            # unchanged\n  schema.py               # MODIFY  add assert_no_secrets(); validate() calls it\n  generate.py             # MODIFY  detect-all + file-claiming merge + resolve_owner + providers\n  cli.py                  # MODIFY  add --owner; handle OwnerAmbiguousError\ntests/\n  builders.py             # NEW  make_&lt;provider&gt;_repo() helpers\n  test_builders.py        # NEW  smoke test for builders\n  test_frontmatter.py     # NEW\n  test_config.py          # NEW\n  test_adapter_base.py    # NEW\n  test_claude_adapter.py  # NEW\n  test_codex_adapter.py   # NEW\n  test_cursor_adapter.py  # NEW\n  test_owner_rule.py      # NEW\n  test_schema.py          # MODIFY  assert_no_secrets cases\n  test_generate.py        # MODIFY  multi-provider merge, determinism, no-double-list, tripwire<\/code><\/pre>\n<p>Each adapter depends on <code>ids<\/code>, <code>redaction<\/code>, <code>markdown<\/code>, <code>frontmatter<\/code>, <code>config<\/code>, and <code>adapters.base<\/code> — never on another adapter. <code>generate.py<\/code> is the only module that wires adapters together.<\/p>\n<p>**Item shape (inventory):** <code>{id, provider, type, typeLabel, title, path, summary}<\/code>.<\/p>\n<p>**Doc shape (docs buckets):** <code>{id, title, path, summary, html}<\/code> (same as Phase 1 generic docs).<\/p>\n<p>**ProviderSummary:** <code>{id, displayName, root, detected}<\/code> (+ optional <code>config<\/code> facts for Codex).<\/p>\n<p>---<\/p>\n<h2>Task 1: Frontmatter parser<\/h2>\n<p>**Files:**<\/p>\n<ul><li>Create: <code>src/acc/frontmatter.py<\/code><\/li><li>Test: <code>tests/test_frontmatter.py<\/code><\/li><\/ul>\n<ul><li>[ ] **Step 1: Write the failing test**<\/li><\/ul>\n<p><code>tests/test_frontmatter.py<\/code>:<\/p>\n<pre><code>from acc.frontmatter import parse_frontmatter\n\n\ndef test_no_fence_returns_empty_fields_and_full_body():\n    fields, body = parse_frontmatter(&quot;# Title\\n\\nbody text&quot;)\n    assert fields == {}\n    assert body == &quot;# Title\\n\\nbody text&quot;\n\n\ndef test_parses_simple_keys_and_body():\n    text = &quot;---\\nname: reviewer\\ndescription: Reviews code\\n---\\n\\n# Reviewer\\n\\nbody&quot;\n    fields, body = parse_frontmatter(text)\n    assert fields[&quot;name&quot;] == &quot;reviewer&quot;\n    assert fields[&quot;description&quot;] == &quot;Reviews code&quot;\n    assert body == &quot;\\n# Reviewer\\n\\nbody&quot;\n\n\ndef test_strips_quotes_and_parses_booleans():\n    text = &#x27;---\\ndescription: &quot;Quoted value&quot;\\nalwaysApply: true\\ndraft: false\\n---\\nx&#x27;\n    fields, _ = parse_frontmatter(text)\n    assert fields[&quot;description&quot;] == &quot;Quoted value&quot;\n    assert fields[&quot;alwaysApply&quot;] is True\n    assert fields[&quot;draft&quot;] is False\n\n\ndef test_parses_inline_list():\n    fields, _ = parse_frontmatter(&#x27;---\\ntools: [Read, Grep, Bash]\\n---\\nx&#x27;)\n    assert fields[&quot;tools&quot;] == [&quot;Read&quot;, &quot;Grep&quot;, &quot;Bash&quot;]\n\n\ndef test_parses_block_list():\n    text = &quot;---\\ntools:\\n  - Read\\n  - Grep\\n---\\nx&quot;\n    fields, _ = parse_frontmatter(text)\n    assert fields[&quot;tools&quot;] == [&quot;Read&quot;, &quot;Grep&quot;]\n\n\ndef test_unclosed_fence_is_not_treated_as_frontmatter():\n    text = &quot;---\\nname: x\\nno closing fence here&quot;\n    fields, body = parse_frontmatter(text)\n    assert fields == {}\n    assert body == text\n\n\ndef test_malformed_lines_are_skipped_not_raised():\n    text = &quot;---\\nname: ok\\n:::garbage:::\\nmodel: opus\\n---\\nx&quot;\n    fields, _ = parse_frontmatter(text)\n    assert fields[&quot;name&quot;] == &quot;ok&quot;\n    assert fields[&quot;model&quot;] == &quot;opus&quot;\n    assert &quot;:::garbage:::&quot; not in fields<\/code><\/pre>\n<ul><li>[ ] **Step 2: Run test to verify it fails**<\/li><\/ul>\n<p>Run: <code>python -m pytest tests/test_frontmatter.py -v<\/code><\/p>\n<p>Expected: FAIL with <code>ModuleNotFoundError: No module named &#x27;acc.frontmatter&#x27;<\/code><\/p>\n<ul><li>[ ] **Step 3: Write minimal implementation**<\/li><\/ul>\n<p><code>src/acc/frontmatter.py<\/code>:<\/p>\n<pre><code>import re\n\n_KEY = re.compile(r&quot;([A-Za-z0-9_-]+):\\s*(.*)$&quot;)\n_BLOCK_ITEM = re.compile(r&quot;\\s*-\\s+(.*)$&quot;)\n\n\ndef _scalar(s: str):\n    s = s.strip()\n    if len(s) &gt;= 2 and s[0] == s[-1] and s[0] in &quot;\\&quot;&#x27;&quot;:\n        return s[1:-1]\n    if s == &quot;true&quot;:\n        return True\n    if s == &quot;false&quot;:\n        return False\n    return s\n\n\ndef _parse_block(lines: list[str]) -&gt; dict:\n    fields: dict = {}\n    key: str | None = None\n    for line in lines:\n        if not line.strip():\n            continue\n        item = _BLOCK_ITEM.match(line)\n        if item and key is not None and isinstance(fields.get(key), list):\n            fields[key].append(_scalar(item.group(1)))\n            continue\n        m = _KEY.match(line)\n        if not m:\n            # unparseable line — skip, never raise\n            continue\n        key = m.group(1)\n        val = m.group(2).strip()\n        if val == &quot;&quot;:\n            fields[key] = []          # may be filled by a following block list\n        elif val.startswith(&quot;[&quot;) and val.endswith(&quot;]&quot;):\n            inner = val[1:-1].strip()\n            fields[key] = [_scalar(x) for x in inner.split(&quot;,&quot;)] if inner else []\n        else:\n            fields[key] = _scalar(val)\n    return fields\n\n\ndef parse_frontmatter(text: str) -&gt; tuple[dict, str]:\n    &quot;&quot;&quot;Parse a leading --- fenced frontmatter block. Returns (fields, body).\n\n    Handles the shallow YAML subset real Claude/Cursor artifacts use:\n    key: value, quoted strings, inline [a, b] and block (- item) lists, booleans.\n    No nested maps. Unparseable lines are skipped. No fence -&gt; ({}, text).\n    &quot;&quot;&quot;\n    lines = text.splitlines()\n    if not lines or lines[0].strip() != &quot;---&quot;:\n        return {}, text\n    end = None\n    for i in range(1, len(lines)):\n        if lines[i].strip() == &quot;---&quot;:\n            end = i\n            break\n    if end is None:\n        return {}, text\n    return _parse_block(lines[1:end]), &quot;\\n&quot;.join(lines[end + 1:])<\/code><\/pre>\n<ul><li>[ ] **Step 4: Run test to verify it passes**<\/li><\/ul>\n<p>Run: <code>python -m pytest tests/test_frontmatter.py -v<\/code><\/p>\n<p>Expected: PASS (7 passed)<\/p>\n<ul><li>[ ] **Step 5: Commit**<\/li><\/ul>\n<pre><code>git add src/acc/frontmatter.py tests/test_frontmatter.py\ngit commit -m &quot;feat: stdlib frontmatter parser for provider artifacts&quot;<\/code><\/pre>\n<p>---<\/p>\n<h2>Task 2: Safe config loaders and MCP allowlist<\/h2>\n<p>**Files:**<\/p>\n<ul><li>Create: <code>src/acc/config.py<\/code><\/li><li>Test: <code>tests/test_config.py<\/code><\/li><\/ul>\n<ul><li>[ ] **Step 1: Write the failing test**<\/li><\/ul>\n<p><code>tests/test_config.py<\/code>:<\/p>\n<pre><code>import json\nfrom acc.config import load_json, load_toml, safe_mcp, MCP_ALLOWED\n\n\ndef test_load_json_reads_object(tmp_path):\n    p = tmp_path / &quot;x.json&quot;\n    p.write_text(json.dumps({&quot;a&quot;: 1}))\n    assert load_json(p) == {&quot;a&quot;: 1}\n\n\ndef test_load_json_returns_empty_on_missing(tmp_path):\n    assert load_json(tmp_path / &quot;nope.json&quot;) == {}\n\n\ndef test_load_json_returns_empty_on_malformed(tmp_path):\n    p = tmp_path / &quot;bad.json&quot;\n    p.write_text(&quot;{ not valid json&quot;)\n    assert load_json(p) == {}\n\n\ndef test_load_toml_reads_tables(tmp_path):\n    p = tmp_path / &quot;config.toml&quot;\n    p.write_text(&#x27;model = &quot;gpt-5.5&quot;\\n[mcp_servers.ctx]\\ncommand = &quot;npx&quot;\\n&#x27;)\n    data = load_toml(p)\n    assert data[&quot;model&quot;] == &quot;gpt-5.5&quot;\n    assert data[&quot;mcp_servers&quot;][&quot;ctx&quot;][&quot;command&quot;] == &quot;npx&quot;\n\n\ndef test_load_toml_returns_empty_on_malformed(tmp_path):\n    p = tmp_path / &quot;bad.toml&quot;\n    p.write_text(&quot;this is = not [valid toml&quot;)\n    assert load_toml(p) == {}\n\n\ndef test_safe_mcp_keeps_allowlisted_drops_env():\n    server = {&quot;command&quot;: &quot;npx&quot;, &quot;args&quot;: [&quot;-y&quot;, &quot;pg-mcp&quot;],\n              &quot;type&quot;: &quot;stdio&quot;, &quot;url&quot;: &quot;https://h&quot;,\n              &quot;env&quot;: {&quot;PG[redacted]}, &quot;headers&quot;: {&quot;X&quot;: &quot;y&quot;}}\n    clean = safe_mcp(server)\n    assert set(clean.keys()) &lt;= MCP_ALLOWED\n    assert &quot;env&quot; not in clean and &quot;headers&quot; not in clean\n    assert &quot;s3cr3tpassword&quot; not in str(clean)\n    assert clean[&quot;command&quot;] == &quot;npx&quot;\n\n\ndef test_safe_mcp_redacts_credential_url():\n    clean = safe_mcp({&quot;url&quot;: &quot;[redacted]\n    assert &quot;p4ssw0rd&quot; not in str(clean)<\/code><\/pre>\n<ul><li>[ ] **Step 2: Run test to verify it fails**<\/li><\/ul>\n<p>Run: <code>python -m pytest tests/test_config.py -v<\/code><\/p>\n<p>Expected: FAIL with <code>ModuleNotFoundError: No module named &#x27;acc.config&#x27;<\/code><\/p>\n<ul><li>[ ] **Step 3: Write minimal implementation**<\/li><\/ul>\n<p><code>src/acc/config.py<\/code>:<\/p>\n<pre><code>import json\nimport tomllib\nfrom pathlib import Path\n\nfrom .redaction import allowlist_config\n\n# MCP server config keys that are safe to surface. `type` is the transport\n# (stdio/http/sse); `url` is redacted for embedded credentials. Everything\n# else (env, headers, tokens, ...) is dropped — this tier fails closed.\nMCP_ALLOWED = {&quot;command&quot;, &quot;args&quot;, &quot;type&quot;, &quot;url&quot;}\n\n\ndef load_json(path: Path) -&gt; dict:\n    try:\n        data = json.loads(path.read_text(encoding=&quot;utf-8&quot;))\n    except (OSError, ValueError):\n        return {}\n    return data if isinstance(data, dict) else {}\n\n\ndef load_toml(path: Path) -&gt; dict:\n    try:\n        with path.open(&quot;rb&quot;) as f:\n            return tomllib.load(f)\n    except (OSError, tomllib.TOMLDecodeError):\n        return {}\n\n\ndef safe_mcp(server: dict) -&gt; dict:\n    &quot;&quot;&quot;Allowlist a single MCP server confi b import Path\n\nfrom .base import ScanContext, ProviderRoot, make_item, empty_inventory, empty_docs\nfrom ..ids import rel_posix\nfrom ..redaction import redact_text\nfrom ..markdown import render_markdown_safe\nfrom ..frontmatter import parse_frontmatter\nfrom ..config import load_json, safe_mcp\nfrom .generic import _first_heading, _first_paragraph\n\n\ndef _title(fields: dict, fallback: str) -&gt; str:\n    name = fields.get(&quot;name&quot;)\n    return name if isinstance(name, str) and name else fallback\n\n\ndef _desc(fields: dict) -&gt; str:\n    d = fields.get(&quot;description&quot;, &quot;&quot;)\n    return redact_text(d)[0] if isinstance(d, str) else &quot;&quot;\n\n\nclass ClaudeAdapter:\n    id = &quot;claude&quot;\n    display_name = &quot;Claude Code&quot;\n\n    def detect(self, ctx: ScanContext) -&gt; list[ProviderRoot]:\n        root = ctx.root\n        if (root / &quot;.claude&quot;).is_dir() or (root / &quot;CLAUDE.md&quot;).is_file():\n            base = root / &quot;.claude&quot; if (root / &quot;.claude&quot;).is_dir() else root\n            return [ProviderRoot(provider=&quot;claude&quot;, path=base)]\n        return []\n\n    def normalize(self, ctx: ScanContext, root: ProviderRoot) -&gt; dict:\n        inv = empty_inventory()\n        docs = empty_docs()\n\n        for p in ctx.files:\n            rel = rel_posix(p, ctx.root)\n            try:\n                raw = p.read_text(encoding=&quot;utf-8&quot;, errors=&quot;replace&quot;)\n            except OSError:\n                continue\n            stem = p.stem\n\n            if rel.startswith(&quot;.claude/agents/&quot;) and rel.endswith(&quot;.md&quot;):\n                fields, _ = parse_frontmatter(raw)\n                inv[&quot;agents&quot;].append(make_item(\n                    &quot;claude&quot;, &quot;agent&quot;, &quot;Claude agent&quot;,\n                    _title(fields, stem), rel, _desc(fields)))\n            elif rel.startswith(&quot;.claude/commands/&quot;) and rel.endswith(&quot;.md&quot;):\n                fields, _ = parse_frontmatter(raw)\n                inv[&quot;commands&quot;].append(make_item(\n                    &quot;claude&quot;, &quot;command&quot;, &quot;Claude command&quot;,\n                    _title(fields, stem), rel, _desc(fields)))\n            elif rel.startswith(&quot;.claude/skills/&quot;) and rel.endswith(&quot;/SKILL.md&quot;):\n                fields, _ = parse_frontmatter(raw)\n                name = _title(fields, Path(rel).parent.name)\n                inv[&quot;skills&quot;].append(make_item(\n                    &quot;claude&quot;, &quot;skill&quot;, &quot;Claude skill&quot;, name, rel, _desc(fields)))\n            elif rel == &quot;CLAUDE.md&quot; or (rel.startswith(&quot;.claude/&quot;) and rel.endswith(&quot;/CLAUDE.md&quot;)):\n                clean, _ = redact_text(raw)\n                heading = _first_heading(clean) or rel\n                docs[&quot;references&quot;].append({\n                    &quot;id&quot;: make_item(&quot;claude&quot;, &quot;doc&quot;, &quot;Claude instructions&quot;, heading, rel, &quot;&quot;)[&quot;id&quot;],\n                    &quot;title&quot;: heading,\n                    &quot;path&quot;: rel,\n                    &quot;summary&quot;: _first_paragraph(clean),\n                    &quot;html&quot;: render_markdown_safe(clean),\n                })\n\n        inv[&quot;hooks&quot;].extend(self._hooks(ctx.root))\n        inv[&quot;mcpServers&quot;].extend(self._mcp(ctx.root))\n\n        return {\n            &quot;provider&quot;: {&quot;id&quot;: self.id, &quot;displayName&quot;: self.display_name,\n                         &quot;root&quot;: rel_posix(root.path, ctx.root) if root.path != ctx.root else &quot;.&quot;,\n                         &quot;detected&quot;: True},\n            &quot;inventory&quot;: inv,\n            &quot;docs&quot;: docs,\n        }\n\n    # Reuses generic&#x27;s prose helpers (_first_heading/_first_paragraph) to derive\n    # the heading/summary for CLAUDE.md. No import cycle: generic imports only\n    # base/ids/redaction/markdown, none of which import this adapter.\n    def _hooks(self, root: Path) -&gt; list[dict]:\n        settings = load_json(root / &quot;.claude&quot; / &quot;settings.json&quot;)\n        out: list[dict] = []\n        for event, entries in (settings.get(&quot;hooks&quot;) or {}).items():\n            for entry in entries if isinstance(entries, list) else []:\n                matcher = entry.get(&quot;matcher&quot;, &quot;&quot;)\n                for h in entry.get(&quot;hooks&quot;, []):\n                    cmd = redact_text(str(h.get(&quot;command&quot;, &quot;&quot;)))[0]\n                    title = f&quot;{event} ({matcher})&quot; if matcher else event\n                    out.append(make_item(\n                        &quot;claude&quot;, &quot;hook&quot;, &quot;Claude hook&quot;, title,\n                        &quot;.claude/settings.json&quot;, cmd))\n        return out\n\n    def _mcp(self, root: Path) -&gt; list[dict]:\n        merged: dict[str, tuple[str, dict]] = {}\n        # settings.json first, then .mcp.json overrides on name conflict\n        for rel in (&quot;.claude/settings.json&quot;, &quot;.mcp.json&quot;):\n            path = root / rel\n            servers = load_json(path).get(&quot;mcpServers&quot;) or {}\n            for name, cfg in servers.items():\n                merged[name] = (rel, cfg if isinstance(cfg, dict) else {})\n        out: list[dict] = []\n        for name, (rel, cfg) in merged.items():\n            clean = safe_mcp(cfg)\n            summary = clean.get(&quot;command&quot;) or clean.get(&quot;url&quot;) or &quot;&quot;\n            item = make_item(&quot;claude&quot;, &quot;mcpServer&quot;, &quot;MCP server&quot;, name, rel, summary)\n            item[&quot;config&quot;] = clean\n            out.append(item)\n        return out<\/code><\/pre>\n<p>&gt; Note: the <code>from ..adapters.generic import _first_heading, _first_paragraph<\/ rvived into output&quot;)\n\n\ndef validate(data: dict) -&gt; None:\n    missing = _REQUIRED_TOP - data.keys()\n    if missing:\n        raise ValueError(f&quot;missing required keys: {sorted(missing)}&quot;)\n    if data[&quot;schemaVersion&quot;] != SCHEMA_VERSION:\n        raise ValueError(f&quot;unexpected schemaVersion: {data[&#x27;schemaVersion&#x27;]!r}&quot;)\n    assert_no_secrets(data)<\/code><\/pre>\n<ul><li>[ ] **Step 4: Run test to verify it passes**<\/li><\/ul>\n<p>Run: <code>python -m pytest tests/test_schema.py -v<\/code><\/p>\n<p>Expected: PASS (6 passed)<\/p>\n<ul><li>[ ] **Step 5: Commit**<\/li><\/ul>\n<pre><code>git add src/acc/schema.py tests/test_schema.py\ngit commit -m &quot;feat: assert_no_secrets tripwire in schema validate&quot;<\/code><\/pre>\n<p>---<\/p>\n<h2>Task 9: Owner rule and provider detection<\/h2>\n<p>**Files:**<\/p>\n<ul><li>Modify: <code>src/acc/generate.py<\/code><\/li><li>Test: <code>tests/test_owner_rule.py<\/code><\/li><\/ul>\n<p>This task adds detection + the owner rule to <code>generate.py<\/code> without yet wiring the merge (Task 10). <code>detect_out_dir<\/code> is preserved as a delegating wrapper so Phase 1 tests stay green.<\/p>\n<ul><li>[ ] **Step 1: Write the failing test**<\/li><\/ul>\n<p><code>tests/test_owner_rule.py<\/code>:<\/p>\n<pre><code>import pytest\nfrom acc.generate import resolve_owner, detect_providers, OwnerAmbiguousError\nfrom tests.builders import make_claude_repo, make_codex_repo, make_multi_provider_repo\n\n\ndef test_detect_providers_lists_present(tmp_path):\n    make_multi_provider_repo(tmp_path)\n    assert detect_providers(tmp_path) == [&quot;claude&quot;, &quot;codex&quot;, &quot;cursor&quot;]\n\n\ndef test_detect_providers_empty_on_brownfield(tmp_path):\n    (tmp_path / &quot;README.md&quot;).write_text(&quot;# x&quot;)\n    assert detect_providers(tmp_path) == []\n\n\ndef test_owner_none_existing_uses_precedence(tmp_path):\n    make_multi_provider_repo(tmp_path)\n    out = resolve_owner( p of <code>generate.py<\/code>, after the existing imports and <code>_PROVIDER_DIRS<\/code>:<\/p>\n<pre><code>_PROVIDER_MARKERS = {&quot;claude&quot;: &quot;CLAUDE.md&quot;, &quot;codex&quot;: &quot;AGENTS.md&quot;, &quot;cursor&quot;: &quot;.cursorrules&quot;}\n_PROVIDER_DIR_BY_ID = {&quot;claude&quot;: &quot;.claude&quot;, &quot;codex&quot;: &quot;.codex&quot;, &quot;cursor&quot;: &quot;.cursor&quot;}\n_PRECEDENCE = (&quot;claude&quot;, &quot;codex&quot;, &quot;cursor&quot;)\n_KNOWN_OWNER_DIRS = (&quot;.claude&quot;, &quot;.codex&quot;, &quot;.cursor&quot;, &quot;.ai-control-center&quot;)\n\n\nclass OwnerAmbiguousError(Exception):\n    pass\n\n\ndef detect_providers(root: Path) -&gt; list[str]:\n    root = root.resolve()\n    out: list[str] = []\n    for pid in _PRECEDENCE:\n        if (root / _PROVIDER_DIR_BY_ID[pid]).is_dir() or (root / _PROVIDER_MARKERS[pid]).is_file():\n            out.append(pid)\n    return out\n\n\ndef _existing_dashboards(root: Path) -&gt; list[Path]:\n    return [root / d / &quot;dashboard.html&quot; for d in _KNOWN_OWNER_DIRS\n            if (root / d / &quot;dashboard.html&quot;).is_file()]\n\n\ndef resolve_owner(root: Path, detected_ids: list[str], owner_override: str | None = None) -&gt; Path:\n    root = root.resolve()\n    if owner_override:\n        return (root / owner_override).resolve()\n    existing = _existing_dashboards(root)\n    if len(existing) == 1:\n        return existing[0].parent.resolve()\n    if len(existing) &gt;= 2:\n        names = &quot;, &quot;.join(d.parent.relative_to(root).as_posix() for d in existing)\n        raise OwnerAmbiguousError(\n            f&quot;multiple dashboards found ({names}); pick one with --owner &lt;dir&gt;&quot;)\n    for pid in _PRECEDENCE:\n        if pid in detected_ids:\n            return (root / _PROVIDER_DIR_BY_ID[pid]).resolve()\n    return (root / &quot;.ai-control-center&quot;).resolve()<\/code><\/pre>\n<p>Then replace the existing <code>detect_out_dir<\/code> with a delegating tory&quot;][&quot;agents&quot;])\n    assert any(r[&quot;typeLabel&quot;] == &quot;Cursor rule&quot; for r in data[&quot;inventory&quot;][&quot;rules&quot;])\n    assert data[&quot;inventory&quot;][&quot;mcpServers&quot;], &quot;expected merged mcp servers&quot;\n\n\ndef test_generate_owner_is_dot_claude_for_multi(tmp_path):\n    make_multi_provider_repo(tmp_path)\n    out = generate(tmp_path)\n    assert out.resolve() == (tmp_path / &quot;.claude&quot; / &quot;dashboard.html&quot;).resolve()\n\n\ndef test_generate_multi_provider_is_deterministic(tmp_path):\n    make_multi_provider_repo(tmp_path)\n    first = generate(tmp_path).read_text(encoding=&quot;utf-8&quot;)\n    second = generate(tmp_path).read_text(encoding=&quot;utf-8&quot;)\n    assert first == second\n\n\ndef test_generic_does_not_double_list_provider_files(tmp_path):\n    make_multi_provider_repo(tmp_path)\n    data = _island(generate(tmp_path))\n    ref_paths = [d[&quot;path&quot;] for d in data[&quot;docs&quot;][&quot;references&quot;]]\n    # provider files appear via their adapters, never duplicated by generic\n    assert ref_paths == sorted(set(ref_paths))\n    # the loose doc is indexed; the agent file is NOT a generic reference\n    assert &quot;docs/notes.md&quot; in ref_paths\n    assert &quot;.claude/agents/reviewer.md&quot; not in ref_paths\n\n\ndef test_generate_drops_mcp_env_secret(tmp_path):\n    make_claude_repo(tmp_path)\n    out = generate(tmp_path)\n    assert &quot;s3cr3tpassword&quot; not in out.read_text(encoding=&quot;utf-8&quot;)\n\n\ndef test_generate_tripwire_blocks_unredacted_leak(tmp_path):\n    # an agent whose frontmatter description carries a token shape\n    make_claude_repo(tmp_path, with_secret=True)\n    out = generate(tmp_path)\n    # the description is redacted, so the token never reaches the file\n    assert &quot;[redacted]&quot; not in out.read_text(encoding=&quot;utf-8&quot;)<\/code><\/pre>\n<ul><li>[ ] **Step 2: Run test to verify it fails**<\/li><\/ul>\n<p>Run: <code>python -m pytest tests/test_generate.py -v<\/code><\/p>\n<p>Expected: FAIL — <code>generate<\/code> still runs the generic-only Phase 1 pipeline, so <code>test_generate_merges_all_providers<\/code> fails on missing providers/inventory.<\/p>\n<ul><li>[ ] **Step 3: Rewrite the pipeline body of <code>src/acc/generate.py<\/code>**<\/li><\/ul>\n<p>Add imports at the top (alongside the existing ones):<\/p>\n<pre><code>from .adapters.claude import ClaudeAdapter\nfrom .adapters.codex import CodexAdapter\nfrom .adapters.cursor import CursorAdapter<\/code><\/pre>\n<p>Add the claiming rule and merge helpers (after the owner-rule code from Task 9):<\/p>\n<pre><code>_FIRST_CLASS = (ClaudeAdapter, CodexAdapter, CursorAdapter)\n_CLAIM_DIRS = (&quot;.claude&quot;, &quot;.codex&quot;, &quot;.cursor&quot;)\n_CLAIM_MARKERS = (&quot;CLAUDE.md&quot;, &quot;AGENTS.md&quot;, &quot;.cursorrules&quot;)\n\n\ndef _claimed_by_provider(rel: str) -&gt; bool:\n    top = rel.split(&quot;/&quot;, 1)[0]\n    return top in _CLAIM_DIRS or rel in _CLAIM_MARKERS\n\n\ndef _merge_parts(parts: list[dict]) -&gt; tuple[dict, dict]:\n    inv = empty_inventory()\n    docs = empty_docs()\n    for part in parts:\n        for k, items in part.get(&quot;inventory&quot;, {}).items():\n            inv.setdefault(k, []).extend(items)\n        for k, items in part.get(&quot;docs&quot;, {}).items():\n            docs.setdefault(k, []).extend(items)\n    for bucket in (inv, docs):\n        for k in bucket:\n            bucket[k].sort(key=lambda x: (x[&quot;path&quot;], x[&quot;title&quot;], x[&quot;id&quot;]))\n    return inv, docs\n\n\ndef _build_search(inv: dict, docs: dict) -&gt; list[dict]:\n    records: list[dict] = []\n    for bucket in (docs, inv):\n        for items in bucket.values():\n            for it in items:\n                records.append({&quot;id&quot;: it[&quot;id&quot;], &quot;title&quot;: it[&quot;title&quot;],\n                                &quot;path&quot;: it[&quot;path&quot;], &quot;text&quot;: it.get(&quot;summary&quot;, &quot;&quot;)})\n    records.sort(key=lambda r: (r[&quot;path&quot;], r[&quot;title&quot;], r[&quot;id&quot;]))\n    return records\n\n\ndef _escape_summaries(inv: dict, docs: dict) -&gt; None:\n    for bucket in (inv, docs):\n        for items in bucket.values():\n            for it in items:\n                if &quot;summary&quot; in it:\n                    it[&quot;summary&quot;] = _html.escape(it[&quot;summary&quot;])<\/code><\/pre>\n<p>Update the imports from <code>adapters.base<\/code> so <code>empty_inventory<\/code>/<code>empty_docs<\/code> are available:<\/p>\n<pre><code>from .adapters.base import ScanContext, empty_inventory, empty_docs<\/code><\/pre>\n<p>Replace the <code>generate<\/code> function body with:<\/p>\n<pre><code>def generate(root: Path, out_dir: Path | None = None, owner: str | None = None) -&gt; Path:\n    root = root.resolve()\n    all_files = scan_files(root)\n\n    detected_ids = detect_providers(root)\n    out_dir = out_dir.resolve() if out_dir else resolve_owner(root, detected_ids, owner)\n    dashboard = (out_dir / &quot;dashboard.html&quot;).resolve()\n\n    files = [f for f in all_files if f.resolve() != dashboard]\n    ctx = ScanContext(root=root, files=files)\n\n    parts: list[dict] = []\n    provider_summaries: list[dict] = []\n    for adapter_cls in _FIRST_CLASS:\n        adapter = adapter_cls()\n        roots = adapter.detect(ctx)\n        if not roots:\n            continue\n        part = adapter.normalize(ctx, roots[0])\n        parts.append(part)\n        provider_summaries.append(part[&quot;provider&quot;])\n\n    # generic indexes only the markdown not claimed by a provider folder/marker\n    unclaimed = [f for f in files if not _claimed_by_provider(rel_posix(f, root))]\n    gctx = ScanContext(root=root, files=unclaimed)\n    gadapter = GenericAdapter()\n    gpart = gadapter.normalize(gctx, gadapter.detect(gctx)[0])\n    parts.append(gpart)\n    provider_summaries.append({&quot;id&quot;: &quot;generic&quot;, &quot;displayName&quot;: &quot;Generic&quot;,\n                               &quot;root&quot;: &quot;.&quot;, &quot;detected&quot;: True})\n\n    inv, docs = _merge_parts(parts)\n    _escape_summaries(inv, docs)        # escape plain-text summaries for the island\n    search = _build_search(inv, docs)   # search reads escaped summaries (Phase 1 contract)\n\n    out_dir.mkdir(parents=True, exist_ok=True)\n\n    data = {\n        &quot;schemaVersion&quot;: SCHEMA_VERSION,\n        &quot;generator&quot;: {&quot;name&quot;: &quot;ai-control-center&quot;, &quot;version&quot;: __version__, &quot;rendererDigest&quot;: &quot;&quot;},\n        &quot;source&quot;: {\n            &quot;repoName&quot;: root.name,\n            &quot;dashboardPath&quot;: (\n                dashboard.relative_to(root).as_posix()\n                if dashboard.is_relative_to(root) else str(dashboard)\n            ),\n            &quot;sourceDigest&quot;: source_digest(files, root),\n            &quot;vcs&quot;: {&quot;kind&quot;: &quot;none&quot;},\n        },\n        &quot;providers&quot;: provider_summaries,\n        &quot;project&quot;: gpart[&quot;project&quot;],\n        &quot;inventory&quot;: inv,\n        &quot;docs&quot;: docs,\n        &quot;relationships&quot;: [],\n        &quot;search&quot;: search,\n    }\n    validate(data)\n    dashboard.write_text(render_html(data), encoding=&quot;utf-8&quot;)\n    return dashboard<\/code><\/pre>\n<p>Add the <code>rel_posix<\/code> import at the top (used by <code>_claimed_by_provider<\/code>):<\/p>\n<pre><code>from .ids import rel_posix<\/code><\/pre>\n<p>Remove the now-unused <code>_escape_plain_text_fields<\/code> and the old <code>_build_search(part)<\/code> (single-arg) definitions; the new <code>_build_search(inv, docs)<\/code> and <code>_escape_summaries<\/code> replace them.<\/p>\n<p>&gt; Note: summaries are HTML-escaped before the search index is built, so no raw markup (e.g. <code>&lt;img onerror=...&gt;<\/code>) reaches the data island via <code>search[].text<\/code>. This preserves Phase 1&#x27;s XSS guarantee (<code>test_generate_escapes_hostile_markdown<\/code>). The cosmetic &quot;<code>search[].text<\/code> holds escaped entities&quot; item stays deferred — <code>app.js<\/code> never reads <code>data.search<\/code>.<\/p>\n<ul><li>[ ] **Step 4: Run tests to verify they pass**<\/li><\/ul>\n<p>Run: <code>python -m pytest tests/test_generate.py -v<\/code><\/p>\n<p>Expected: PASS (all existing Phase 1 tests + the new multi-provider tests)<\/p>\n<ul><li>[ ] **Step 5: Run the whole suite**<\/li><\/ul>\n<p>Run: <code>python -m pytest -q<\/code><\/p>\n<p>Expected: PASS (all green)<\/p>\n<ul><li>[ ] **Step 6: Commit**<\/li><\/ul>\n<pre><code>git add src/acc/generate.py tests/test_generate.py\ngit commit -m &quot;feat: multi-provider detect/claim/merge in generate pipeline&quot;<\/code><\/pre>\n<p>---<\/p>\n<h2>Task 11: CLI <code>--owner<\/code>, ambiguity handling, and final verification<\/h2>\n<p>**Files:**<\/p>\n<ul><li>Modify: <code>src/acc/cli.py<\/code><\/li><li>Test: covered by <code>tests/test_owner_rule.py<\/code> (resolve_owner) and a CLI smoke run<\/li><\/ul>\n<ul><li>[ ] **Step 1: Modify <code>src/acc/cli.py<\/code>**<\/li><\/ul>\n<p>Replace the file with:<\/p>\n<pre><code>import argparse\nimport sys\nfrom pathlib import Path\n\nfrom .generate import generate, OwnerAmbiguousError\n\n\ndef main(argv: list[str] | None = None) -&gt; int:\n    parser = argparse.ArgumentParser(prog=&quot;acc&quot;, description=&quot;Generate the AI control center dashboard&quot;)\n    parser.add_argument(&quot;--root&quot;, default=&quot;.&quot;, help=&quot;repo root to scan&quot;)\n    parser.add_argument(&quot;--out&quot;, default=None, help=&quot;output directory (default: auto-detect provider folder)&quot;)\n    parser.add_argument(&quot;--owner&quot;, default=None,\n                        help=&quot;provider folder to own the dashboard when more than one exists&quot;)\n    args = parser.parse_args(argv)\n    out_dir = Path(args.out) if args.out else None\n    try:\n        dashboard = generate(Path(args.root), out_dir, owner=args.owner)\n    except OwnerAmbiguousError as e:\n        print(f&quot;error: {e}&quot;, file=sys.stderr)\n        return 2\n    print(f&quot;wrote {dashboard}&quot;)\n    return 0\n\n\nif __name__ == &quot;__main__&quot;:\n    raise SystemExit(main())<\/code><\/pre>\n<ul><li>[ ] **Step 2: Verify the CLI entry behaves**<\/li><\/ul>\n<p>Run: <code>python -m pytest -q<\/code><\/p>\n<p>Expected: PASS (whole suite green; <code>main<\/code> now returns an int — no test asserts the old <code>None<\/code> return)<\/p>\n<ul><li>[ ] **Step 3: Smoke-test the CLI on a multi-provider temp repo**<\/li><\/ul>\n<p>Run:<\/p>\n<pre><code>python - &lt;&lt;&#x27;PY&#x27;\nimport tempfile, pathlib, sys\nsys.path.insert(0, &quot;tests&quot;)\nfrom builders import make_multi_provider_repo\nd = pathlib.Path(tempfile.mkdtemp())\nmake_multi_provider_repo(d)\nfrom importlib import import_module\nsys.path.insert(0, &quot;src&quot;)\ncli = import_module(&quot;acc.cli&quot;)\nrc = cli.main([&quot;--root&quot;, str(d)])\nprint(&quot;rc&quot;, rc)\nprint((d / &quot;.claude&quot; / &quot;dashboard.html&quot;).read_text()[:120])\nPY<\/code><\/pre>\n<p>Expected: prints <code>wrote .../.claude/dashboard.html<\/code>, <code>rc 0<\/code>, and the start of a valid HTML document.<\/p>\n<ul><li>[ ] **Step 4: Smoke-test the ambiguity path**<\/li><\/ul>\n<p>Run:<\/p>\n<pre><code>python - &lt;&lt;&#x27;PY&#x27;\nimport tempfile, pathlib, sys\nsys.path.insert(0, &quot;src&quot;)\nfrom importlib import import_module\ncli = import_module(&quot;acc.cli&quot;)\nd = pathlib.Path(tempfile.mkdtemp())\nfor prov in (&quot;.claude&quot;, &quot;.codex&quot;):\n    (d / prov).mkdir()\n    (d / prov / &quot;dashboard.html&quot;).write_text(&quot;&lt;html&gt;&quot;)\nrc = cli.main([&quot;--root&quot;, str(d)])\nprint(&quot;rc&quot;, rc)   # expect 2\nPY<\/code><\/pre>\n<p>Expected: prints an <code>error: multiple dashboards found ...<\/code> line and <code>rc 2<\/code>.<\/p>\n<ul><li>[ ] **Step 5: Run the CLI on this repo itself (real Codex + Claude fixture)**<\/li><\/ul>\n<p>Run: <code>python -m acc.cli --root . --out /tmp/acc-phase2 &amp;&amp; head -c 200 /tmp/acc-phase2/dashboard.html<\/code><\/p>\n<p>Expected: <code>wrote /tmp/acc-phase2/dashboard.html<\/code>; the island lists this repo&#x27;s <code>.codex/config.toml<\/code> MCP (none active), <code>AGENTS.md<\/code>, and the docs index, with no secrets.<\/p>\n<ul><li>[ ] **Step 6: Commit**<\/li><\/ul>\n<pre><code>git add src/acc/cli.py\ngit commit -m &quot;feat: CLI --owner flag and ambiguous-owner exit code&quot;<\/code><\/pre>\n<p>---<\/p>\n<h2>Self-review notes<\/h2>\n<ul><li>**Spec coverage (Phase 2):** frontmatter parser (Task 1), safe config loaders + MCP allowlist (Task 2), shape helpers (Task 3), hybrid builders (Task 4), Claude/Codex/Cursor adapters with native labels + inventory parity (Tasks 5-7), <code>assert_no_secrets<\/code> tripwire (Task 8), detection + owner rule with precedence/override/ambiguity (Task 9), file-claiming merge + providers[] + determinism + no-double-list (Task 10), <code>--owner<\/code> CLI (Task 11). Data-only — no renderer changes, matching the locked decision.<\/li><li>**Naming consistency:** <code>parse_frontmatter<\/code>, <code>load_json<\/code>, <code>load_toml<\/code>, <code>safe_mcp<\/code>, <code>MCP_ALLOWED<\/code>, <code>make_item<\/code>, <code>empty_inventory<\/code>, <code>empty_docs<\/code>, <code>ClaudeAdapter<\/code>/<code>CodexAdapter<\/code>/<code>CursorAdapter<\/code>, <code>detect_providers<\/code>, <code>resolve_owner<\/code>, <code>OwnerAmbiguousError<\/code>, <code>_claimed_by_provider<\/code>, <code>_merge_parts<\/code>, <code>_build_search<\/code>, <code>_escape_summaries<\/code> are used identically across tasks. Item shape <code>{id, provider, type, typeLabel, title, path, summary}<\/code> and doc shape <code>{id, title, path, summary, html}<\/code> are consistent.<\/li><li>**Backward compatibility:** <code>detect_out_dir<\/code> is kept as a wrapper over <code>resolve_owner<\/code>, so Phase 1&#x27;s <code>test_detect_out_dir_*<\/code> and <code>test_generate_includes_provider_folder_markdown<\/code> stay green. <code>assert_no_secrets<\/code> does not fire on the existing hostile-markdown test (<code>onerror<\/code> is not a secret keyword).<\/li><li>**Redaction paths:** MCP config -&gt; <code>safe_mcp<\/code> allowlist (drops env/headers); frontmatter text and hook commands -&gt; <code>redact_text<\/code>; <code>assert_no_secrets<\/code> is the backstop over the serialized output.<\/li><li>**No placeholders:** every code step contains complete, runnable code.<\/li><\/ul>\n<h2>What Phase 2 leaves for later<\/h2>\n<p>The full layout-B renderer (bento Overview, Inventory badges, relationship-list Map, client search over the new inventory) and the size budget are Phase 3. The three-tier refresh and skill/plugin packaging are Phase 4. Loose non-structured markdown inside a provider folder (e.g. a stray <code>.claude/notes.md<\/code> no adapter inventories) is intentionally not surfaced in v1.<\/p>","id":"7d28fae29475","path":"docs/superpowers/plans/2026-05-29-ai-control-center-phase-2-adapters.md","summary":"**Goal:** Add first-class Claude Code, Codex, and Cursor adapters that map native conventions into the superset schema, activate the allowlist redaction tier for structured config, and merge every detected provider into one dashboard via the owner rule.","title":"AI Control Center — Phase 2 (first-class provider adapters) Implementation Plan"},{"html":"<h1>Phase 3 renderer (Overview + Inventory) Implementation Plan<\/h1>\n<p>&gt; **For agentic workers:** REQUIRED SUB-SKILL: Use superpowers:subagent-driven-development (recommended) or superpowers:executing-plans to implement this plan task-by-task. Steps use checkbox (<code>- [ ]<\/code>) syntax for tracking.<\/p>\n<p>**Goal:** Render the Phase 1/2 JSON island into a human-facing dashboard — a bento Overview and an Inventory view grouped by type with linked source paths — and add the output size budget.<\/p>\n<p>**Architecture:** Extend the existing classic-IIFE renderer (<code>src/acc/templates/app.js<\/code>) with two new render functions and a shared <code>itemRow<\/code> builder; add <code>source.pathPrefix<\/code> and <code>generator.truncated<\/code> plus a render-then-measure size budget to <code>src/acc/generate.py<\/code>. No adapter changes. <code>textContent<\/code> everywhere; the one <code>href<\/code> is built by per-segment URL-encoding the combined relative path.<\/p>\n<p>**Tech Stack:** Python 3.12 stdlib (generator), vanilla browser JS (renderer, no framework, file://-safe), <code>pytest<\/code> for contract tests, <code>pytest-playwright<\/code> (test-only) for DOM tests.<\/p>\n<p>**Spec:** <code>docs/superpowers/specs/2026-05-30-ai-control-center-phase-3-renderer-design.md<\/code><\/p>\n<p>**Branch:** <code>feature/phase-3-renderer<\/code> (already created; the spec is committed there).<\/p>\n<p>---<\/p>\n<h3>Task 1: <code>source.pathPrefix<\/code> and <code>generator.truncated<\/code><\/h3>\n<p>**Files:**<\/p>\n<ul><li>Modify: <code>src/acc/generate.py<\/code> (imports near top; the <code>data<\/code> dict at <code>src/acc/generate.py:165-183<\/code>)<\/li><li>Test: <code>tests/test_generate.py<\/code><\/li><\/ul>\n<ul><li>[ ] **Step 1: Write the failing tests**<\/li><\/ul>\n<p>Append to <code>tests/test_generate.py<\/code>:<\/p>\n<pre><code>import os\nimport acc.generate as gen\n\n\ndef test_pathprefix_is_dotdot_for_provider_owner(tmp_path):\n    make_claude_repo(tmp_path)\n    data = _island(generate(tmp_path))\n    assert data[&quot;source&quot;][&quot;pathPrefix&quot;] == &quot;..&quot;\n\n\ndef test_pathprefix_is_dot_when_out_is_root(tmp_path):\n    make_claude_repo(tmp_path)\n    data = _island(generate(tmp_path, out_dir=tmp_path))\n    assert data[&quot;source&quot;][&quot;pathPrefix&quot;] == &quot;.&quot;\n\n\ndef test_pathprefix_for_nested_out_dir(tmp_path):\n    make_claude_repo(tmp_path)\n    data = _island(generate(tmp_path, out_dir=tmp_path / &quot;a&quot; / &quot;b&quot;))\n    assert data[&quot;source&quot;][&quot;pathPrefix&quot;] == &quot;../..&quot;\n\n\ndef test_pathprefix_empty_when_relpath_fails(tmp_path, monkeypatch):\n    make_claude_repo(tmp_path)\n\n    def boom(*a, **k):\n        raise ValueError(&quot;different drive&quot;)\n\n    monkeypatch.setattr(os.path, &quot;relpath&quot;, boom)\n    data = _island(generate(tmp_path))\n    assert data[&quot;source&quot;][&quot;pathPrefix&quot;] == &quot;&quot;\n\n\ndef test_generator_truncated_defaults_false(tmp_path):\n    make_claude_repo(tmp_path)\n    data = _island(generate(tmp_path))\n    assert data[&quot;generator&quot;][&quot;truncated&quot;] is False<\/code><\/pre>\n<ul><li>[ ] **Step 2: Run tests to verify they fail**<\/li><\/ul>\n<p>Run: <code>python -m pytest tests/test_generate.py -k &quot;pathprefix or truncated&quot; -q<\/code><\/p>\n<p>Expected: FAIL with <code>KeyError: &#x27;pathPrefix&#x27;<\/code> / <code>KeyError: &#x27;truncated&#x27;<\/code>.<\/p>\n<ul><li>[ ] **Step 3: Implement**<\/li><\/ul>\n<p>At the top of <code>src/acc/generate.py<\/code>, ensure these imports exist (add what is missing):<\/p>\n<pre><code>import os<\/code><\/pre>\n<p>Add this helper above <code>def generate(<\/code>:<\/p>\n<pre><code>def _path_prefix(root: Path, out_dir: Path) -&gt; str:\n    &quot;&quot;&quot;Posix relative path from the dashboard&#x27;s dir back to the repo root.\n\n    Normally &quot;..&quot;, &quot;.&quot; when out_dir == root, &quot;../..&quot; when nested. Returns &quot;&quot;\n    when the path is not expressible (e.g. a different Windows drive), in which\n    case the renderer falls back to plain-text paths instead of a broken href.\n    &quot;&quot;&quot;\n    try:\n        return Path(os.path.relpath(root, out_dir)).as_posix()\n    except ValueError:\n        return &quot;&quot;<\/code><\/pre>\n<p>In the <code>data<\/code> dict (<code>src/acc/generate.py:165-183<\/code>), change the <code>generator<\/code> line and add <code>pathPrefix<\/code> to <code>source<\/code>:<\/p>\n<pre><code>        &quot;generator&quot;: {&quot;name&quot;: &quot;ai-control-center&quot;, &quot;version&quot;: __version__,\n                      &quot;rendererDigest&quot;: &quot;&quot;, &quot;truncated&quot;: False},\n        &quot;source&quot;: {\n            &quot;repoName&quot;: root.name,\n            &quot;pathPrefix&quot;: _path_prefix(root, out_dir),\n            &quot;dashboardPath&quot;: (\n                dashboard.relative_to(root).as_posix()\n                if dashboard.is_relative_to(root) else str(dashboard)\n            ),\n            &quot;sourceDigest&quot;: source_digest(files, root),\n            &quot;vcs&quot;: {&quot;kind&quot;: &quot;none&quot;},\n        },<\/code><\/pre>\n<ul><li>[ ] **Step 4: Run tests to verify they pass**<\/li><\/ul>\n<p>Run: <code>python -m pytest tests/test_generate.py -q<\/code><\/p>\n<p>Expected: PASS (all, including the existing tests).<\/p>\n<ul><li>[ ] **Step 5: Commit**<\/li><\/ul>\n<pre><code>git add src/acc/generate.py tests/test_generate.py\ngit commit -m &quot;feat(phase-3): add source.pathPrefix and generator.truncated&quot;<\/code><\/pre>\n<p>---<\/p>\n<h3>Task 2: Output size budget (warn + summary-only reducer)<\/h3>\n<p>**Files:**<\/p>\n<ul><li>Modify: <code>src/acc/generate.py<\/code> (logging import; constants; <code>_reduce_for_size<\/code>; the render/write at <code>src/acc/generate.py:184-186<\/code>)<\/li><li>Modify: <code>tests/builders.py<\/code> (add <code>make_large_repo<\/code>)<\/li><li>Test: <code>tests/test_generate.py<\/code><\/li><\/ul>\n<ul><li>[ ] **Step 1: Write the large-repo builder**<\/li><\/ul>\n<p>Append to <code>tests/builders.py<\/code>:<\/p>\n<pre><code>def make_large_repo(root: Path, n: int) -&gt; Path:\n    &quot;&quot;&quot;A repo whose markdown is large enough to exceed the size budget.\n\n    Each file carries a heading and a big body so the rendered island grows\n    with n. Use a small n for the warn band and a large n to force truncation.\n    &quot;&quot;&quot;\n    docs = root / &quot;docs&quot;\n    docs.mkdir(parents=True, exist_ok=True)\n    body = (&quot;lorem ipsum dolor sit amet &quot; * 400) + &quot;\\n&quot;\n    for i in range(n):\n        (docs / f&quot;big_{i:04d}.md&quot;).write_text(f&quot;# Doc {i}\\n\\n{body}&quot;)\n    return root<\/code><\/pre>\n<ul><li>[ ] **Step 2: Write the failing tests**<\/li><\/ul>\n<p>Append to <code>tests/test_generate.py<\/code>:<\/p>\n<pre><code>import logging\nfrom tests.builders import make_large_repo\n\n\ndef test_over_2mb_truncates_to_summary_only(tmp_path):\n    make_large_repo(tmp_path, 150)\n    data = _island(generate(tmp_path))\n    assert data[&quot;generator&quot;][&quot;truncated&quot;] is True\n    # heavy values blanked, keys/shapes preserved\n    assert data[&quot;search&quot;] == []\n    for d in data[&quot;docs&quot;][&quot;references&quot;]:\n        assert d[&quot;summary&quot;] == &quot;&quot; and d[&quot;html&quot;] == &quot;&quot;\n        assert &quot;id&quot; in d and &quot;title&quot; in d and &quot;path&quot; in d  # shape intact\n\n\ndef test_between_1_and_2mb_warns_and_keeps_full(tmp_path, caplog):\n    make_large_repo(tmp_path, 45)\n    with caplog.at_level(logging.WARNING):\n        data = _island(generate(tmp_path))\n    assert data[&quot;generator&quot;][&quot;truncated&quot;] is False\n    assert any(d[&quot;html&quot;] for d in data[&quot;docs&quot;][&quot;references&quot;])  # full kept\n    assert &quot;exceeds&quot; in caplog.text\n\n\ndef test_small_repo_not_truncated(tmp_path):\n    make_claude_repo(tmp_path)\n    data = _island(generate(tmp_path))\n    assert data[&quot;generator&quot;][&quot;truncated&quot;] is False<\/code><\/pre>\n<p>Note: each <code>big_*.md<\/code> contributes roughly 30 KB to the island (its <code>html<\/code> body, its <code>summary<\/code>, and its search entry each hold the ~11 KB body). The <code>n<\/code> values (150 ≈ &gt;2 MB, 45 ≈ 1–2 MB) target each band; if a run lands in the wrong band, adjust <code>n<\/code> so the assertion&#x27;s band is hit — do not change the thresholds.<\/p>\n<ul><li>[ ] **Step 3: Run tests to verify they fail**<\/li><\/ul>\n<p>Run: <code>python -m pytest tests/test_generate.py -k &quot;2mb or truncat&quot; -q<\/code><\/p>\n<p>Expected: FAIL (<code>truncated<\/code> stays <code>False<\/code>; nothing blanked).<\/p>\n<ul><li>[ ] **Step 4: Implement**<\/li><\/ul>\n<p>At the top of <code>src/acc/generate.py<\/code> add:<\/p>\n<pre><code>import copy\nimport logging\n\nlogger = logging.getLogger(__name__)\n\n_WARN_BYTES = 1_000_000\n_TRUNCATE_BYTES = 2_000_000<\/code><\/pre>\n<p>Add this helper above <code>def generate(<\/code>:<\/p>\n<pre><code>def _reduce_for_size(data: dict) -&gt; dict:\n    &quot;&quot;&quot;Summary-only island: deep-copy then blank known heavy values.\n\n    Blanks every inventory/doc summary, every doc html body, and the search\n    array, and sets generator.truncated. Deep-copy-then-blank preserves every\n    key and optional field (item id, MCP config, doc id), so validate() and\n    assert_no_secrets still pass on the result.\n    &quot;&quot;&quot;\n    reduced = copy.deepcopy(data)\n    for bucket in reduced[&quot;inventory&quot;].values():\n        for item in bucket:\n            item[&quot;summary&quot;] = &quot;&quot;\n    for bucket in reduced[&quot;docs&quot;].values():\n        for doc in bucket:\n            doc[&quot;summary&quot;] = &quot;&quot;\n            if &quot;html&quot; in doc:\n                doc[&quot;html&quot;] = &quot;&quot;\n    reduced[&quot;search&quot;] = []\n    reduced[&quot;generator&quot;][&quot;truncated&quot;] = True\n    return reduced<\/code><\/pre>\n<p>Replace the render/write at <code>src/acc/generate.py:184-186<\/code>:<\/p>\n<pre><code>    validate(data)\n    html = render_html(data)\n    size = len(html.encode(&quot;utf-8&quot;))\n    if size &gt; _TRUNCATE_BYTES:\n        reduced = _reduce_for_size(data)\n        validate(reduced)\n        html = render_html(reduced)\n        rsize = len(html.encode(&quot;utf-8&quot;))\n        logger.warning(&quot;dashboard %d bytes exceeds %d; reduced to %d bytes&quot;,\n                       size, _TRUNCATE_BYTES, rsize)\n        if rsize &gt; _TRUNCATE_BYTES:\n            logger.warning(&quot;reduced dashboard still %d bytes (over budget)&quot;, rsize)\n    elif size &gt; _WARN_BYTES:\n        logger.warning(&quot;dashboard %d bytes exceeds %d&quot;, size, _WARN_BYTES)\n    dashboard.write_text(html, encoding=&quot;utf-8&quot;)\n    return dashboard<\/code><\/pre>\n<ul><li>[ ] **Step 5: Run tests to verify they pass**<\/li><\/ul>\n<p>Run: <code>python -m pytest tests/test_generate.py -q<\/code><\/p>\n<p>Expected: PASS. If a budget test lands in the wrong band, adjust <code>n<\/code> in that test and re-run.<\/p>\n<ul><li>[ ] **Step 6: Commit**<\/li><\/ul>\n<pre><code>git add src/acc/generate.py tests/builders.py tests/test_generate.py\ngit commit -m &quot;feat(phase-3): output size budget (warn &gt;1MB, summary-only &gt;2MB)&quot;<\/code><\/pre>\n<p>---<\/p>\n<h3>Task 3: Playwright DOM test harness<\/h3>\n<p>**Files:**<\/p>\n<ul><li>Modify: <code>pyproject.toml<\/code> (add a <code>test<\/code> optional-dependency group)<\/li><li>Create: <code>tests/test_render_dom.py<\/code><\/li><\/ul>\n<ul><li>[ ] **Step 1: Add the test dependency**<\/li><\/ul>\n<p>In <code>pyproject.toml<\/code>, after the <code>[project]<\/code> table add:<\/p>\n<pre><code>[project.optional-dependencies]\ntest = [&quot;pytest&quot;, &quot;pytest-playwright&quot;]<\/code><\/pre>\n<ul><li>[ ] **Step 2: Install and prepare the browser**<\/li><\/ul>\n<p>Run:<\/p>\n<pre><code>python -m pip install -e &quot;.[test]&quot;\npython -m playwright install chromium<\/code><\/pre>\n<p>Expected: installs <code>pyt , tmp_path):\n    # a doc with reserved chars in its name must produce a correctly encoded href\n    (tmp_path / &quot;weird name#1.md&quot;).write_text(&quot;# Weird\\n\\nbody&quot;)\n    page.set_content(_html(tmp_path))\n    link = page.locator(&#x27;#acc-docs a.path&#x27;, has_text=&quot;weird name#1.md&quot;)\n    assert link.count() == 1\n    href = link.first.get_attribute(&quot;href&quot;)\n    assert &quot;weird%20name%231.md&quot; in href  # space-&gt;%20, #-&gt;%23\n    assert &quot;#1.md&quot; not in href             # raw # would start a fragment<\/code><\/pre>\n<ul><li>[ ] **Step 2: Run to verify it fails**<\/li><\/ul>\n<p>Run: <code>python -m pytest tests/test_render_dom.py::test_doc_path_renders_as_encoded_link -q<\/code><\/p>\n<p>Expected: FAIL — docs currently render the path as a <code>&lt;span class=&quot;path&quot;&gt;<\/code>, not an <code>&lt;a&gt;<\/code>, so <code>a.path<\/code> count is 0.<\/p>\n<ul><li>[ ] **Step 3: Implement the helpers and refactor**<\/li><\/ul>\n<p>In <code>src/acc/templates/app.js<\/code>, after the <code>el(...)<\/code> helper add:<\/p>\n<pre><code>  function encodedRelHref(prefix, path) {\n    var raw = (prefix === &quot;.&quot; ? path : prefix + &quot;/&quot; + path);\n    return raw.split(&quot;/&quot;).map(function (seg) {\n      return seg === &quot;.&quot; || seg === &quot;..&quot; ? seg : encodeURIComponent(seg);\n    }).join(&quot;/&quot;);\n  }\n\n  function itemRow(opts) {\n    var row = el(&quot;div&quot;, &quot;acc-row acc-item&quot;);\n    var head = el(&quot;div&quot;, &quot;acc-rowhead&quot;);\n    if (opts.provider) head.appendChild(el(&quot;span&quot;, &quot;acc-chip&quot;, opts.provider));\n    if (opts.typeLabel) head.appendChild(el(&quot;span&quot;, &quot;badge&quot;, opts.typeLabel));\n    head.appendChild(el(&quot;span&quot;, &quot;acc-itemtitle&quot;, opts.title));\n    row.appendChild(head);\n    if (opts.summary) row.appendChild(el(&quot;div&quot;, &quot;acc-summary&quot;, opts.summary));\n    var prefix = (data.source &amp;&amp; data.source.pathPrefix) || &quot;&quot;;\n    if (prefix) {\n      var a = el(&quot;a&quot;, &quot;path&quot;, opts.path);\n      a.href = encodedRelHref(prefix, opts.path);\n      row.appendChild(a);\n    } else {\n      row.appendChild(el(&quot;span&quot;, &quot;path&quot;, opts.path));\n    }\n    row.dataset.search =\n      (opts.title + &quot; &quot; + opts.path + &quot; &quot; + (opts.summary || &quot;&quot;)).toLowerCase();\n    return row;\n  }<\/code><\/pre>\n<p>Replace <code>renderDocs<\/code> and <code>renderTodos<\/code> with:<\/p>\n<pre><code>  function renderDocs() {\n    var host = document.getElementById(&quot;acc-docs&quot;);\n    var groups = data.docs;\n    Object.keys(groups).sort().forEach(function (g) {\n      groups[g].forEach(function (doc) {\n        host.appendChild(itemRow({\n          typeLabel: g, title: doc.title, path: doc.path, summary: doc.summary\n        }));\n      });\n    });\n  }\n\n  function renderTodos() {\n    var host = document.getElementById(&quot;acc-todos&quot;);\n    (data.project.openTodos || []).forEach(function (t) {\n      host.appendChild(itemRow({ title: t.text, path: t.path }));\n    });\n  }<\/code><\/pre>\n<p>In <code>src/acc/templates/styles.css<\/code> append:<\/p>\n<pre><code>.acc-rowhead { display: flex; gap: 8px; align-items: baseline; flex-wrap: wrap; }\n.acc-chip { border: 1px solid var(--line); border-radius: 8px; padding: 0 6px; font-size: 10px; }\n.acc-itemtitle { font-weight: 600; }\n.acc-summary { color: var(--muted); margin: 2px 0; }\n.acc-row a.path { display: inline-block; color: var(--muted); font-size: 11px; text-decoration: none; }\n.acc-row a.path:hover { text-decoration: underline; }<\/code><\/pre>\n<ul><li>[ ] **Step 4: Run to verify it passes**<\/li><\/ul>\n<p>Run: <code>python -m pytest tests/test_render_dom.py -q<\/code><\/p>\n<p>Expected: PASS (both DOM tests).<\/p>\n<ul><li>[ ] **Step 5: Commit**<\/li><\/ul>\n<pre><code>git add src/acc/templates/
