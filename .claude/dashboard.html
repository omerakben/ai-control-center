<script id="acc-data" type="application/json">{"docs":{"adrs":[],"decisions":[],"prds":[],"references":[{"html":"<h1>AI Control Center<\/h1>\n<p>A stdlib-Python tool that scans a repository&#x27;s AI-assistant configuration (Claude Code,<\/p>\n<p>Codex, Cursor) and generates a deterministic, single-file, offline HTML dashboard of what<\/p>\n<p>the repo declares — agents, skills, hooks, commands, MCP servers, rules, docs, and open<\/p>\n<p>TODOs. Public repo: <code>omerakben/ai-control-center<\/code>.<\/p>\n<h2>What this is<\/h2>\n<ul><li>A generator (<code>src/acc/<\/code>) reads the repo, normalizes each provider through an adapter,<\/li><\/ul>\n<p>  and emits one self-contained <code>dashboard.html<\/code> with a JSON data island plus a vanilla-JS<\/p>\n<p>  renderer. No build step, no runtime dependencies, no network.<\/p>\n<ul><li>Output is **deterministic**: every list is explicitly sorted, so repeated runs are<\/li><\/ul>\n<p>  byte-identical.<\/p>\n<ul><li>The renderer is **textContent-only**: no <code>innerHTML<\/code> / <code>outerHTML<\/code> / <code>insertAdjacentHTML<\/code><\/li><\/ul>\n<p>  (a CI guard greps <code>app.js<\/code>). Author-derived text is <code>html.escape<\/code>-d at build and<\/p>\n<p>  <code>htmlUnescape<\/code>-d at display.<\/p>\n<ul><li>Secrets are redacted at extraction; a tripwire re-scans the assembled output.<\/li><\/ul>\n<h2>Architecture<\/h2>\n<ul><li><code>src/acc/generate.py<\/code> — orchestration: scan, per-provider normalize, merge, escape,<\/li><\/ul>\n<p>  build the search index, build relationships, assemble + validate + render the island.<\/p>\n<ul><li><code>src/acc/adapters/<\/code> — <code>claude.py<\/code>, <code>codex.py<\/code>, <code>cursor.py<\/code>, <code>generic.py<\/code> over <code>base.py<\/code>.<\/li><li><code>src/acc/schema.py<\/code> — top-level shape + search-record + relationship validation; the<\/li><\/ul>\n<p>  redaction tripwire.<\/p>\n<ul><li><code>src/acc/templates/<\/code> — <code>dashboard.html.tmpl<\/code>, <code>app.js<\/code>, <code>styles.css<\/code>.<\/li><li><code>tests/<\/code> — flat pytest suite incl. a real-Chromium Playwright DOM test<\/li><\/ul>\n<p>  (<code>test_render_dom.py<\/code>) and the innerHTML CI guard (<code>test_appjs_guard.py<\/code>).<\/p>\n<h2>Current state<\/h2>\n<ul><li>Phases 1–3 (schema/generator/adapters/renderer) and Phase 4a (Find omnibox) are merged<\/li><\/ul>\n<p>  to <code>main<\/code>. Phase 4b (Relationships / cross-references) is in progress on<\/p>\n<p>  <code>feature/phase-4b-relationships<\/code> — spec at <code>docs/specs/phase-4b-relationships.md<\/code>.<\/p>\n<h2>Codex setup<\/h2>\n<ul><li>Model <code>gpt-5.5<\/code>, reasoning effort <code>xhigh<\/code> (see <code>.codex/config.toml<\/code>). Sandbox<\/li><\/ul>\n<p>  <code>workspace-write<\/code>, approvals <code>on-request<\/code>.<\/p>\n<ul><li>MCP servers are disabled by default. Enable with <code>/codex-config enable-mcp &lt;name&gt;<\/code><\/li><\/ul>\n<p>  (context7 for docs, playwright for UI testing).<\/p>\n<h2>Conventions<\/h2>\n<ul><li>Stdlib Python only (3.12+), type hints, no third-party runtime deps in the generator.<\/li><li>Preserve the determinism and textContent-only invariants in every change.<\/li><li>No secrets in the repo; use a local <code>.env<\/code> and gitignore it.<\/li><li>Verify renderer changes in a browser (or the Playwright DOM test) before claiming the UI<\/li><\/ul>\n<p>  works.<\/p>","id":"052e50051df6","path":"AGENTS.md","summary":"A stdlib-Python tool that scans a repository&#x27;s AI-assistant configuration (Claude Code,","title":"AI Control Center"},{"html":"<h1>AI Control Center<\/h1>\n<p>One self-contained HTML file that turns a repo&#x27;s scattered AI markdown into a control center a human can actually navigate.<\/p>\n<p>&gt; Status: design stage. The <a href=\"docs/superpowers/specs/2026-05-29-ai-control-center-design.md\">design spec<\/a> is complete; implementation has not started. This README describes where it is headed.<\/p>\n<h2>The problem<\/h2>\n<p>Markdown is the right format for AI agents. Config, intent, decisions, and capability definitions live in <code>CLAUDE.md<\/code>, <code>AGENTS.md<\/code>, Cursor rules, skills, agents, hooks, commands, MCP config, PRDs, and ADRs. Agents read and write it well.<\/p>\n<p>Humans don&#x27;t. Once a repo holds dozens of markdown files spread across <code>.claude/<\/code>, <code>docs/<\/code>, and the tree, you lose track of what exists, how it connects, what was decided, and where the project stands.<\/p>\n<h2>The idea<\/h2>\n<p>Keep markdown as the source of truth for the machine. Add one layer for the human: a single HTML dashboard that mirrors the markdown and makes it navigable. You open one file and see scope, the inventory of skills/agents/hooks/commands/MCP/rules, PRDs, decisions, the doc index, project state, and how the pieces relate.<\/p>\n<h2>What makes it different<\/h2>\n<ul><li>One standalone HTML file. Opens from <code>file://<\/code> with no server, no build, no framework, and nothing added to your repo at runtime.<\/li><li>Lives under the AI-provider folder (<code>.claude/<\/code>, <code>.codex/<\/code>, <code>.cursor/<\/code>), so it stays inert to any web build instead of colliding with it.<\/li><li>Committed and shared, treated like <code>CLAUDE.md<\/code>, so it travels with the repo.<\/li><li>Deterministic output, so re-stamping does not churn your diffs.<\/li><li>Redaction at extraction, so MCP tokens and other secrets never get baked into a file you push.<\/li><li>Multi-provider: first-class support for Claude Code, Codex, and Cursor, with a generic fallback for any other repo.<\/li><\/ul>\n<h2>How it works<\/h2>\n<p>A bundled, offline <code>python3<\/code> generator scans the repo, runs a per-provider adapter to map native conventions into one schema, redacts secrets, and stamps a single HTML file with the data inlined as a JSON island. The renderer builds the view from that island and gives you client-side search. Refresh runs three ways: an explicit command, an automatic re-stamp when an agent edits markdown, and an optional git or CI hook.<\/p>\n<p>Read the <a href=\"docs/superpowers/specs/2026-05-29-ai-control-center-design.md\">full design spec<\/a> for the schema, adapter interface, generation pipeline, and security model.<\/p>\n<h2>Roadmap<\/h2>\n<p>v1: deterministic inventory, doc index, relationship list, project facts, three-tier refresh, redaction, sanitized rendering, three first-class adapters plus the generic fallback, project level only.<\/p>\n<p>Later: a global cross-repo view, an interactive relationship graph, and richer interpretation of workflows.<\/p>\n<h2>Distribution<\/h2>\n<p>Ships as a standalone skill plus a marketplace plugin. The skill, the generator, and the HTML it produces are the whole product.<\/p>\n<h2>License<\/h2>\n<p>MIT — see <a href=\"LICENSE\">LICENSE<\/a>.<\/p>","id":"cb150b40c21b","path":"README.md","summary":"One self-contained HTML file that turns a repo&#x27;s scattered AI markdown into a control center a human can actually navigate.","title":"AI Control Center"},{"html":"<h1>Phase 4a — Find (global omnibox)<\/h1>\n<p>&gt; Status: SPEC. Splits the &quot;search&quot; half out of <code>phase-4-roadmap.md<\/code> workstream D.<\/p>\n<p>&gt; Phase 4b (Relationships) and the packaging work (refresh, <code>/dashboard<\/code>, plugin) are<\/p>\n<p>&gt; separate specs. Grounded in a 15-agent adversarial design review (run<\/p>\n<p>&gt; <code>wf_553ff185-c26<\/code>) — see &quot;Review provenance&quot; at the end.<\/p>\n<p>Phase 3 shipped a deterministic single-file dashboard with an Overview bento and an<\/p>\n<p>Inventory view grouped by type. The pain that started this product — &quot;it&#x27;s hard to see<\/p>\n<p>where what I&#x27;m looking for is&quot; — is still half-served: Inventory has a per-row filter,<\/p>\n<p>but there is no way to search across everything at once and land on the hit.<\/p>\n<p>The generator already builds a search index (<code>_build_search<\/code> → <code>data.search<\/code>) and ships<\/p>\n<p>it in the data island, but the renderer never reads it (<code>app.js<\/code> filters rows by a<\/p>\n<p>separate <code>dataset.search<\/code> blob and ignores <code>data.search<\/code> entirely). Phase 4a turns that<\/p>\n<p>dead index into a real global omnibox, extends it just enough to be useful, and builds<\/p>\n<p>the **reusable jump infrastructure** (per-item ids + an id→row map) that Phase 4b&#x27;s<\/p>\n<p>relationship surfaces will consume.<\/p>\n<h2>Decisions (locked)<\/h2>\n<p>1. **Find leads.** Relationships → Phase 4b; packaging → a later phase.<\/p>\n<p>2. **Split confirmed.** 4a is Find only; 4a owns the shared jump infra so 4b reuses it<\/p>\n<p>   rather than duplicating it.<\/p>\n<p>3. **Search = both.** A global omnibox consuming <code>data.search<\/code>, plus the existing<\/p>\n<p>   per-view row filter (kept, with its role made distinct from the omnibox).<\/p>\n<p>4. **Index depth = names + paths + summaries + a capped body slice.**<\/p>\n<p>5. **textContent only.** Every value reaches the DOM via <code>textContent<\/code>; the path <code>href<\/code><\/p>\n<p>   (per-segment <code>encodeURIComponent<\/code>) stays the sole data-derived attribute.<\/p>\n<p>6. **Highlighting is <code>createElement(&#x27;mark&#x27;)<\/code> + <code>textContent<\/code>, never <code>innerHTML<\/code>.**<\/p>\n<p>7. **No view router in this phase.** &quot;Jump&quot; means scrollIntoView + a transient highlight<\/p>\n<p>   on the item&#x27;s row. The POC-style multi-view sidebar IA is worth doing, but as its own<\/p>\n<p>   phase.<\/p>\n<h2>Scope<\/h2>\n<ul><li><code>generate.py<\/code> <code>_build_search<\/code>: add <code>type<\/code> + <code>typeLabel<\/code> per record (including docs);<\/li><\/ul>\n<p>  append a capped, escaped body slice to the indexed <code>text<\/code>; keep the deterministic sort.<\/p>\n<ul><li><code>generate.py<\/code> <code>_reduce_for_size<\/code>: rebuild a **light** index (names + paths) in<\/li><\/ul>\n<p>  summary-only mode instead of emptying <code>search<\/code>, so the omnibox still works on large repos.<\/p>\n<ul><li><code>generate.py<\/code> give every searchable item — including TODOs — a stable <code>id<\/code> so results<\/li><\/ul>\n<p>  can be jumped to.<\/p>\n<ul><li><code>schema.py<\/code>: enforce the search-record shape at build time.<\/li><li><code>app.js<\/code>: an omnibox reading <code>data.search<\/code> — type-grouped results with counts and a<\/li><\/ul>\n<p>  matched snippet, keyboard nav, focus via <code>/<\/code>, and jump via an <code>id → row<\/code> map built at<\/p>\n<p>  render time. Add a per-row id in every render path (inventory, docs, todos).<\/p>\n<ul><li><code>dashboard.html.tmpl<\/code> + <code>styles.css<\/code>: omnibox markup; <code>&lt;mark&gt;<\/code>, type-chip, and<\/li><\/ul>\n<p>  highlight-flash styles.<\/p>\n<ul><li>Keep the per-view filter; relabel the two inputs so they don&#x27;t read as duplicates.<\/li><\/ul>\n<h2>Non-goals (Phase 4a)<\/h2>\n<ul><li>Relationships: <code>_build_relationships<\/code>, edges, inline &quot;Related&quot;, the dedicated view —<\/li><\/ul>\n<p>  Phase 4b.<\/p>\n<ul><li>A multi-view sidebar router — a later phase (jump is scrollIntoView here).<\/li><li>Ordered workflow chains, refresh tiers, <code>/dashboard<\/code>, plugin packaging.<\/li><li>The two latent Phase 3 items (<code>markdown.py<\/code> <code>_safe_link<\/code> attribute-escaping,<\/li><\/ul>\n<p>  <code>render.py<\/code> <code>__SCHEMA_VERSION__<\/code> ordering) stay deferred: 4a routes no <code>doc.html<\/code><\/p>\n<p>  through <code>innerHTML<\/code>, so they remain unreached.<\/p>\n<h2>Data contract (changes)<\/h2>\n<p>Search record grows from <code>{id, title, path, text}<\/code> to:<\/p>\n<pre><code>{ id, type, typeLabel, title, path, text }<\/code><\/pre>\n<ul><li><code>type<\/code> — the internal kind used as a stable group key (<code>skill<\/code>, <code>agent<\/code>, <code>command<\/code>,<\/li><\/ul>\n<p>  <code>mcpServer<\/code>, <code>hook<\/code>, <code>rule<\/code>, <code>reference<\/code>, <code>doc<\/code>, …).<\/p>\n<ul><li><code>typeLabel<\/code> — the human group heading (<code>Claude agent<\/code>, <code>MCP server<\/code>, …). Inventory<\/li><\/ul>\n<p>  items already carry both via <code>make_item<\/code> (<code>base.py<\/code>); **docs do not** — they are built<\/p>\n<p>  by a separate path (<code>claude.py<\/code>/<code>codex.py<\/code>/<code>generic.py<\/code>) and grouped only by bucket<\/p>\n<p>  name. <code>_build_search<\/code> must synthesize a <code>type<\/code>/<code>typeLabel<\/code> for doc records from their<\/p>\n<p>  bucket key, or doc results land in an undefined group. <code>type<\/code>/<code>typeLabel<\/code> are<\/p>\n<p>  generator-controlled constants (not author input), so they follow the existing<\/p>\n<p>  <code>provider<\/code>/<code>typeLabel<\/code> convention and are not escaped.<\/p>\n<ul><li><code>text<\/code> — <code>summary<\/code> plus a capped slice of the item&#x27;s raw body.<\/li><li>**Order:** records stay sorted by <code>(path, title, id)<\/code> (already deterministic). Adding<\/li><\/ul>\n<p>  fields does not change ordering. <code>render.py<\/code> does <code>json.dumps(sort_keys=True)<\/code>, which<\/p>\n<p>  fixes dict-key order but **not** list order, so the explicit sort is load-bearing.<\/p>\n<h3>Escaping and matching (the subtle part)<\/h3>\n<p>The data island is JSON read via <code>JSON.parse(node.textContent)<\/code> — a JSON-in-<code>&lt;script&gt;<\/code><\/p>\n<p>context, not HTML. Island-breakout safety already comes from <code>render.py<\/code>&#x27;s<\/p>\n<p><code>.replace(&quot;&lt;/&quot;,&quot;&lt;\\/&quot;)<\/code> over the whole payload, and display safety comes from<\/p>\n<p><code>app.js<\/code> using <code>textContent<\/code> exclusively. Phase 1&#x27;s field-level <code>html.escape<\/code> is a<\/p>\n<p>defense-in-depth layer on top of that.<\/p>\n<p>We **keep** that layer (do not weaken the hardening), but it has a side effect: a value<\/p>\n<p>like <code>AT&amp;T<\/code> is stored as <code>AT&amp;amp;T<\/code>, so naive <code>textContent<\/code> display shows the entity and<\/p>\n<p>a substring search for <code>AT&amp;T<\/code> misses. Resolution:<\/p>\n<ul><li>The capped body slice is escaped on the **same** path as <code>title<\/code>/<code>summary<\/code> (Phase 1<\/li><\/ul>\n<p>  contract), so the stored island stays uniformly escaped.<\/p>\n<ul><li><code>app.js<\/code> gains a small <code>htmlUnescape(s)<\/code> helper (decode <code>&amp;amp; &amp;lt; &amp;gt; &amp;quot; &amp;#39;<\/code>).<\/li><\/ul>\n<p>  It is applied **only** at the <code>textContent<\/code> assignment for display and when building<\/p>\n<p>  the omnibox match key. <code>textContent<\/code> makes the decoded value inert, so this restores<\/p>\n<p>  correct display + search without reintroducing an HTML sink.<\/p>\n<p>This resolves the review&#x27;s &quot;capped slice bypasses escape&quot; and &quot;escaping breaks the<\/p>\n<p>omnibox for <code>&amp; &lt; &gt; &quot; &#x27;<\/code>&quot; findings while preserving the island&#x27;s defense-in-depth.<\/p>\n<h3><code>_SEARCH_BODY_CHARS<\/code> (the cap)<\/h3>\n<p>A module-level constant with a rationale comment tying it to the size budget<\/p>\n<p>(<code>_WARN_BYTES = 1_000_000<\/code>): at ~500 indexable items, <code>500 × 200 = 100 KB<\/code> pre-escape —<\/p>\n<p>an order of magnitude under the warn line; <code>_reduce_for_size<\/code> is the safety valve above<\/p>\n<p>it. Default: **200**. A test asserts the cap boundary (including a clean cut on a<\/p>\n<p>multibyte body) and that a large synthetic repo still truncates.<\/p>\n<h2>Rendering model<\/h2>\n<ul><li>**Omnibox.** <code>input#acc-omnibox<\/code> in the header. <code>/<\/code> focuses it (unless a field is<\/li><\/ul>\n<p>  already focused); <code>Esc<\/code> clears and closes the result panel.<\/p>\n<ul><li>**Matching.** On input (debounced ~60 ms), filter <code>data.search<\/code> by a literal,<\/li><\/ul>\n<p>  lowercased substring over <code>htmlUnescape(title + path + text)<\/code>. Build that match key<\/p>\n<p>  once per record.<\/p>\n<ul><li>**Results.** Group hits by <code>type<\/code> (heading = <code>typeLabel<\/code>), show a per-group count, cap<\/li><\/ul>\n<p>  rendered hits per group (e.g. 8) with a &quot;+N more&quot; line. Each hit row = <code>htmlUnescape<\/code>d<\/p>\n<p>  title + a type chip + path + a matched snippet, all via <code>el()<\/code>/<code>textContent<\/code>.<\/p>\n<ul><li>**Highlight.** Wrap the match by splitting the logical string on the query and<\/li><\/ul>\n<p>  appending text nodes and <code>createElement(&#x27;mark&#x27;)<\/code> nodes, each via <code>textContent<\/code>. No<\/p>\n<p>  <code>innerHTML<\/code>, no string-built markup.<\/p>\n<ul><li>**Jump.** Build an <code>id → rowElement<\/code> map while rendering the views. Enter/click on a<\/li><\/ul>\n<p>  hit scrolls its row into view and toggles a transient highlight class. The map degrades<\/p>\n<p>  cleanly when an id has no rendered row (empty bucket skipped, or truncated mode). Item<\/p>\n<p>  ids are the existing <code>stable_id<\/code> (<code>&quot;i&quot;+sha1hex<\/code>, fixed alphabet, DOM-safe); resolve<\/p>\n<p>  through the map, never a selector concatenated from item text.<\/p>\n<ul><li>**Keyboard.** <code>↑<\/code>/<code>↓<\/code> move the active hit, <code>Enter<\/code> jumps, <code>Esc<\/code> closes.<\/li><li>**Empty states.** Empty query → panel hidden. No hits → &quot;No matches&quot;. Light/degraded<\/li><\/ul>\n<p>  index → a one-line note that body search is off.<\/p>\n<h2>Architecture<\/h2>\n<ul><li><code>generate.py<\/code><\/li><li><code>_build_search(inv, docs)<\/code> → add <code>type<\/code> + <code>typeLabel<\/code> (synthesize for docs from the<\/li><\/ul>\n<p>    bucket key); append the escaped capped slice to <code>text<\/code>; keep the sort. The slice&#x27;s<\/p>\n<p>    raw source must be captured and escaped in the **same pass** that escapes<\/p>\n<p>    <code>title<\/code>/<code>summary<\/code>, before <code>_build_search<\/code> reads it (preserve the &quot;search reads escaped<\/p>\n<p>    fields&quot; contract). Note: doc bodies live in the separately-sanitized <code>html<\/code> field, so<\/p>\n<p>    the slice source for docs needs an explicit decision — slice the doc <code>summary<\/code>, or<\/p>\n<p>    carry a raw pre-markdown body. Default: slice <code>summary<\/code> for docs, raw body for<\/p>\n<p>    inventory items that have one.<\/p>\n<ul><li><code>_reduce_for_size(data)<\/code> → replace <code>reduced[&quot;search&quot;] = []<\/code> with a light rebuild:<\/li><\/ul>\n<p>    keep <code>{id, type, typeLabel, title, path, text: &quot;&quot;}<\/code> per record. Re-validate stays<\/p>\n<p>    under budget.<\/p>\n<ul><li>ensure TODO records carry a stable <code>id<\/code>.<\/li><li><code>schema.py<\/code> → <code>validate()<\/code> checks each <code>search<\/code> record has the required keys, string<\/li><\/ul>\n<p>  types, and a known <code>type<\/code>. A build-time backstop so a dropped field or wrong type fails<\/p>\n<p>  loudly.<\/p>\n<ul><li><code>app.js<\/code> → omnibox build/consume/group/snippet/<code>&lt;mark&gt;<\/code>/keyboard/jump; the <code>htmlUnescape<\/code><\/li><\/ul>\n<p>  helper; the <code>id → row<\/code> map; per-row id in inventory/docs/todos render paths; keep the<\/p>\n<p>  per-view filter.<\/p>\n<ul><li><code>dashboard.html.tmpl<\/code> / <code>styles.css<\/code> → omnibox input + result panel + <code>&lt;mark&gt;<\/code> + flash.<\/li><\/ul>\n<h2>Acceptance criteria<\/h2>\n<ul><li><code>/<\/code> focuses the omnibox; <code>Esc<\/code> closes it; <code>↑<\/code>/<code>↓<\/code> move the active hit; <code>Enter<\/code> jumps.<\/li><li>Typing a skill&#x27;s name shows it under its <code>typeLabel<\/code> group with a count; results from<\/li><\/ul>\n<p>  inventory **and** docs both group correctly (no undefined group).<\/p>\n<ul><li>Enter on a hit scrolls that specific item&#x27;s row into view and flashes it.<\/li><li>Search matches name, path, summary, and capped body content.<\/li><li>Typing <code>AT&amp;T<\/code> finds and correctly displays an item named <code>AT&amp;T<\/code> (logical text, not<\/li><\/ul>\n<p>  entities).<\/p>\n<ul><li>A body containing <code>&lt;/script&gt;&lt;img src=x onerror=alert(1)&gt;<\/code> causes no script execution<\/li><\/ul>\n<p>  and no raw HTML — the text is inert. (XSS regression.)<\/p>\n<ul><li><code>grep -nE &#x27;innerHTML|outerHTML|insertAdjacentHTML&#x27; app.js<\/code> returns nothing.<\/li><li>Output is byte-identical across repeated runs; stays under the size budget; in<\/li><\/ul>\n<p>  light/degraded mode the omnibox still finds items by name and path.<\/p>\n<ul><li>The per-view filter still works and reads as distinct from the omnibox.<\/li><\/ul>\n<h2>Testing<\/h2>\n<ul><li>Unit (<code>_build_search<\/code>): adds <code>type<\/code>+<code>typeLabel<\/code> to inventory and docs; caps the slice<\/li><\/ul>\n<p>  at <code>_SEARCH_BODY_CHARS<\/code> (multibyte-safe); escapes the slice (inject<\/p>\n<p>  <code>&lt;/script&gt;&lt;img onerror&gt;<\/code> and assert escaped in <code>data.search<\/code>); records stay sorted.<\/p>\n<ul><li>Unit (<code>_reduce_for_size<\/code>): keeps a non-empty light index, drops the body slice,<\/li><\/ul>\n<p>  re-validates under budget; a large synthetic repo crosses 1 MB and recovers.<\/p>\n<ul><li>Unit: TODO records have ids.<\/li><li>Schema: a malformed search record (missing key, wrong type, unknown <code>type<\/code>) is rejected.<\/li><li>Playwright DOM (<code>page.set_content<\/code>): omnibox grouping + counts across inventory + docs;<\/li><\/ul>\n<p>  keyboard nav; jump scrolls + flashes the exact row; <code>&lt;mark&gt;<\/code> built via <code>textContent<\/code>;<\/p>\n<p>  empty states; <code>AT&amp;T<\/code> logical match + display; hostile-body inertness.<\/p>\n<ul><li>CI guard: a test/lint step greps <code>app.js<\/code> for banned <code>innerHTML<\/code>/<code>outerHTML<\/code>/<code>insertAdjacentHTML<\/code>.<\/li><\/ul>\n<h2>File-by-file plan<\/h2>\n<ul><li><code>src/acc/generate.py<\/code> — <code>_build_search<\/code> (type/typeLabel/escaped slice), <code>_reduce_for_size<\/code><\/li><\/ul>\n<p>  (light rebuild), TODO ids.<\/p>\n<ul><li><code>src/acc/schema.py<\/code> — search-record validation.<\/li><li><code>src/acc/templates/app.js<\/code> — omnibox + <code>htmlUnescape<\/code> + id→row map + per-row ids.<\/li><li><code>src/acc/templates/dashboard.html.tmpl<\/code> — omnibox markup.<\/li><li><code>src/acc/templates/styles.css<\/code> — omnibox, <code>&lt;mark&gt;<\/code>, type chip, flash.<\/li><li><code>tests/<\/code> — unit + schema + Playwright DOM + the banned-<code>innerHTML<\/code> guard.<\/li><\/ul>\n<h2>Reusable infra handed to Phase 4b<\/h2>\n<ul><li>Per-row <code>id<\/code> on every item row + the <code>id → row<\/code> map → 4b&#x27;s inline &quot;Related&quot; links and<\/li><\/ul>\n<p>  the dedicated Relationships view jump straight to items using the same mechanism.<\/p>\n<ul><li><code>type<\/code>/<code>typeLabel<\/code> on records → reused for edge endpoints.<\/li><li>The <code>htmlUnescape<\/code>-at-display pattern → reused for any author-derived edge <code>evidence<\/code>.<\/li><\/ul>\n<h2>Open questions (resolve during spec review)<\/h2>\n<p>1. **Doc body-slice source** — slice the doc <code>summary<\/code> (simple, default) vs. carry a raw<\/p>\n<p>   pre-markdown doc body to slice (deeper search, more plumbing). Default: <code>summary<\/code>.<\/p>\n<p>2. **<code>_SEARCH_BODY_CHARS<\/code>** — accept 200 or set another number.<\/p>\n<h2>Out of scope → later phases<\/h2>\n<ul><li>Phase 4b — Relationships (path-ref + structural edges first; body-mentions-name<\/li><\/ul>\n<p>  deferred; escape <code>evidence<\/code>; name the view &quot;Cross-references&quot; until ordered chains exist).<\/p>\n<ul><li>A POC-style multi-view sidebar router.<\/li><li>Packaging; ordered chains; latent Phase 3 hardening.<\/li><\/ul>\n<h2>Review provenance<\/h2>\n<p>15-agent adversarial review (5 lenses × source-reading agents, skeptic verification of<\/p>\n<p>every high finding). All five lenses returned ship-with-changes. Confirmed findings folded<\/p>\n<p>in: highlight-<code>innerHTML<\/code> trap → <code>&lt;mark&gt;<\/code>+CI guard; group-by-type impossible (records lack<\/p>\n<p><code>type<\/code>, docs lack it entirely) → <code>type<\/code>+<code>typeLabel<\/code> incl. docs; jump is net-new (no router,<\/p>\n<p>no per-item id, todos lack ids) → scrollIntoView + id→row map + per-row ids + todo ids;<\/p>\n<p>escaping breaks matching for <code>&amp; &lt; &gt; &quot; &#x27;<\/code> → keep escaping + <code>htmlUnescape<\/code> at display/match;<\/p>\n<p>capped slice can exceed the budget → light-index rebuild in <code>_reduce_for_size<\/code>; cap<\/p>\n<p>unjustified → named constant with budget math. Deferred to 4b: body-mentions-name edges<\/p>\n<p>(high false-positive risk), <code>evidence<\/code> escaping, ordered-chain rename.<\/p>\n<h1>(end of spec)<\/h1>","id":"f2c4c1486cbe","path":"docs/specs/phase-4a-find.md","summary":"Phase 3 shipped a deterministic single-file dashboard with an Overview bento and an","title":"Phase 4a — Find (global omnibox)"},{"html":"<h1>Phase 4b — Relationships (cross-references)<\/h1>\n<p>&gt; Status: SPEC, hardened by a 5-lens adversarial design review (18 findings) and a Codex<\/p>\n<p>&gt; debate (gpt-5.5, run thread <code>019e7ad1<\/code>). Splits the &quot;relationships&quot; half out of the<\/p>\n<p>&gt; Phase 4 roadmap, after Phase 4a (Find) shipped and merged (PR #4, merge commit<\/p>\n<p>&gt; <code>e76c0df<\/code>). Ordered workflow chains, a multi-view router, and packaging stay in later<\/p>\n<p>&gt; phases.<\/p>\n<p>Phase 3 shipped a deterministic single-file dashboard; Phase 4a turned the dead search<\/p>\n<p>index into a global omnibox and built the reusable **id → row jump** infrastructure<\/p>\n<p>(per-item ids, an <code>id → row<\/code> map, <code>jumpTo<\/code>).<\/p>\n<p>The <code>relationships<\/code> field has been a required top-level key since Phase 1 (<code>schema.py<\/code>)<\/p>\n<p>but has always shipped empty (<code>generate.py<\/code> sets <code>&quot;relationships&quot;: []<\/code>). Phase 4b fills it<\/p>\n<p>with deterministic edges and surfaces them two ways: an inline &quot;Related&quot; block on every<\/p>\n<p>item/doc row, and a dedicated &quot;Cross-references&quot; view. It consumes 4a&#x27;s jump infra rather<\/p>\n<p>than building anything new for navigation.<\/p>\n<h2>Decisions (locked)<\/h2>\n<p>1. **Two deterministic edge kinds only.** <code>reference<\/code> (a doc body mentions an inventory<\/p>\n<p>   item&#x27;s exact path) and <code>declares<\/code> (a provider config file → the MCP servers and hooks<\/p>\n<p>   it declares). No inference, no scoring.<\/p>\n<p>2. **Body-mentions-name is deferred.** Matching an item by its title/name (not its path)<\/p>\n<p>   has a high false-positive rate and waits for a later slice.<\/p>\n<p>3. **Reference matching is exact-path, boundary-checked, unique-path-only, and targets<\/p>\n<p>   inventory items.** Match an inventory item&#x27;s exact repo-relative path as a<\/p>\n<p>   boundary-delimited token (not a bare substring), only for paths that resolve to exactly<\/p>\n<p>   one id, and never the four provider config files. Docs are reference **sources**, not<\/p>\n<p>   targets (doc→doc graphing is deferred). Shared config paths are excluded — they are the<\/p>\n<p>   <code>declares<\/code> channel.<\/p>\n<p>4. **<code>declares<\/code> source = a config-file node, not an instruction doc.** A <code>.claude/settings.json<\/code>,<\/p>\n<p>   <code>.mcp.json<\/code>, <code>.codex/config.toml<\/code>, or <code>.cursor/mcp.json<\/code> is the thing that declares an<\/p>\n<p>   MCP server or hook, so it is the edge source — not <code>CLAUDE.md<\/code>. Config-file nodes are<\/p>\n<p>   synthetic: they appear as Cross-references source-group headers and as an inline<\/p>\n<p>   &quot;declared in&quot; label, but they are **not** inventory rows and are not jump targets. This<\/p>\n<p>   gives correct provenance and covers cursor (which has MCP servers but no instruction<\/p>\n<p>   doc).<\/p>\n<p>5. **<code>declares<\/code> targets = MCP servers and hooks only.** Commands are file-discovered<\/p>\n<p>   (<code>.claude/commands/*.md<\/code>, <code>.codex/prompts/*.md<\/code>), not config declarations, so they are<\/p>\n<p>   out of <code>declares<\/code>.<\/p>\n<p>6. **Evidence is a generator-controlled path, not author text.** <code>evidence<\/code> is the<\/p>\n<p>   salient path of the edge (the referenced item path for <code>reference<\/code>, the config file<\/p>\n<p>   path for <code>declares<\/code>). It carries no doc-body text, so relationships hold no<\/p>\n<p>   author-derived content and need no <code>html.escape<\/code> / <code>htmlUnescape<\/code>; like every other<\/p>\n<p>   path field it reaches the DOM via <code>textContent<\/code> and is inert.<\/p>\n<p>7. **textContent only.** Edges render through <code>el()<\/code> / <code>textContent<\/code>; no new<\/p>\n<p>   <code>innerHTML<\/code> / <code>outerHTML<\/code> / <code>insertAdjacentHTML<\/code>. The CI guard still holds.<\/p>\n<p>8. **Jump controls are not rows.** Inline Related entries and Cross-references endpoints<\/p>\n<p>   are real <code>&lt;button type=&quot;button&quot;&gt;<\/code> / <code>&lt;a href=&quot;#…&quot;&gt;<\/code> controls with keyboard behavior,<\/p>\n<p>   but they are **not** <code>.acc-item<\/code> and carry **no** <code>data-id<\/code>. The <code>.acc-item[data-id]<\/code><\/p>\n<p>   namespace stays reserved for the one canonical row per id, so <code>buildRowIndex<\/code> resolves<\/p>\n<p>   each id to its real row, never to a jump control.<\/p>\n<p>9. **Edges are stored directed, rendered bidirectionally.** One stored edge (<code>from → to<\/code>)<\/p>\n<p>   shows on both endpoints with a direction-aware verb (where both endpoints have a row).<\/p>\n<p>10. **The view is &quot;Cross-references,&quot; grouped by source, display-sorted by path/title.**<\/p>\n<p>    Ordered chains (&quot;Workflows&quot;) stay deferred, so the name avoids implying sequence.<\/p>\n<h2>Scope<\/h2>\n<ul><li><code>generate.py<\/code>: a new <code>_build_relationships(inv, docs)<\/code> that emits the edge list and the<\/li><\/ul>\n<p>  synthetic config-file nodes; wire it into <code>data[&quot;relationships&quot;]<\/code>. Adapters carry a<\/p>\n<p>  private <code>_refScanBody<\/code> on each doc so the reference scan sees full doc text **without**<\/p>\n<p>  disturbing the search slice; drop it (and <code>_searchBody<\/code>) before serialization.<\/p>\n<p>  <code>_reduce_for_size<\/code> keeps <code>declares<\/code> edges and caps <code>reference<\/code> edges.<\/p>\n<ul><li><code>schema.py<\/code>: validate the edge shape, the <code>type<\/code> enum, and type-aware referential<\/li><\/ul>\n<p>  integrity.<\/p>\n<ul><li><code>app.js<\/code>: build an <code>id → edges<\/code> adjacency index and an <code>id → {title, typeLabel, path}<\/code><\/li><\/ul>\n<p>  label map from canonical inventory/docs/todos; render an inline &quot;Related&quot; block per row;<\/p>\n<p>  add <code>renderCrossReferences()<\/code>; wire the nav anchor and an Overview card; pin the init<\/p>\n<p>  sequence.<\/p>\n<ul><li><code>dashboard.html.tmpl<\/code>: a <code>#crossref<\/code> section and its nav anchor.<\/li><li><code>styles.css<\/code>: <code>.acc-related<\/code> and Cross-references styles.<\/li><\/ul>\n<h2>Non-goals (Phase 4b)<\/h2>\n<ul><li>Body-mentions-name edges (deferred, decision 2).<\/li><li>doc → doc references and a general documentation graph (decision 3); revisit with its<\/li><\/ul>\n<p>  own filtering and budget.<\/p>\n<ul><li>Markdown-link destination resolution (<code>./x.md<\/code>, <code>/x.md<\/code>, URL-encoded, sibling-relative).<\/li><\/ul>\n<p>  Reference matching is exact repo-relative path only this slice; relative-link recall is<\/p>\n<p>  a later enhancement.<\/p>\n<ul><li>Commands in <code>declares<\/code> (decision 5); a <code>provides<\/code>/<code>contains<\/code> edge kind is a later slice.<\/li><li>Inventory-item bodies as reference **sources**. Only doc bodies are scanned. Codex<\/li><\/ul>\n<p>  prompt commands (<code>.codex/prompts/*.md<\/code>) carry markdown bodies but live in<\/p>\n<p>  <code>inventory[&quot;commands&quot;]<\/code>; promoting all body-bearing command artifacts to reference<\/p>\n<p>  sources is deferred (and should be provider-agnostic, not codex-only).<\/p>\n<ul><li>The two latent Phase 3 items (<code>markdown.py<\/code> <code>_safe_link<\/code> attribute-escaping,<\/li><\/ul>\n<p>  <code>render.py<\/code> <code>__SCHEMA_VERSION__<\/code> ordering) stay deferred — 4b routes no <code>doc.html<\/code><\/p>\n<p>  through <code>innerHTML<\/code>.<\/p>\n<h2>Data contract (changes)<\/h2>\n<p><code>relationships<\/code> grows from <code>[]<\/code> to a sorted, deduped list of directed edges:<\/p>\n<pre><code>{ &quot;from&quot;: &quot;&lt;id&gt;&quot;, &quot;to&quot;: &quot;&lt;id&gt;&quot;, &quot;type&quot;: &quot;reference&quot; | &quot;declares&quot;, &quot;evidence&quot;: &quot;&lt;path&gt;&quot; }<\/code><\/pre>\n<ul><li><code>from<\/code> / <code>to<\/code> / <code>type<\/code> / <code>evidence<\/code> are all generator-controlled. <code>from<\/code> is a doc id<\/li><\/ul>\n<p>  (<code>reference<\/code>) or a synthetic config-node id (<code>declares<\/code>); <code>to<\/code> is an inventory item id.<\/p>\n<ul><li><code>evidence<\/code> is the salient path: the referenced item&#x27;s canonical path (<code>reference<\/code>) or<\/li><\/ul>\n<p>  the config file path (<code>declares<\/code>). It is treated like every other path field — not<\/p>\n<p>  escaped, displayed via <code>textContent<\/code>. No author-derived text enters <code>relationships<\/code>.<\/p>\n<ul><li>**<code>SCHEMA_VERSION<\/code> stays <code>&quot;1.0&quot;<\/code>.** This is a compatible population of an<\/li><\/ul>\n<p>  already-required field plus stricter validation, not a breaking shape change; no<\/p>\n<p>  external consumer reads the island independently of the renderer shipped with it.<\/p>\n<ul><li>**Order and dedup.** Dedup on <code>(from, to, type)<\/code>; sort the stored list on<\/li><\/ul>\n<p>  <code>(from, to, type)<\/code>. ids are hashes, so this order is deterministic but not<\/p>\n<p>  human-meaningful — the **renderer** display-sorts by path/title (see Rendering).<\/p>\n<p>  <code>render.py<\/code>&#x27;s <code>json.dumps(sort_keys=True)<\/code> fixes dict-key order but not list order, so<\/p>\n<p>  the explicit sort is load-bearing (same as <code>_build_search<\/code>).<\/p>\n<h3>Reference matching (the precise part)<\/h3>\n<ul><li>**Build <code>path → set(ids)<\/code>** over inventory items only (docs are sources, not targets),<\/li><\/ul>\n<p>  iterating a deterministically sorted item list (<code>_merge_parts<\/code> already sorts each bucket<\/p>\n<p>  by <code>(path, title, id)<\/code>; concatenate buckets in a fixed order). Keep a path only if<\/p>\n<p>  <code>len(ids) == 1<\/code> — never first-wins. A path on two or more ids is dropped.<\/p>\n<ul><li>**Exclude the provider config paths** (<code>.claude/settings.json<\/code>, <code>.mcp.json<\/code>,<\/li><\/ul>\n<p>  <code>.codex/config.toml<\/code>, <code>.cursor/mcp.json<\/code>) from the lookup regardless of id count. They<\/p>\n<p>  are the <code>declares<\/code> channel; otherwise a single-server config (one id) would become a<\/p>\n<p>  unique reference target and produce a stray <code>reference<\/code> edge alongside its <code>declares<\/code>.<\/p>\n<ul><li>**Boundary match, not bare substring.** For each doc, scan its <code>_refScanBody<\/code> for each<\/li><\/ul>\n<p>  remaining unique path with<\/p>\n<p>  <code>re.compile(r&#x27;(?&lt;![\\w./-])&#x27; + re.escape(path) + r&#x27;(?![\\w/-])(?!\\.[\\w/-])&#x27;)<\/code>. A bare<\/p>\n<p>  <code>path in body<\/code> produces phantom edges: <code>.claude/agents/x.md<\/code> matches inside<\/p>\n<p>  <code>.claude/agents/x.md.bak<\/code>, and a short generic doc <code>API.md<\/code> matches inside<\/p>\n<p>  <code>legacy_API.md.old<\/code> or prose. The right boundary rejects a hit when the next char is a<\/p>\n<p>  word/slash/hyphen (<code>mdx<\/code>, <code>/foo<\/code>, <code>-1<\/code>) or when it is a <code>.<\/code> that continues into a<\/p>\n<p>  word/slash/hyphen (<code>.bak<\/code>, a second extension) — while still allowing a <code>.<\/code> that is a<\/p>\n<p>  sentence terminator (<code>…x.md.<\/code> at end of a sentence), so a path written at the end of a<\/p>\n<p>  sentence still matches. The left boundary rejects a hit preceded by <code>[\\w./-]<\/code>. A markdown<\/p>\n<p>  link <code><a href=\".claude/agents/x.md\">x<\/a><\/code> matches because the path appears as a delimited token.<\/p>\n<ul><li>On a match, emit <code>{from: doc.id, to: item.id, type: &quot;reference&quot;, evidence: item.path}<\/code>.<\/li><\/ul>\n<p>  Skip self-edges (<code>from == to<\/code>) defensively. Repeated mentions collapse to one edge<\/p>\n<p>  (dedup on the triple); evidence is the item&#x27;s canonical path, so it is fixed regardless<\/p>\n<p>  of which occurrence matched.<\/p>\n<h3><code>declares<\/code> (config-file nodes)<\/h3>\n<ul><li>Group inventory items of type <code>mcpServer<\/code> and <code>hook<\/code> by their <code>path<\/code> (which is always<\/li><\/ul>\n<p>  the declaring config file). Each distinct such path is a **config-file node** with a<\/p>\n<p>  deterministic synthetic id: <code>stable_id(&quot;config&quot;, &quot;configFile&quot;, config_path, &quot;&quot;)<\/code>.<\/p>\n<ul><li>For each config-file node, emit `{from: node.id, to: item.id, type: &quot;declares&quot;,<\/li><\/ul>\n<p>  evidence: config_path}` for every MCP/hook item with that path.<\/p>\n<ul><li>This covers all providers including cursor (<code>.cursor/mcp.json<\/code> → its MCP items), with<\/li><\/ul>\n<p>  correct provenance, and adds no inventory rows.<\/p>\n<h3><code>_refScanBody<\/code> lifecycle (and why not <code>_rawBody<\/code>)<\/h3>\n<p>Docs persist only <code>summary<\/code> + <code>html<\/code> today, so the reference scan needs the full text.<\/p>\n<p>**It must not reuse the <code>_rawBody<\/code> key.** <code>_escape_text_fields<\/code> (generate.py:166-168)<\/p>\n<p>already promotes any <code>_rawBody<\/code> into the search slice <code>_searchBody<\/code> for both inventory and<\/p>\n<p>docs; no adapter sets it today, so docs fall back to the summary. Setting <code>doc[&quot;_rawBody&quot;]<\/code><\/p>\n<p>would silently flip every doc&#x27;s search slice to a body slice and break the<\/p>\n<p><code>_SEARCH_BODY_CHARS<\/code> budget math.<\/p>\n<p>So the <code>claude<\/code>, <code>codex<\/code>, and <code>generic<\/code> adapters set <code>doc[&quot;_refScanBody&quot;] = clean<\/code> (the<\/p>\n<p>redacted raw markdown they already compute; cursor indexes no docs). The doc search slice<\/p>\n<p>is unchanged. <code>_build_relationships<\/code> reads <code>_refScanBody<\/code>; <code>generate()<\/code> then pops it and<\/p>\n<p><code>_searchBody<\/code> from inventory and docs before assembling <code>data<\/code>.<\/p>\n<p>**Pinned order** (<code>_refScanBody<\/code> is redacted but unescaped full markdown — leaving it on a<\/p>\n<p>doc would dump whole bodies into the island and blow the budget):<\/p>\n<pre><code>_merge_parts → _escape_text_fields → _build_search →\n_build_relationships(reads _refScanBody) →\npop _searchBody and _refScanBody from inventory + docs →\nassemble data → validate(data) → render_html<\/code><\/pre>\n<p><code>data[&quot;docs&quot;]<\/code> aliases the same dict objects the pop loop mutates, so popping before<\/p>\n<p>assembly is sufficient; an acceptance test asserts neither <code>_refScanBody<\/code> nor <code>_rawBody<\/code><\/p>\n<p>appears in the rendered HTML.<\/p>\n<h3>Reference scanning runs over the redacted body<\/h3>\n<p><code>_refScanBody = clean<\/code> is post-<code>redact_text<\/code>. A doc line like <code>see [redacted] redacts to <\/code>see [redacted]`, so that path reference is dropped. This<\/p>\n<p>is an **accepted false negative** (rare; a path immediately after a secret keyword), kept<\/p>\n<p>for defense-in-depth: even with path-only evidence, scanning the redacted body means a<\/p>\n<p>mis-ordered pop can never leak a secret. A unit test pins it.<\/p>\n<h2>Rendering model<\/h2>\n<ul><li>**Adjacency + labels.** Build once from <code>data.relationships<\/code>:<\/li><\/ul>\n<p>  <code>edgesByEndpoint: id → [{ otherId, dir, type, evidence }]<\/code> (<code>dir<\/code> is <code>out<\/code> on the <code>from<\/code><\/p>\n<p>  side, <code>in<\/code> on the <code>to<\/code> side), and <code>metaById: id → { title, typeLabel, path }<\/code> built from<\/p>\n<p>  the **canonical** <code>inventory<\/code> / <code>docs<\/code> / <code>todos<\/code> (not from <code>search<\/code>, so labels do not<\/p>\n<p>  depend on the search index&#x27;s light-mode behavior; doc labels synthesize <code>typeLabel<\/code> from<\/p>\n<p>  the bucket via the existing <code>doc_type_label<\/code>). Config-file node ids are not in<\/p>\n<p>  <code>metaById<\/code>; their label is the config path carried in the edge <code>evidence<\/code>.<\/p>\n<ul><li>**Inline &quot;Related.&quot;** After a row renders, append an <code>.acc-related<\/code> block listing its<\/li><\/ul>\n<p>  edges. Each entry is a real <code>&lt;button type=&quot;button&quot;&gt;<\/code> (or <code>&lt;a href=&quot;#…&quot;&gt;<\/code>) with keyboard<\/p>\n<p>  activation that calls <code>jumpTo(otherId)<\/code> — the target id lives in the handler closure (or<\/p>\n<p>  a <code>data-jump<\/code> attribute), **never** as <code>data-id<\/code> on an <code>.acc-item<\/code>. A <code>declares<\/code> edge<\/p>\n<p>  shown on an item renders &quot;declared in <code>&lt;evidence path&gt;<\/code>&quot; as a plain label (the config<\/p>\n<p>  node has no row to jump to). Verbs: <code>declares<\/code> in → &quot;declared in&quot;, <code>reference<\/code> out →<\/p>\n<p>  &quot;references&quot;, <code>reference<\/code> in → &quot;referenced by&quot;.<\/p>\n<ul><li>**Cross-references view.** A <code>#crossref<\/code> section with <code>renderCrossReferences()<\/code>. Grouped<\/li><\/ul>\n<p>  by source: each source listed once (a doc, labeled from <code>metaById<\/code>; or a config file,<\/p>\n<p>  labeled by its path), its outgoing edges indented beneath, each item endpoint a<\/p>\n<p>  non-indexed jump control. **Display order:** sort source groups and the targets within<\/p>\n<p>  them by <code>(path, title)<\/code> — never by the hash-id storage order. An Overview card links to<\/p>\n<p>  it with an edge count.<\/p>\n<pre><code>Cross-references (12)\n\n.claude/settings.json  [config]\n  → declares     MCP server  github         (.claude/settings.json)\n  → declares     Hook        PreToolUse     (.claude/settings.json)\n\nCLAUDE.md  [doc]\n  → references   Agent       code-reviewer  (.claude/agents/code-reviewer.md)\n\n.cursor/mcp.json  [config]\n  → declares     MCP server  context7       (.cursor/mcp.json)<\/code><\/pre>\n<ul><li>**Init sequence (pinned).** Render the canonical rows (inventory, docs, todos) and<\/li><\/ul>\n<p>  append each row&#x27;s inline Related block during those passes; call <code>buildRowIndex()<\/code><\/p>\n<p>  exactly once after all canonical rows are in the DOM; then <code>renderCrossReferences()<\/code><\/p>\n<p>  (its controls are non-indexed, so order relative to <code>buildRowIndex<\/code> is safe); then wire<\/p>\n<p>  interactions. <code>buildRowIndex<\/code> indexes only <code>.acc-item[data-id]<\/code> canonical rows.<\/p>\n<ul><li>**Empty state.** No edges → the Cross-references section renders a one-line &quot;No<\/li><\/ul>\n<p>  cross-references found&quot; note; rows with no edges render no Related block.<\/p>\n<ul><li>**Degraded mode.** <code>_reduce_for_size<\/code> keeps every <code>declares<\/code> edge (bounded by the<\/li><\/ul>\n<p>  MCP+hook count) and caps <code>reference<\/code> edges to the first <code>_MAX_DEGRADED_REFERENCE_EDGES<\/code><\/p>\n<p>  (default 200) by the deterministic <code>(from, to, type)<\/code> sort, dropping the rest and<\/p>\n<p>  logging the count. Related and Cross-references still render and jump, because labels<\/p>\n<p>  come from <code>metaById<\/code> (canonical, retained).<\/p>\n<h2>Architecture<\/h2>\n<ul><li><code>generate.py<\/code><\/li><li><code>_build_relationships(inv, docs) -&gt; list[dict]<\/code> — the reference pass (sorted<\/li><\/ul>\n<p>    <code>path → set(ids)<\/code> over inventory items, uniqueness + config-path exclusion, boundary<\/p>\n<p>    regex over each doc&#x27;s <code>_refScanBody<\/code>) and the <code>declares<\/code> pass (config-file nodes over<\/p>\n<p>    MCP/hook item paths). Dedup and sort on <code>(from, to, type)<\/code>.<\/p>\n<ul><li>wire <code>data[&quot;relationships&quot;] = _build_relationships(inv, docs)<\/code>; pop <code>_searchBody<\/code> and<\/li><\/ul>\n<p>    <code>_refScanBody<\/code> after this call and before data assembly, per the pinned order.<\/p>\n<ul><li><code>_reduce_for_size<\/code> — keep <code>declares<\/code>, cap <code>reference<\/code> to <code>_MAX_DEGRADED_REFERENCE_EDGES<\/code>.<\/li><li>adapters/<code>claude.py<\/code>, <code>codex.py<\/code>, <code>generic.py<\/code> — set <code>_refScanBody = clean<\/code> on each doc.<\/li><\/ul>\n<p>  (No <code>provider<\/code> tag on docs is needed — <code>declares<\/code> no longer uses instruction docs.)<\/p>\n<ul><li><code>schema.py<\/code> — <code>_validate_relationships(edges, item_ids, doc_ids, config_node_ids)<\/code>:<\/li><\/ul>\n<p>  each edge has <code>{from, to, type, evidence}<\/code> as strings; <code>type in {reference, declares}<\/code>;<\/p>\n<p>  <code>to in item_ids<\/code> always; <code>reference<\/code> <code>from in doc_ids<\/code>; <code>declares<\/code> `from in<\/p>\n<p>  config_node_ids` (the set the builder derives from MCP/hook item paths). All sets are<\/p>\n<p>  built from the data object so the call works identically on full and reduced data.<\/p>\n<ul><li><code>app.js<\/code> — <code>edgesByEndpoint<\/code> + <code>metaById<\/code> (from canonical sources); the inline Related<\/li><\/ul>\n<p>  pass (real buttons/anchors, non-indexed); <code>renderCrossReferences()<\/code> (source-grouped,<\/p>\n<p>  path/title display-sort); the pinned init sequence; nav + Overview card. Reuse <code>el<\/code>,<\/p>\n<p>  <code>jumpTo<\/code>.<\/p>\n<ul><li><code>dashboard.html.tmpl<\/code> / <code>styles.css<\/code> — <code>#crossref<\/code> section + nav anchor; <code>.acc-related<\/code><\/li><\/ul>\n<p>  and Cross-references styles.<\/p>\n<h2>Acceptance criteria<\/h2>\n<ul><li>A doc that contains an inventory item&#x27;s exact path (as a delimited token) produces<\/li><\/ul>\n<p>  exactly one <code>reference<\/code> edge, even if the path appears several times; the item&#x27;s row<\/p>\n<p>  shows &quot;referenced by&quot; and the doc&#x27;s row shows &quot;references.&quot;<\/p>\n<ul><li><code>.claude/agents/x.md.bak<\/code>, or <code>API.md<\/code> inside <code>legacy_API.md.old<\/code>, produces **no** edge<\/li><\/ul>\n<p>  (boundary rule). `see [redacted] produces **no** edge (redaction) —<\/p>\n<p>  pinned, accepted behavior. A doc citing another doc&#x27;s path produces **no** edge<\/p>\n<p>  (inventory-only targets).<\/p>\n<ul><li>Each provider config file shows <code>declares<\/code> edges to its MCP servers and hooks, sourced<\/li><\/ul>\n<p>  from the **config file** node (not <code>CLAUDE.md<\/code>). A cursor repo&#x27;s <code>.cursor/mcp.json<\/code><\/p>\n<p>  declares its MCP servers. No <code>declares<\/code> edge targets a command.<\/p>\n<ul><li>Clicking any Related entry or any Cross-references item endpoint scrolls the **canonical**<\/li><\/ul>\n<p>  row for that id into view and flashes it (jump controls never shadow canonical rows; a<\/p>\n<p>  <code>declares<\/code> config source is a label, not a jump target).<\/p>\n<ul><li>Related entries and Cross-references endpoints are keyboard-activable controls<\/li><\/ul>\n<p>  (<code>&lt;button&gt;<\/code> / <code>&lt;a&gt;<\/code>), and the Cross-references view is display-sorted by path/title.<\/p>\n<ul><li><code>grep -nE &#x27;innerHTML|outerHTML|insertAdjacentHTML&#x27; app.js<\/code> returns nothing.<\/li><li>Output is byte-identical across repeated runs; the doc search slice is unchanged from<\/li><\/ul>\n<p>  4a; under the size budget; in degraded mode <code>declares<\/code> edges all survive and <code>reference<\/code><\/p>\n<p>  edges are capped deterministically.<\/p>\n<ul><li>Neither <code>_refScanBody<\/code> nor <code>_rawBody<\/code> appears in the rendered HTML.<\/li><li>Schema rejects an edge with a dangling <code>to<\/code> (not an item id), a <code>reference<\/code> <code>from<\/code> that<\/li><\/ul>\n<p>  is not a doc id, a <code>declares<\/code> <code>from<\/code> that is not a config-node id, an unknown <code>type<\/code>, or<\/p>\n<p>  a non-string field.<\/p>\n<h2>Testing<\/h2>\n<ul><li>Unit (<code>_build_relationships<\/code>):<\/li><li>reference dedup across repeated mentions; boundary rejection of <code>.md<\/code>-inside-<code>.md.bak<\/code><\/li><\/ul>\n<p>    and filename-in-prose; the <code>path → set(ids)<\/code> uniqueness filter (a path on one item<\/p>\n<p>    after iterating other buckets still matches; a path on two items matches nothing); the<\/p>\n<p>    four config-path exclusions; docs are not reference targets; redaction false-negative<\/p>\n<p>    (`[redacted] → no edge).<\/p>\n<ul><li><code>declares<\/code>: config-file node → its MCP/hook items; one node per distinct config path;<\/li><\/ul>\n<p>    cursor <code>.cursor/mcp.json<\/code> declares its MCP; no command is a <code>declares<\/code> target; the<\/p>\n<p>    synthetic node id is deterministic.<\/p>\n<ul><li>deterministic sort; full edge list byte-identical across runs.<\/li><li>Unit (<code>_refScanBody<\/code>): set on docs by the adapters, read by the builder, absent from the<\/li><\/ul>\n<p>  serialized island; the doc search slice (<code>_searchBody<\/code>) is unchanged vs. 4a.<\/p>\n<ul><li>Schema: dangling <code>to<\/code>, wrong-kind <code>from<\/code>, bad <code>type<\/code>, non-string field each rejected;<\/li><\/ul>\n<p>  sets built from the data object; valid edges pass on full and reduced data.<\/p>\n<ul><li>Unit (<code>_reduce_for_size<\/code>): <code>declares<\/code> retained, <code>reference<\/code> capped at<\/li><\/ul>\n<p>  <code>_MAX_DEGRADED_REFERENCE_EDGES<\/code>, re-validates under budget.<\/p>\n<ul><li>Playwright DOM (<code>page.set_content<\/code>): bidirectional Related with correct verbs and<\/li><\/ul>\n<p>  keyboard activation; clicking Related / a Cross-references item endpoint jumps to and<\/p>\n<p>  flashes the **canonical** row (not a jump control); a <code>declares<\/code> source renders as a<\/p>\n<p>  label; the Cross-references view groups by source and display-sorts by path/title;<\/p>\n<p>  degraded/light mode still renders Related and Cross-references; the init sequence leaves<\/p>\n<p>  <code>buildRowIndex<\/code> indexing only canonical rows.<\/p>\n<ul><li>CI guard: <code>app.js<\/code> stays free of <code>innerHTML<\/code> / <code>outerHTML<\/code> / <code>insertAdjacentHTML<\/code>.<\/li><\/ul>\n<h2>File-by-file plan<\/h2>\n<ul><li><code>src/acc/generate.py<\/code> — <code>_build_relationships<\/code> (reference + config-file-node <code>declares<\/code>);<\/li><\/ul>\n<p>  wire <code>relationships<\/code>; the pinned pop-before-assembly order; <code>_reduce_for_size<\/code> reference<\/p>\n<p>  cap; <code>_MAX_DEGRADED_REFERENCE_EDGES<\/code>.<\/p>\n<ul><li><code>src/acc/adapters/claude.py<\/code>, <code>codex.py<\/code>, <code>generic.py<\/code> — <code>_refScanBody = clean<\/code> on docs.<\/li><li><code>src/acc/schema.py<\/code> — <code>_validate_relationships<\/code> (shape, enum, type-aware referential<\/li><\/ul>\n<p>  integrity); endpoint id sets from the data object.<\/p>\n<ul><li><code>src/acc/templates/app.js<\/code> — adjacency + <code>metaById<\/code> from canonical sources; inline<\/li><\/ul>\n<p>  Related (non-indexed buttons/anchors); Cross-references view (source-grouped, path/title<\/p>\n<p>  sort); pinned init sequence; nav + Overview card.<\/p>\n<ul><li><code>src/acc/templates/dashboard.html.tmpl<\/code> — <code>#crossref<\/code> section + nav anchor.<\/li><li><code>src/acc/templates/styles.css<\/code> — Related + Cross-references styles.<\/li><li><code>tests/<\/code> — unit + schema + Playwright DOM + the existing innerHTML guard.<\/li><\/ul>\n<h2>Reusable infra consumed from Phase 4a<\/h2>\n<ul><li>Per-row <code>id<\/code> + the <code>id → row<\/code> map + <code>jumpTo<\/code> → inline Related links and Cross-references<\/li><\/ul>\n<p>  item endpoints jump with the existing mechanism (and never pollute the index — decision 8).<\/p>\n<ul><li><code>type<\/code> / <code>typeLabel<\/code> + <code>doc_type_label<\/code> → the <code>metaById<\/code> label map for edge endpoints.<\/li><\/ul>\n<h2>Open questions (resolved in the Codex debate — listed for the record)<\/h2>\n<p>1. **<code>reference<\/code> evidence** — resolved to the matched path string (not a context snippet):<\/p>\n<p>   simpler, no redaction/window/escape risk, and the edge already proves the connection.<\/p>\n<p>2. **<code>declares<\/code> source** — resolved to config-file nodes (not the instruction-doc hub):<\/p>\n<p>   correct provenance and cursor coverage.<\/p>\n<p>3. **<code>declares<\/code> set** — resolved to MCP/hook only; commands are file-discovered.<\/p>\n<p>4. **reference targets** — resolved to inventory items only; doc→doc deferred.<\/p>\n<p>5. **redaction** — resolved to scan the redacted body, accept the rare false negative<\/p>\n<p>   (defense-in-depth).<\/p>\n<p>6. **codex prompt commands as reference sources** — deferred (Non-goal); promote all<\/p>\n<p>   body-bearing command artifacts together later, provider-agnostic.<\/p>\n<h2>Out of scope → later phases<\/h2>\n<ul><li>Body-mentions-name edges; doc→doc references; markdown relative-link resolution.<\/li><li>Reference sources beyond doc bodies (command artifacts), provider-agnostic.<\/li><li>Commands as <code>declares<\/code>/<code>provides<\/code> targets; ordered workflow chains; a multi-view router.<\/li><li>Packaging (<code>/dashboard<\/code>, refresh tiers, plugin); latent Phase 3 hardening.<\/li><\/ul>\n<h2>Review provenance<\/h2>\n<p>5-lens adversarial design review (XSS / island safety, determinism, reference false<\/p>\n<p>positives, jump / render correctness, schema / referential integrity), source-grounded;<\/p>\n<p>run <code>wf_244234f2-95e<\/code>. 18 findings; verification interrupted at session suspend, so<\/p>\n<p>findings were adjudicated against ground-truth source. Folded in: distinct <code>_refScanBody<\/code>;<\/p>\n<p>boundary-checked path match; non-indexed jump controls; <code>path → set(ids)<\/code> uniqueness;<\/p>\n<p>config-path exclusion; redacted-body scan; pinned pop-before-serialize order and init<\/p>\n<p>sequence.<\/p>\n<p>Codex debate (gpt-5.5 / xhigh, read-only, thread <code>019e7ad1<\/code>), verdict needs-rework, all<\/p>\n<p>claims re-verified against source. Accepted and folded in: <code>declares<\/code> re-sourced from<\/p>\n<p>config-file nodes instead of instruction-doc hubs (false provenance + dropped cursor);<\/p>\n<p>commands removed from <code>declares<\/code> (file-discovered, not config-declared); reference targets<\/p>\n<p>narrowed to inventory items (doc→doc deferred); <code>reference<\/code> evidence simplified to the<\/p>\n<p>matched path (snippet machinery removed); a deterministic <code>reference<\/code> cap in degraded mode;<\/p>\n<p>Cross-references display-sorted by path/title rather than hash id; <code>metaById<\/code> built from<\/p>\n<p>canonical sources; Related controls specified as real buttons/anchors; the leftover<\/p>\n<p><code>body.find<\/code> wording removed; <code>SCHEMA_VERSION<\/code> documented as a compatible population.<\/p>\n<p>Deferred against the debate: markdown relative-link resolution (kept exact-path for v1) and<\/p>\n<p>a target-grouped Cross-references section (the bidirectional inline Related already answers<\/p>\n<p>&quot;what references this item&quot;).<\/p>\n<h1>(end of spec)<\/h1>","id":"a4fb696be9d0","path":"docs/specs/phase-4b-relationships.md","summary":"Phase 3 shipped a deterministic single-file dashboard; Phase 4a turned the dead search","title":"Phase 4b — Relationships (cross-references)"},{"html":"<h1>AI Control Center — Phase 1 (deterministic core + generic dashboard) Implementation Plan<\/h1>\n<p>&gt; **For agentic workers:** REQUIRED SUB-SKILL: Use superpowers:subagent-driven-development (recommended) or superpowers:executing-plans to implement this plan task-by-task. Steps use checkbox (<code>- [ ]<\/code>) syntax for tracking.<\/p>\n<p>**Goal:** Build the deterministic extraction core and a generic-fallback adapter that stamps one self-contained, redacted, byte-stable <code>dashboard.html<\/code> for any repo.<\/p>\n<p>**Architecture:** A stdlib-only <code>python3<\/code> package scans a repo&#x27;s files, a generic adapter turns markdown into normalized data, secrets are redacted at extraction, the data is canonicalized and inlined as a JSON island, and a bundled HTML template plus classic inline JS renders the view. No third-party runtime dependencies. Output is deterministic so re-stamping produces no diff when content is unchanged.<\/p>\n<p>**Tech Stack:** Python 3.12 (stdlib only at runtime), pytest (dev only), HTML + classic JS template.<\/p>\n<p>This is Phase 1 of 4 (see the design spec at <code>docs/superpowers/specs/2026-05-29-ai-control-center-design.md<\/code>). Phases 2-4 (first-class adapters, full renderer, refresh + packaging) get their own plans.<\/p>\n<p>---<\/p>\n<h2>File structure<\/h2>\n<pre><code>ai-control-center/\n  pyproject.toml                 # package metadata, pytest config (dev)\n  src/acc/\n    __init__.py                  # version constant\n    ids.py                       # stable_id(), rel_posix()\n    redaction.py                 # redact_text(), allowlist_config()\n    scan.py                      # scan_files(), DEFAULT_EXCLUDES\n    markdown.py                  # render_markdown_safe()\n    digest.py                    # source_digest()\n    schema.py                    # SCHEMA_VERSION, canonical_json(), validate()\n    render.py                    # render_html()\n    generate.py                  # generate(), detect_out_dir()\n    cli.py                       # main() entry point\n    adapters/\n      __init__.py\n      base.py                    # ScanContext, ProviderRoot, ProviderAdapter\n      generic.py                 # GenericAdapter\n  templates/\n    dashboard.html.tmpl          # static shell, layout B, placeholders\n    styles.css                   # inlined at render\n    app.js                       # classic JS, builds DOM from JSON island\n  tests/\n    test_ids.py\n    test_redaction.py\n    test_scan.py\n    test_markdown.py\n    test_digest.py\n    test_schema.py\n    test_generic_adapter.py\n    test_render.py\n    test_generate.py             # determinism, redaction, XSS integration\n    fixtures/\n      sample_repo/               # built inside the test, not committed raw<\/code><\/pre>\n<p>Each module has one responsibility. <code>generate.py<\/code> is the only place that wires them together. Adapters depend on <code>ids<\/code>, <code>redaction<\/code>, <code>markdown<\/code> but never on each other.<\/p>\n<p>---<\/p>\n<h2>Task 0: Scaffold the package<\/h2>\n<p>**Files:**<\/p>\n<ul><li>Create: <code>pyproject.toml<\/code><\/li><li>Create: <code>src/acc/__init__.py<\/code><\/li><li>Create: <code>src/acc/adapters/__init__.py<\/code><\/li><\/ul>\n<ul><li>[ ] **Step 1: Create <code>pyproject.toml<\/code>**<\/li><\/ul>\n<pre><code>[build-system]\nrequires = [&quot;setuptools&gt;=68&quot;]\nbuild-backend = &quot;setuptools.build_meta&quot;\n\n[project]\nname = &quot;ai-control-center&quot;\nversion = &quot;0.1.0&quot;\ndescription = &quot;Self-contained HTML control center generated from a repo&#x27;s AI markdown&quot;\nrequires-python = &quot;&gt;=3.12&quot;\n\n[project.scripts]\nacc = &quot;acc.cli:main&quot;\n\n[tool.setuptools.packages.find]\nwhere = [&quot;src&quot;]\n\n[tool.pytest.ini_options]\npythonpath = [&quot;src&quot;]\ntestpaths = [&quot;tests&quot;]<\/code><\/pre>\n<ul><li>[ ] **Step 2: Create the package init files**<\/li><\/ul>\n<p><code>src/acc/__init__.py<\/code>:<\/p>\n<pre><code>__version__ = &quot;0.1.0&quot;<\/code><\/pre>\n<p><code>src/acc/adapters/__init__.py<\/code>:<\/p>\n<pre><code><\/code><\/pre>\n<p>(empty file)<\/p>\n<ul><li>[ ] **Step 3: Verify the dev environment**<\/li><\/ul>\n<p>Run: <code>python -m pytest --version<\/code><\/p>\n<p>Expected: pytest prints its version (install with <code>pip install pytest<\/code> if missing).<\/p>\n<ul><li>[ ] **Step 4: Commit**<\/li><\/ul>\n<pre><code>git add pyproject.toml src/acc/__init__.py src/acc/adapters/__init__.py\ngit commit -m &quot;chore: scaffold acc package&quot;<\/code><\/pre>\n<p>---<\/p>\n<h2>Task 1: Stable IDs and repo-relative paths<\/h2>\n<p>**Files:**<\/p>\n<ul><li>Create: <code>src/acc/ids.py<\/code><\/li><li>Test: <code>tests/test_ids.py<\/code><\/li><\/ul>\n<ul><li>[ ] **Step 1: Write the failing test**<\/li><\/ul>\n<p><code>tests/test_ids.py<\/code>:<\/p>\n<pre><code>from pathlib import Path\nfrom acc.ids import stable_id, rel_posix\n\n\ndef test_stable_id_is_deterministic_and_12_chars():\n    a = stable_id(&quot;generic&quot;, &quot;doc&quot;, &quot;docs/x.md&quot;, &quot;Title&quot;)\n    b = stable_id(&quot;generic&quot;, &quot;doc&quot;, &quot;docs/x.md&quot;, &quot;Title&quot;)\n    assert a == b\n    assert len(a) == 12\n    assert a.isalnum()\n\n\ndef test_stable_id_changes_with_inputs():\n    base = stable_id(&quot;generic&quot;, &quot;doc&quot;, &quot;docs/x.md&quot;, &quot;Title&quot;)\n    assert base != stable_id(&quot;claude&quot;, &quot;doc&quot;, &quot;docs/x.md&quot;, &quot;Title&quot;)\n    assert base != stable_id(&quot;generic&quot;, &quot;skill&quot;, &quot;docs/x.md&quot;, &quot;Title&quot;)\n    assert base != stable_id(&quot;generic&quot;, &quot;doc&quot;, &quot;docs/y.md&quot;, &quot;Title&quot;)\n\n\ndef test_rel_posix_uses_forward_slashes(tmp_path):\n    root = tmp_path\n    f = root / &quot;sub&quot; / &quot;a.md&quot;\n    f.parent.mkdir(parents=True)\n    f.write_text(&quot;hi&quot;)\n    assert rel_posix(f, root) == &quot;sub/a.md&quot;<\/code><\/pre>\n<ul><li>[ ] **Step 2: Run test to verify it fails**<\/li><\/ul>\n<p>Run: <code>python -m pytest tests/test_ids.py -v<\/code><\/p>\n<p>Expected: FAIL with <code>ModuleNotFoundError: No module named &#x27;acc.ids&#x27;<\/code><\/p>\n<ul><li>[ ] **Step 3: Write minimal implementation**<\/li><\/ul>\n<p><code>src/acc/ids.py<\/code>:<\/p>\n<pre><code>import hashlib\nfrom pathlib import Path\n\n\ndef stable_id(provider: str, kind: str, rel_path: str, heading: str = &quot;&quot;) -&gt; str:\n    raw = f&quot;{provider}\\0{kind}\\0{rel_path}\\0{heading}&quot;\n    return hashlib.sha256(raw.encode(&quot;utf-8&quot;)).hexdigest()[:12]\n\n\ndef rel_posix(path: Path, root: Path) -&gt; str:\n    return path.resolve().relative_to(root.resolve()).as_posix()<\/code><\/pre>\n<ul><li>[ ] **Step 4: Run test to verify it passes**<\/li><\/ul>\n<p>Run: <code>python -m pytest tests/test_ids.py -v<\/code><\/p>\n<p>Expected: PASS (3 passed)<\/p>\n<ul><li>[ ] **Step 5: Commit**<\/li><\/ul>\n<pre><code>git add src/acc/ids.py tests/test_ids.py\ngit commit -m &quot;feat: stable IDs and repo-relative paths&quot;<\/code><\/pre>\n<p>---<\/p>\n<h2>Task 2: Redaction at extraction<\/h2>\n<p>**Files:**<\/p>\n<ul><li>Create: <code>src/acc/redaction.py<\/code><\/li><li>Test: <code>tests/test_redaction.py<\/code><\/li><\/ul>\n<ul><li>[ ] **Step 1: Write the failing test**<\/li><\/ul>\n<p><code>tests/test_redaction.py<\/code>:<\/p>\n<pre><code>from acc.redaction import redact_text, allowlist_config\n\n\ndef test_redacts_bearer_token():\n    out, n = redact_text(&quot;Authorization: [redacted]&quot;)\n    assert &quot;abcDEF123456789&quot; not in out\n    assert n == 1\n\n\ndef test_redacts_keyword_assignment():\n    out, n = redact_text(&#x27;[redacted]&#x27;)\n    assert &quot;supersecretvalue&quot; not in out\n    assert n &gt;= 1\n\n\ndef test_redacts_provider_prefixed_key():\n    out, n = redact_text(&quot;token [redacted]&quot;)\n    assert &quot;[redacted]&quot; not in out\n    assert n &gt;= 1\n\n\ndef test_redacts_url_with_credentials():\n    out, n = redact_text(&quot;[redacted]\n    assert &quot;p4ssw0rd&quot; not in out\n    assert n == 1\n\n\ndef test_leaves_clean_text_untouched():\n    text = &quot;This is a normal sentence about skills and agents.&quot;\n    out, n = redact_text(text)\n    assert out == text\n    assert n == 0\n\n\ndef test_allowlist_drops_unlisted_keys_and_redacts_values():\n    cfg = {&quot;command&quot;: &quot;npx&quot;, &quot;args&quot;: [&quot;-y&quot;, &quot;pkg&quot;, &quot;--token&quot;, &quot;[redacted]&quot;],\n           &quot;env&quot;: {&quot;SECRET&quot;: &quot;x&quot;}}\n    clean = allowlist_config(cfg, {&quot;command&quot;, &quot;args&quot;})\n    assert &quot;env&quot; not in clean\n    assert clean[&quot;command&quot;] == &quot;npx&quot;\n    assert &quot;[redacted]&quot; not in &quot; &quot;.join(clean[&quot;args&quot;])<\/code><\/pre>\n<ul><li>[ ] **Step 2: Run test to verify it fails**<\/li><\/ul>\n<p>Run: <code>python -m pytest tests/test_redaction.py -v<\/code><\/p>\n<p>Expected: FAIL with <code>ModuleNotFoundError: No module named &#x27;acc.redaction&#x27;<\/code><\/p>\n<ul><li>[ ] **Step 3: Write minimal implementation**<\/li><\/ul>\n<p><code>src/acc/redaction.py<\/code>:<\/p>\n<pre><code>import re\n\nREDACTED = &quot;[redacted]&quot;\n\n_SECRET_PATTERNS = [\n    re.compile(r&quot;(?i)bearer\\s+[A-Za-z0-9._\\-]{8,}&quot;),\n    re.compile(\n        r&quot;(?i)\\b(?:api[_-]?key|secret|access[_-]?token|token|password|passwd|pwd|client[_-]?secret)\\b&quot;\n        r&quot;\\s*[:=]\\s*[\\&quot;&#x27;]?[^\\s\\&quot;&#x27;]{6,}&quot;\n    ),\n    re.compile(r&quot;\\b(?:sk|pk|gho|ghp|ghs|xox[baprs])[-_][A-Za-z0-9]{10,}&quot;),\n    re.compile(r&quot;(?i)\\b[a-z][a-z0-9+.\\-]*://[^/\\s:@]+:[^/\\s:@]+@\\S+&quot;),\n]\n\n\ndef redact_text(text: str) -&gt; tuple[str, int]:\n    n = 0\n    for pat in _SECRET_PATTERNS:\n        text, count = pat.subn(REDACTED, text)\n        n += count\n    return text, n\n\n\ndef allowlist_config(config: dict, allowed: set[str]) -&gt; dict:\n    clean: dict = {}\n    for key, value in config.items():\n        if key not in allowed:\n            continue\n        clean[key] = _redact_value(value)\n    return clean\n\n\ndef _redact_value(value):\n    if isinstance(value, str):\n        return redact_text(value)[0]\n    if isinstance(value, list):\n        return [_redact_value(v) for v in value]\n    if isinstance(value, dict):\n        return {k: _redact_value(v) for k, v in value.items()}\n    return value<\/code><\/pre>\n<ul><li>[ ] **Step 4: Run test to verify it passes**<\/li><\/ul>\n<p>Run: <code>python -m pytest tests/test_redaction.py -v<\/code><\/p>\n<p>Expected: PASS (6 passed)<\/p>\n<ul><li>[ ] **Step 5: Commit**<\/li><\/ul>\n<pre><code>git add src/acc/redaction.py tests/test_redaction.py\ngit commit -m &quot;feat: redaction-at-extraction with allowlist&quot;<\/code><\/pre>\n<p>---<\/p>\n<h2>Task 3: File scanning with exclusions<\/h2>\n<p>**Files:**<\/p>\n<ul><li>Create: <code>src/acc/scan.py<\/code><\/li><li>Test: <code>tests/test_scan.py<\/code><\/li><\/ul>\n<ul><li>[ ] **Step 1: Write the failing test**<\/li><\/ul>\n<p><code>tests/test_scan.py<\/code>:<\/p>\n<pre><code>from acc.scan import scan_files, DEFAULT_EXCLUDES\n\n\ndef test_scan_is_sorted_and_relative(tmp_path):\n    (tmp_path / &quot;b.md&quot;).write_text(&quot;b&quot;)\n    (tmp_path / &quot;a.md&quot;).write_text(&quot;a&quot;)\n    (tmp_path / &quot;sub&quot;).mkdir()\n    (tmp_path / &quot;sub&quot; / &quot;c.md&quot;).write_text(&quot;c&quot;)\n    rels = [p.relative_to(tmp_path).as_posix() for p in scan_files(tmp_path)]\n    assert rels == [&quot;a.md&quot;, &quot;b.md&quot;, &quot;sub/c.md&quot;]\n\n\ndef test_scan_excludes_known_dirs(tmp_path):\n    (tmp_path / &quot;keep.md&quot;).write_text(&quot;k&quot;)\n    for bad in DEFAULT_EXCLUDES:\n        d = tmp_path / bad\n        d.mkdir()\n        (d / &quot;skip.md&quot;).write_text(&quot;s&quot;)\n    rels = [p.relative_to(tmp_path).as_posix() for p in scan_files(tmp_path)]\n    assert rels == [&quot;keep.md&quot;]\n\n\ndef test_scan_skips_symlinks(tmp_path):\n    real = tmp_path / &quot;real.md&quot;\n    real.write_text(&quot;r&quot;)\n    (tmp_path / &quot;link.md&quot;).symlink_to(real)\n    rels = [p.relative_to(tmp_path).as_posix() for p in scan_files(tmp_path)]\n    assert rels == [&quot;real.md&quot;]<\/code><\/pre>\n<ul><li>[ ] **Step 2: Run test to verify it fails**<\/li><\/ul>\n<p>Run: <code>python -m pytest tests/test_scan.py -v<\/code><\/p>\n<p>Expected: FAIL with <code>ModuleNotFoundError: No module named &#x27;acc.scan&#x27;<\/code><\/p>\n<ul><li>[ ] **Step 3: Write minimal implementation**<\/li><\/ul>\n<p><code>src/acc/scan.py<\/code>:<\/p>\n<pre><code>from pathlib import Path\n\nDEFAULT_EXCLUDES = {\n    &quot;.git&quot;, &quot;node_modules&quot;, &quot;.venv&quot;, &quot;venv&quot;, &quot;__pycache__&quot;,\n    &qu uot;generic&quot;\n    display_name = &quot;Generic&quot;\n\n    def detect(self, ctx: ScanContext) -&gt; list[ProviderRoot]:\n        return [ProviderRoot(provider=&quot;generic&quot;, path=ctx.root)]\n\n    def normalize(self, ctx: ScanContext, root: ProviderRoot) -&gt; dict:\n        docs: list[dict] = []\n        todos: list[dict] = []\n        title = ctx.root.name\n        for p in ctx.files:\n            if p.suffix.lower() != &quot;.md&quot;:\n                continue\n            rel = rel_posix(p, ctx.root)\n            raw = p.read_text(encoding=&quot;utf-8&quot;, errors=&quot;replace&quot;)\n            clean, _ = redact_text(raw)\n            heading = _first_heading(clean) or rel\n            docs.append({\n                &quot;id&quot;: stable_id(&quot;generic&quot;, &quot;doc&quot;, rel, heading),\n                &quot;title&quot;: heading,\n                &quot;path&quot;: rel,\n                &quot;summary&quot;: _first_paragraph(clean),\n                &quot;html&quot;: render_markdown_safe(clean),\n            })\n            for line in clean.splitlines():\n                m = _TODO.match(line)\n                if m:\n                    todos.append({&quot;text&quot;: m.group(1).strip(), &quot;path&quot;: rel})\n            if rel.lower() == &quot;readme.md&quot; and heading:\n                title = heading\n        docs.sort(key=lambda d: d[&quot;path&quot;])\n        todos.sort(key=lambda t: (t[&quot;path&quot;], t[&quot;text&quot;]))\n        return {\n            &quot;project&quot;: {&quot;title&quot;: title, &quot;openTodos&quot;: todos, &quot;recentDocs&quot;: [], &quot;warnings&quot;: []},\n            &quot;docs&quot;: {&quot;references&quot;: docs, &quot;prds&quot;: [], &quot;adrs&quot;: [], &quot;decisions&quot;: [], &quot;workflows&quot;: []},\n            &quot;inventory&quot;: {&quot;agents&quot;: [], &quot;skills&quot;: [], &quot;hooks&quot;: [], &quot;commands&quot;: [], &quot;mcpServers&quot;: [], &quot;rules&quot;: []},\ itle + &quot; &quot; + doc.path + &quot; &quot; + (doc.summary || &quot;&quot;)).toLowerCase();\n        host.appendChild(row);\n      });\n    });\n  }\n\n  function renderTodos() {\n    var host = document.getElementById(&quot;acc-todos&quot;);\n    (data.project.openTodos || []).forEach(function (t) {\n      var row = el(&quot;div&quot;, &quot;acc-row acc-item&quot;, t.text + &quot;  —  &quot; + t.path);\n      row.dataset.search = (t.text + &quot; &quot; + t.path).toLowerCase();\n      host.appendChild(row);\n    });\n  }\n\n  function wireSearch() {\n    var box = document.getElementById(&quot;acc-search&quot;);\n    box.addEventListener(&quot;input&quot;, function () {\n      var q = box.value.toLowerCase();\n      document.querySelectorAll(&quot;.acc-item&quot;).forEach(function (row) {\n        var hit = !q || (row.dataset.search || &quot;&quot;).indexOf(q) !== -1;\n        row.classList.toggle(&quot;acc-hidden&quot;, !hit);\n      });\n    });\n  }\n\n  renderHead();\n  renderDocs();\n  renderTodos();\n  wireSearch();\n})();<\/code><\/pre>\n<ul><li>[ ] **Step 3: Create <code>templates/dashboard.html.tmpl<\/code>**<\/li><\/ul>\n<pre><code>&lt;!DOCTYPE html&gt;\n&lt;html lang=&quot;en&quot;&gt;\n&lt;head&gt;\n&lt;meta charset=&quot;utf-8&quot;&gt;\n&lt;meta name=&quot;viewport&quot; content=&quot;width=device-width, initial-scale=1&quot;&gt;\n&lt;meta name=&quot;generator&quot; content=&quot;ai-control-center __SCHEMA_VERSION__&quot;&gt;\n&lt;title&gt;AI Control Center&lt;/title&gt;\n&lt;style&gt;/*__CSS__*/&lt;/style&gt;\n&lt;/head&gt;\n&lt;body&gt;\n&lt;header class=&quot;acc-head&quot;&gt;\n  &lt;strong id=&quot;acc-title&quot;&gt;Dashboard&lt;/strong&gt;\n  &lt;input id=&quot;acc-search&quot; placeholder=&quot;search…&quot; aria-label=&quot;search&quot;&gt;\n  &lt;span class=&quot;acc-meta&quot; id=&quot;acc-meta&quot;&gt;&lt;/span&gt;\n&lt;/header&gt;\n&lt;nav class=&quot;acc-nav&quot;&gt;\n  &lt;a href=&quot;#overview&quot;&gt;Overview&lt;/a&gt;\n  &lt;
