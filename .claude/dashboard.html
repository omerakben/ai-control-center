;,\n    hooks: &quot;Hooks&quot;, mcpServers: &quot;MCP servers&quot;, rules: &quot;Rules&quot;\n  };<\/code><\/pre>\n<p>Add the function:<\/p>\n<pre><code>  function renderInventory() {\n    var host = document.getElementById(&quot;acc-inventory&quot;);\n    var inv = data.inventory || {};\n    INV_ORDER.forEach(function (bucket) {\n      var items = inv[bucket] || [];\n      if (!items.length) return;\n      host.appendChild(el(&quot;div&quot;, &quot;acc-sublabel&quot;,\n        INV_LABEL[bucket] + &quot; (&quot; + items.length + &quot;)&quot;));\n      items.forEach(function (it) {\n        host.appendChild(itemRow({\n          provider: it.provider, typeLabel: it.typeLabel,\n          title: it.title, path: it.path, summary: it.summary\n        }));\n      });\n    });\n  }<\/code><\/pre>\n<p>Add <code>renderInventory();<\/code> to the call block at the bottom, after <code>renderHead();<\/code>:<\/p>\n<pre><code>  renderHead();\n  renderInventory();\n  renderDocs();\n  renderTodos();\n  wireSearch();<\/code><\/pre>\n<p>In <code>src/acc/templates/styles.css<\/code> append:<\/p>\n<pre><code>.acc-sublabel { font-weight: 600; margin: 12px 0 4px; }<\/code><\/pre>\n<ul><li>[ ] **Step 4: Run to verify they pass**<\/li><\/ul>\n<p>Run: <code>python -m pytest tests/test_render_dom.py tests/test_render.py -q<\/code><\/p>\n<p>Expected: PASS.<\/p>\n<ul><li>[ ] **Step 5: Commit**<\/li><\/ul>\n<pre><code>git add src/acc/templates/app.js src/acc/templates/dashboard.html.tmpl src/acc/templates/styles.css tests/test_render_dom.py tests/test_render.py\ngit commit -m &quot;feat(phase-3): Inventory view grouped by type with provider chips&quot;<\/code><\/pre>\n<p>---<\/p>\n<h3>Task 6: <code>renderOverview<\/code> bento grid<\/h3>\n<p>**Files:**<\/p>\n<ul><li>Modify: <code>src/acc/templates/app.js<\/code> (add <code>renderOverview<\/code>, call it)<\/li><li>Modify: <code>src/acc/templates/styles.css<\/code> (bento + card)<\/li><li>Test: <code>tests/test_render_dom.py<\/code><\/li><\/ul>\n<ul><li>[ ] **Step 1: Write the failing tests**<\/li><\/ul>\n<p>Append to <code>tests/test_render_dom.py<\/code>:<\/p>\n<pre><code>def test_overview_bento_cards(page, tmp_path):\n    make_multi_provider_repo(tmp_path)\n    page.set_content(_html(tmp_path))\n    ov = page.locator(&quot;#acc-overview .acc-bento&quot;)\n    assert ov.count() == 1\n    cards = ov.locator(&quot;.acc-card&quot;)\n    assert cards.count() &gt;= 3  # Providers, Inventory, Docs (+ TODOs)\n    # generic is not shown when real providers exist\n    prov = ov.locator(&quot;.acc-card&quot;, has_text=&quot;Providers&quot;)\n    assert prov.locator(&quot;.acc-chip&quot;, has_text=&quot;Generic&quot;).count() == 0\n    assert prov.locator(&quot;.acc-chip&quot;, has_text=&quot;Claude Code&quot;).count() == 1\n\n\ndef test_overview_generic_only_when_sole(page, tmp_path):\n    make_brownfield_repo(tmp_path)  # no AI provider -&gt; generic only\n    page.set_content(_html(tmp_path))\n    prov = page.locator(&quot;#acc-overview .acc-card&quot;, has_text=&quot;Providers&quot;)\n    assert prov.locator(&quot;.acc-chip&quot;, has_text=&quot;Generic&quot;).count() == 1<\/code><\/pre>\n<ul><li>[ ] **Step 2: Run to verify they fail**<\/li><\/ul>\n<p>Run: <code>python -m pytest tests/test_render_dom.py -k overview -q<\/code><\/p>\n<p>Expected: FAIL — <code>#acc-overview<\/code> is empty (<code>renderOverview<\/code> undefined).<\/p>\n<ul><li>[ ] **Step 3: Implement**<\/li><\/ul>\n<p>This task reuses <code>INV_ORDER<\/code> and <code>INV_LABEL<\/code> defined in Task 5 — do not redeclare them (a duplicate <code>var<\/code> would be a syntax error). In <code>src/acc/templates/app.js<\/code> add the function (above the call block):<\/p>\n<pre><code>  function card(title, target) {\n    var c = el(&quot;div&quot;, &quot;acc-card&quot;);\n    if (target) {\n      var a = el(&quot;a&quot;, &quot;acc-card-h&quot;, title);\n      a.href = &quot;#&quot; + target;\n      c.appendChild(a);\n    } else {\n      c.appendChild(el(&quot;div&quot;, &quot;acc-card-h&quot;, title));\n    }\n    return c;\n  }\n\n  function renderOverview() {\n    var host = document.getElementById(&quot;acc-overview&quot;);\n    var bento = el(&quot;div&quot;, &quot;acc-bento&quot;);\n\n    var provs = data.providers || [];\n    var firstClass = provs.filter(function (p) { return p.id !== &quot;generic&quot;; });\n    var show = firstClass.length ? firstClass : provs;\n    if (show.length) {\n      var pc = card(&quot;Providers&quot;);\n      show.forEach(function (p) { pc.appendChild(el(&quot;span&quot;, &quot;acc-chip&quot;, p.displayName)); });\n      bento.appendChild(pc);\n    }\n\n    var inv = data.inventory || {};\n    var nonEmpty = INV_ORDER.filter(function (b) { return (inv[b] || []).length; });\n    if (nonEmpty.length) {\n      var ic = card(&quot;Inventory&quot;, &quot;inventory&quot;);\n      nonEmpty.forEach(function (b) {\n        ic.appendChild(el(&quot;div&quot;, null, inv[b].length + &quot; &quot; + INV_LABEL[b].toLowerCase()));\n      });\n      bento.appendChild(ic);\n    }\n\n    var todos = (data.project &amp;&amp; data.project.openTodos) || [];\n    if (todos.length) {\n      var tc = card(&quot;Open TODOs (&quot; + todos.length + &quot;)&quot;, &quot;todos&quot;);\n      todos.slice(0, 3).forEach(function (t) { tc.appendChild(el(&quot;div&quot;, null, t.text)); });\n      bento.appendChild(tc);\n    }\n\n    var docs = data.docs || {};\n    var docCount = 0;\n    Object.keys(docs).forEach(function (k) { docCount += (docs[k] || []).length; });\n    if (docCount) {\n      var dc = card(&quot;Docs&quot;, &quot;docs&quot;);\n      dc.appendChild(el(&quot;div&quot;, null, docCount + &quot; referenced&quot;));\n      bento.appendChild(dc);\n    }\n\n    if (bento.childNodes.length) host.appendChild(bento);\n  }<\/code><\/pre>\n<p>Add <code>renderOverview();<\/code> right after <code>renderHead();<\/code> in the call block:<\/p>\n<pre><code>  renderHead();\n  renderOverview();\n  renderInventory();\n  renderDocs();\n  renderTodos();\n  wireSearch();<\/code><\/pre>\n<p>In <code>src/acc/templates/styles.css<\/code> append:<\/p>\n<pre><code>.acc-bento { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 10px; }\n.acc-card { border: 1px solid var(--line); border-radius: 8px; padding: 10px; }\n.acc-card-h { display: block; font-weight: 600; margin-bottom: 6px; color: var(--fg); text-decoration: none; }\n.acc-card a.acc-card-h:hover { text-decoration: underline; }<\/code><\/pre>\n<ul><li>[ ] **Step 4: Run to verify they pass**<\/li><\/ul>\n<p>Run: <code>python -m pytest tests/test_render_dom.py -q<\/code><\/p>\n<p>Expected: PASS.<\/p>\n<ul><li>[ ] **Step 5: Commit**<\/li><\/ul>\n<pre><code>git add src/acc/templates/app.js src/acc/templates/styles.css tests/test_render_dom.py\ngit commit -m &quot;feat(phase-3): bento Overview grid (real-data cards)&quot;<\/code><\/pre>\n<p>---<\/p>\n<h3>Task 7: Truncation banner<\/h3>\n<p>**Files:**<\/p>\n<ul><li>Modify: <code>src/acc/templates/dashboard.html.tmpl<\/code> (banner host after <code>&lt;nav&gt;<\/code>)<\/li><li>Modify: <code>src/acc/templates/app.js<\/code> (<code>renderBanner<\/code>, call it)<\/li><li>Modify: <code>src/acc/templates/styles.css<\/code> (banner style)<\/li><li>Test: <code>tests/test_render_dom.py<\/code><\/li><\/ul>\n<ul><li>[ ] **Step 1: Write the failing test**<\/li><\/ul>\n<p>Append to <code>tests/test_render_dom.py<\/code>:<\/p>\n<pre><code>def test_truncation_banner_when_truncated(page, tmp_path):\n    make_large_repo(tmp_path, 150)  # forces summary-only\n    page.set_content(_html(tmp_path))\n    banner = page.locator(&quot;#acc-banner&quot;)\n    assert banner.inner_text().strip() != &quot;&quot;\n\n\ndef test_no_banner_when_full(page, tmp_path):\n    make_multi_provider_repo(tmp_path)\n    page.set_content(_html(tmp_path))\n    assert page.locator(&quot;#acc-banner&quot;).inner_text().strip() == &quot;&quot;<\/code><\/pre>\n<p>Add the import at the top of <code>tests/test_render_dom.py<\/code>:<\/p>\n<pre><code>from tests.builders import make_multi_provider_repo, make_brownfield_repo, make_large_repo<\/code><\/pre>\n<ul><li>[ ] **Step 2: Run to verify it fails**<\/li><\/ul>\n<p>Run: <code>python -m pytest tests/test_render_dom.py -k banner -q<\/code><\/p>\n<p>Expected: FAIL — no <code>#acc-banner<\/code> element.<\/p>\n<ul><li>[ ] **Step 3: Implement**<\/li><\/ul>\n<p>In <code>src/acc/templates/dashboard.html.tmpl<\/code>, add the banner host immediately after the closing <code>&lt;/nav&gt;<\/code>:<\/p>\n<pre><code>&lt;/nav&gt;\n&lt;div id=&quot;acc-banner&quot; class=&quot;acc-banner&quot;&gt;&lt;/div&gt;<\/code><\/pre>\n<p>In <code>src/acc/templates/app.js<\/code> add the function and call it after <code>renderHead();<\/code>:<\/p>\n<pre><code>  function renderBanner() {\n    if (!(data.generator &amp;&amp; data.generator.truncated)) return;\n    document.getElementById(&quot;acc-banner&quot;).appendChild(el(&quot;div&quot;, &quot;acc-noticetext&quot;,\n      &quot;This dashboard was reduced to a summary because the full output exceeded the size budget.&quot;));\n  }<\/code><\/pre>\n<pre><code>  renderHead();\n  renderBanner();\n  renderOverview();\n  renderInventory();\n  renderDocs();\n  renderTodos();\n  wireSearch();<\/code><\/pre>\n<p>In <code>src/acc/templates/styles.css<\/code> append:<\/p>\n<pre><code>.acc-banner:empty { display: none; }\n.acc-banner { padding: 8px 16px; border-bottom: 1px solid var(--line); }\n.acc-noticetext { color: var(--muted); font-size: 12px; }<\/code><\/pre>\n<ul><li>[ ] **Step 4: Run to verify it passes**<\/li><\/ul>\n<p>Run: <code>python -m pytest tests/test_render_dom.py -q<\/code><\/p>\n<p>Expected: PASS (all DOM tests).<\/p>\n<ul><li>[ ] **Step 5: Commit**<\/li><\/ul>\n<pre><code>git add src/acc/templates/dashboard.html.tmpl src/acc/templates/app.js src/acc/templates/styles.css tests/test_render_dom.py\ngit commit -m &quot;feat(phase-3): summary-only truncation banner&quot;<\/code><\/pre>\n<p>---<\/p>\n<h3>Task 8: Full verification and manual acceptance<\/h3>\n<p>**Files:** none (verification only)<\/p>\n<ul><li>[ ] **Step 1: Run the whole suite**<\/li><\/ul>\n<p>Run: <code>python -m pytest -q<\/code><\/p>\n<p>Expected: PASS (all Python contract tests + Playwright DOM tests).<\/p>\n<ul><li>[ ] **Step 2: Determinism check**<\/li><\/ul>\n<p>Run:<\/p>\n<pre><code>PYTHONPATH=src python3 -c &quot;\nfrom pathlib import Path; from acc.generate import generate\na = generate(Path(&#x27;.&#x27;)).read_text(&#x27;utf-8&#x27;); b = generate(Path(&#x27;.&#x27;)).read_text(&#x27;utf-8&#x27;)\nprint(&#x27;deterministic:&#x27;, a == b)&quot;<\/code><\/pre>\n<p>Expected: <code>deterministic: True<\/code>.<\/p>\n<ul><li>[ ] **Step 3: Lint the source**<\/li><\/ul>\n<p>Run: <code>python -m ruff check src/<\/code><\/p>\n<p>Expected: clean (no errors).<\/p>\n<ul><li>[ ] **Step 4: Manual acceptance — screenshot a multi-provider dashboard**<\/li><\/ul>\n<p>Generate a multi-provider dashboard to a temp dir, serve it, and screenshot with Playwright (the renderer extension may be offline; serve over local HTTP). Confirm visually: the Overview bento shows Providers/Inventory/TODOs/Docs cards; the Inventory view lists all items grouped by type with provider chips; path links resolve; search filters rows.<\/p>\n<ul><li>[ ] **Step 5: Final commit if any verification fix was needed**<\/li><\/ul>\n<pre><code>git add -A\ngit commit -m &quot;test(phase-3): verification pass&quot;<\/code><\/pre>\n<p>---<\/p>\n<h2>Notes for the implementer<\/h2>\n<ul><li>Do not introduce <code>innerHTML<\/code> anywhere in <code>app.js<\/code>. Every author value uses <code>textContent<\/code> (via <code>el<\/code>); the only <code>href<\/code> is built by <code>encodedRelHref<\/code>.<\/li><li>Keep <code>app.js<\/code> a single classic IIFE — no ES modules, no imports. It must run from <code>file://<\/code>.<\/li><li>The size-budget thresholds are exact byte counts on the rendered HTML; the <code>n<\/code> values in the budget tests are tuned to land in each band, so adjust <code>n<\/code> (not the thresholds) if a band is missed.<\/li><li>Runtime stays stdlib-only. <code>pytest-playwright<\/code> is test-only; never import it from <code>src/acc<\/code>.<\/li><\/ul>","id":"90b3aec1cb6e","path":"docs/superpowers/plans/2026-05-30-ai-control-center-phase-3-renderer.md","summary":"**Goal:** Render the Phase 1/2 JSON island into a human-facing dashboard — a bento Overview and an Inventory view grouped by type with linked source paths — and add the output size budget.","title":"Phase 3 renderer (Overview + Inventory) Implementation Plan"},{"html":"<h1>Phase 4a — Find Implementation Plan<\/h1>\n<p>&gt; **For agentic workers:** REQUIRED SUB-SKILL: Use superpowers:subagent-driven-development (recommended) or superpowers:executing-plans to implement this plan task-by-task. Steps use checkbox (<code>- [ ]<\/code>) syntax for tracking.<\/p>\n<p>**Goal:** Turn the dead <code>data.search<\/code> index into a real global omnibox — type-grouped results with counts, a <code>&lt;mark&gt;<\/code>-highlighted snippet, keyboard nav, focus via <code>/<\/code>, and jump-to-row — plus the reusable per-row-id + id→row jump infra, all via <code>textContent<\/code> only.<\/p>\n<p>**Architecture:** The Python generator (<code>generate.py<\/code>) enriches each search record with generator-controlled <code>type<\/code>/<code>typeLabel<\/code> (synthesized for docs from their bucket key) and a capped, html-escaped body slice; <code>_reduce_for_size<\/code> rebuilds a light names+paths index instead of emptying <code>search<\/code>; every searchable item (incl. TODOs) gets a <code>stable_id<\/code>. <code>schema.py<\/code> enforces the record shape at build time. The renderer (<code>app.js<\/code>) decodes escaped values with a new <code>htmlUnescape<\/code> helper at the <code>textContent<\/code> boundary and the match key, builds an omnibox over <code>data.search<\/code>, builds an <code>id→row<\/code> map during view render, and jumps with scrollIntoView + a transient flash. The data island stays uniformly html-escaped (Phase 1 contract); <code>textContent<\/code>/<code>&lt;mark&gt;<\/code> keep it inert.<\/p>\n<p>**Tech Stack:** stdlib-only Python 3.12 (no runtime deps), vanilla ES5-style IIFE JS in <code>app.js<\/code>, a <code>&lt;style&gt;<\/code>/JSON-island single-file HTML template, pytest + pytest-playwright (test-only extra) DOM tests via <code>page.set_content<\/code>.<\/p>\n<p>---<\/p>\n<h2>File structure<\/h2>\n<ul><li><code>src/acc/generate.py<\/code> — <code>_build_search<\/code> (add <code>type<\/code>/<code>typeLabel<\/code> incl. docs + capped escaped body slice + <code>_SEARCH_BODY_CHARS<\/code>), <code>_reduce_for_size<\/code> (light index rebuild), the escape pass capturing a raw body slice, TODO <code>id<\/code>s.<\/li><li><code>src/acc/adapters/base.py<\/code> — add <code>_DOC_TYPE_LABELS<\/code> (bucket-key → human label) so docs can get a <code>typeLabel<\/code>; helper <code>doc_type_label(bucket)<\/code>.<\/li><li><code>src/acc/adapters/generic.py<\/code> — give each open-TODO record a <code>stable_id<\/code>.<\/li><li><code>src/acc/schema.py<\/code> — <code>validate()<\/code> enforces every <code>search<\/code> record&#x27;s keys, string types, and known <code>type<\/code>.<\/li><li><code>src/acc/templates/app.js<\/code> — <code>htmlUnescape<\/code> helper; per-row <code>dataset.id<\/code> in <code>itemRow<\/code>/<code>renderDocs<\/code>/<code>renderTodos<\/code>; an <code>id→row<\/code> Map; the omnibox (build/consume/group/snippet/<code>&lt;mark&gt;<\/code>/keyboard/jump); relabel the per-view filter input.<\/li><li><code>src/acc/templates/dashboard.html.tmpl<\/code> — omnibox <code>&lt;input id=&quot;acc-omnibox&quot;&gt;<\/code> + result panel <code>&lt;div id=&quot;acc-omnibox-results&quot;&gt;<\/code>; relabel <code>#acc-search<\/code>.<\/li><li><code>src/acc/templates/styles.css<\/code> — omnibox input/panel, <code>&lt;mark&gt;<\/code>, type chip, <code>.acc-flash<\/code> highlight-flash, active-hit styles.<\/li><li><code>tests/test_generate.py<\/code> — <code>_build_search<\/code> type/typeLabel/escaped-slice/cap/sort; <code>_reduce_for_size<\/code> light index; TODO ids.<\/li><li><code>tests/test_schema.py<\/code> — malformed search-record rejection.<\/li><li><code>tests/test_render_dom.py<\/code> — Playwright DOM: grouping+counts, keyboard, jump+flash, <code>&lt;mark&gt;<\/code>, empty states, <code>AT&amp;T<\/code>, hostile-body inertness.<\/li><li><code>tests/test_appjs_guard.py<\/code> — CI guard grepping <code>app.js<\/code> for banned <code>innerHTML<\/code>/<code>outerHTML<\/code>/<code>insertAdjacentHTML<\/code>.<\/li><\/ul>\n<p>---<\/p>\n<h3>Task 0: Reconcile branch base (Phase 3 must be present)<\/h3>\n<p>The current branch <code>feature/phase-4a-find<\/code> was cut from a commit **before** Phase 3 merged. The working tree <code>app.js<\/code> (60 lines), <code>generate.py<\/code> (no <code>_reduce_for_size<\/code>/<code>_WARN_BYTES<\/code>), and templates are the pre-Phase-3 versions, but this spec was written against Phase 3 (<code>itemRow<\/code>, <code>renderInventory<\/code>, <code>_reduce_for_size<\/code>, <code>pathPrefix<\/code>, <code>generator.truncated<\/code>, <code>tests/test_render_dom.py<\/code>). All code blocks below assume the Phase 3 base. This task rebases Phase 4a onto Phase 3 so the planned edits apply to real current code.<\/p>\n<p>**Files:**<\/p>\n<ul><li>Modify (git history only): branch <code>feature/phase-4a-find<\/code> (currently at <code>89a2fa5<\/code>, parent chain ends at <code>17bb59a<\/code>; Phase 3 lives on <code>feature/phase-3-renderer<\/code> tip <code>32bf625<\/code>).<\/li><\/ul>\n<ul><li>[ ] Confirm the mismatch: <code>git -C /Users/ozzy-mac/Projects/html-dash merge-base --is-ancestor feature/phase-3-renderer HEAD; echo $?<\/code> — expect <code>1<\/code> (Phase 3 NOT an ancestor).<\/li><li>[ ] Confirm only the spec commit is unique to this branch: <code>git -C /Users/ozzy-mac/Projects/html-dash log --oneline feature/phase-3-renderer..feature/phase-4a-find<\/code> — expect a single line <code>89a2fa5 docs(phase-4a): spec for Find (global omnibox)<\/code>.<\/li><li>[ ] Rebase the spec commit onto Phase 3: <code>git -C /Users/ozzy-mac/Projects/html-dash rebase --onto feature/phase-3-renderer 17bb59a feature/phase-4a-find<\/code>.<\/li><li>[ ] Verify Phase 3 is now present: <code>git -C /Users/ozzy-mac/Projects/html-dash merge-base --is-ancestor feature/phase-3-renderer HEAD; echo $?<\/code> — expect <code>0<\/code>; and <code>test -f /Users/ozzy-mac/Projects/html-dash/tests/test_render_dom.py &amp;&amp; grep -c &quot;_reduce_for_size&quot; /Users/ozzy-mac/Projects/html-dash/src/acc/generate.py<\/code> — expect a non-zero count.<\/li><li>[ ] Install the test extra and confirm the full suite is green on the new base: <code>cd /Users/ozzy-mac/Projects/html-dash &amp;&amp; python3 -m pip install -e &#x27;.[test]&#x27; &amp;&amp; python3 -m playwright install chromium<\/code> then <code>python3 -m pytest -q<\/code> — expect all tests pass (Phase 3 unit + DOM).<\/li><li>[ ] No commit (rebase already rewrote history). If the rebase is undesired, the fallback is <code>git merge feature/phase-3-renderer<\/code> on this branch; either way Phase 3 code must be in the tree before Task 1.<\/li><\/ul>\n<p>---<\/p>\n<h3>Task 1: Doc type-label lookup in base.py<\/h3>\n<p>Docs are built by <code>claude.py<\/code>/<code>codex.py<\/code>/<code>generic.py<\/code> with keys <code>{id,title,path,summary,html}<\/code> and carry no <code>type<\/code>/<code>typeLabel<\/code>. They live in <code>_DOC_BUCKETS = (&quot;prds&quot;,&quot;adrs&quot;,&quot;decisions&quot;,&quot;workflows&quot;,&quot;references&quot;)<\/code>. Add a bucket-key→label map and a helper so <code>_build_search<\/code> can synthesize a doc <code>typeLabel<\/code>. These are generator-controlled constants (not author input), so they are not escaped — same convention as <code>provider<\/code>/<code>typeLabel<\/code> in <code>_escape_text_fields<\/code>.<\/p>\n<p>**Files:**<\/p>\n<ul><li>Modify: <code>src/acc/adapters/base.py<\/code> (after line 38, the <code>empty_docs<\/code> block)<\/li><li>Test: <code>tests/test_adapter_base.py<\/code><\/li><\/ul>\n<ul><li>[ ] Write failing test. Append to <code>tests/test_adapter_base.py<\/code>:<\/li><\/ul>\n<pre><code>def test_doc_type_label_maps_buckets():\n    from acc.adapters.base import doc_type_label\n    assert doc_type_label(&quot;references&quot;) == &quot;Reference&quot;\n    assert doc_type_label(&quot;prds&quot;) == &quot;PRD&quot;\n    assert doc_type_label(&quot;adrs&quot;) == &quot;ADR&quot;\n    assert doc_type_label(&quot;decisions&quot;) == &quot;Decision&quot;\n    assert doc_type_label(&quot;workflows&quot;) == &quot;Workflow&quot;\n\n\ndef test_doc_type_label_unknown_bucket_titlecases():\n    from acc.adapters.base import doc_type_label\n    assert doc_type_label(&quot;misc&quot;) == &quot;Misc&quot;<\/code><\/pre>\n<ul><li>[ ] Run it — expect FAIL: <code>cd /Users/ozzy-mac/Projects/html-dash &amp;&amp; python3 -m pytest tests/test_adapter_base.py -q<\/code> → <code>ImportError: cannot import name &#x27;doc_type_label&#x27;<\/code>.<\/li><li>[ ] Implement. In <code>src/acc/adapters/base.py<\/code>, after the <code>empty_docs()<\/code> function (line 38), add:<\/li><\/ul>\n<pre><code># Human group headings for the doc buckets. Generator-controlled constants\n# (never author input), so they are not html-escaped — same convention as the\n# inventory typeLabel set by make_item.\n_DOC_TYPE_LABELS = {\n    &quot;prds&quot;: &quot;PRD&quot;,\n    &quot;adrs&quot;: &quot;ADR&quot;,\n    &quot;decisions&quot;: &quot;Decision&quot;,\n    &quot;workflows&quot;: &quot;Workflow&quot;,\n    &quot;references&quot;: &quot;Reference&quot;,\n}\n\n\ndef doc_type_label(bucket: str) -&gt; str:\n    &quot;&quot;&quot;Map a doc bucket key to i \n      var m = document.createElement(&quot;mark&quot;);\n      m.textContent = logical.slice(idx, idx + qLower.length);\n      target.appendChild(m);\n      from = idx + qLower.length;\n    }\n    if (from &lt; logical.length) target.appendChild(document.createTextNode(logical.slice(from)));\n  }\n\n  function snippetFor(rec, qLower) {\n    var logical = htmlUnescape(rec.text || &quot;&quot;);\n    var idx = logical.toLowerCase().indexOf(qLower);\n    if (idx === -1) return logical.slice(0, 120);\n    var start = Math.max(0, idx - 40);\n    var end = Math.min(logical.length, idx + qLower.length + 80);\n    return (start &gt; 0 ? &quot;…&quot; : &quot;&quot;) + logical.slice(start, end) + (end &lt; logical.length ? &quot;…&quot; : &quot;&quot;);\n  }\n\n  function wireOmnibox() {\n    var box = document.getElementById(&quot;acc-omnibox&quot;);\n    var panel = document.getElementById(&quot;acc-omnibox-results&quot;);\n    if (!box || !panel) return;\n    var hits = [];        // flat list of {rec} in render order\n    var active = -1;\n    var timer = null;\n\n    function close() { panel.hidden = true; panel.textContent = &quot;&quot;; hits = []; active = -1; }\n\n    function setActive(i) {\n      var nodes = panel.querySelectorAll(&quot;.acc-omni-hit&quot;);\n      if (active &gt;= 0 &amp;&amp; nodes[active]) nodes[active].classList.remove(&quot;acc-omni-active&quot;);\n      active = i;\n      if (active &gt;= 0 &amp;&amp; nodes[active]) {\n        nodes[active].classList.add(&quot;acc-omni-active&quot;);\n        nodes[active].scrollIntoView({ block: &quot;nearest&quot; });\n      }\n    }\n\n    function render(q) {\n      panel.textContent = &quot;&quot;;\n      hits = [];\n      active = -1;\n      var qLower = q.toLowerCase();\n      if (!qLower) { close(); return; }\n      panel.hidden = false;\n\n      if (isLightIndex()) {\n        panel.appendChild(el(&quot;div&quot;, &quot;acc-omni-note&quot;,\n          &quot;Body search is off (index reduced for size); searching names and paths only.&quot;));\n      }\n\n      // group records by type, preserving a stable type order\n      var byType = {};\n      searchRecords().forEach(function (rec) {\n        if (matchKey(rec).indexOf(qLower) === -1) return;\n        (byType[rec.type] || (byType[rec.type] = [])).push(rec);\n      });\n      var types = INV_TYPE_ORDER.filter(function (t) { return byType[t]; });\n      Object.keys(byType).forEach(function (t) {\n        if (types.indexOf(t) === -1) types.push(t);\n      });\n\n      if (!types.length) {\n        panel.appendChild(el(&quot;div&quot;, &quot;acc-omni-note&quot;, &quot;No matches&quot;));\n        return;\n      }\n\n      types.forEach(function (t) {\n        var recs = byType[t];\n        var group = el(&quot;div&quot;, &quot;acc-omni-group&quot;);\n        group.appendChild(el(&quot;div&quot;, &quot;acc-omni-grouphead&quot;,\n          (recs[0].typeLabel || t) + &quot; (&quot; + recs.length + &quot;)&quot;));\n        recs.slice(0, OMNI_GROUP_CAP).forEach(function (rec) {\n          var hit = el(&quot;div&quot;, &quot;acc-omni-hit&quot;);\n          hit.dataset.id = rec.id;\n          var titleEl = el(&quot;span&quot;, &quot;acc-omni-title&quot;);\n          appendHighlighted(titleEl, htmlUnescape(rec.title || &quot;&quot;), qLower);\n          hit.appendChild(titleEl);\n          hit.appendChild(el(&quot;span&quot;, &quot;acc-chip&quot;, rec.typeLabel || t));\n          hit.appendChild(el(&quot;span&quot;, &quot;path&quot;, rec.path || &quot;&quot;));\n          if ((rec.text || &quot;&quot;) !== &quot;&quot;) {\n            var snipEl = el(&quot;span&quot;, &quot;acc-omni-snippet&quot;);\n            appendHighlighted(snipEl, snippetFor(rec, qLower), qLower);\n            hit.appendChild(snipEl);\n          }\n          hit.addEventListener(&quot;click&quot;, function () { jumpTo(rec.id); });\n          group.appendChild(hit);\n          hits.push(rec);\n        });\n        if (recs.length &gt; OMNI_GROUP_CAP) {\n          group.appendChild(el(&quot;div&quot;, &quot;acc-omni-more&quot;,\n            &quot;+&quot; + (recs.length - OMNI_GROUP_CAP) + &quot; more&quot;));\n        }\n        panel.appendChild(group);\n      });\n    }\n\n    box.addEventListener(&quot;input&quot;, function () {\n      if (timer) window.clearTimeout(timer);\n      timer = window.setTimeout(function () { render(box.value); }, 60);\n    });\n    box.addEventListener(&quot;keydown&quot;, function (e) {\n      if (e.key === &quot;Escape&quot;) { box.value = &quot;&quot;; close(); return; }\n      if (e.key === &quot;ArrowDown&quot;) { e.preventDefault(); if (hits.length) setActive(Math.min(active + 1, hits.length - 1)); }\n      else if (e.key === &quot;ArrowUp&quot;) { e.preventDefault(); if (hits.length) setActive(Math.max(active - 1, 0)); }\n      else if (e.key === &quot;Enter&quot;) {\n        e.preventDefault();\n        var pick = active &gt;= 0 ? active : 0;\n        if (hits[pick]) jumpTo(hits[pick].id);\n      }\n    });\n    // &quot;/&quot; focuses the omnibox unless a field is already focused\n    document.addEventListener(&quot;keydown&quot;, function (e) {\n      if (e.key !== &quot;/&quot;) return;\n      var a = document.activeElement;\n      var tag = a &amp;&amp; a.tagName;\n      if (tag === &quot;INPUT&quot; || tag === &quot;TEXTAREA&quot; || (a &amp;&amp; a.isContentEditable)) return;\n      e.preventDefault();\n      box.focus();\n    });\n  }<\/code><\/pre>\n<ul><li>[ ] Wire it in. In <code>src/acc/templates/app.js<\/code>, in the bootstrap (after <code>buildRowIndex();<\/code> from Task 9, before <code>wireSearch();<\/code>), add <code>wireOmnibox();<\/code>:<\/li><\/ul>\n<pre><code>  buildRowIndex();\n  wireOmnibox();\n  wireSearch();\n})();<\/code><\/pre>\n<ul><li>[ ] Run to pass: <code>cd /Users/ozzy-mac/Projects/html-dash &amp;&amp; python3 -m pytest tests/test_render_dom.py -q<\/code> → all pass.<\/li><li>[ ] Commit: <code>git -C /Users/ozzy-mac/Projects/html-dash add src/acc/templates/app.js tests/test_render_dom.py &amp;&amp; git -C /Users/ozzy-mac/Projects/html-dash commit -m &quot;feat(phase-4a): global omnibox over data.search (group/snippet/mark/keyboard/jump)&quot;<\/code><\/li><\/ul>\n<p>---<\/p>\n<h3>Task 11: styles.css — omnibox panel, <code>&lt;mark&gt;<\/code>, type chip, flash<\/h3>\n<p>Style the omnibox input/panel, hit rows, group heads, <code>+N more<\/code>, the note line, <code>&lt;mark&gt;<\/code> highlight, and the <code>.acc-flash<\/code> jump-flash animation. Reuse existing vars/classes (<code>--fg<\/code>, <code>--muted<\/code>, <code>--line<\/code>, <code>--bg<\/code>, <code>.acc-chip<\/code>, <code>.path<\/code>). This is presentation; a DOM smoke test confirms the panel positions and the flash class is defined.<\/p>\n<p>**Files:**<\/p>\n<ul><li>Modify: <code>src/acc/templates/styles.css<\/code> (append after line 34)<\/li><li>Test: <code>tests/test_render_dom.py<\/code><\/li><\/ul>\n<ul><li>[ ] Write failing test. Append to <code>tests/test_render_dom.py<\/code>:<\/li><\/ul>\n<pre><code>def test_omnibox_panel_styled_and_flash_defined(page, tmp_path):\n    make_multi_provider_repo(tmp_path)\n    page.set_content(_html(tmp_path))\n    page.fill(&quot;#acc-omnibox&quot;, &quot;review&quot;)\n    page.wait_for_timeout(120)\n    panel = page.locator(&quot;#acc-omnibox-results&quot;)\n    # panel is absolutely positioned (a dropdown), not static\n    assert panel.evaluate(&quot;el =&gt; getComputedStyle(el).position&quot;) == &quot;absolute&quot;\n    # mark has a non-transparent background (highlight is visible)\n    bg = page.locator(&quot;#acc-omnibox-results mark&quot;).first.evaluate(\n        &quot;el =&gt; getComputedStyle(el).backgroundColor&quot;)\n    assert bg not in (&quot;rgba(0, 0, 0, 0)&quot;, &quot;transparent&quot;)<\/code><\/pre>\n<ul><li>[ ] Run it — expect FAIL: <code>cd /Users/ozzy-mac/Projects/html-dash &amp;&amp; python3 -m pytest tests/test_render_dom.py::test_omnibox_panel_styled_and_flash_defined -q<\/code> → position <code>static<\/code>.<\/li><li>[ ] Implement. Append to <code>src/acc/templates/styles.css<\/code>:<\/li><\/ul>\n<pre><code>.acc-omnibox-wrap { position: relative; flex: 1 1 280px; max-width: 520px; }\n#acc-omnibox { width: 100%; padding: 4px 10px; border: 1px solid var(--line); border-radius: 6px; background: transparent; color: var(--fg); }\n.acc-omnibox-results { position: absolute; top: calc(100% + 4px); left: 0; right: 0; z-index: 20;\n  max-height: 60vh; overflow: auto; background: var(--bg); border: 1px solid var(--line); border-radius: 8px; padding: 4px; }\n.acc-omnibox-results[hidden] { display: none; }\n.acc-omni-group { padding: 4px 2px; }\n.acc-omni-grouphead { text-transform: uppercase; letter-spacing: .05em; font-size: 11px; color: var(--muted); margin: 6px 2px 2px; }\n.acc-omni-hit { display: flex; gap: 8px; align-items: baseline; flex-wrap: wrap; padding: 4px 6px; border-radius: 6px; cursor: pointer; }\n.acc-omni-hit:hover, .acc-omni-hit.acc-omni-active { background: color-mix(in srgb, var(--fg) 8%, transparent); }\n.acc-omni-title { font-weight: 600; }\n.acc-omni-snippet { color: var(--muted); font-size: 12px; flex-basis: 100%; }\n.acc-omni-more { color: var(--muted); font-size: 11px; padding: 2px 6px; }\n.acc-omni-note { color: var(--muted); font-size: 12px; padding: 4px 6px; }\nmark { background: #ffe066; color: #1a1a1a; border-radius: 2px; padding: 0 1px; }\n@keyframes acc-flash-kf { from { background: #ffe066; } to { background: transparent; } }\n.acc-flash { animation: acc-flash-kf 1.6s ease-out; }<\/code><\/pre>\n<ul><li>[ ] Run to pass: <code>cd /Users/ozzy-mac/Projects/html-dash &amp;&amp; python3 -m pytest tests/test_render_dom.py -q<\/code> → all pass.<\/li><li>[ ] Commit: <code>git -C /Users/ozzy-mac/Projects/html-dash add src/acc/templates/styles.css tests/test_render_dom.py &amp;&amp; git -C /Users/ozzy-mac/Projects/html-dash commit -m &quot;feat(phase-4a): omnibox panel, mark highlight, and jump-flash styles&quot;<\/code><\/li><\/ul>\n<p>---<\/p>\n<h3>Task 12: CI guard — no <code>innerHTML<\/code>/<code>outerHTML<\/code>/<code>insertAdjacentHTML<\/code> in app.js<\/h3>\n<p>A pytest test that reads the shipped <code>app.js<\/code> and fails if any banned HTML sink appears. This is the regression guard the spec requires.<\/p>\n<p>**Files:**<\/p>\n<ul><li>Create: <code>tests/test_appjs_guard.py<\/code><\/li><\/ul>\n<ul><li>[ ] Write the test (it doubles as the failing check if a sink exists). Create <code>tests/test_appjs_guard.py<\/code>:<\/li><\/ul>\n<pre><code>import re\nfrom importlib.resources import files\n\n_BANNED = re.compile(r&quot;innerHTML|outerHTML|insertAdjacentHTML&quot;)\n\n\ndef _app_js() -&gt; str:\n    return files(&quot;acc&quot;).joinpath(&quot;templates&quot;, &quot;app.js&quot;).read_text(encoding=&quot;utf-8&quot;)\n\n\ndef test_app_js_has_no_html_sinks():\n    src = _app_js()\n    matches = [ln for ln in src.splitlines() if _BANNED.search(ln)]\n    assert not matches, &quot;banned HTML sink in app.js: %r&quot; % matches<\/code><\/pre>\n<ul><li>[ ] Run it — expect PASS now (the omnibox uses only <code>el()<\/code>/<code>textContent<\/code>/<code>createElement(&#x27;mark&#x27;)<\/code>): <code>cd /Users/ozzy-mac/Projects/html-dash &amp;&amp; python3 -m pytest tests/test_appjs_guard.py -q<\/code> → pass. (To confirm the guard actually bites: temporarily add a line <code>x.innerHTML = &quot;y&quot;;<\/code> to <code>app.js<\/code>, rerun → FAIL <code>banned HTML sink<\/code>, then revert.)<\/li><li>[ ] Commit: <code>git -C /Users/ozzy-mac/Projects/html-dash add tests/test_appjs_guard.py &amp;&amp; git -C /Users/ozzy-mac/Projects/html-dash commit -m &quot;test(phase-4a): CI guard rejecting innerHTML/outerHTML/insertAdjacentHTML in app.js&quot;<\/code><\/li><\/ul>\n<p>---<\/p>\n<h3>Task 13: Full-suite + lint + determinism gate<\/h3>\n<p>Final gate: whole test suite green, ruff clean, output byte-identical across runs.<\/p>\n<p>**Files:**<\/p>\n<ul><li>Test: all of <code>tests/<\/code><\/li><\/ul>\n<ul><li>[ ] Run the full suite: <code>cd /Users/ozzy-mac/Projects/html-dash &amp;&amp; python3 -m pytest -q<\/code> → all pass (unit + schema + DOM + guard).<\/li><li>[ ] Lint: <code>cd /Users/ozzy-mac/Projects/html-dash &amp;&amp; ruff check src/<\/code> → no errors. (If <code>ruff<\/code> is not on PATH, <code>python3 -m ruff check src/<\/code>.)<\/li><li>[ ] Determinism spot-check: <code>cd /Users/ozzy-mac/Projects/html-dash &amp;&amp; python3 -m pytest tests/test_generate.py -k deterministic -q<\/code> → pass (byte-identical output already asserted by <code>test_generate_is_deterministic<\/code> and <code>test_generate_multi_provider_is_deterministic<\/code>; the explicit <code>_build_search<\/code> sort keeps the new fields ordered).<\/li><li>[ ] No commit (gate only). If any step fails, fix in the owning task and re-run.<\/li><\/ul>\n<p>---<\/p>\n<h2>Plan author notes<\/h2>\n<p>**Spec-vs-code mismatches found (and how the plan handles them):**<\/p>\n<p>1. **Branch base is wrong — the biggest one.** The spec was written against the Phase 3 branch (<code>feature/phase-3-renderer<\/code>, tip <code>32bf625<\/code>), which contains every symbol the spec references: <code>itemRow<\/code>, <code>renderInventory<\/code>/<code>renderDocs<\/code>/<code>renderTodos<\/code>, <code>_reduce_for_size<\/code>, <code>_WARN_BYTES<\/code>/<code>_TRUNCATE_BYTES<\/code>, <code>_path_prefix<\/code>, <code>source.pathPrefix<\/code>, <code>generator.truncated<\/code>, the Overview bento, and the Playwright DOM harness <code>tests/test_render_dom.py<\/code>. But the current branch <code>feature/phase-4a-find<\/code> (HEAD <code>89a2fa5<\/code>) was cut from before Phase 3 merged — its parent chain ends at <code>17bb59a<\/code>, and <code>git merge-base --is-ancestor feature/phase-3-renderer HEAD<\/code> returns 1 (NOT an ancestor). The working-tree files are the pre-Phase-3 versions: <code>app.js<\/code> is 60 lines with no <code>itemRow<\/code>; <code>generate.py<\/code> has no <code>_reduce_for_size<\/code>/<code>_WARN_BYTES<\/code>. **Task 0 rebases the spec commit onto Phase 3** before any code task; every code block in the plan is written against the verified Phase 3 source (read via <code>git show feature/phase-3-renderer:&lt;path&gt;<\/code>).<\/p>\n<p>2. **<code>html.escape<\/code> emits <code>&amp;#x27;<\/code>, not <code>&amp;#39;<\/code>.** The spec says <code>htmlUnescape<\/code> should decode <code>&amp;#39;<\/code>. Python&#x27;s <code>html.escape<\/code> actually produces <code>&amp;#x27;<\/code> for <code>&#x27;<\/code> (verified: <code>html.escape(&quot;&#x27;&quot;)<\/code> → <code>&amp;#x27;<\/code>). Task 7&#x27;s helper decodes **both** <code>&amp;#x27;<\/code> and <code>&amp;#39;<\/code> (and <code>&amp;quot;<\/code> for <code>&quot;<\/code>), so it is correct against the real island and robust to either form.<\/p>\n<p>3. **Docs lack <code>type<\/code>/<code>typeLabel<\/code> AND a usable raw body.** Confirmed: doc records carry only <code>{id,title,path,summary,html}<\/code> (no <code>type<\/code>/<code>typeLabel<\/code>), and the body lives in the separately-sanitized <code>html<\/code> field. The plan synthesizes <code>type=&quot;doc&quot;<\/code> + a bucket-derived <code>typeLabel<\/code> (Task 1 <code>doc_type_label<\/code>, Task 4) and, per the spec&#x27;s resolved open question, slices the doc <code>summary<\/code> (not <code>html<\/code>) for the body slice (Task 3).<\/p>\n<p>4. **Inventory items have no raw body field today.** Confirmed <code>make_item<\/code> yields <code>{id,provider,type,typeLabel,title,path,summary}<\/code> — no body. The plan&#x27;s slice source falls back to the escaped <code>summary<\/code> for inventory, with a live <code>_rawBody<\/code> branch ready for any future adapter that adds one (matches the spec&#x27;s &quot;raw body for inventory items that have one&quot; wording without inventing a field).<\/p>\n<p>5. **TODOs lack ids — confirmed** (<code>_extract_todos<\/code> builds <code>{text,path}<\/code> only). Task 2 adds <code>stable_id(&quot;generic&quot;,&quot;todo&quot;,path,text)<\/code>.<\/p>\n<p>6. **<code>_searchBody<\/code> private key would leak into the island.** Because <code>inv<\/code>/<code>docs<\/code> are serialized whole into <code>data<\/code>, the temporary slice key must be stripped after <code>_build_search<\/code>. Task 4 adds an explicit <code>.pop(&quot;_searchBody&quot;, None)<\/code> pass and a guard test (<code>test_private_search_body_key_not_in_island<\/code>).<\/p>\n<p>7. **The Phase 3 test <code>test_over_2mb_truncates_to_summary_only<\/code> asserts <code>data[&quot;search&quot;] == []<\/code>.** Task 5 updates that assertion (the light index now survives truncation) — flagged so the implementer does not treat it as a regression.<\/p>\n<p>**Test directory / naming convention matched:** <code>tests/<\/code> flat layout, <code>pythonpath=[&quot;src&quot;]<\/code> + <code>testpaths=[&quot;tests&quot;]<\/code> in <code>pyproject.toml<\/code>, no <code>conftest.py<\/code>. Unit/generate tests are plain <code>def test_*(tmp_path)<\/code> importing <code>from acc.generate import ...<\/code> and <code>from tests.builders import ...<\/code>, reading the island via the local <code>_island(out_path)<\/code> helper. Playwright DOM tests live in <code>tests/test_render_dom.py<\/code>, take the <code>page<\/code> fixture from <code>pytest-playwright<\/code> (declared in the <code>[project.optional-dependencies] test<\/code> extra on the Phase 3 branch), and load HTML with <code>page.set_content(_html(repo))<\/code> (real Chromium, no server/<code>file://<\/code>) — the plan&#x27;s DOM tests copy that exact pattern, fixture, and the <code>_html<\/code>/builder imports. Tests run with <code>python3 -m pytest -q<\/code>; lint with <code>ruff check src/<\/code>.<\/p>\n<p>**Self-review result:**<\/p>\n<ul><li>*Spec coverage* — every acceptance criterion maps to a step: <code>/<\/code> focus + <code>Esc<\/code> (Task 10 <code>test_omnibox_slash_focus_and_esc_close<\/code>); <code>↑<\/code>/<code>↓<\/code> + <code>Enter<\/code> jump (Task 10 <code>test_omnibox_keyboard_nav_and_enter_jumps<\/code>); group + count across inventory **and** docs, no undefined group (Tasks 4/10 <code>test_build_search_record_shape_and_doc_type_label<\/code>, <code>test_omnibox_matches_inventory_and_docs<\/code>); jump scrolls + flashes exact row (Task 9 <code>test_jump_scrolls_and_flashes_exact_row<\/code>); match name/path/summary/body (Task 10 group tests + Task 4 body-slice test); <code>AT&amp;T<\/code> logical match + display (Task 10 <code>test_omnibox_at_and_t_logical_match_and_display<\/code>); hostile <code>&lt;/script&gt;&lt;img onerror&gt;<\/code> inert (Tasks 4/10 <code>test_build_search_escapes_hostile_slice_in_island<\/code>, <code>test_omnibox_hostile_body_is_inert<\/code>); grep returns nothing (Task 12); byte-identical + under budget + light-mode find (Tasks 5/13 + <code>test_omnibox_light_index_note<\/code>); per-view filter distinct (Task 8 <code>test_omnibox_and_filter_inputs_distinct<\/code>). Every item in the spec&#x27;s &quot;Testing&quot; list has a corresponding test. No coverage gaps remained after review; the <code>_searchBody<\/code>-leak gap was caught and closed with Task 4&#x27;s pop + guard test.<\/li><li>*Placeholder scan* — no &quot;TBD&quot;/&quot;similar to&quot;/&quot;add error handling&quot;/&quot;write tests for the above&quot;. Every step shows complete code or an exact command + expected message.<\/li><li>*Type/signature consistency* — helper names are spelled identically across tasks: <code>doc_type_label<\/code> (Tasks 1, 4), <code>_SEARCH_BODY_CHARS<\/code> (Tasks 3, 4), <code>_searchBody<\/code> private key (Tasks 3, 4), <code>_search_record<\/code> (Task 4), <code>_validate_search<\/code>/<code>_KNOWN_SEARCH_TYPES<\/code> (Task 6), <code>htmlUnescape<\/code>/<code>window.__accHtmlUnescape<\/code> (Task 7), <code>buildRowIndex<\/code>/<code>rowById<\/code>/<code>jumpTo<\/code>/<code>window.__accJump<\/code> (Task 9), <code>wireOmnibox<\/code>/<code>matchKey<\/code>/<code>appendHighlighted<\/code>/<code>snippetFor<\/code>/<code>OMNI_GROUP_CAP<\/code>/<code>INV_TYPE_ORDER<\/code> (Task 10), CSS classes <code>acc-omni-group<\/code>/<code>acc-omni-grouphead<\/code>/<code>acc-omni-hit<\/code>/<code>acc-omni-active<\/code>/<code>acc-omni-snippet<\/code>/<code>acc-omni-more<\/code>/<code>acc-omni-note<\/code>/<code>acc-flash<\/code> (Tasks 10, 11). DOM ids <code>#acc-omnibox<\/code>/<code>#acc-omnibox-results<\/code> consistent across Tasks 8, 10, 11.agentId: ad3e4ec3e311616fe (use SendMessage with to: &#x27;ad3e4ec3e311616fe&#x27; to continue this agent)<\/li><\/ul>\n<p>&lt;usage&gt;subagent_tokens: 195313<\/p>\n<p>tool_uses: 145<\/p>\n<p>duration_ms: 1520470&lt;/usage&gt;<\/p>","id":"9b4f157796c2","path":"docs/superpowers/plans/2026-05-30-ai-control-center-phase-4a-find.md","summary":"**Goal:** Turn the dead `data.search` index into a real global omnibox — type-grouped results with counts, a `&lt;mark&gt;`-highlighted snippet, keyboard nav, focus via `/`, and jump-to-row — plus the reusable per-row-id + id→row jump infra, all via `textContent` only.","title":"Phase 4a — Find Implementation Plan"},{"html":"<h1>Phase 4b — Relationships Implementation Plan<\/h1>\n<p>&gt; **For agentic workers:** REQUIRED SUB-SKILL: Use superpowers:subagent-driven-development (recommended) or superpowers:executing-plans to implement this plan task-by-task. Steps use checkbox (<code>- [ ]<\/code>) syntax for tracking.<\/p>\n<p>**Goal:** Populate the empty <code>relationships: []<\/code> with deterministic <code>reference<\/code> (doc→item path mention) and <code>declares<\/code> (config-file→MCP/hook) edges, and render them as inline &quot;Related&quot; blocks plus a &quot;Cross-references&quot; view.<\/p>\n<p>**Architecture:** A new <code>generate._build_relationships(inv, docs)<\/code> emits a sorted, deduped edge list after the search index is built; docs carry a private <code>_refScanBody<\/code> (redacted body, dropped before serialization) for the reference scan; <code>declares<\/code> edges are sourced from synthetic config-file nodes. <code>schema._validate_relationships<\/code> enforces shape + type-aware referential integrity. <code>app.js<\/code> builds an adjacency index and renders Related blocks (non-indexed jump controls) and a source-grouped Cross-references view.<\/p>\n<p>**Tech Stack:** Python 3.12 stdlib (generator), vanilla JS (renderer in a JSON island), pytest + pytest-playwright (real-Chromium DOM tests), ruff.<\/p>\n<p>**Spec:** <code>docs/specs/phase-4b-relationships.md<\/code> (final at commit <code>1b7333c<\/code>).<\/p>\n<p>**Conventions for every task:** stdlib only; deterministic output (sort every list); renderer is <code>textContent<\/code>/<code>createElement<\/code> only — never <code>innerHTML<\/code>; run from the repo root with <code>python3 -m pytest<\/code>. New relationship tests live in <code>tests/test_relationships.py<\/code> unless noted.<\/p>\n<p>---<\/p>\n<h3>Task 1: Adapters carry <code>_refScanBody<\/code> on every doc<\/h3>\n<p>**Files:**<\/p>\n<ul><li>Modify: <code>src/acc/adapters/claude.py:82-91<\/code> (the <code>doc<\/code> branch)<\/li><li>Modify: <code>src/acc/adapters/codex.py:55-61<\/code> (the <code>AGENTS.md<\/code> branch)<\/li><li>Modify: <code>src/acc/adapters/generic.py:114-120<\/code> (the doc append)<\/li><li>Test: <code>tests/test_relationships.py<\/code><\/li><\/ul>\n<ul><li>[ ] **Step 1: Write the failing test**<\/li><\/ul>\n<pre><code># tests/test_relationships.py\nfrom acc.adapters.base import ScanContext\nfrom acc.adapters.claude import ClaudeAdapter\nfrom tests.builders import make_claude_repo\n\n\ndef _claude_docs(tmp_path):\n    make_claude_repo(tmp_path)\n    files = list(tmp_path.rglob(&quot;*&quot;))\n    ctx = ScanContext(root=tmp_path, files=[f for f in files if f.is_file()])\n    adapter = ClaudeAdapter()\n    part = adapter.normalize(ctx, adapter.detect(ctx)[0])\n    return part[&quot;docs&quot;][&quot;references&quot;]\n\n\ndef test_claude_doc_carries_refscanbody(tmp_path):\n    docs = _claude_docs(tmp_path)\n    claude_md = next(d for d in docs if d[&quot;path&quot;] == &quot;CLAUDE.md&quot;)\n    assert &quot;_refScanBody&quot; in claude_md\n    assert &quot;Project memory and rules.&quot; in claude_md[&quot;_refScanBody&quot;]<\/code><\/pre>\n<ul><li>[ ] **Step 2: Run test to verify it fails**<\/li><\/ul>\n<p>Run: <code>python3 -m pytest tests/test_relationships.py::test_claude_doc_carries_refscanbody -v<\/code><\/p>\n<p>Expected: FAIL with <code>KeyError<\/code>/<code>assert &#x27;_refScanBody&#x27; in ...<\/code> (the key is absent).<\/p>\n<ul><li>[ ] **Step 3: Add <code>_refScanBody = clean<\/code> in all three doc builders**<\/li><\/ul>\n<p>In <code>src/acc/adapters/claude.py<\/code>, the <code>else<\/code> (doc) branch currently appends:<\/p>\n<pre><code>            else:  # &quot;doc&quot; — CLAUDE.md at root or nested under .claude/\n                clean, _ = redact_text(raw)\n                heading = _first_heading(clean) or rel\n                docs[&quot;references&quot;].append({\n                    &quot;id&quot;: make_item(&quot;claude&quot;, &quot;doc&quot;, &quot;Claude instructions&quot;, heading, rel, &quot;&quot;)[&quot;id&quot;],\n                    &quot;title&quot;: heading,\n                    &quot;path&quot;: rel,\n                    &quot;summary&quot;: _first_paragraph(clean),\n                    &quot;html&quot;: render_markdown_safe(clean),\n                    &quot;_refScanBody&quot;: clean,\n                })<\/code><\/pre>\n<p>In <code>src/acc/adapters/codex.py<\/code>, the <code>AGENTS.md<\/code> branch:<\/p>\n<pre><code>                docs[&quot;references&quot;].append({\n                    &quot;id&quot;: make_item(&quot;codex&quot;, &quot;doc&quot;, &quot;Codex instructions&quot;, heading, rel, &quot;&quot;)[&quot;id&quot;],\n                    &quot;title&quot;: heading,\n                    &quot;path&quot;: rel,\n                    &quot;summary&quot;: _first_paragraph(clean),\n                    &quot;html&quot;: render_markdown_safe(clean),\n                    &quot;_refScanBody&quot;: clean,\n                })<\/code><\/pre>\n<p>In <code>src/acc/adapters/generic.py<\/code>, the doc append in <code>normalize<\/code>:<\/p>\n<pre><code>            docs.append({\n                &quot;id&quot;: stable_id(&quot;generic&quot;, &quot;doc&quot;, rel, heading),\n                &quot;title&quot;: heading,\n                &quot;path&quot;: rel,\n                &quot;summary&quot;: _first_paragraph(clean),\n                &quot;html&quot;: render_markdown_safe(clean),\n                &quot;_refScanBody&quot;: clean,\n            })<\/code><\/pre>\n<p>Also pop <code>_refScanBody<\/code> in <code>generate.py<\/code> so it never reaches the island yet<\/p>\n<p>(<code>_refScanBody<\/code> is redacted but **unescaped** — leaving it in would regress the<\/p>\n<p>hostile-markdown test). In <code>src/acc/generate.py<\/code>, the existing private-field pop<\/p>\n<p>loop (~lines 268-271) drops <code>_searchBody<\/code>; add <code>_refScanBody<\/code> beside it:<\/p>\n<pre><code>    for bucket in (inv, docs):\n        for items in bucket.values():\n            for it in items:\n                it.pop(&quot;_searchBody&quot;, None)\n                it.pop(&quot;_refScanBody&quot;, None)<\/code><\/pre>\n<p>Task 4 later rewrites this region to call <code>_build_relationships<\/code> (which reads<\/p>\n<p><code>_refScanBody<\/code>) *before* this pop, so the field is read then dropped. Until<\/p>\n<p>then it is set-then-popped, keeping every commit green.<\/p>\n<ul><li>[ ] **Step 4: Add codex + generic coverage to the test, run to verify it passes**<\/li><\/ul>\n<pre><code># append to tests/test_relationships.py\nfrom acc.adapters.codex import CodexAdapter\nfrom acc.adapters.generic import GenericAdapter\nfrom tests.builders import make_codex_repo, make_brownfield_repo\n\n\ndef test_codex_and_generic_docs_carry_refscanbody(tmp_path):\n    make_codex_repo(tmp_path)\n    make_brownfield_repo(tmp_path)\n    files = [f for f in tmp_path.rglob(&quot;*&quot;) if f.is_file()]\n    ctx = ScanContext(root=tmp_path, files=files)\n    cod = CodexAdapter().normalize(ctx, CodexAdapter().detect(ctx)[0])\n    agents = next(d for d in cod[&quot;docs&quot;][&quot;references&quot;] if d[&quot;path&quot;] == &quot;AGENTS.md&quot;)\n    assert &quot;Guide.&quot; in agents[&quot;_refScanBody&quot;]\n    gen = GenericAdapter().normalize(ctx, GenericAdapter().detect(ctx)[0])\n    assert all(&quot;_refScanBody&quot; in d for d in gen[&quot;docs&quot;][&quot;references&quot;])<\/code><\/pre>\n<p>Run: <code>python3 -m pytest tests/test_relationships.py -v<\/code><\/p>\n<p>Expected: PASS (both tests).<\/p>\n<ul><li>[ ] **Step 5: Commit**<\/li><\/ul>\n<pre><code>git add src/acc/adapters/claude.py src/acc/adapters/codex.py src/acc/adapters/generic.py tests/test_relationships.py\ngit commit -m &quot;feat(phase-4b): carry redacted _refScanBody on docs for the reference scan&quot;<\/code><\/pre>\n<p>---<\/p>\n<h3>Task 2: <code>_build_relationships<\/code> — reference pass<\/h3>\n<p>**Files:**<\/p>\n<ul><li>Modify: <code>src/acc/generate.py<\/code> (add <code>_CONFIG_PATHS<\/code>, <code>_build_relationships<\/code>; extend the <code>.ids<\/code> import)<\/li><li>Test: <code>tests/test_relationships.py<\/code><\/li><\/ul>\n<ul><li>[ ] **Step 1: Write the failing test**<\/li><\/ul>\n<pre><code># append to tests/test_relationships.py\nfrom acc.generate import _build_relationships\nfrom acc.adapters.base import make_item, empty_inventory, empty_docs\n\n\ndef _doc(doc_id, path, body):\n    return {&quot;id&quot;: doc_id, &quot;title&quot;: path, &quot;path&quot;: path, &quot;summary&quot;: &quot;&quot;,\n            &quot;html&quot;: &quot;&quot;, &quot;_refScanBody&quot;: body}\n\n\ndef test_reference_edge_from_doc_body_path_mention():\n    agent = make_item(&quot;claude&quot;, &quot;agent&quot;, &quot;Claude agent&quot;, &quot;reviewer&quot;,\n                      &quot;.claude/agents/reviewer.md&quot;, &quot;&quot;)\n    inv = empty_inventory()\n    inv[&quot;agents&quot;].append(agent)\n    docs = empty_docs()\n    docs[&quot;references&quot;].append(\n        _doc(&quot;docid&quot;, &quot;CLAUDE.md&quot;, &quot;See .claude/agents/reviewer.md for review rules.&quot;))\n    edges = _build_relationships(inv, docs)\n    refs = [e for e in edges if e[&quot;type&quot;] == &quot;reference&quot;]\n    assert refs == [{&quot;from&quot;: &quot;docid&quot;, &quot;to&quot;: agent[&quot;id&quot;], &quot;type&quot;: &quot;reference&quot;,\n                     &quot;evidence&quot;: &quot;.claude/agents/reviewer.md&quot;}]\n\n\ndef test_reference_dedup_and_boundary_and_unique():\n    a1 = make_item(&quot;claude&quot;, &quot;agent&quot;, &quot;Claude agent&quot;, &quot;x&quot;, &quot;.claude/agents/x.md&quot;, &quot;&quot;)\n    inv = empty_inventory()\n    inv[&quot;agents&quot;].append(a1)\n    docs = empty_docs()\n    # path appears twice (dedup to 1) and once as a .bak prefix (boundary: no match)\n    docs[&quot;references&quot;].append(_doc(\n        &quot;d&quot;, &quot;CLAUDE.md&quot;,\n        &quot;.claude/agents/x.md and again .claude/agents/x.md but not .claude/agents/x.md.bak&quot;))\n    refs = [e for e in _build_relationships(inv, docs) if e[&quot;type&quot;] == &quot;reference&quot;]\n    assert len(refs) == 1 and refs[0][&quot;to&quot;] == a1[&quot;id&quot;]<\/code><\/pre>\n<ul><li>[ ] **Step 2: Run test to verify it fails**<\/li><\/ul>\n<p>Run: <code>python3 -m pytest tests/test_relationships.py::test_reference_edge_from_doc_body_path_mention -v<\/code><\/p>\n<p>Expected: FAIL with <code>ImportError: cannot import name &#x27;_build_relationships&#x27;<\/code>.<\/p>\n<ul><li>[ ] **Step 3: Add the constant, the import, and the reference pass**<\/li><\/ul>\n<p>In <code>src/acc/generate.py<\/code>, extend the ids import:<\/p>\n<pre><code>from .ids import rel_posix, stable_id<\/code><\/pre>\n<p>Add <code>import re<\/code> near the top imports, and a module constant near the other constants:<\/p>\n<pre><code># The provider config files that declare MCP servers and hooks. They are the\n# `declares` channel, so they are never `reference` targets — otherwise a\n# single-server config (one id, unique path) would draw a stray reference edge.\n_CONFIG_PATHS = frozenset({\n    &quot;.claude/settings.json&quot;, &quot;.mcp.json&quot;, &quot;.codex/config.toml&quot;, &quot;.cursor/mcp.json&quot;,\n})<\/code><\/pre>\n<p>Add the builder (reference pass only for now; <code>declares<\/code> lands in Task 3):<\/p>\n<pre><code>def _build_relationships(inv: dict, docs: dict) -&gt; list[dict]:\n    &quot;&quot;&quot;Deterministic edges over the merged inventory + docs.\n\n    `reference`: a doc body mentions an inventory item&#x27;s exact, unique,\n    boundary-delimited repo-relative path. `declares` (Task 3): a config-file\n    node -&gt; the MCP servers / hooks it declares.\n    &quot;&quot;&quot;\n    edges: list[dict] = []\n\n    # reference pass: path -&gt; set(ids) over inventory items only, keep unique\n    # paths that are not a provider config file.\n    path_ids: dict[str, set[str]] = {}\n    for items in inv.values():\n        for it in items:\n            path_ids.setdefault(it[&quot;path&quot;], set()).add(it[&quot;id&quot;])\n    unique = {p: next(iter(ids)) for p, ids in path_ids.items()\n              if len(ids) == 1 and p not in _CONFIG_PATHS}\n    # boundary match: reject a hit that is part of a longer path/word token\n    matchers = {p: re.compile(r&quot;(?&lt;![\\w./-])&quot; + re.escape(p) + r&quot;(?![\\w./-])&quot;)\n                for p in unique}\n    for bucket in docs.values():\n        for doc in bucket:\n            body = doc.get(&quot;_refScanBody&quot;, &quot;&quot;)\n            if not body:\n                continue\n            for path, item_id in unique.items():\n                if item_id == doc[&quot;id&quot;]:\n                    continue  # self-edge guard\n                if matchers[path].search(body):\n                    edges.append({&quot;from&quot;: doc[&quot;id&quot;], &quot;to&quot;: item_id,\n                                  &quot;type&quot;: &quot;reference&quot;, &quot;evidence&quot;: path})\n\n    return _dedup_sort_edges(edges)\n\n\ndef _dedup_sort_edges(edges: list[dict]) -&gt; list[dict]:\n    seen: set[tuple] = set()\n    out: list[dict] = []\n    for e in edges:\n        key = (e[&quot;from&quot;], e[&quot;to&quot;], e[&quot;type&quot;])\n        if key in seen:\n            continue\n        seen.add(key)\n        out.append(e)\n    out.sort(key=lambda e: (e[&quot;from&quot;], e[&quot;to&quot;], e[&quot;type&quot;]))\n    return out<\/code><\/pre>\n<ul><li>[ ] **Step 4: Run tests to verify they pass**<\/li><\/ul>\n<p>Run: <code>python3 -m pytest tests/test_relationships.py -v<\/code><\/p>\n<p>Expected: PASS (both new reference tests, plus the Task 1 tests).<\/p>\n<ul><li>[ ] **Step 5: Commit**<\/li><\/ul>\n<pre><code>git add src/acc/generate.py tests/test_relationships.py\ngit commit -m &quot;feat(phase-4b): _build_relationships reference pass (unique boundary path match)&quot;<\/code><\/pre>\n<p>---<\/p>\n<h3>Task 3: <code>_build_relationships<\/code> — <code>declares<\/code> pass (config-file nodes)<\/h3>\n<p>**Files:**<\/p>\n<ul><li>Modify: <code>src/acc/generate.py<\/code> (<code>_build_relationships<\/code>)<\/li><li>Test: <code>tests/test_relationships.py<\/code><\/li><\/ul>\n<ul><li>[ ] **Step 1: Write the failing test**<\/li><\/ul>\n<pre><code># append to tests/test_relationships.py\nfrom acc.ids import stable_id\n\n\ndef test_declares_edges_from_config_file_nodes():\n    inv = empty_inventory()\n    hook = make_item(&quot;claude&quot;, &quot;hook&quot;, &quot;Claude hook&quot;, &quot;PreToo clares edges yet).<\/p>\n<ul><li>[ ] **Step 3: Add the <code>declares<\/code> pass before <code>return _dedup_sort_edges(edges)<\/code>**<\/li><\/ul>\n<pre><code>    # declares pass: config-file node -&gt; each MCP server / hook it declares.\n    # Commands are file-discovered, not config-declared, so they are excluded.\n    config_items: dict[str, list[str]] = {}\n    for kind in (&quot;mcpServers&quot;, &quot;hooks&quot;):\n        for it in inv.get(kind, []):\n            config_items.setdefault(it[&quot;path&quot;], []).append(it[&quot;id&quot;])\n    for config_path, item_ids in config_items.items():\n        node_id = stable_id(&quot;config&quot;, &quot;configFile&quot;, config_path, &quot;&quot;)\n        for item_id in item_ids:\n            edges.append({&quot;from&quot;: node_id, &quot;to&quot;: item_id,\n                          &quot;type&quot;: &quot;declares&quot;, &quot;evidence&quot;: config_path})\n\n    return _dedup_sort_edges(edges)<\/code><\/pre>\n<ul><li>[ ] **Step 4: Run tests to verify they pass**<\/li><\/ul>\n<p>Run: <code>python3 -m pytest tests/test_relationships.py -v<\/code><\/p>\n<p>Expected: PASS (all relationship tests).<\/p>\n<ul><li>[ ] **Step 5: Commit**<\/li><\/ul>\n<pre><code>git add src/acc/generate.py tests/test_relationships.py\ngit commit -m &quot;feat(phase-4b): _build_relationships declares pass (config-file source nodes)&quot;<\/code><\/pre>\n<p>---<\/p>\n<h3>Task 4: Wire <code>relationships<\/code> into <code>generate()<\/code> with the pinned pop order<\/h3>\n<p>**Files:**<\/p>\n<ul><li>Modify: <code>src/acc/generate.py:266-295<\/code> (search build, private-field pop, data assembly)<\/li><li>Test: <code>tests/test_relationships.py<\/code><\/li><\/ul>\n<ul><li>[ ] **Step 1: Write the failing test**<\/li><\/ul>\n<pre><code># append to tests/test_relationships.py\nimport json\nfrom acc.generate import generate\nfrom tests.builders import make_multi_provider_repo\n\n\ndef _island(html: str) -&gt; dict:\n    start = html.in ationships<\/code> and call it from <code>validate<\/code>**<\/li><\/ul>\n<p>In <code>src/acc/schema.py<\/code>, add the import:<\/p>\n<pre><code>from .ids import stable_id<\/code><\/pre>\n<p>Add the validator and constants:<\/p>\n<pre><code>_REL_TYPES = {&quot;reference&quot;, &quot;declares&quot;}\n_REL_KEYS = (&quot;from&quot;, &quot;to&quot;, &quot;type&quot;, &quot;evidence&quot;)\n\n\ndef _validate_relationships(edges, item_ids: set, doc_ids: set, config_node_ids: set) -&gt; None:\n    if not isinstance(edges, list):\n        raise ValueError(&quot;relationships must be a list&quot;)\n    for i, e in enumerate(edges):\n        if not isinstance(e, dict):\n            raise ValueError(f&quot;relationships[{i}] is not an object&quot;)\n        for key in _REL_KEYS:\n            if key not in e:\n                raise ValueError(f&quot;relationships[{i}] missing key: {key!r}&quot;)\n            if not isinstance(e[key], str):\n                raise ValueError(f&quot;relationships[{i}].{key} must be a string&quot;)\n        if e[&quot;type&quot;] not in _REL_TYPES:\n            raise ValueError(f&quot;relationships[{i}] unknown type: {e[&#x27;type&#x27;]!r}&quot;)\n        if e[&quot;to&quot;] not in item_ids:\n            raise ValueError(f&quot;relationships[{i}] dangling &#x27;to&#x27;: {e[&#x27;to&#x27;]!r}&quot;)\n        if e[&quot;type&quot;] == &quot;reference&quot; and e[&quot;from&quot;] not in doc_ids:\n            raise ValueError(f&quot;relationships[{i}] reference &#x27;from&#x27; not a doc: {e[&#x27;from&#x27;]!r}&quot;)\n        if e[&quot;type&quot;] == &quot;declares&quot; and e[&quot;from&quot;] not in config_node_ids:\n            raise ValueError(f&quot;relationships[{i}] declares &#x27;from&#x27; not a config node: {e[&#x27;from&#x27;]!r}&quot;)<\/code><\/pre>\n<p>In <code>validate(data)<\/code>, after <code>_validate_search(data[&quot;search&quot;])<\/code> and before <code>assert_no_secrets(data)<\/code>:<\/p>\n<pre><code>    inv = data[&qu
